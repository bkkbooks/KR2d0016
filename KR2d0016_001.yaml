front:
  text: 並進應龍佯令其黨約降而統苗兵據關衝殺都司王之翰軍覆會繼光罷撤兵委軍資略盡二月禮部員外郎陳泰來疏曰虞淳熙素擅楊于庭西功未敘袁黃方贊東師該部計品取自上裁劉道隆遽借拾遺熒惑聖聼而蒙專權結黨之旨革考功趙南星并淳熙于庭黃等職必將來挈權以阿閣臣而後不為專權植黨以媚閣臣而後不為結黨上怒降泰來并薛敷教于孔兼顧元成賈岩張納陛各謫外石硅土舍馬邦䀻攻女寬撫覃氏覃上書曰臣自從征疊茂擊破大雪山斬虜一千級兩臺不以臣女流賜之奬曰紀律嚴明衝鋒苐一今邦聘無故而虔劉我臣請比先年楚金洞舍謀纂事願以邦聘就吏經略宋應昌檄劉綎陳璘水陸濟師上益發帑金二十萬佐軍興時諜言王京倭二十萬聲言入犯如松等分布守要害聞倭將平秀嘉據龍山倉粟𢾗十萬從間道縱火盡焚之倭乏食江西巡按薦舉人劉光卿鄧元錫學行純修特受光卿國子監博士元錫翰林待詔吳縣舉人王敬臣孝行修真進奉訓大夫行有司優禮原任通判王升馮行可遙授慱士俱直隸按臣薦三月閣臣王錫爵疏論進言受言之義不報淮甸水漂沒漕糧二万餘石李化龍巡撫遼東東師議欵四月倭退營釡山時師老糧匱李如松與宋應昌謀圖休息始用沈惟敬欵謀倭芻糧既燼亦懲平壤之敗有歸志而封貢之議起矣經略既得請于朝赦不窮追且得倭報惟敬書乃益遊擊周弘謨同惟敬往諭倭獻王京返王子如約縱歸倭果于四月十八日棄王京遁如松及應昌以翼日入城所餘米尚四萬餘豆芻稱是如松計乘間擊其惰歸而倭步步為營用分畨休迭法以退至釡山浦築居屯種為久戍計我乃張疑兵分遣劉綎祖承訓等屯大丘忠州檄全羅水兵龜船分布釡山海口倭既棄王京漢江以南千有餘里朝鮮故土奄然還定五月給事中侯慶逺謂我與倭何讎為屬國勤𢾗道之師力爭平壤權收王京挈兩都授之存亡興滅義聲振海外矣全師而歸所獲實多上乃諭朝鮮王還都王京整兵自守各鎮兵久疲海外以次撤歸應昌疏釡山雖瀕南海亦朝鮮境有如倭覘我罷兵突入再犯朝鮮不支前功盡棄且關白之圖朝鮮意在中國朝鮮固則東保薊遼並無慮京師鞏于泰山矣今曰撥兵協守為第一策部議量簡精兵三千善後餘盡撤還禮科都給事中張貞觀言祀典關係甚重日久遣代冝非方今淮甸之水畿輔之旱湖湘之風霾兗豫之淫􅕙左在為沴而地震天鳴甘寧殆無虛月流星火光薊遼屢有報聞瀋陽之天火千家留都之霆煨陵樹可以見天心之仁愛亦可以見宗宫之怨恫則竭誠以格祖回天正今日吃緊第一義不報御史彭應參言倭奴通貢勢必寧波入經行紹興杭嘉等地方設備勞費邉海重地財賦奧區豈不慮其乘機肆螫此其害之在地方者至若天下財賦所入不過四百五十餘萬北虜𣢾貢浸淫至今歲費三百六十萬倘倭貢之套再成自淮掦蘇松兩浙閩廣間在在皆可開市皆當備禦則東南之費當亦不減西北此其害之在國家者願皇上斷斷勿許乘今六師既集沿海有偹之時極力長驅務使片帆不返下所司議閣臣王錫爵疏臣幸得與諸臣立不諱之朝事聖明之主以至人無擇言言無擇官豈非甚盛雖然言太輕則浮太煩則亂太執則頗太深則刻就此甚盛中亦不無大可憂者臣之所憂上下相信而後政事可修相重而後論説可入今言不已而漸輕輕而不已漸厭使君父視外廷之奏論如賈𥪡之爭言因一人而疑衆人因一事而疑衆事上下之際無復相信相重之意後雖有忠言讜論亦將格而不入此臣之憂也古稱有對則爭興爭興則黨立今朝中議論已分兩岐恐水火之爭至成左右之袒此以彼為邪彼以此為邪使天下之士智力殫于相伺名望損于相詆即使一彼一此一勝一負朝廷亦止得一半人才之用若始于兩持終于兩敗不但人才盡壞亦且國骵大傷此臣之憂也上有所處分而下未必服下有所爭執而上未必亮下以忤上為髙上以反汗為恥上下相激何事不有譬之水然波方起而擊之以石則其躍彌髙譬之石然火方出而即沃之以水則其壞彌速此又臣之憂也大抵𢾗年議論始于相矯成于相激議𢾗更而難窮法𢾗更而難守事𢾗更而難睹其效人𢾗更而難課其成政事不修紀綱不振皆始于此今習尚已成極重難返則莫若導之使言而總之使一切謂題覆冝慎聼納冝公甄别冝先勘劾冝審向者皇上嘗嚴出位之禁矣臣以為此不必禁也古所患于盈廷者苐以莫執其咎爾如使言有歸著事有總萃則雖盈廷何害臣請一切章奏統條貫而歸六部六部題覆别黑白而定一尊嘉言用之足為益而妄言置之不為損則在廷議論更患其少爾所謂題覆冝慎也孔子曰君子不以言舉人不以人廢言乃臣見近來聼言之弊往往不問其所言之事而先揣其所以言之心臣以為使其人不肖朝廷原自有黜陟之權而何必于聼納之時逆意深求自今請就言論言就人論人使士絶踰涯之望則無所為而言自公朝開翕受之途則無所激而氣自平所謂聼納冝公也天下之人品不齊迹同心異言同行異者誠不可不辨然必先用其賢而徐簡其不賢亟暴其長而薄責其所短然後衆心愧服物論自平乃臣又見近來淹棄諸臣之中蓋多素心馴行卓然流俗之外者而或屢推未報或一黜不復朝廷既不得盡真才之用而天下且得借為議論之端不若盡捐前忤以次特表用之庶幾舉直而枉自錯忘我而人自安所謂甄别冝先也朝廷用舍多慿舉劾任已則耳目不廣任衆則毀譽易淆比年以來幾于朝無完人人無完行當事者但為調停量處若其事果虛則是近在輦轂猶有不白之冤若事果實則既聞于朝廷豈有不行之法近時釋繫臣李材命釋之四川巡按王象蒙參楊應龍上以既無叛逆重情彼處撫按行提酌量情法具奏不必差官往諭六月沈惟敬歸自釡山同倭使小西飛驒守藤來請欵倭隨犯咸安晉州給事中張輔之謂倭聚釡山原徉退誘我撤兵以圖漸逞無故請貢非人情今猝犯晉州情形已露冝節制征勦遼撫趙耀亦報欵貢不可輕許下部勘議總河尚書舒應龍以霪雨河決請賑沿河州縣工部左侍郎沈節甫言浙直閭閻蕭條請停龍袍之運議宗藩選舉與之入學中式將軍以下改官升轉七月吏部尚書孫鑨罷羣臣疏請御朝講大學士王錫爵密疏言古帝王禳彗之法一切以除穢布新為義若紫微垣王者之宫則必求莫大切身之事可以改觀萬國厭不祥者天以皇上為子皇上以太子為子天子之象曰帝星太子之象曰前星方今非亟舉册立之大典無以解赫然之天變旨慰答之敕諭內外群臣頃者皇天垂戒災異洊臻朕仰承天心仁愛且感且懼巳齋居思過兼敕臣工痛加修省猶恐窮􅉉蔀屋之下邊方荒徼之外耳目不周軍民失所以干天和是用申諭爾等今後但以小臣得所為有司之賢否以有司得職為撫按之賢否其不恤民瘼無濟地方者即時議處姦貪不法酷虐害民者參奏拿問如有真心實政德惠及民者即據實特薦以慿優異且國家養兵原自優厚只因官不恤將將不恤兵今後著督撫官痛湔宿弊其舉劾體訪必公必慎無得輕忽恣意朕又念東征將士荷戈異邦三伏炎蒸重以隂雨直以恤小禦暴不得不然其在朕心能無憫惻其發去銀兩不知各兵果沾實惠否日給糧餉不知有無足用及該大兵所過地方民間不致騷優否榖價不至騰貴否都著實查勘以聞倭從金山移西生浦送回王子陪臣議留劉綎川兵吳維忠等南兵防守加綎總兵維忠等俱聼節制傳催紗金彩膝襴蠎衣三千匹侍郎沈節甫疏諌上以天變民窮減三分之一江北水災留備倭漕糧二十萬石賑散八月萬壽節免賀吏部題諸臣飾詐有欲借請告之名謝速化之迹倡避嫌之路開去國之端者請容酌議不得允放上曰人臣恬退知止原係士節但近來每飾虛名以退為進致使職業曠廢升遷躐等徒長澆風于國家何賴爾部嚴名實以一政體果有亷靜實行仍不次擢用以示風勵申嚴薦本連坐法其論劾倒置者亦坐之河南民飢都給事王德完條賜欽賑蠲起運行平糴三事從之楊應龍不服勘問敕該撫按官便冝擒治仍諭止罪首惡不許貪功妄殺山東按臣周維翰言東師病困難留夷請封貢未去冝且撤兵休息及春再圖下司議九月召南吏書陳有年為吏部尚書左都御史李世逹罷孫丕掦代吏部選司孟孔鯉以擅推張棟諸人謫為民十月上諭本兵倭奴許封不許貢宋應昌復遣沈惟敬入倭營趣謝表兵部復議併撤吳惟忠等兵止留劉綎協守總督顧養謙亦力王撤兵許之因疏請封貢上命九卿科道會議儀制郎中何喬逺忿請罷封科道趙完璧唐一鵬等交章參總督朋欺如松開釁請絶封本兵石星恐不能縻關白終主封貢不已十一月慈聖皇太后萬壽上御皇極門受朝賀畢御暖閣召輔臣王錫爵至錫爵叩頭謝纍次恩眷又叩頭賀聖體康寧畢上諭曰卿為國逺來辛苦朕心甚喜對曰臣受皇上髙厚之恩粉自碎骨不能補報何况區區奔赱之勞上又諭卿扶母來京可謂忠孝兩全爵又叩頭對曰臣今日正恐忠孝兩虧且如皇上召臣本付托以國家之事目今外邉諸務雖漸有頭緒苦于朝廷之上議論日繁止因册立一事不㝎生出無𢾗疑心所以連進密揭力勸皇上早斷上曰恐後中宫有生却怎麼處錫爵又對𢾗年之前説此猶可今皇長子年十三歲矣豈有人家子弟十三歲不讀書之理何况皇子上曰朕知道了朕子明年該長髮之期卿所奏洞悉苦心爵又奏臣今日見了皇上不知再見何時伏望皇上三思臣言將此事速斷不必待冬至後更望皇上時出御朝頻召臣等啇量政事天下幸甚上曰朕也要與先生每常相見不料朕體不時動火爵對動火原是小疾望皇上清心寡欲保養聖躬以遂羣臣願見之望即如今日聖駕一出滿朝歡呼可見勤政視朝是治安急務言畢聖駕欲起又叩頭而出錫爵復疏請豫教分别長幼再疏請皇長子先行冠禮行人髙攀龍上言黜楊應宿應宿亦疏黜攀龍有旨各謫外御史吳弘濟辨髙楊邪正并黜為民起鄧以讃吏部右侍郎辭不至諭吏部皇長子册立一事久已斷自斷心但以方在壯年不妨待嫡稍緩今欲明春先行出閣講學禮其皇三子少待次年另行長幼之序即此為定爾部傳諭各衙門如敕奉行調刑部郎中張廷相外任內監馮海等盜庫銀千餘兩部擬充淨軍上怒其受賄徇私遂調外浙江巡按彭應參言該省災傷乞停減袍縀不允十二月以東征大兵既撤宋應昌及李如松等俱取回命督撫侍郎顧養謙代為經略南部即談一召言人心有偏蔽則不平輔臣王錫爵不能平心久矣自正月再入輔政無月不逐言官今得罪棄置者六十餘人部郎孫繼有言姦人敢于傾善閣臣果于容姦應宿量降攀龍重處去留失平矣南部安􅛽范言南星化鯉之秉公天下共惜之用賢之剛正天下共惜之至如鑨之清修世逹之練逹李禎之方介天下又共惜之行人髙攀龍一疏湥惜諸臣之去反蒙重黜不能不歸罪于閣臣矣以為出聖裁則閣臣乏弼違輔衮之忠若出票擬則閣臣隂快私意而歸過君父不忠之尤者旨革繼有為民一召希范逮問南給事中葉繼美等疏參王錫爵救談一召等言閣臣有心黜逐為妬賢不能匡救為竊位奪繼美俸一年既而輔臣申救甚切免一召希范逮問旌表湖廣孝子周勃節婦二十五人烈婦女五人萬曆二十二年甲午正月庚辰朔洽事中趙完璧言倭奴往者託貢之術以覘我輕重幸賴皇上格寢其説兹又假封之名以嘗試我夫倭之所嗜者利利不足無以誘倭使還經略惡夫以利啖倭之名也不得不託之為貢貢不成則倭不退經略又見貢之不行也故不得不易之為封説雖三義則一名在此而實在彼也經略出都之時行色何壯而今憊懦至此遂虎之法轟雷之炮戰車巨艦之修費水衡內府百萬俱付之烏有而僅僅市一封臣以為此舉是人臣之利非國家之福也下部知之諭吏部昨歲各省災傷山東河南及徐淮近河之地為尤甚民間至有剝樹皮削草子而食又至有割死尸殺生人而食者朕雖居深宫之中不遑寢處曽經屢旨蠲賑不知有司曽否奉行小民有無沾惠值此公私交詘不知谷該地方除內帑漕糧或留或發之外别有救急便冝措處方略否其各處礦徒盜嘨聚成群又不知果已安插歸農防禦有備否目今四方吏治全不務講求荒政牧養小民止以摶擊風力為名聲交際趨承為職業費用侈于公庭追呼遍于閭里囂訟者不能禁止流亡者不能招徠遇有盜賊生發則或互相隱匿或故意縱舍以避地方失事之咎其各該撫按官
