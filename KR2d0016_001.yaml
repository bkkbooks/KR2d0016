body:
  text: 顯皇帝本紀三萬暦三十二年甲辰正月壬子朔大計河道侍郎李化成上泇黄河自開㱕而下合運河入海有道有三由籣陽道考城過堅城出茶城向徐邳為中路是名濁河由曺單經豊沛出飛雲橋從昭陽湖出秦溝為北路是名銀河由潘家口過司家道口經符離道睢寕入宿遷出小河口為南路名符離河較而言之中路差勝不如泇河之開其善有六盖由宿遷入運則徐邳涸而無水難由豐沛入運則豐堤壞而有水難泇河開而運不借河其善一以三百六十里之泇河避三百三十里之黄河二洪自險鎮口自淤不相関善二運借河則河為政運不借河則我為政察機冝而治之善三先年估全工以三百九十萬今直二十萬善四開河必行召募及此時召募則春荒役興麥熟人散在冨民不苦于賠在窮民亦淂以養此両利之術也善五粮船過河約在春盡畏河漲尔入泇河而安流送浪早暮無妨過河之禁可弛善六請開泇河以通運泇河者在滕嶧之間受沂洙下流南通淮海舒應龍嘗鑿韓荘中作而罷劉東星在事欲遂成之㑹病卒未果至是化龍建議開之漕河别出一間道矣大學士王家屏卒贈少保謚文端家屏器局慱大操履嚴正論者謂其忠誠體國抱大經濟不及盡展以致太平有餘思焉二月大學士沈鯉辭㑹試主考首輔沈一貫題次輔沈鯉禮部右侍郎唐文獻主考鯉辭次輔主考以祖宗朝有入京朝賀舊臣暫留典試畧倣遺意可絶弊端乃改命朱𢋫取楊守勤等三百人山東廵撫黄克纉奏稅監委官觧銀于路詭称被刼累地方賠償此輩習成嚇詐局套攘奪日甚請通行申飾禮部左侍郎李廷機條陳宗藩簡便事例時宗藩請封諸事所費不貲天潢之胄等于無吿故疏言之江西禁山所屬七縣民包納山價二千両認買盗竊守衛将軍金牌各監稅進銀二十餘萬兩下户部収取金珠寳玉入宫三月廷試賜進士楊守勤孫承宗吳宗逹等及第出身有差考選庶吉士二十二人駙馬楊春元棄職私赱囘郷詔削其父官四月辛巳朔日食改初五日享太廟司禮太監陳矩上妖書獄𥘉株連捕冶已非一𧺫最後淂皦生光廷訊時康丕掦錢夢皐皆欲坐郭正域而御史牛應元等指天為誓沈裕厲声折之生光從重論恐株連多人無所㱕獄生光自誣服歎曰朝廷得我結案如移一口諸君何䖏求生活乎李廷機趙世卿又吿輔臣朱𢋫既淂生光可具獄𢋫亦勸一貫如廷機言事稍解遂移生光刑部論斬上欲加等以謀危社稷律論磔定歳貢于四月十五日初試五月十五日再試著為令詔景府遺下荘田地租悉送福府崇文門外皇店聼福府𬋩理五月兩廣總督戴耀極言中官採珠之害初粤中香山澚九夷貿易畨舶所艤漸乃築城聚室儼然立一畨主交搆中官流毒一方云廣東税監李敬進礦金珍珠千兩張忠等進金銀八萬兩有竒廵按四川李時華奏勘界事難結局𥘉播州之役安疆臣不惟假道又且助兵戦甚力有功将士分功蔽之僅以虚銜酬賞竟負𥘉約其靖邉等地疆臣據于掦酋存日撫臣必欲反之于酋亡之後所以怏怏卒不服六月光禄卿王守素奏寺帑屡竭光禄每年錢粮入𢾗不過二十二萬又時有逋欠不如額者萬暦𥘉張居正作相限制用十二萬多至十五萬止以後漸至三十萬出浮于入寺臣束手城狐社鼠莫可問矣羽林衛等官奏稱徽寕二府稅契銀十五萬蘓松諸府稅契銀二十萬着太監邢隆繳進山水衝諸陵䖝食陵樹葉殆盡諭内閣傳諭各衙門修舉切要時政以昭畏天至意諭内閣朕自聞祖陵災異至今尚驚惧尗安卿等屡奏應行時政少俟簡發其召見至誠候㫖從容行之所請詣門起居已知道大學士沈一貫等言今日夜思四方之政如寝針氊如坐火薪何能頃刻待臣等非不欲俟而天下危亂恐有不能俟者乗天下未變而圖之則權在皇上但一下明詔而海宇大定待天下有變而圖之則權在匹夫一經嘨聚便難措手不報七月大學士沈一貫沈鯉朱𢋫各素服賫疏赴文華門叩頭投進懇賜施行實政淂俞㫖時霪雨連綿都城崩壞主事徐鑾上言弭災實意請収囘礦使户部尚書趙世卿諫言蒼生縻爛已極天心示警特嚴礦税貂璫掘墳墓奸子女侮官虐民成何世界皇上嘗曰朕心仁慈自有停止之日日以継日更待何日也諭天雨連綿京城􅔐壞房屋𢾗多壓死人民甚衆朕心惻然便着太僕寺給發銀十萬両交與該部科及五城御史㑹同查勘每房一間欽賞銀五錢以資修理賑濟及醫薬津送之費務先儘貧難下户仍不許官吏侵冐必令沾受實恵又諭户部京師米價日貴着于通州倉粮暫借十萬石運付京倉支放該月折色軍匠米粮五城房號銀両除舊例免徴外再免一月以昭朝廷權冝救災德意大學士沈一貫等條應天實政一西山被災窑户當恤二鎮撫司獄房雨傾各犯當矜三播州戦功乆未叙當行四江北地方疊災當賑五教習庶吉士舘師當補六部院大臣及四省廵撫當用七牧地為水所占當緩賦諭嘉慰之原任兵部左侍郎許孚遠卒賜祭葬如例河決蘓家茌水渰豐沛八月都給事中田大益疏言皇上迩來亂政不减六代之季屡疏泣陳而皇上堅塞兩耳宵人奸棍妄謂小亂易治搜括竒巧蠱惑聖心恐積怨之民窮極計生斬木掲竿四向而起文武大小九卿科道官齊赴文華門叩頭上疏諭内閣前有㫖修省实政静俟次第發行文武大臣俱着安心供職共濟時艱如何又來凟激奏優恭照祖宗制度朝儀静粛尊嚴凡有軍國大計許實封本從㑹極門投進聼候裁奪近來不知何物設意作俑朝廷但行一事若妨已之私弊便哄然群𧺫挾廹君上要譽沽名全不思君臣大義恣肆成風是何理體沈一貫等言上欲朝儀粛静當収天下之心欲收天下之心當恤天下之言近年以來天下乆罹礦稅之苦而又習聞停止之言跂望恩綸以日為歳諸臣感時多故千言萬牘總出懇誠君臣大義正當如此伏望皇上取逆耳以悦心圖宗社之永計曠然下明詔罷礦税于羣慮不及之時使言事之口淡而無味憂國之心化而若忘朝儀自粛天位自尊都俞吁咈之風當不逺矣武􅋮衛百户陳𧺫鳳請採巨木充國用上震怒曰上天示儆朕正修省舉行德政起鳯指称採木誑惑朝廷好生欺玩姑革職為民福王因天變辭免官店不准仍令禁戢騷優九月以畿南災䘲異常勅刷出堪動銀錢賑濟予前吏部尚書倪岳曽孫倪翰儒補廕不為例建參隨程守訓王維忠等追問陳増參其僣匿龍文竒珍異寳及家人供称銀四十萬為撫按㑹報客星變釋詔獄等官何棟如華鈺等二十四名為民囘籍分水河成大學士沈鯉乞休不允鯉念時事艱難天聼未盡囘不積誠無以報主乃列謹天戒惜民窮等十事書之于牌每入閣則率両房官拜禱願天啟聖聰或讒鯉為詛咒上大怒立命中貴取觀之曰此非詛咒語也讒者曰其詛咒但不出声尔上黙然不應閏九月楚宗人藴珍等殺湖廣廵撫趙可懐楚事既寝楚王遣人奏謝因遺書幣謝諸貴人楚宗知之率衆邀諸途副使周應治鄞人也恐事露率驍騎盡縛之械繫于獄明日可懷出視事三司使者環列宗人羣而訢于可懷可懷譙讓之起至溜下欲訊審珍等遂以手械擊其首因仆立殺之餘宗起徧擊諸司踰墻赱應治亦被重傷廵按吳楷奏聞上怒勅盡法拿治諭内閣播功平定一國拓土開疆不行封爵之賞不可以勸後大學士一貫謂在事文武衆難以濫封特加總督李化龍少保總兵劉綎陳璘左都督十月紅夷肆刼于福建𥘉紅夷為奸啇所誘貪漢財物而來入閩不過二舶乆之賈人欺紿盡沒其貲夷為具吿守土大吏不辨佅􅍣之言惟慿通事顛倒以致夷人忿而称亂自後時時見吿不可復止海西友帖等衛㤗寕等衛夷人各進賀萬壽長至二節禮部疏覆楚宗上曰宗室有賢有愚這釁亂的必有民間棍惡乘机夾雜其中分别擒䖏一直榜諭善宗恪守禮法毋得黨奸取戾以後各宗俱不許聚衆䙝體擅入公門把持囑託威制有司楚王着用心照舊整理八郡王恊心分職綏靖所屬毋仍縱玩廣東兵備姚善掩殺黎人致敗瓊州生黎以香易土牛廵兵奪其牛黎憤殺𢾗人去參将倖功聞于兵備姚善率衆掩之大敗督府遣師援之又大敗後調𢾗萬人擊之黎赱入深險莫可奈何得老弱首𢾗顆報㨗十一月以畿輔飢發通倉粮十萬石平糶朝鮮國王觧外洋所獲被擄人民及倭衆于中國勅奨賚之十二月命部司御史領太僕寺銀兩速行賑濟輦下飢民廵撫湖廣梁應龍奏楚宗罪状分别五等以聞㑹勘時布政使薛三才與撫按二臣力辨諸宗不反應龍云世有不反而敢公然殺一廵撫大臣者乎獄詞既上温純亦言今日諸宗之罪最重在毆死重臣一語遂執以断斯獄衆議帖然萬暦三十三年乙巳春正月丙子朔給事中胡忻言獻歳發春宸情悦豫聞山䑓二厰鳩工運材起架鰲山以備游賞而小民為礦稅所困為中使參隨所魚肉輦轂之下物耗價騰畿輔之間析骸易子江之南北山之東西無地不流離無人不愁苦誠于此時急下明詔一切報罷則渙號風行歡聲雷動矣不報考察京官時主察當屬侍郎楊時喬輔臣沈一貫憎其方嚴請以兵部尚書䔥大亨主筆上以時喬亷直竟屬之與都御史温純力持公道執政使人語喬曰此番計事凡舊嫌宿怨當一切破除又曰各屬賢不肖一聼其長以受成于明主不得有所侵奪喬嘆曰此挾天子以令諸侯尔及疏上乆持不下給事中錢夢皐以妖言誣大臣罪當外補中㫖留之喬乃請罷不許于是郎中劉元珍御史朱吾弼主事龎時雍後先論一貫權奸誤國有㫖元珍等俱謫外廣東廵按御史直指楚藩假王亦坐謫時有吳中布衣在一貫坐夢皐戯之云昔之山人為山中閒人今之山人為山外逰人布衣對云昔之給事給黄門事今之給事給相門事一坐咍然二月乙巳朔開採太監沈永壽以廣西地多猺獞礦塲險逺請令有司包觧上命酌派河池永康等州富州思恩等縣歳納銀一千兩有竒廵撫侍郎楊芳請賜豁免以惠遐方不報三月乙亥朔諭吏部都察院大察各官本内科道不称職者甚繁豈皆不肖或因忿恚以洩怨者有之因結黨以排去者有之欲𥪡權以挾人者有之欲立威以制人者有之大察朝廷鉅典非以公濟私之案牘大臣當以尊君體國為要以詳慎休容為美務去成心同寅恊恭共濟時艱以成平明之治部院因㑹奏臣等恭奉聖諭不勝戦慄嘉靖以來察䖏科道其𢾗恒多各官多缺察𢾗太減今次員𢾗視昔不逺而議䖏科臣四人道臣七人皆參質衆論矢公矢慎不敢苛求惟是臣等不職不称任使亟冝罷黜上曰既矢公慎各安心供職不必陳優命太監田義㑹㤗寕侯陳良弼戎政尚書䔥大亨御史李楠閱視三大營将領等官分别賞賚及罸俸䧏黜如例改題長陵石碑曰成祖文皇帝之陵工部言長陵碑石原刻太宗文皇帝之陵世廟改太宗廟號為成祖陵亦因之惟碑石未敢輕動仰祈欽定以著孝思上曰碑石鼎新理冝改題議徙寛奠新疆居民六萬餘口入内棄新疆為甌脱摠督蹇逹廵撫趙楫布政張中鴻摠兵李成梁以招囘華人叙功東虜酋首宰賽誘殺慶雲堡備禦熊鑰及拆毀墩䑓戕擄軍役事聞詔停革市賞行督撫鎮道相机䖏置山東廵按奏濟寕魚䑓单縣等州縣被河衝决其錢粮除應免者餘俱炤被災八分以上事例每石折銀五錢俟水退地出另為徐議部覆從之庚戌刑部㑹府部九卿科道覆議楚宗罪状得㫖藴鉁等二名䖏斬華雋等三名及二等内華勒令自盡英嫶等二十三人押發髙墻禁錮藴芳等二十二人及四等内華璠定熈常净分發逺府閒宅禁住藴䥸等十五人䧏爵一等未封者俱不准封五月甲戌朔大學士沈鯉以疾乞休上優詔勉留之兵部郎中劉元珍疏劾大學士沈一貫曲庇私人蒙上箝下給事中錢夢皐翼賛一貫搏擊朝紳引用匪類乞賜罷黜疏入不報一貫隨具疏剖白并乞明示獨断之意以釋人疑上温㫖慰留之夢皐亦力詆元珍謂其謗毀君父指為左都御史温純鷹犬又言今大臣忿純辯疏不下相約一時求去以示要挾意指大學士沈鯉與吏部侍郎楊時喬也疏留中南京兵部條陳馬快船事冝列為四欵一申明註選之規三年之内不淂别差則官乆而事専一裁冗設之員庶無十羊九牧之虞一申差遣之䂓明㫖由飾酌量省併𬋩運内官務選老成安静者則驛騷之害免一廣赦宥之恩乞分别帶徴全徴隨粮同解下兵部議覆從之予安南禄州夷官韋逹禮贖罪自新仍令頭目鄭松嚴加約束不得再犯先是逹礼聼叛目陸佑等誘執思陵土官韋紹勇奪其印督撫戴燿楊芳責令鄭松擒献達礼惶惧送還官印官兵勦陸佑達礼奉拿奸細十八名督撫以其悔罪用命請姑待以不死從之勅諭中外大小臣工朕近年雖事静挕而一日萬幾未嘗不親自䖏断二三輔臣雖時有献替而亦必取自上裁其于咸福予奪之柄從未有下移者也今歳大察疏朕簡閱良乆見科道𢾗多不能無疑又思近年行取及散舘𧺫𥙷各官諸衙門屡來市恩凟優未經簡彂恐差用乏人是以卹念将被察科道一㮣留用仍嚴諭切責以警将來皆断自朕心誰能參預乃聼補郎中劉元珍以補官未遂輙造言生謗排擊元輔株連蔓引揺惑人心将使人主事事狥人漫無主宰大臣時時畏謗不敢擔當然後為快欤則何以振紀綱成政體也治亂所関特兹諭知尔中外大小諸臣務冝捐私體國臻于蕩平毋淂更起疑端淆亂國是劉元珍冝重治但念寛小臣所以安大臣姑䧏一級調極邉方用再有隨声附和的併治不貸故諭虜犯戚家堡殺擄人畜甚衆參将劉宗漢等革職提問有差六月甲辰朔大學士朱𢋫疏請亟視事其吏部本章積而未下者一一點票以収人心以召和氣大學士沈鯉以久病曠官乞賜罷黜以應天變并請采納首輔及九卿科徑批云南京吏部疏催考察庻官得㫖各致化䧏黜如例改江西新城知縣髙江為直隷東光縣敎諭湖口太監李道鷙暴大肆威福江與抗禮及議稅江曰新城濱江瘠壌啇賈不集何稅之有道索庫金江曰新無積儲浚民膏以為中貴人歡令实不能道大怒慢罵去復檄新城包稅江一切拒之新民某所居山不𢾗畆下為廬以居上葬其親道欲鑿之江再為牘白上官爭之力道黨王金吾復至新求賂語侵江江不堪忿抑獵纓𧺫曰䑕輩豈以吾重去官耶吾㱕矣遂上牒乞㱕御史史弼欽其亷明慈愛再三留不得以改教題請去之日民扳轅羅拜有下淚者後𥙷東光敎諭署吳橋縣事編審徭役親為勾校大服民心大璫盧受延之賞雪体寒令吏索衣未至璫出貂裘衣之以衣至即觧還礑曰裘值百金而少之耶江笑曰子思不受狐白裘于子方吾貧不若子思君裘不啻子方故不受尓璫侄從旁強衣之江拂袖而𧺫其介直盖如此江仁和人萬暦乙酉南榜魁致仕吏部尚書陸樹聲卒華亭人恬黙嚴重寵辱不揺云壬午以黄河洶湧運船過淮過洪照先年例量寛一月其衝决䖏所着摠河嚴督司道作速修治郎中賀燦然䧏三級調外燦然疏主察與被察者俱冝罷吏部楊時喬言國是難定主權下移懇辭印務上諭時喬䇿勵供職燦然等䧏極邉大學士沈一貫沈鯉朱𢋫皆疏救不從戊子上諭閣臣當今天變頻仍人心翕訿維新庶政恊和萬邦正在今日朕以一人焦勞于上而股肱心膂自顧身名杜門不出如國家大事何古人任天下之重委身于利害是非之塲者當不如此着鴻臚寺堂官宣諭朕意即日入閣辦事戊戌夷酋五路台吉悔罪認罸仍許貢市原革舊賞准量給與仍命督撫宣諭朝廷恩威以後但有挟賞犯邉定行誅討賞順義王忠順夫人銀幣八月壬子蘓松常鎮稅監劉成以米粮免稅額𢾗難充請乞特賜裁减上曰前有㫖米粮柴薪民生日用之需不許徴稅以昭朝廷德意今奏四府額税六萬之多米粮居半還㑹按撫委令有司酌徴四萬兩觧進應用俟殿門工有次第奏請停免不許困累啇民以南直隷礦務銀兩聼有司包納觧進其原差百户王遇桂囘衛己巳詔今歳暫免行刑各税監梁永等進内銀十一萬餘兩禮部侍郎馮琦奏言自礦使出而天下之苦更甚于兵稅使出而百姓之苦更甚于礦皇上欲通啇而彼專欲困啇皇上欲愛民而彼專欲害民皇上戒以勿信撥置而撥置愈多皇上責以不許騷優而騷優愈甚皇上之心但欲𥙿國不欲病民群小之心必欲瘠民方能肥已運謀如鬼蜮取財盡錙銖逺近困嗟貧冨交病疏入不報九月壬申朔浙直及陜西撫按各䟽請停减織造不聼楊應龍餘黨楊守隆等七十九名䖏斬發邉逺安置釋放變賣納價各有差從四川廵按李時華勘議也錄陕西河洮等三次擒斬破虜功廵撫顧其志而下陞賞有差大學士沈一貫乞休御史吳逹可疏陳維新庶政因劾一貫狎暱憸人私相比監一貫乃三疏請假修墓上仍温㫖慰留之隴川叛逆士舍多罕䧏詔發永昌府拘留以彰朝廷不殺之仁十月江西廵按吳逹可薦布衣章潢纂修經世諸書遥授順天府訓導廵撫貴州郭子章請討叛苗得㫖苗惡既稔天討冝加一切征勦事冝俱許便冝從事務保萬全以安逺人准思明府土知府黄承祖幼子應䀻承襲從兩廣督撫戴燿之議也十一月辛未朔工科以至日届期城工未畢乞勅工部酌議何工可以暫停何工可以减作嗣歳一意城工併日修築以固保障大學士朱𢋫亦言民窮財盡殿門大工寕緩母急得㫖覧奏具悉詳慎今河工國家咽㗋城工切近保障㝡為緊要便當設䖏錢粮刻期奏績其鼎建殿門理不可緩但工程浩大財盡民窮之時且内外帑藏空虚各䖏奏報災傷委應逺慮議䖏次第落成以昭朝廷寛民固本徳意以薊遼昌保四鎮及宣大山西三鎮修舉大閲八事叙錄文武各官各起用陞廕賞賚優恤有差甲申皇太子第一子生是為熹宗皇帝上喜得元孫諭禮部尊皇太子生母恭妃王氏為皇貴妃命皇太子正宫封妃餘皆才人俱照皇明典禮書載内閣揭稱閣部無此書當令搜覧上各䧏一部為定式聖母壽届六􅐆適皇孫誕生尊上徽號曰慈聖宣文明粛貞壽端獻恭僖皇太后詔吿天下覃恩中外旌表鄭世子載堉賢行載堉曽祖見泳永貢成化中以庶子封東垣郡王正德四年鄭王見濍誣廢以見泳永貢子祐檡進封鄭王祐檡子厚烷襲爵東垣郡封以祐檡庶子厚烱承襲載堉乃七疏乞正倫序請令見濍曽孫載玺𬋩理府事于是禮部覆見濍之以誣枉廢也生既蒙孝宗之矜釋死又沐世廟之冊卹見濍之爵既復則見濍之子孫冝襲此載堉所以乆遜必欲改而㱕之載玺也載堉翊錫仍以世子世孫終身翊錫身後其子襲封東垣王以接見泳永貢之統厚烱孫翊鎧另封一郡以接見焹之統今載堉年髙德卲慱物洽聞仍當給其父子郡王之禄以示優賢之義賜勅褒嘉樹坊表宅從之十二月辛丑朔罷開礦抽稅内外官回京閉各䖏礦塲稅銀有司徴解内官監太監陳永壽進秋冬二季煤課銀兩上曰昨已有㫖停礦調稅念畿輔煤窑係小民日用營生除官窑煤炸照舊内監開取供用其餘民窑税課盡行停免以昭朝廷優卹根本地方至意摠督河道曺時聘條議大挑事冝一䖏錢粮一募夫役一嚴稽核一議禁戢一酌蠲卹一明激勸一固上源勅諭朝鮮及時淬勵振㧞自強一應戦守機冝着實修舉仍逺偵宻探不論有無警息每兩月一報山東偵探委官并無動静徒兹煩優其令召還户部㑹計天下錢粮出入之𢾗因極言借支截留之弊得㫖積儲空虚支吾不給各地方即有急務自冝查照額項多方區䖏豈淂動称借留以虧國家根本之計今後各京邉錢粮俱令隨徴隨觧不許乆停以致借抵有司私自那觧該部參治原任參政今調茶陵知州范守已請開賈魯河及沁口以濟㑹通河之窮下工部議覆行摠河及河南撫按勘議具奏諭内閣傳示講官撰冩論法講章進覧仍命擬撰重刋大學衍義𥙷序文以昭示朝廷明德新民圖治至意𥙷給故大同廵撫張文錦祭塟禮部言其不附逆濠及創建五堡有功邉境死于悍卒為可憫也萬暦三十四年丙午春正月庚午朔䧏原任修撰焦竑廣東都司断事𥘉元子出閣定講官六人竑與焉因私纂養正圖說一書内璫陳矩得之以献由是物議疑駭遂以浮察䖏越八年始補今職鳯陽廵倉御史䔥如松條上倉儲八議一明職掌二專責成三查積逋四核屯粮五嚴查參六議改折七議糴米每歳秋成于豊稔地方收買粮米出陳易新八革奸役下户部尚書趙世卿集議称便從之命清勘兩淮塩塲直隷御史喬應甲言國家設塩課以實軍需而課辦于灶灶依于蕩蕩之関于塩灶至為喫緊法乆弊滋奸豪侵占楊州廟湾一塲開至九萬九千二百餘𤱔一塲如此其他可知三十郡縣論地當分等則應否納價作何分種論租當有多寡誰為徴收作何支銷海防兵俻張鳴鶚㤗州知州李存信興化知縣楊潤接攘海濵素知灶情可令沿坵踏勘以清弊端從之兵部侍郎魏允貞卒直隷南楽人生平亷直特立寡與抗疏極言礦稅之害内使孫朝飛語誣之南北諸臣疏救稱為天下清官第一部民詣闕白其冤者𢾗千人撫晋九年不調乞終養至二十餘疏乃得請㱕途行李䔥然詔建咸陽知縣宋時際䧏咸寕知縣滿朝薦一級火稅使梁永誣其抗刼稅銀刑禁稅役也輔臣沈鯉請収前㫖另勅撫按勘奏不報雲南殺太監楊榮榮在雲南殘害軍民軍官賀世勛韓光大紏衆焚其第殺之上聞大怒朱𢋫奏言陛下無以一人故變動一方𢾗日有㫖首事者正法中使罷不遣乃拘世勛于獄福建稅監髙宷激變閩中民大閧廵撫袁一驥輯㝎之宷肆虐于民一驥時為左轄已力阨而制之比開府又盡捕其爪牙置之法㑹粤璫死上使宷兼筦粤稅宷故垂涎粤既被命則造楼船艅艎治戎噐招集亡命徴集百貨将䦨出諸夷市而躬自徃粤閩人麇集其門索市直不予民大譁宷所殺傷百十人射火箭焚民居無筭閩大優又率其黨介而馳䦨入中丞轅門以請救為辭一驥叱曰尔虐吾民何捄為時蚤衙初散一驥方坐銓閣治文書旁無侍者寀挽之出至通衢則介士畢集将殺寀一驥目止之後觀察兵道聞変冐白刅馳至以大義責寀寀得㱕署而民心少輯定督理礦稅太監張忠參夏縣知縣韓熏才力不及竟擬量調簡僻事下部議言撫按職在察吏猶下吏部題覆而後䖏之今中使而可以參人則朝廷設撫按何為哉得㫖韓熏應調與否聼撫按查實具奏幽殺慎嬪魏氏嬪魏縣人太子七歳時微有水厄嬪力䕶得無恙好直諌㑹元夕御宴嬪勸停礦稅取君民同楽面訶鄭貴妃為妹妲忤㫖幽之七日卒後頗著靈異上嘗念之卹最厚真保薊永開礦太監王虎奏繳開採進過金銀𢾗目自萬暦二十四年閏八月至三十二年正月共金五百五十七兩零銀九萬二千六百四十二兩零石青一百一十九斤然計歴年間開礦所費工值物料亦至十餘萬得不償失也以皇孫生遣修撰朱之蕃給事中梁有年勅諭朝鮮賜王及妃紵絲錦絹有差二月庚子朔御史史弼疏陳治河之患言大役已興而議未决丁夫方集而技已窮驅飢疲之民于嚴寒之候枵腹墮指累累而是此不能慎始之過濱河守令半集河上沿河赤子悉赴工所徴發太煩期㑹太促洶洶生心憂在瓦觧此不能防微之過昔挑黄家口費金錢百餘萬今挑朱旺口又需金錢八十萬竭澤可虞勞薪何継此不能長慮之過泇河之役亦一時權冝但河塞而後議泇則泇成冝必可以代河今導河而河流愈漫濬泇而泇河日枯二役並興一役莫竟此不能圖終之過為今之計固當廣集方畧而其要務則莫急于措䖏錢粮綏懷衆庶分銀斗粟務沾實惠則應募者必衆應募者衆則可免調郷丁褁粮而赴千里之役棄家而失農桑之期豈若應募就食者得斗粟分銀之惠免流離饑凍之苦㢤至于錢粮丙帑可捐外帑可借而漕粮必不可留臣聞河南山東江北地方頗稔誠厚值以募米啇而捐其稅米啇必集米價自平轉三省粟以供𢾗萬之衆何憂不及又臣觀今日諸臣人持一心山東諸臣利河南流河南諸臣利河東下両議相持阻撓四出敗乃公事莫甚此曺乞亟選賢能同心戮力以幾成平之功不報陜西開礦太監趙欽掊剋無厭復命之日驛逓申報除牛負馬䭾外箱九十六擡用夫四百名尚顛踣不𧺫户科給事姚文蔚奏乞逮治不報山東廵撫黄克纉言徃者民苦稅監為其牙爪羽翼之流毒慘也今已革稅監委官復用有司之委官是百歩五十歩之間尔臣議不用委官止用行首使司其事盖以啇賈而偵察啇賈計甚便也又称本省稅銀十三萬有竒皆以威刼取盈乞量行减免得㫖允行吏科給事中翁憲祥上論銓政一曰明職掌大􅒼之有㑹推盖冡宰不獨受其權而慱謀以示公若冡宰舉手而聼則所司何事至于吏部司屬亦待㑹舉尤屬無名二曰復選法掣籖之法乆為笑柄果無心兮天官之職一吏可代如仍有心則官原預擬何必于大廷中支吾三曰儆曠職臣之去就悉由君命自便身圖恣行已意撫按不即參䖏以患病具題漫無懲究緩急奚頼焉入計復任當有限期優㳺郷井仍得照常陞轉有官名無官實所責成謂何四曰杜趋避有司薄不善之地選而求改未經到任旋有調煩方面官一遷逺方遂不復去待遷近地依然就列庶常舘選㮣從多留或預度難盡留姑引疾以幾幸日後人心不正僥倖何由自抑五曰禁保留方靣官加銜保留因為地方惜才遂有相與體面以完故事有司沽名要譽明示意指使士民奔訴上官倡效成風安可底止隄防末流正在此時疏入不報倭酋源家康代平秀吉為王盡誅其大臣移秀吉子秀頼于大板三月己巳朔庚午上遣文書官盧受諭元輔沈一貫曰朕恭上聖母徽称大典在即卿為元輔冝率百官行禮恭祝聖孝且卿眷委年深任勞任怨朕所鑒知豈可執浮言引身求退宜即出賛㐮以副朕惓惓佇望至意一貫終不出具奏称賀諭禮工二部朕第三子福王出府成婚有年冝遵祖制分封預建藩府合行事冝二部㑹同擬議來看輔臣沈一貫又上疏乞休諭留殊切給事中王元翰言臣度一貫萬無復出皇上亦當垂念俯允勿使具瞻重地有進退維谷之嗟不報南京内官監太監徐壽僞造関防文移指称上用取南工部杉枋三千塊事發勅令南京守備劉朝用嚴提追䆒正法不許扶同囘䕶工科給事中孟成已乞将壽拏觧來京䆒問仍諭内監衙門所用錢粮皆湏奏請如移文請討該部竟寝不行永著為令不報丁丑仍以江西湖口稅務㱕稅監征時江西稅監李道詭称㱕稅而有司固辭原不干預請照舊𬋩理遽從之給事中孫善継江西廵按史弼疏爭不聼户科都給事中姚文蔚言先朝重科道之官而陞轉不拘内外盖内外一體𥘉無軒䡖故才賢忠節之士列于内則耳目明出之外則方隅重未間有年例左遷之說也自丁酉年科道推轉年例留中不下至今十年遂成故事殊傷國體乞自今于科道外轉立賜俞綸上伸主權下全士節不報吏部侍郎楊時喬遵新詔𧺫廢例疏萬暦十二年至三十三年内詿誤觸犯各官范儁等一百三員發单咨訪給事中周曰庠言詔㫖不信八事曰簡大􅒼而九卿員缺如故曰考㢘官而考選中格如故曰通章奏而公車不報如故曰飾邉備而樞撫虚席如故曰罷礦稅而採遣使制如故曰惠京啇而内官叢歛如故曰蒐逸才而草澤沉淪如故曰釋冤獄而圜扉繫縲如故遂使中外翹企之心轉為􅔵望不報丁酉以災傷命蠲賑眞定順德廣平大名等府是月儀真太監曁禄進銀十萬餘兩蘇松稅監劉成江西稅監潘相天津税監馬堂共進銀十萬餘兩河南稅監胡濱進礦金二十八両銀四千七百八兩遼東稅監髙淮進人参一百五十五斤給事中姚文蔚言自採榷並行天下嗷嗷震恐幸蒙恩㫖停礦分稅歡如更生乃未幾而梁永楊榮激變滇陕潘相李道仍行抽採馬堂又借取魚而復用委官詭詞漸肆聖意日格章奏安得不煩人心安得不惧則知分稅不如罷稅之為便不用參隨不如盡撤稅使之為仁也至于山西有無地懸坐之租乃以代州等䖏民壮工食扣抵觧税夫雁門係衝要之邉民壮乃守邉之役撤邉備以辦租銀舛錯若此豈宗社之福哉不報夏四月己亥朔命藺州夷奢崇明承襲祖職𬋩宣撫事仍行貴州撫按嚴諭土婦奢世續勒限㱕印毋怙終取勦並禁安疆臣不許隂助阿利致生釁端乙巳輔臣沈一貫乞休甚力至是七十一疏上之上終不允貴州廵撫郭子章討平貴州苗賊斬獲酋領吳老喬等十三人俘斬苗衆三十餘名招䧏男婦一萬三千餘口諸苗盡平詔發秦府宗室敬鎓等于髙墻禁住以私出禁城毆殺衛官也保定廵撫孫瑋疏劾天津稅監馬堂㒺上欺君戕民怙惡悖㫖迷亂六罪伏望嚴㫖撤囘庶威福出自朝廷而􅍔亂消于瞬息不報癸未大挑河工成自朱旺口逹小浮橋延袤一百七十里用衆凢五十萬費金錢八十萬両自十一月至今五閱月而工成河道摠督曺時聘報聞兼請建祠賜祭以旌河神破格蠲征以酬力役上皆從之京師大旱五月戊辰朔江西礦稅太監潘相以礦撤􅔵望移駐景德鎮疏請専理窑務又言描畫甆器須用土青惟浙青為上廬陵永豊玉山縣所岀土青顏色淺淡請變價以進從之科臣䔥近髙孟成已疏劾相先移札而後題知自擅要君宜撤囘相仍㱕窑務有司不報癸酉以平定閩妖吳建功撫臣徐學聚以下陞賞有差套虜火落赤分犯中西二路官兵擊赱之斬馘二百有竒仍復池河營市稅從南兵書孫鑛議以此項係留都原額冝照舊征取以免紛更也壬午宣大摠督楊時亨奏北虜称臣納貢三十餘年近以京賞市貨不堪虜王不肯領受上獻愆期若不及時挽囘迨歛怨益深彊塲之患不可言矣上諭署工部侍郎沈應文京賞衣叚係撫夷大典近皆濫惡短小以致狡虜生心即行各省直撫按及督造内官務合先年式様逐一騐確方許印觧其有不堪具參無縦丙戌北虜順義王撦力克等始進萬暦三十三年表文鞍馬弓矢官其貢使閃察蒙素等二十八人俱為百户照品給賞仍䧏勅勞諭虜王丁酉四川廵按孔貞一言蜀中開堰灌田故名沃野近為王府有者什七軍屯什二民僅什一而已正供之外歳進金扇四萬八千四百餘柄絲絹四千四百疋兩中使入川又歳出稅銀三萬兩委官漁獵歳且五萬両自奉㫖㱕有司後又于稅額三萬兩沠一萬八千徴觧稅監作為公費而貼兊及差官舍類觧剝削夫馬之累不與焉巴蜀皮毛已為稅使所盡宜亟罷撤以滇南為前車不報加雜谷安撫司貢番口粮樞臣䔥大亨言本司北抵黄毛韃虜東抵孟梁諸寨歴年惡番狂逞皆頼率衆救援與長寕等司不同而食粮反居其下冝其欲請益也兹議以後計番口共一千二百七十四名每十二人給粮一分每分八斗俱于該邉附餘銀米内支給從之奪漕運摠督李三才俸五月三才疏言恩詔既布旋復中泥道路所傳其説有二一謂前日新政原非上意不過一時喜心旋開旋閉一謂輔臣恐沈鯉朱𢋫通已之位忌其有成故賄買左右百計相傾以惑聖聼或借秦指滇以激聖怒遂使一應美政俱不得行疏奏上震怒云三才執任撫綏不思盡心本職逞意妄言排誣上下狂肆當治念河工多事姑奪俸于是大學士沈一貫疏辨求去上慰留之六月戊戌朔郭煖楼人家口河决北股至茶城鎮口癸邜雲南𬗟夷阿瓦擁衆𢾗萬攻圍木邦宣慰司我兵不援失之事聞黜鎮守副摠兵陳寅遊擊劉素錮其終身革新平參将王士弘職上因諭邉臣凡将領不拘本屬他鎮但在百里内者遇警即併力策應功罪一體其以士弘為戒丙辰以上聖母徽號覃恩勅存問舊輔申時行王錫爵各賜銀幣羊酒辛酉停浙江二十九年織造徴沠未完從工部侍郎沈應文請也是月河南太監胡濱進稅銀三萬五千八百餘兩礦銀四千八十一兩金十五兩廣西税監沈永壽進稅銀八千九百六十萬礦銀三百八十兩秋七月戊辰朔以災傷蠲真定順德廣平大名四府行派諸稅大學士沈一貫沈鯉並致仕遣官䕶送馳驛䧏南京給事中陳家訓二級調外任奪御史孫居相俸一年先是家訓居相交章言一貫奸貪諸状一貫上疏詳辯其言臣求去疏八十上而皇上不允以致人言愈出愈竒皇上有意憐臣則幸放臣乃下温詔許之因以家訓居相朋謀誣衊淆亂國是各淂䧏罰鯉以年老乞休遽淂俞㫖且御批于一貫准給假理俟痊可之日撫按具奏召用于鯉直准致仕論者不得其故僉疑一貫使然矣通政使沈子木薊遼摠督蹇逹各上疏乞休以孫居相劾一貫疏波及也上皆諭留之時居相又言致仕兵部侍郎賈應元賄一貫𧺫用今應元已物故而一貫銀不還于是應元亦上疏力辨奉㫖言官論人生死尚不一審安得事情之實顯然誣言可無體訪也上諭各邉鎮防秋事冝務照連年申飾事理兼酌近日虜情倍加隄備以保萬全仍候草木枯槁之日燒荒盡絶以断虜騎駐牧便官軍瞭望谷不許仍前怠玩自取罪愆安南都統使國王黎維新刺死常逹禮凾首以献八月丁酉朔上命特减廣東稅課一萬兩停觧廣西鹽稅銀一千一百五十六兩留充兵餉從撫按之議也始令将軍鎮輔中尉得与生員一體應試進士二甲選知州三甲選推官知縣其以郷舉出仕者亦照常除授俱不得選除京職直隷廵按陳宗契以聖壽届期陳金鏡四事一臨朝受賀二便殿召對三重枚卜簡大􅒼下行取四急却諸稅不報大審獄囚釋重辟七十一人俱遣戍餘减算有差而曺學程不與焉于是刑科給事中梁有年等交章請同仁併宥不報九月丁邜朔除順天中式第四名舉人鄭汝鑛名遣戍汝鑛大賄役割截取中貢生馬顯忠首二塲文獲列魁選事覺併奸黨俱擬䆒𥘉議以顯忠補解既以五策不出顯忠不果顯忠鬰死士論惜之河道摠督曺時聘以朱旺口既塞疏聞因條議十事一移置專道一増設河官一創築隄防以建立舖厰一分别賞罸一乆任責成一申明職掌一嚴那借一議䖏河夫一除豁占田工部覆如議行上諭部臣連歳公帑民力俱竭于河上役不可再冝懷永圖既称大􅄵已成全河東注必使盡岀中路方保無虞趂此秋涸将一應南北隄岸儘力修築屹如山峙自然水得所㱕方堪永頼所議十事俱依擬可即行与河上諸臣知之薊遼摠督蹇逹奏東西二虜与長昻合营共圖内犯上乃諭兵部虜謀之叵測非一大創無以遏其狂逞各鎮督勵兵秣馬聼摠督調遣相机防勦不問所犯何地都要互為聲援母得稽遲觀望致有疎虞釋御史曺學程于獄遣充湖廣寕逺衛軍大學士朱𢋫因萬壽聖旦疏請釋放翌日即傳㫖釋赦云上命欽取南京户部錢粮供御署部事侍郎葉向髙疏奏自萬暦二十年以來庫中存貯尚二百一十餘萬其後日朘月削耗費殆盡今摠計每歳出計可四十餘萬入𢾗止二十萬逺不相當今見在庫銀未及二十萬尚不足半年支給若欽取之錢粮継此不已則户部之帑立空而枵腹之變可立待矣况所取之物名為供御而實則羣小营謀視為竒貨射影鑿空巧立名色一聞詔下蟻聚蝇趋奸啇之冐濫吏書之横索匠役之虚縻百孔千瘡展轉奸利一金之直動費十金比入御府亦徒委之泥沙俟其朽爛而已朝廷被其虚名羣小享其實利當事者苦無米之炊旁伺者幸不耕之獲似此奸弊陛下不得而知之也乞額外欽取盡行停罷即歳貢物件悉心節省不報稅監髙宷私与紅毛夷人市貢閩南路參将施德政聞之曰是延㓂也力言于御史奏之謂若許其入貢福閩将無寕時上可其奏宷大恨㑹德政召入禁旅或語宷云其槖中多珍異胠其篋可冨也且釋憾寀然之遣人禦之塗發篋廩金𢾗兩而已復籍以還之山稅務奉御孫朝奏參廵撫魏允貞倡阻朝命下部院參看允貞秉性太剛任事太執孤立獨行多讐少與舉朝明知内臣之非然畏以蜚語相加但相和觧而已冬十月丙申朔摠督川湖貴王象乾參論安彊臣讎害五司給事中吕邦耀因劾貴州廵撫郭子章受疆臣賄縱奸長惡子章疏辨言播州未破則欲臣作使安氏用之惟恐其不速播州既破又欲臣裁抑安氏逺之惟恐其不踈疆臣本一孺子原無他膓䖏之有道自是瓜牙土司讎殺自其常態夷狄相攻中國之利若蜀為蜀夷而讎黔黔為黔夷而讐蜀是為夷狄而罷中國也因求去甚力上慰留之十一月丙寅朔大修都城重城自三十三年正月始事至是報竣儀真稅監暨禄請罷天下稅使不報兵科夏子陽冊封琉球囘獲鳯陽妖民劉天叙伏誅天叙與其黨三人擡一小佛像厯郷村募化妄言有法術能畫地地䧟指天天開且知人生三世南京衛軍某者素黠得其情即吿之操江等衙門時長至百官當詣孝陵上香将出城兵部忽傳城外有反賊萬餘人次日操江捕得四十九人付應天獄為首者天叙也事聞詔磔天叙張名二人斬應鳳等五人餘俱遣戍故事戍者必立枷時方兩枷大中橋不一夕已有死者沙壅其屍俟滿日方埋都御史丁賔署刑部大理寺念其脅從皆無知愚民召錦衣与兵馬官語曰如此十日必盡死朝廷開以生而我輩乃欲死之且以骨戍乎搭蓬与坐飲食之餘人乃得全活都察院右副都御史詹沂等奏覲期在迩合無責成吏部等等各嚴拒餽遺奉㫖餽遺申飾已乆有仍前違犯者小則拏送大則參奏十二月乙未朔摠理惜薪司内監楊致中杖殺燕山右衛指揮僉事鄭光耀給事中汪若霖疏劾致中十罪兵部尚書䔥大亨亦言衛官為天子瓜牙無兼啇應役之制而世職皆勛臣苗裔非閹官可殺之人致中貪暴弥天冝嚴正法紀俱不報重修南海普陀寺成命所司建碑其地御製碑文記之互調薊鎮摠兵尤継先為延綏鎮摠兵延綏摠兵杜松為薊鎮摠兵継先収養䧏夷至八百人倚為精鋭薊遼督臣蹇逹議以薊鎮与他鎮不同修守為上收息蕃多恐夷情難馭致貽後患請調継先于别鎮樞臣䔥大亨以杜松亷威素著議令更調仍令継先将所畜夷丁携到新任安挿停妥上皆從之陜西總督李汶以将離任條議安邉五事一葺松塞一創衝堡一明順逆一傳邉烽一停畨堡從之輔臣朱𢋫言考察之期不越二三日而主察大臣尚未蒙批出伏望即賜乾断又請亟命考選行取諸臣不報給事中宋一韓言定亂之主不餙銷鋒息馬之威而以鋤暴綏良為威耀德之朝不務招携納欵之名而以閉関謝質為武窃見貴州銅仁府紅苗不靖朝廷軫念遐方詔以議䖏撫臣曰苗依山阻箐不可䋲以漢法已之便臣固心韙之然猶以為未盡者則勦撫之策當决主客之兵當議而首從之罪當分也夫銅仁之苗黔剝膚之災也則冝以黔為主邑梅麻陽之苗是助黔為虐者則冝以川湖為客調撥土漢官兵犄角並進無慮不破刑一百二十里之小醜即不煩三省之力可也交夷不庭自黎惟譚復國不貢者十年子維新嗣立一旦叩関請襲都統之封朝廷猶未之許也無何而貢献至矣撫臣曰來享來王自是聖朝盛事許之便臣心亦韙之然猶以為未盡者則印信之予太急而安挿之令太狥也夫其既臣則爲貢其未臣則名為賂堂堂天朝而可以賂遺乎則代身之金人補過之方物事不經見也今冝責成貴州撫臣搜捕首惡龍許保吳黒苗庶其塗炭可拯而中國之威常震又責成廣西撫臣待維新承襲都統之後收其貢獻其議安挿莫氏亦須悉心計慮無使暮戚朝讐一方重罹荼毒庶其絛籠在我而中國之勢常尊上令兵部詳議以聞皇太子第二子生名由㰒四歳薨天啓二年追封簡懷王是年旌貴州烈婦薛氏周氏屈氏李氏雲南烈婦趙氏從廵按金忠士沈正隆請也萬暦三十五年丁未春正月乙丑朔廵按陜西御史余𢡟衡劾稅監梁永並乞休不報時永与樂綱諸罪状已著聞𢡟衡入境恐不自保遂謀毒之𢡟衡至靖邉旋至寕塞中毒者再取方下之得不死搜之厨役得所受行毒金及褁中餘蠱皆屑黒蝌蚪也于是鞫問盡得諸奸状疏陳其罪并乞休致自是言官攻永不置上亦知永縱横䆮有撤回之意矣吏部奏言方直缺官太多吏治廢弛已極乞賜點用兩司郡守以修實政上是之署吏部事侍郎楊時喬請辭印務不許時當大察時喬與副都詹沂恊同行事屡疏請補正官或各部尚書代挕不報命時喬与沂恊同行事察已兩日𥘉四日忽復有户部尚書趙世卿代理之命時喬以印為辭上言察典舊例二日㪯行已着楊時喬与詹沂恊同行事如何又有此奏昨誤發舊日批紅文書即已追寝今乃不遵已䧏之㫖而請未出之令輒自躭延成何政體冝即依行以竣大典是日時喬乃還視事時喬与沂皆勵清節署禮部左侍郎李廷機如之當除乆上在宫中謂左右曰此際廷臣受朝覲官書帕開宴打閙惟楊李詹三老清寂可念永平伯王棟母趙氏為孫王明輔乞襲祖爵許之吏部侍郎楊時喬疏言皇親不襲封爵祖宗令甲甚嚴准襲一軰棟襲父偉伯爵已屬曠典今明輔安得襲封恐此端一開漸不可長将來戚畹皆以特恩為常典效尤者衆覦覬安窮上竟以特恩許襲後不為例南兵部以擒獲妖黨上諸将士功攻下兵部查議以妖黨伏辜命禮部具吿謝之儀從南京内外守備請也時南中文武争功張皇牽累不逞者因而播私帖驚優上下南兵書孫鑛奏妖黨屡布妖言等事奉㫖留都根本重地陵廟尊臨設有内外守備衙門及兵部參賛机務俱有專勅如何事多掣肘致使妖黨妄肆跳梁一切善後事冝責令孫鑛悉心經理終始其事毋得疑畏罪人既得此後只冝撫綏鎮静宣布朝廷徳意以安重地湖廣廵按御史史學遷論聖心三好曰好貨好疑好逸又言大臣以傴僂周宻為謙恭小臣以奔赱依托為本事傳舎其官者以連化鳴得意代庖他職者以因循為積習黨同伐異者白日而倚氷山嗜利肥家者暮夜而伺金穴皆由此三好之心為之也乞留神省覧不報勅諭天下朝覲官貟曰朕惟治天下無先安民安民無先計吏迩年災異頻仍民不堪命而繆懦者媮安武徤者恣臆藩臬或庇私人郡縣間持長上詔令之下視為虚文急不在公而在声施務不先民而先􅌩橐甚且籍口朝廷為朕歛怨兹當三載黜陟幽明之期申命所司罷汰不職于貪酷之懲尤加嚴焉顧㢘静之吏守斤墨而憂緣餙或無以延譽貪殘之輩多貲而善營便文巧脱尔等自今冝赤心白意拊循元元均賦平刑持亷奉職毋比黨而撓公論毋倚法而壅上恩毋沾沾而愚小民毋悻悻而事操切其或剝窮閭赱津路三尺無赦二月甲午朔停四川叙州府富順䨇流二縣儒童歳考禮部侍郎李廷机言士風驕横陵轢有司辱及學使一年之間楚浙相継蜀復效尤不一大創復将安極冝比常熟事例停其歳考首犯俱發口外為民並申飾各省秋試罷大收事從之下監廣寕門内監邢朝等于獄擬辟九門之稅徴及士紳歳值計偕孝亷縉紳垂槖而出猶有稅者正月中㤗興知縣龍鏜覲畢出城羣璫需索継之以挺去𢾗歩遂斃于民舎時值日者趙禄而朝等共為兇熖兵部以朝為首讞上即付法司䆒問正法于是監䜿少戢士紳亦以是故末减廵関御史吳宗禮上邉防五事一議固陵寝一議嚴清勾一議蘇戦馬一議葺土堡一議度山城部覆從之摠督河道曺時聘言全河既已就軌泇功委應厚終開泇于漕梗之日固不可因泇而廢黄漕利于泇成之後亦不可因黄而廢泇兩利俱存庶緩急可頼因條泇河善後六事議築欷山之隄削頓荘之嘴平大泛口之溜浚猫児窩等處之淺建鉅梁吕冲之閘増三市徐塘之􅄵以終泇河未就之工又議設河官置官夫建驛逓立廵司嚴禁閘加裁展以成新渠善後之務自去歳冬月凡三請乃允從之摠督宣大侍郎鄭汝璧以病吿㱕汝璧𥘉至陽和守将偵言五路台吉萬餘騎挾賞叩邉汝璧意五路跳梁邉新易帥恐有他虞乃調諸将分兵守險留麻董二帥帳下乆之虜騎不至稍稍來講舊賞貢馬如平時廵撫喬允升言五路虚聲要喝督臣破膽張皇始則集兵糜餉以自防継則委心加幣以媚虜汝璧疏言禦虜之要我弱則虜肆侵凌我強則夷知歛畏五路老奸巨猾最爲梟獍新河得志至今猖狂向使防禦不先則虜謀益熾脱有不測則摠帥謂何今抗虜無犯尚有媚虜糜餉之說倘蹈新河之輙又将坐以何罪乎允升又掲言五路入犯之說皆發于守備燕賓欲加宣府之賞借虜以喝督臣卽五路之貢馬皆守備道之于是汝璧遂謝病去從之先是長昻之事科臣與督撫論左兵部䟽言中國之馭夷狄在察其情形之順逆以合勦撫之机冝而已奉㫖但着撫按從長計議應勦應撫酌定勝筭務操縦萬全毋得互持意見推諉以誤封疆吏部催請考選諸臣點用䑓省疏留中既而下考選堪任部屬官等共十六員㑹試天下貢士以掌詹事府礼部侍郎楊道賓恊理詹事府礼部侍郎黄汝良充主試官取施鳯來等三百人甲寅西朝房火三月甲子朔緩浙江織造歳運從撫按之請也大學士朱𢋫復入閣視事先是𢋫疏陳時政良乆有㫖以廷試届期趣命入閣𢋫再疏陳謝益條時政所不可已状上心許之諭曰枚卜閣臣朕已知之簡任大􅒼及考選諸事俟即檢點發行于是𢋫遂入閣再請枚卜簡考選諸事上甚嘉恱署都察院副都御史詹沂疏言陵祭故事監視御史十八員今在京御史僅二三人無可應者禋祀大典缺焉不光吏科熊鳴夏亦疏言前㑹推宣大督臣集闕下僅三侍郎一大理卿四人而已堂堂天朝何遽乏人至是今廷試届期讀卷官止一閣臣未知果能趨朝否列之試録以傳天下載之史册以垂百世謂今日何如景象乎不報延綏廵撫凃宗濬陳安邉四事一明莭制以粛軍政一簡有司以振吏治一革流弊以𥙿軍寔一清班價以𥙿城守兵部覆議從之湖廣廵按史學遷勘白誣奏郭正域事言楚王𥘉疏上亦希當道意為應敵之兵及事乆情見而其誣始白詔南都京營在册餘丁挑選操練每年終仍将選補實丁照例奏報從南兵書孫鑛議也詔蠲免河南裕州十二州縣新墾逋粮廷試賜黄士俊施鳯來張瑞圖等及第出身有差楊漣是科所得士也選庶吉士林欲楫等十八人命掌翰林院禮部侍郎䔥雲舉詹事王圖教習夏四月癸已朔復宰賽市賞戮哈大得俸以示関外長昂復貢而後宰賽復請開市執哈大得俸以解新河之忿又遣中軍鑚刀說誓督臣為之疏請許之仍分别治失事将臣等罪死事熊鑰襲陞二級詔尚寶司及兵仗局補鑄京營金銅牌靣盔甲金瓜刀仗令如舊額順義王撦力克薨修築陜西沿東一帶上堡從摠督徐三畏議也五月癸亥朔勅宣大督撫諭順義部落不得乆駐青海從甘粛廵撫之議議减旅順防兵令山東與北直分餉以倭事已寜也丁丑召禮部尚書于慎行入東閣未至卒謚文定慎行東阿人髫年赴鹿鳴深沉勁挺不為町畦大為正人所倚信後與江陵不合乞病㱕及江陵敗復携書丘橓引大體調䕶營救極其切至天下称其仁至義盡焉以葉向髙李廷机為禮部尚書各兼東閣大學士閣臣朱𢋫年七十獨任乆病疏不啻十餘上皆極哀苦至是復籲請速𥙷閣員上感動手諭卿屡懇請枚卜朕已明悉但任大責重而新進喜事私結朋黨牽引凟優是以遲疑卿可傳示吏部即㑹九卿科道推素懷忠義堪是任者六七員來簡用時𢋫子左通政敬循病殤于家𢋫求去益懇上復俞㫖慰勞尋㑹推于慎行趙世卿劉元震葉向髙楊道賔李廷机孫丕掦七人是日楊時喬等十人先集東閣㑹議已定頃之䑓省入揖舉单傳示吏科給事陳治則顧謂同列曰公道猶不盡冺廷机乃在推中刑科給事曺于汴病其瑣屑諸臣皆舉其清正争論良乆于是治則上㑹推始末折于聖衷上點于葉李三人批曰廷机日講有年功多啟沃署部屡遇大典勤勞懋著衆議素負清節朕已點用當以國體為重不必紛紛凟優廷机三疏辭職報曰卿近在輦轂冝直前任事仍猶趦趄周譲急公之義謂何遵㫖到任不必再辭科臣曺于汴宋一韓王元翰胡忻相継疏劾傳諭吏部近來両衙門專以揣摩猜疑杜害良善逞臆制人全無國體昨日枚卜各官皆有品隲請自上裁有何宻嘱而王元翰胡忻呶呶求勝不已姑且罸俸半年是日李廷機楊時喬黄汝良諸疏俱下皆切責言官慰諸臣心上復傳諭内閣朕思舊輔王錫爵輔賛多年忠誠正直國家多事之際可以共濟時艱欲卿等夾輔恊恭辭事吏部承旨加少保建極殿大學士遣官敦趣入閣錫爵具疏謝恩辭不至六月壬辰朔廵撫鳯陽李三才以稅監暨禄病故請罷天下稅使不從禄在諸璫中㝡愿見啇民病苦請以稅課還㱕有司並請停免身自囘京故三才申議及之上以門工未舉俟有次第乃許蠲免稅事仍令理鹽内官兼攝河南廵撫沈季文疏徴稅之法當稅冨民不當稅貧民言啇賈之中有開設典當但取子母無賦役之煩車舟之榷江湖之險此冝厚稅反以重賂而得輕至于小民負擔之微終日經營不過銖兩反以輸納而得重此甚非平也當有官稅不當有私稅言各省抽税之初先開行户應納之𢾗多寡已定不復旁加而中州不然如未抽稅以前原有小稅既抽稅以後小稅不减公稅又増各行戸毎年換帖納榖備賑而𥿄贖之追不問俱為稅槖矣當稅有稅之稅不當稅無稅之稅言㱕德汝南十六州縣河决乆衝水災渰沒稅額四千二十餘兩臣已另疏題免乃欲追賠将何所出致仕南京吏部尚書曽同亨䘚同亨性明逹与物無忤清節著于銓部宻理見于大工宦蹟所至人皆思之閏六月壬戌朔致仕左都御史温純卒三原人居平講一貫㱕仁之學其出䖏伸屈不激不隨三拂柄相而卒以通顯終亦逹人之進于道者欤命依順義王祖父事例給与撦力克卹典仍䧏勅書一道撫諭各夷許長昻復通貢市給三十一年以後恭順歳賞仍勅道将詳察情僞以為操縱机冝從蹇達劉四科之請也許火落赤擺言汰沙三酋復通貢市三十一年以後恭順者俱許補賞仍勅将領加意隄備聼督撫指授戰欵机冝從徐三畏凃宗濬議也京師大雨如注晝夜不息各衙門皆成巨浸平陸成江内外城垣傾塌二百餘丈大内紫金城亦塌壞四十餘丈㑹通運河盡衝决皇木漂流殆盡損粮船二十三隻失米損軍雨霽三日正陽宣武二門外猶然波濤洶湧輿馬不得前城湮不可渉詔發銀十萬兩付五城御史酌量濟救仍照甲寅例發太倉米二十萬石平糶以濟飢民大學士朱𢋫疏奏礦稅之優末云兒童赱卒無非怨詛臣之言流離瑣尾無非感悟臣之状乃者齎捧官即説礦税各䖏書來未開緘而知其説礦稅令臣等如何抵對皇上于章疏可以留中而臣等之書揭不可無答語時時户外羅無對業之冤家日日階前列不欠錢之債主按劍相視誶語横加輔相之地真苦海矣不報秋七月辛卯朔刑部右侍郎沈應文以獄囚乆淹乞暫豁諸矜疑者需命未下于是諸臣司查發囚徒除凌遲斬絞鎻鈕牢固外軍徒杖罪及各輕犯已結未結摠五十三人俱發大興宛平二縣監候續疏以聞上亦不罪也撤稅監梁永還京逮咸寕知縣滿朝薦于獄永在陜西横甚咸寕長安特其黨惡諸亾命稍稍叛去其渠魁方装具恐為有司所疏則托内遣持鎗劍負弓矢方陳而行按臣屡疏陳其反状上以御史固為危言不報永遣人觧馬匹者已乘郵傳發矣而楊逹官王九功等急出欲與前郵傳合縣快知其亾命也追及之交摶互傷而前郵傳去已逺遂為渭南兵快所獲御史余懋衡以賊黨叛殺奏聞永窘惧乃遣人繫書髪中入都言奪貢事誣称楊逹官王九功魏二等各貢名馬持孝順錢粮槖金鑲珠石睛緣縧環鐸簮耳墜等物咸寕知縣滿朝薦承余御史㫖命馬快伏渭南道刼之時懋衡疏已先至上見永疏怒甚謂御史固無恙而朝薦創為御史報讐命錦衣趣逮朝薦着撫按差䕶還京並撤楽綱以陜西稅務併之河南于是陜西之民始蘓而朝薦坐詔獄者十餘年陜西撫按各掲称貢馬八匹摃七擡俱安穏無恙不報以班白移帳南行乆兩邉墻傾塌命薊鎮督撫嚴行道将等官躬親廵閱加意修築防守以保無虞八月辛酉朔大學士李廷机以藺州鎮雄事乆未决復上疏言邉餉吿急户部求借馬價三十萬太僕与兵部連章吿乏姑括老庫及東西二庫銀十五萬與之其苦難已如此加以䖏䖏水災所在空竭即欲用兵餉安從辦臣等窃見安氏功不可冺而罪尚可貰印已獻矣崇明已𬋩事矣兵已撤路已通矣即與崇明怨恨未消仇殺未免此皆可以勿問也時阿利已死安堯臣度印必出託言得之阿野遂還崇明黔撫謂真印已出卽可結局閻宗傳安堯臣皆可赦不問而蜀撫以堯臣之篡必不可赦再疏請用師廷議未决㑹有邉餉吿匱之事輔臣計征播時費二百萬今驟無所出于是切責蜀将張神武等意盖與黔合而給事中王翰以輔臣之揭只冝吿于宻勿不可以播逺迩請勿發抄于是又有發抄之禁並禁諸訕君沽直亂政市名疑詞謾語排擠良善者以為皆不可傳而禁發抄之議自此始命釋放奢世續並赦閻宗傅等罪訪求隴氏子孫為鎮雄後并令安疆臣約束堯臣歸土本司聼選遥授職衘不許冐襲隴職并命四川撤兵時按臣馮奕垣孔貞一等俱言夷狄不可以中國之治治與政府議合從之九月辛卯朔江西參政姜士昌䧏三級調用士昌追劾舊輔王錫爵于是大學士李廷机朱𢋫各上疏自明士昌坐誣㒺得罪琉球國中山王尚寕奏獻前使所却餽金上嘉其欵誠並以禮金還其來使而褒給事夏子陽行人王士禎却餽亷正得使臣之禮以災傷發通粮五萬石行薊鎮平糴冬十月庚申朔直隷廵按鄧澄以畿南災困俵馬多艱為請改折從之命延綏各酋男惹得能台吉奔把什力刀見計及松栢台吉各准給冠帶授試百户職衘凡欵虜事例毎鎮各輪叙二名延寕諸虜𥘉以犯順稽叙既以效欵追功則併叙之外必停隔一年方得再叙惟松栢台吉乆赴鈐束應與職衘于是再為申飾福王庶第一子生命名由崧凡藩封生子五歳請名例也福王以未之國疏言臣男生于京師若拘于例則臣父子直都之時不無呼抱之情入朝皇祖母父皇御前寧無歡愛承應且請名填註非敢請封下禮部覆上命即百日命名大學士李廷机復自陳宜去者十内言近日奉㫖䖏分皆御筆親書如雲漢昭囘有目之所共覩其他票擬或出首輔而外輙㱕之臣至于禁發抄一㫖亦謂出臣所擬欲箝人口而壅聖聼一疑百疑至言者始比臣于包拯王安石今比臣于秦檜豺狼循此以徃何所不至上曰卿勤誠敬慎朝野共知每章疏票擬皆朕親覧裁断有何專擅豈得以浮言疑似介意遽求休致何忍于心即出安意輔政工部侍郎劉元霖以舖啇煩難請再僉報從之𥘉工科諸臣屡請僉啇也上以僉啇之優不下于派辦故慎重者乆之至是上言内供啇役偏累五六疲民殊為可憫冝酌定人𢾗㑹同來説其該優免人家不得仇誣報派如核虚寔杜嘱托减墊費禁需索等項俱要從公執議加意體恤務使人心楽從称朕爱養畿民之意福建督稅内監髙宷薦福建布政陳性學堪陞福建廵撫事下部凡推廵撫廷舉𢾗人以待上點即一二大臣不得獨薦雖衆人共薦亦不執定何人今廷推一人舉用五人宷不俟上裁指定性學一人堪為廵撫大可異也湖廣廵按史學遷薦隱逸舉人瞿九思及華陽王奉銳賢孝九思黄梅縣舉人本縣張維翰激變小民借九思求觧不應反誣禠革撫按辯白張居正持之沉閣閉門著書三十餘年後徴為翰林待詔華陽王分封澧州建拱宸以表嵩祝匾思親以事継母歳租不及千盡散貧宗積書幾萬卷躬披朝夕先世荘靖以純孝称温懿以崇文著王寔象賢寔當旌奨詔給京軍布花時應給者十九萬三千有竒工部以缺乏那處請詔内庫暫撥九萬疋工部再請詔如𢾗与之蘓州五年内欠至八十萬二千餘疋載入考成嚴追有司停俸河南災上諭各該𬒳災地方着撫按上緊勘寔具奏照分𢾗蠲免其積榖去䖏就便從冝放賑災重者多方設䖏户部奏畿内災民委寔異視上曰六郡災傷之處准照順永賑糴事例發臨德二倉米五萬石平糴以蘓民困價銀竟觧該鎮抵充年例十一月庚寅朔大學士葉向髙至京入閣辦事以李廷机資俸在前受事日乆乞以資俸為序從之廷机以枚卜欽點向髙名在前乞從枚卜時名後向髙上已從向髙請而両嘉其能譲云大學士朱𢋫亦以是日趋朝陕西撫按余懋衡條上延鎮四事一稽錢粮二廣屯種三覈經費四疏塩法上嘉其深切時務命如議㪯行十二月己未朔𬗟夷阿克等作亂破嵩明禄豊殺吏目韋宗孝知縣蘓夢陽上諭兵部滇夷作孽撲滅非難何日乆蔓延任其焚刼失郡邑戕官民如入無人之境撫鎮官平居防守何為臨事制馭何策陳用賓沐叡俱着住俸戴罪殺賊自贖其保身失事為國死事官負着廵按速勘䖏分又粤地逺在萬里交夷窃發果否逃遁作何防勦失事地方作何保禦撫按亦從寔勘報昨余懋衡閲視條奏邉務業已有㫖未見奉行具奏仍還傳諭各邉守臣一體振刷以稱朕意安南賊突入欽州廵撫蔡夢説等戴罪切責摠督戴耀剋期討賊仍嚴督黎惟新合兵同勦擒獻首惡下户部辦七公主婚禮金珠價逾十九萬兩御馬監開𢾗又復倍之尚書趙世卿以嘉禮伊迩時絀難支皇上婚禮用止七萬公主雖貴典禮雖隆視之至尊自冝少减冝每减三分之一應用從之萬暦三十六年戊申春正月己丑朔吏科給事中姚士慎陳四事一曰渙俞音以昭大信一曰謹中㫖以絶倖竇一曰正刑典以正紀綱一曰停營繕以蘓物力不報許班白二酋照舊貢市兵部題其悔􅍔就罸議許貢市仍傳諭諸夷使知朝廷恩威報可以災傷免畿内粒錢粮十分之三緬夷阿克等賊攻羅次諸縣熊尚謨拒却之守備王之瑞乘賊不備進抵元謀賊潰赱賊黨吳良傑來争㳺擊裴希擊斬之官兵大集乘勝進薄武定參将張名世掦兵而進賊皆鋌赱官兵入城大掠已復躡賊賊抛金于道官軍争拾勿逐賊盡赱東川廵撫陳用賔遂奏大㨗二月戊午朔安南頭目鄭松潜計刺死䘵州夷官韋逹禮凾首𥙷貢論功加摠督戴燿太子少保陞賞湖廣廵撫楊芳以下有差追贈先朝吏部左侍郎孟春為工部尚書吏部議其守貞持正夷險不易故有是命予原任摠督薊遼右都御史萬世德祭塟山西人恢宏大畧慷慨雄才有定國之勲焉贈原任左都御史温純少保三原人正議瑣垣振綱憲府典南北大計者五黜陟允恊于公論察機勇退壽考令終贈原任南吏部尚書曽同亨少保吉水縣人三朝耆德膚功偉績出處大節允恊輿論三月戊子朔禮部疏陳東夷違貢冝詰責之若其輸情悔罪許令自新倘果驁負固則冝暴其罪状革其爵賞勅户兵二部從長計議整頓兵餉以耀威武而防侵暴庶中國之體統尊外夷之覌聼粛矣大學士朱𢋫等言建州桀黠非常旁近諸夷多被吞併悖強不貢已經二年又勤買参觔多索車價遼陽凋敝一區一旦内犯何以支吾伏望聖明速将臣等擬票兵部題覆摠督蹇逹前疏省發以便遵行陕西廵撫王基洪條議甘粛孤懸天末䖏䖏隣虜戒備冝豫請改設将領以重机冝更調官軍以資緩急剙修邉寨以固疆圉合併冗所以實營伍申明屯戍以強兵食選用班軍以資實濟酌量戦欵以昭威信保衛西畨以固藩籬凡八事部覆咸采行之大學士朱𢋫等題國家三處軍情一時吿急其一為廣粤交夷乘虚突入城中失守其一為遼左建夷蓄謀甚乆䟦扈可知臣等謹擬勅一道請皇上裁改亟彂兵部以振法紀以收人心其各處用兵監軍紀功寔惟廵按御史之責考選一事尤其急之急者統乞鍳察允行夏四月丁巳朔雲南廵撫奏楊礼安銓遺孽作亂詔副使羅希益都司張先聲俱革職戴罪殺賊予原任兵部尚書張佳胤祭塟銅梁縣人才猷卓犖遇事勇敢屡平大難中外倚重户部尚書趙世卿備陳財用出入之𢾗与額課虧損之由大學士朱𢋫言隆慶𥘉兵餉二百萬兩今日四百萬兩不知虜未欵貢前塞下多事餉何以少今日安寕餉何以多至于宫中買辦歳進二十萬故事取之于監者皆責之于部自礦稅立正供多被侵削曽未十年虧損已四百六十萬出者日贏入者日詘莫知策之所出乞嚴責邉臣稽查兵餉痛革虚冐剋剥之弊其買辦上供錢粮一㮣停止稅使即未能盡罷亦當權其利害如遼東雲南多事之處先行撤回不報遼東前屯軍変欲殺稅監髙淮不果大學士朱𢋫等言淮在遼東敲骨吸髄遼人合男婦𢾗千人投虜頼将官攔住衆怒未平誓欲殺淮望皇上亟下一令𢾗淮罪過撤令囘京遼安而天下舉安矣户部尚書趙世卿戎政尚書李化龍亦疏論淮事俱不報大學士葉向髙言臣惟古來致亂之故多矣然未有上下隔絶中外乖離如今日者皇上試思一旦有事中外何人可以倚伏何項錢粮可以動支何處兵馬可以殺賊何方百姓可以知感朝廷恩德可以得其死力念及于此豈不寒心望亟講綢繆之䇿以淮萬年基業臣旦夕去國有餘寵焉上優㫖慰留不允辭五月江南大水無麥禾南京科道内外守備大小九卿應天廵撫各揭帖地方霪雨連綿江湖泛漲自留京以至蘓松常鎮諸郡皆𬒳渰沒週廻千餘里茫然巨浸二麥垂成而顆粒不登秧苗将種而寸土難藝圩岸無不衝决廬舎無以傾頽暴骨漂屍凄凉滿目棄妻失子號哭震天甚至舊都宫闕監屬向在髙燥之地者今皆蕩為水郷街衢市肆盡成長河舟航徧于陸地魚鱉㳺于人家盖二百年來未有之災也閣臣朱𢋫亦奏故郷水患異常上曰連日見南直隷浙江各處報災方深軫念覧卿奏益用惻然即行各撫按官分别蠲賑請寛袍叚量留稅銀朕已知之其改折等事通将省直所奏酌議來看詔留稅銀五萬両賑濟蘓松常鎮四府又彂監課儀真稅銀共十五萬兩賑濟浙江杭嘉湖三府朝鮮國王妃金氏奏前王昖卒于去歲立光海君琿請命科臣胡忻駁謂臨海君珒居長琿居次珒因倭患被虜復㱕遂有立次之請未允今擅立非次當改上曰立子以長萬古綱常該國素尚禮義何乃敢行廢立自取亂亾移文秉公詳䆒臨海何以廢光海何以立具奏定奪兵部奏滇雲元兇未獲報㨗冐濫冝防上諭曰賊首未擒府印未復戕戮甚慘師老無功乃猶屡報㨗音豈無掩殺避罪之弊且張名世正在軍中報功獨多尤屬可疑行廵按公勘以慿議處撫鎮二臣失事不小始令戴罪殺賊必以獲酋復印方可自贖仍另推勘任者刻期前徃夾勦毋得乆延悞事命摠兵劉綎徃雲南討賊請給関防有㫖給与事平之日奏徼又諭該省人民既遭賊害地方官若復掩殺避罪豈不更慘今後用兵務在除害安民不許沿習舊弊自取罪愆劉綎沿途須安静無優若量度地方寕息尔部即另行推用六月詔撤髙淮還京淮差舎需索錦州軍户軍户殺舎吏部侍郎楊時喬力言邉情叵測遼左重困乃有㫖撤回秋七月乙酉朔御史方大美以南畿水災言蠲之條有四而賑之條有二曰漕粮冝蠲也條鞭冝蠲也存留冝蠲也叠稅宜蠲也曰目前無依之民冝賑也來歳用力之民冝賑也疏留中大學士葉向髙言自古災異之生說者謂天心仁愛然不過日月吿蝕星辰災異之類今乃舉天下財賦之區東南𢾗千里盡爲馮夷所據自江淮以北如陕西河西等䖏又旱魃爲虐赤地千里則是天下無一楽土百姓從何安生官司從何設法明歳邉餉漕粮從何措辦目前查勘料理全頼廵按而考選一事經今已及三年十百待命之臣前路欲窮壮心且盡又况九列空虗百司廢曠甚至綸扉重地乃使寥寥一人出入其間瑣尾䔥條不成骵統真有如言官所陳列者臣顒望䖏分以日爲歳㫖報間八月乙卯朔大學士朱𢋫以萬壽届期再請亟下考選上嘉其忠愛令即出輔政㝷有㫖考選諸官都依擬用且閣部院催請再四朕非困悋但因彼此訐辯凟擾尔皆繇汪若霖起意生疑部寺吳正志等訐辯奏優汪若霖調外任用部寺吳正志汪元功黄汝亨黄一騰都各䧏一級調外任用今後考選科道務要精覈真才勿狥虚譽私嘱以亂政治授考選喻安性等科道各官逮雲南廵撫陳用賔摠兵沐叡雲南報擒賊首上曰賊夷連破城池八䖏殺戮平民無筭乘虚直入幾失㑹城鎮撫三司各有地方之責平居備禦謂何臨時束手無策徒以印信餌賊爲退虜全身之計却又上下蒙蔽妄冐報功據獲首惡是真愈見前報之僞陳用賔沐叡俱械送至京從公問擬其餘文武諸臣聼勘䧏調有差直隷廵按李雲鵠陳賑濟災民六欵一請發帑以救燃眉一議平糴以定人心一勤積貯以行遠糴一便閒納以資荒政一興工作以寓賑恤一寓煮粥以救窮獨九月乙酉朔雲南廵按周懋相條上事冝設武備以嚴防禦清隱占以廣訓練復汰折以實行伍重兵備以修邉防復衛營以壮威武寛文法以綏土夷劄隣夷以絶邉釁部覆允行兵部言逆賊阿克等宜生縛闕下亟正顯誅得㫖阿克等俱解京正法獻俘事臨時再議命順天府通州于漷縣永楽店創造景命殿成中官䕶守聖母誕育之地也摠督陕西兵部尚書徐三畏卒于邉任丘縣人屏翰勞多封疆績茂畢生勤瘁輿疾以殞予祭葬如例宰賽入犯開原殺掠男婦六百餘口冬十月乙丑朔許朝鮮次子光海君琿襲封十一月甲申朔大學士葉向髙疏奏今日九卿大僚缺乏已極毎衙門不過一人而又或以真病或以𬒳言皆杜門求去其見在供職者惟戎政尚書李化龍礼部侍郎楊道賓工部侍郎劉元霖三人而道賓又欲給假化龍又偶感寒疾尚未出户長安道上幾遂無九卿之迹又户部尚書趙世卿以邉餉匱乏無可設䖏困苦悲號幾無生趣工部又以夷賞無措兵部光禄寺又以供應難支求借户工二部彼此束手相怨相尤又京民困苦逃亡流竄毎聞號訴盡為酸心叩其受害之故半為舖墊半為奸胥于國家曽無分毫之利而徒竭民脂膏填此谿壑其亦倒置之甚也倘有風塵之警及于國門九列無官倉庫無錢京師無民即有民亦不肯為我用臣不知何所恃也不報大學士朱𢋫卒贈太子太保謚文懿𢋫山隂人其遺疏請補閣臣忠悃可掬兵部尚書蹇逹卒四川重慶衛人策事百不失一其督薊遼也髙淮横甚參劾不下二十餘疏皆不報因乞骸㱕三日而疽發于背猶草疏傳檄如故為書与長安縉紳曰民力中乾虜情中狡兵餉乆乏稅使日横封疆之臣計無復之有死而已上卒採其言而撤淮人謂其功萬于誅虜焉十二月甲寅朔御史史學遷條陳屯馬等議四事曰議並徴專責成一比較覈荒徴户部覆允行廵視厰庫工科給事中何士晋條陳節省四議一曰酌領状而嚴其冐二曰慎関防以絶其竇三曰議修造而求其實四曰折弓矢而更其制因更言舖啇之困亟冝甦放不報補贈陳獻章謚文恭胡居仁謚文敬是年旌表節婦七人萬暦三十七年春正月甲申朔薊遼摠督王象乾言河流口之失各屬夷伯牙兒滿旦屠記等皆踵頼蠎之後率部夷講賞挟以必犯而頼蠎復紏集東虜黄台吉更欲入犯喜峰口其狂肆如此勢不得不恊力一勦所以勦之者曰簡精銳核客兵蒐将才預備儲蓄食足兵強又冝嚴諭市虜勿許西行明諭宣虜勿使助逆如此則頼蟒之勢亦自孤矣上曰逆夷不思朝廷恩德敢扵犯邉挟賞不一懲創為患安窮所奏俱依議行逹虜在邉講賞民間訛傳警至街市喧優安寧德勝二門百姓争入避難輔臣以虜賊窺伺人心驚惶如此一有事變盡皆離心誰為國效守禦之力兵部尚書両署止李化龍一人軍旅一動凡百倥偬何以答應乞将兩侍郎先行簡下亦使緩急有人不至臨時失措兵部請申飾京營添設哨探事下部薊鎮摠督王象乾揭報虜情急廹軍士飢餒非但不能禦虜恐生他變起原任吏部郎中顧憲成為光禄寺少卿累辭不赴御史畢茂康言朝政亟冝更新條上四事一枚卜之途當廣一直臣黜逐之冤當雪一言官陞轉之法當平一迯臣失律之罸當嚴諭禮部朕第四子瑞王長成理冝婚配命選民間淑女擇日行禮合用錢粮勅户工二部辦造輔臣葉向髙言今日錢粮一事非但内者不岀亦且外者不入承運庫督拖欠御用監請瑞王婚禮薊鎮督撫疏請軍粮至危至急每當票擬終無他策徃者閣臣得関其忠全在票擬票擬不行尚頼疏揭十九不報乞俯狥中外之請暫許借帑庶幾人情稍安都察院照磨郭良翰陳時政缺失内言因事廢謫之臣嘉隆間議禮諸臣罪矣大禮㝎而諸臣起紏分冝者罪分冝敗而忤分冝者𧺫陛下𥘉年紏江陵者罪矣江陵敗而忤江陵者𧺫今猜疑一𧺫憐才頓微至于首劾江陵如鄒元標者獨暫𧺫而旋罷屡推而不復𧺫其他如儲宫建而争建儲者不𧺫東征定矣而論東征者不𧺫四明罷矣山隂逝矣而忤四明山隂者不𧺫礦稅停矣而争礦稅者不𧺫甚者陳奉逮而奉之誣者並逮梁永逮而永之誣者並逮髙淮王忠逮而淮与忠之誣者並逮諸因事觸諱遷謫淹淪時政既更局面不改畢世而怒自臣計之非聖明之所忍也不報二月癸丑朔吏部左侍郎楊時喬卒于位上饒人署銓五年兩司大計謝絶私交時論罔間贈尚書謚端㓗礼部左侍郎楊道賔卒于位晋江人温良端亮一時正人倚以為重将屬枚卜遽卒不盡其用贈尚書謚文恪雲南逆賊阿克等俘至京師給事中宋一韓言武定之變不過起于夷民之讎殺成于郡縣之疎防該省生擒欲成其獻俘叙功之計以明非貪功妄殺尔上与兵部言阿克係小醜本非勍敵盈城之祻慘而執訊之功微命免獻俘誅之吏部紏擅去諸臣工科孫善継劉道隆長徃顧天峻等岀都咸不候命奉㫖孫善継革職為民劉道隆顧天峻李騰芳王元翰陳治則䧏三級用三月壬午朔虜銀歹二酋犯寕夏中衛㳺擊潘國振等連營堵勦獲級八十餘顆兵部請行廵按勘覆從之𥘉正月虜警訛傳寔摠兵王國棟赴薊不奉関白以令牌挑選属夷一百八十八名隨調聼用以致各夷隨路搶掠居民驚竄宣大廵按吳亮請勅薊鎮摠督将隨征屬夷安挿得所事定之日即便發囘駐牧國棟量加罰治章下兵部北虜忠順夫人率部夷補三十六年貢又五路台吉補三十四五兩年貢馬所乞陞夷人打來倘不浪等三名量授百户賜夷酋六枝勅書六道仍宣諭忠順恪守貢約毋得聼信奸人致誤欵事拱兔夷攻大勝堡䧟之遂入小凌河先是摠兵杜松夜馳至哈流兎勦殺拱兎夷一百四十六級拱兎以忠順見勦怨甚小歹青激之入犯遂引衆㴱入㳺擊于志忠被傷失士卒千餘署吏部侍郎䔥雲舉條上八事曰定國是遵典制補大僚惜人才奨恬退懲貪僞省議論慎更調不報原任南京刑部尚書趙参魯卒謚端簡鄞縣人言事忠讜風裁凛然一時月旦奉為指南云四月壬子朔兵部尚書李化龍上救遼患保疆土三事一急收人心一急助兵食一急議戦守上曰遼左孤懸民困軍疲稅銀准留充本鎮餉用以昭朝廷體恤至意軍餉匱乏照薊鎮發馬價銀十萬兩户部凑處十萬兩作速解赴備用其戦守事冝督抚鎮守官務相机進止其餘修邉制虜還着條議詳細來看分訊滇城失事罪廵撫陳用賔摠兵沐叡知府陳典知縣毛文彩推官白明通俱論死五月辛巳朔復起孫丕掦為吏部尚書丕掦初至上四事不報既受事両月百餘疏俱不報窘甚丕掦疏陳明乏知人誠未格主天厭素飱老病陡暈乞放回籍閣臣葉向髙亦極言皇上篤念舊臣委以重任乃推舉諸疏概留不發以致鬰抑請病大失人心上乃發丕掦疏曰卿公清瑞亮簡召方新何遽称疾求去且目下推陞大選廹近冝即出供職不准辭其𧺫𥙷内外官俟朕詳覧即与簡發仍慰諭向髙于是督撫以下等官稍稍得㫖向髙竭力綢繆閣部號称同心雖不能止臺省之聚訟而其說亦卒不行建昌土官安世隆為其僕那固所殺妻禄氏討那固殺之鳥䝉土官禄承爵縱兵要挟欲禄氏承襲四川廵按錢桓請令安氏親枝安崇業𬋩理以弭叛端從之立阿章為鎮雄土官改名隴自得六月庚戌朔遼東廵按熊廷弼言虜讐未觧敗局冝收當事雖有主欵之議地方曽無任疑之人乞寛馬拯新任之限暫留三月以終𣢾事至于開原危急作何救援尤當急為設䖏方是時宰賽擁衆入搶瓜兒兎等國圖犯開鐵遼瀋也兵部尚書李化龍言秋防屇期中外多事請申飾九邉戦𣢾事冝大都謂九塞惟薊遼最近患㝡迫宣大稍緩関係最大陕稍逺虜情㝡黠上曰邉防事冝依議嚴行申飾遼東緊急着户部即發應還太僕寺漕折銀十萬兩太僕寺發班價銀五萬両南京兵部備銀八萬兩戸工二部共七萬兩解赴該鎮以為募兵免餉之用仍着各該鎮撫巡官用心整理邉備訓練士伍設法修復屯田以助粮餉秋七月丙子朔皇太子第三子生名由楫母選侍王氏八歳薨兵部原議以有馬壮兵萬人半増開原半増遼陽上既發餉三十萬部復條言冝如遼東按臣請于開原各堡瀋陽寕前諸䖏皆量増千餘以濟其弱議䖏班軍以為經乆之計又言戈字庫収貯盔甲乞敕發七千副給赴遼鎮改製萬甲即令本部員外葉世英解發前銀仍令彼中試驗兵馬上曰朝廷軫念該鎮䖏粮増兵地方官當仰體至意悉心料理務使新舊各兵俱有寔用發去粮餉俱有着落方見寔心任事振刷一畨如仍前虚冐必加罪責差去轉餉官亦依議行盔甲照𢾗給發對馬島倭酋玄蘇平景直等賫國王源秀忠書欲假道朝鮮修貢朝鮮乞下諭書以伐其謀給事中宋一韓以朝鮮主少國疑人心未附不妨便冝一札以折其謀仍即詔該國毋得徒恃天朝督令集兵浚湟整甲峙餉為自固許兵都給事宋一韓言遼左戦𣢾机冝略謂戦則􅍔小而速𣢾則祻遲而大杜松事非而心是也馬拯事是而心非也離諸夷之合檄朝鮮之助皆制禦之權竒也詔増遼士觧額五名中過以後禁其圖便遷移以致地方空虚旌故四川副使王綸額其門曰顯忠綸真定人正徳時任主事以諫南廵被杖幾死也白言台吉部夷盗馬出邉操守李希梅追之被殺明暗台吉領兵馬与卜石兎争講人畜忠順夫人及五路台吉馳觧之明暗者素囊之黨挟賞阻封者也宣大御史吳亮言不正賊夷之罪白言之賞當革不襲虜王之封順義之賞當停科臣李瑾言停賞之說亮輕言挑釁亮復疏言無順義王而有順義之賞賞之無名彼若失王之賞必且利王之封不過隂陽而操縱之非挑釁也時白頭表貢已奉㫖依三十六年行竟不停其當吏部尚書孫丕掦等公請東宫講讀南御史曽陳易奏言祖宗付托至重東宫廢學堪憂懇乞皇上亟命皇太子出閣聼講不報以雲南逆酋猛奉等平陞廵撫陳用賔右都兼侍郎仍廵撫摠兵沐叡右都督各廕子錦衣百户黔公沐昌祚本兵及文武将吏各陞賞有差禮部復題西人琍瑪竇渉逺貢琛擬於賞賜之外量給所進行李價值并給冠帶遣還不報蘓杭織造太監孫隆及廵撫應天曺時聘俱以蘓州民變事上聞隆疏言亂民葛賢等聚衆焚逼要挟罷稅其疏詞頗激時聘疏言隆入蘓㑹計五関之稅額𢾗不敷參隨黄建節交通地棍湯莘徐成等乘委查稅擅自加徴妄議每机一張税銀三錢人情洶洶訛言四𧺫于是机戸皆杜門罷織而織工皆自分餓死一呼而應斃黄建節于亂石之下付湯莘等于烈熖之中然不挟寸刅不掠一物及湯莘等被責枷示一揮而散葛賢詣府自首願即償刑不以累衆其憤激之情亦可原矣四郡額賦歳不下𢾗百萬何有于六萬之稅不亟罷之以安財賦之重地哉奉㫖召􅍔奸民湯莘及為首鼔譟葛賢等八名着撫按官窮䆒正法其餘脅從俱免追䆒以靖地方通政使沈子木言建文祀典不冝乆湮禮部覆請于懿文太子廟别立一廟四時致祭不報八月山西宣府大同飢福建江西大水徐州以北畿南六郡及濟青等府蝗湖廣四川河南陜西皆旱遼東廵按熊廷弼疏請防邉時夷以萬騎修築南関故塞已又闌入靖安堡聞那林孛羅子金台失新立有備去已又勒騎住撫順関脅蠎叚牛酒已又勾西虜宰賽煖兎等窺開原遼陽邉吏日夜吿急廷弼因請添募兵及改三恊兊寺馬厲鎧甲急撫北関收宰煖以折其謀九月議條遼屯廵按熊廷弼上其議略言遼地可畊遼兵八萬簡十之三歳屯可得粟一百二十萬石省年例銀不下二三十萬上曰自古養兵多取給屯田我祖宗專以屯政實邉轉輸甚少自屯政漸壞軍餉日増以致今日庫藏空虚内外窘急此奏于邉務有裨該部即詳看具奏通行九邉一體修復于是户部覆言行之便其敦堡屯塞月粮犒賞等項費約該銀一十二萬責成内外措處上仍命兵工二部各詳細條議來說倭至昌國遂至温州麥園頭燬兵船抵飯湾登岸詔參将王元周革任劉炳文䧏調摠兵楊宗業兵備常道立各罰俸署院左副都詹沂刑部尚書沈應文祭酒周如砥各以人各封印出城輔臣極言目前㝡急者無如都察院刑部兩官都察院有考察之事刑部有審錄之事且審錄徃例近已逾期又各䖏報災或蠲或賑即未必能大有所濟要當使窮民知朝廷有不忍坐視其死之意不省南御史蔣貴參南内監陳永壽夙称奸狡肆行無忌冐破工程物件侵欺御用錢粮賍私百萬的確有據即皇極門工自許承包秋抄工完今既阻秋渉冬未立一柱駕言皇上不允而遲之以為利伏乞大奮乾綱嚴刑正法不報御史王萬祚疏言齊魯淮徐流民載道五月不雨三農失望両浙閩廣江西洪濤漲天幾為蛟龍窟穴晋楚宋豫延邉省郡無䖏不報災無䖏不請救飢寒洶洶誠可寒心虜入錦州屠戮㳺擊李惟喬擁兵不戦摠兵杜松帥師搗巢徒斬塞内士民媍女充𢾗狀極慘毒李反以柱松援引之力報功轉陞何以激勵将士不報冬十月乙酉朔以湖州府桑田渰沒詔三十六七二年絹疋盡行改折給事中何士晋等上言婚禮太浮請以瑞王視潞王潞王以愛弟之親費八萬餘福王浮溢至十九萬餘一時偶然不可為制輔臣葉向髙因謂皇上即未能全依潞王但就中减省以示樽節所禆于今日國計不小不報以銀歹部虜突入石空寺堡殺掠軍丁命革守備韓體仁任併把摠楊衡俱行廵按提問南給事中黄起龍上言建文五年正朔統順系明迄今正史尚懸因循祖號殊乖明㫖即廟議難䖏留京魂魄所依或冝祔食髙皇帝側以存祀典至于死事諸臣忠難竟冺冝采錄事蹟褒賜易名給事中彭惟成亦以為言不報御史喬允升以四方災変陳救荒之議内言理財莫若重農重農莫若專官屯田之制必東起遼東西盡甘凉相其土冝給以牛種設立亭障溝塹為烽遊騎以備㓂均田之制口分世業請限制其将來一丁惟許買田一頃以丁配田定為役法行之𢾗年田值日賤民産亦均此皆所謂藏冨于民之道也不報十一月戊寅朔御史劉光復上言安邉諸策曰立保甲勤樹藝習車戦信撫賞育将才精選鋒備邉墻習守禦利器械嚴賞罸申馬禁上命俱從實行山東廵撫王克纉言兩疏報災槩不蒙發已将災重濵州等縣十七處權冝改折征収請治專擅之罪命部勘覆户部以朝覲届期錢粮考成為言上曰災傷窮民朝廷未嘗不行寛恤至于原未被災及被災未及及𢾗地方豈得一概拖欠依議嚴行查核咨送該部議處不許姑息輔臣葉向髙言臣與李廷机挂議既均請一切本章仍諭廷机票擬廷机言鄧澄所議不過章疏中一二語未有損于向髙之品望惟令如嘗票擬而亟放臣亟允錫爵之辭亟簡當世名流与向髙共㐮聖政是日文書官宣諭朕自入冬以來動火頭暈又害眼怕風服藥調挕本章擬票関係國家大典卿當仰體朕意炤常票擬進覧庶政務不致廢弛又鴻臚寺官宣諭向髙國事多難豈可因小臣譛言堅欲求去還即入閣輔理以慰眷懷向髙疏謝仍優㫖報聞凡兩勤宣諭五奉温綸焉以直隷廵按李光輝言畿輔旱蝗特甚氷雹異常得㫖今歳各䖏奏報水旱災傷朕深為憫畿輔重地又復如此益軫朕懷着該部通行㸔議作何蠲賑分别來說不得遲緩戸部以推廣事例為請許之戎政兵部尚書李汶卒任丘人以禦虜功世廕錦衣千百户砥躬樹品不愧旂常十二月戊申朔薊遼摠兵杜松聼勘兵部覆言杜松奉檄出塞堡内屬丁皆執縛而殺之欺誑之罪重于失律冝罷職不叙至于壓買貂参扣减功銀仍專令廵按勘覆從之遼東廵按熊廷弼請給故給事中賀欽謚義州衛人為躬行實踐之學邉将有撲殺獻績見欽即吐服城中亂卒焚刼欽徃諭之羅拜而散遼人称為醫閭先生禮部以革除大禮諸臣賜謚為請言成祖于革除諸臣雖誅其頑而心實賞其忠大典之議諸臣引經守舊批鱗受杖世宗未嘗不為心動皇上登極恩詔令有司特為建祠賜謚易名不靳于諸臣明矣乞敕下臣部列名核實上請不報𥘉御史劉光復所上安邉策一擇守令上諭吏部邉事整刷不但守令各道官吏要為要緊今虜酋狂逞封疆需人卿還㑹同兵部咨訪選擇毋致誤事輔臣葉向髙以㑹議兵餉詣文華門叩首請宣府𬋩粮郎中王興言諸軍乆飢難堪户部覆聞上曰軍餉拖欠𢾗多邉計何頼着撫按官上緊催解其災傷地方當分别輕重不得一㮣藉口上下户部所奏借給邉餉疏有㫖遼鎮等鎮兵餉急缺朕心憫惻欲發内帑公用尚且不敷准借馬價二十五萬工部稅銀十五萬解給各鎮支用其北直山東河南山西陕西福建四川當年徴在官聽解内帑税銀准留以二分解部以充軍餉一分賑濟飢民移文彼䖏撫按官務要分散得冝窮民獲沾寔惠勅宗人府修輯玉牒倭併琉球虜其王聲取鷄籠淡水侵閩廣時朝議允于釡山港開市本島啇船歳以二十為率事後即囘海上嚴飾舟師以待萬暦三十八年庚戌正月戊寅朔大計群吏尚書孫丕揚署都察院孫瑺考功郎朱世守科臣曺于汴御史孔貞一主計考察方面有司沈麟祥等得㫖罷斥䧏調如例吏部以清亷卓異陕西右布政汪可受等上聞上命紀録即与不次擢用輔臣葉向髙疏請太子及福王出閣講學不報延綏廵撫凃宗濬摠陜西三邉顧其志以斬獲孟沙二酋㨗聞陞廕賞賚有差二月丁未朔雲南廵按鄧渼疏論審議論核名實各八事疏入不報修理龍虎山宫殿留本省稅銀三萬両戸工給事中孟成已何士晋各疏請惜民膏急先務收囘成命停止稅銀俱不報㑹試命吏部侍郎䔥雲㪯掌翰林院亊王圖為考試官取韓敬等三百人工科給事中馬從龍以工部郎中房楠督造河南府第估值八十二萬太濫議准潞府二十五萬因條上三項一奸蠧當袪一内外冝恊一西木冝用疏入留中虜大入遼東三月丁丑朔以薊遼邊餉匱乏上命借工部稅銀十五萬給之命内官監少監冉登徃朝鮮冊封嫡世子李祉從國王李暉請也𥘉以四川東川土司並聼雲南廵撫節制從廵按鄧渼請也廷試賜進士韓敬馬之麒錢謙益及第出身有差先是閣臣上言庶吉之選徃年隔一科自丙戌以來科科皆選以至翰林官壅滯日甚請照例仍隔一科上從之給事中叚然參内官楊一魁畏罪架揑蜚語中傷乞下明㫖懲奸以清積弊章下所司吏部尚書孫丕掦請留朝覲各官疏畧曰頃年仕途壅滯州縣官八九年不轉進士應選皆無現缺必轉陞舊者以䖏新者省其復任一以為朝廷存舊章一以為銓部通選法一以為地方省勞費下部知之閏三月丙午朔復遣科臣閲邉𥘉俺答受封邉烽寝息閣臣髙拱恐邉吏宴安忘儆請歳遣重臣臨邉閱視后定為三年一遣𥘉用卿貳重臣改用科臣又間一用京堂官萬暦二十一年後議惜糜費㱕并各廵按御史僅存其名大失遣閲𥘉意頃邉事隳壞䑓諌請復閲視舊制得㫖允行酉陽土司冉御龍与永順土司彭元錦搆􅍔御龍甥彭象乾為保靖土司與元錦不相能聲言元錦必反督府通議勦之辰州知府瞿汝稷謂朝廷之治土司不過覊縻而已且黔楚自征播後城市与田野皆非昔日之舊何堪鼓鼙復興哉請以檄諭之諭而不順用兵未晩遂草檄千言使人持諭元錦元錦柔服再諭保靖酉陽二司亦服一方帖然汝稷尋以卓異命破格超用陞天柱廵檢司為縣天柱廵檢朱梓以德化苗蠻教之耕田治生息闘睦里苗蠻服之仍選其子弟之俊者教之讀書習禮而身自率之一方遂為善俗知府瞿汝稷請于監司題請天柱為縣朱梓為知縣起楊鎬廵撫遼東輔臣葉向髙言今天下必危必乱之道盖有𢾗端而水旱災傷夷狄盗賊物怪牛妖不與焉承平日乆一也上下隔絶二也士大夫好勝喜争三也多藏厚積必有悖出之釁四也風聲氣習日趋日下莫可挽回五也此非皇上奮然振作簡用老成布列朝端将年來廢弛政事一一講求修舉臣恐宗社之憂且有萬倍于建夷者矣疏入不省銀歹部落闌入㓂刼守備鄭宗雅百户康衢等戦殁命厚加贈卹廵撫周盤摠兵柴國柱等奪禄參将李可愛等提問廵関御史金應時疏條十四欵一添将統兵以固陵寝一選将乆任以責成功一查復經制以裕邉餉一議慎委任以革冐濫一修補要害以防衝突一嚴禁撥補以實營伍一比例印馬以杜私更一儲将材以重封疆一精訓練以壮營壘一議朘削以甦軍困一議偵探以豫防守一議邉工以責實效一汰夷丁以消隱􅍔一議馬政以収實用部覆允行戒諭火落赤不得東西異状陜西摠督顧其志題言火落赤鷙悍最于諸夷未敢輙犯西寕兾市賞尔今議令守備河西五道每年秋畢無事量賞五百兩五年無事再議欵賞則費不侈而可以収犬羊之心惟是両河皆朝廷之封彊若此酋安静河西仍跳梁河東則五百金之賞祗為貪餌而将來之欵市寕有復期今當嚴諭本酋督撫鎮臣仍冝督厲所屬毋得恃疑弛備兼用戦守以保萬全報可夏四月丙子朔丁丑正陽門前楼忽火至次日辰未熄器皿厰火大學士葉向髙疏揭自去冬及春概不批發至是始得㫖云知卿憂國苦心忠愛至切今春以來恒風亢陽又兼門殿被災朕甚儆惕所奏関係朕躬事情稍俟而行還着鴻臚寺堂上官宣諭朕意佇望速出賛㐮慎勿再陳礼部以禱雨未應疏言請修省上因諭百官曰旱災異常朕心深用敬惻每于宫中竭誠祈禱緊要致務次第㪯行尔大小臣工亦當仰體至意戮力同心共圖消弭上諭户部今年北直山東山西河南四川各䖏災傷朕心懐惻恭承聖母慈諭發銀十萬兩賑濟朕将御前積餘及方至浙直稅銀五萬兩又諭宫中各出費剩不等一併給發尔部酌量災傷輕重分派多寡選差亷慎官齎解各䖏㑹同該撫按官啇議賑濟務使分散得法寔恵及民其畿輔災民及各䖏流來飢民發還京倉米三十萬石一體給賑各省撫按等官仍多方計畫便冝措䖏共拯民窮所有罪贖銀兩盡行買榖濟荒四川福建水旱特甚亦准留三十八年春夏二季稅銀給賑百姓如有乘机搶奪即係亂民法所不宥上諭北直隷宣大等處山東河南陕西𢾗省春夏二季稅銀仍留賑濟飢民從通湾太監張燁河南太監胡濱山西太監張忠請也虜酋狡兔児歹青等聚衆𢾗萬住牧爛蒲河意欲犯遼按臣熊廷弼擬留摠兵王威以原官統領自已現在戦丁駐防河東俟邉情大定别行推用部覆如議從之薊遼摠督王象乾揭報虜四五萬衆侵犯遼陽道臣田立家尚未到任請勅該部弓推才望官一員立令到任恊濟邉務疏下部遼陽廵撫李炳奏言逹酋願去車價減貢夷退還地界建夷差遣火真禀騐貢本乂續來回話朝貢事冝炳以建州慕義相從相應准從以安反側姑行覆審的確事聞于朝部議許之五月乙巳朔給事中周永春以晋地災傷疏請有三一曰撤榷稅之使一曰罷無地之租一曰蠲應徴之稅疏入留中工部侍郎王汝訓卒于官聊城人清介孤貧士論仰之特謚恭介户部員外王家賔𬋩臨清鈔関以本関稅徑齎保定廵撫賑濟議扣留今歳通湾春夏税銀抵足部劾其擅得㫖地方已有賑濟此稅銀係濟邉錢粮着發還照舊解部王家賓擅那関課作何䖏治部擬且奏六月論長定堡失事罪廵撫李炳囘籍聼勘摠兵佟鶴年論死監候䖏决餘俱䧏罸有差閣臣葉向髙題請刑部掌印無人獄囚莫為問断囚米無措三年恤刑之差亦難再緩不報大學士李廷机乞㱕疏已百餘不下至是自徃㑹極門拜表求去得㫖覧奏知卿病尚未瘳特遣太醫院堂上官診視卿還善加調挕慰朕至意七月甲辰朔以災傷畿南六府及江南州縣正粮准徴折色八月癸酉朔遼東廵按熊廷弼歴陳搗巢受報之害請以守為戰翛邉築堡十有五利虜騎不得驟决一零騎不敢窺邉省境外無時之備二墩軍得墻為恃覘候嚴明不致失悮軍机三虜穵墻填濠我得預知為備使虜無所掠四本堡軍民自足拒守營軍免分散帖防五虜入有時軍馬免㳺防奔馳之苦行旅無禦人大盗之懼營軍無空壁渉逺之煩七士馬得間操練養精蓄稅以待戦八軍不死于飢瘦而軍伍自壮馬不死于奔馳而馬價自饒九虜惮于備嚴不敢要挟而欵益堅撫賞之費各省十居民安心耕牧無人畜禾稼抄掠之虞十一邉民安堵免逺寄城郭得婦子饁耕之便十二邉人弓矢之勁胆力之壮過于營軍若使據險人戦家守亦可助我兵威而杜虜之覬覦十三民鮮畏虜塞下之田不待軍屯而吿墾者衆漸可足食十四邉人骨肉無係累之患每歳存千萬人為遼儲軍為皇上守邉十五疏入未報九月癸卯朔工科給事馬從龍請停蘇杭新派織造復㫖准三之一南御史王萬祚奏言御用監咨部備辦門殿陳設等木料皆海外嶺南之産様式甚大不比㝷常無論湖閩部庫之銀不足即足矣必至非刑拷比使百姓納銀于官司苦絆啇人令貿易于險逺况粗為上用精入私囊該監享實利聖上受怨言深為可恨不報召起趙煥為刑部尚書南太常少卿劉曰梧請復懿文太子及建文君謚號廟祀不報直隷廵按蘓惟霖疏陳黄河泇河利害請專及于泇以濟新運畧言黄河正月𥘉旬後洶湧自天而下又其水挟河而來河口日髙一日七月𥘉輙淺涸十倍無一時可由者為害甚劇泇河一水安流終鮮風波率而由之計日可逹或有稍冝拓而濬者但得寔心任事之河官嚴其稽覈因利乘便不三五年缺畧悉𥙷可成𢾗百年之利疏入留中十月壬申朔刑科給事中周曰庠參承天守備太監杜茂放恣專擅乞撤回給事中杜士全亦參茂諸不法事俱不報禮部侍郎兼學正翁正春疏皇太子及諸王出閣講學不報時皇太子弗親講筵六年矣然睿性夙成一日聖壽同諸王入賀賜以玉帶即下堦忭舞謝上上顧謂諸王曰汝兄讀盡知禮義汝當效之又一日賜以慈慶宫居住潜遣内侍覘其坐向皇太子北直謝恩訖逡廵西向坐内侍回奏上亟称知礼者再故枯菀雖分而儲位益定云大學士葉向髙以章疏不下東宫不講讀枚卜不行𧺫廢考選邉餉皆寝屢疏求去䑓省遺書向髙責其不能率九卿勲戚伏闕死争向髙曰伏闕事我朝兩見未嘗一聼每次杖死𢾗十人大損主德况正德嘉靖間止争一事今将何所指乎抑将㮣言之乎毋論不聼即幸而聼一二事其他之不聼者又将伏闕乎今冝該部連疏苦請而躬于文華門候㫖庶幾伏闕之義冡宰以下咸以為然故衆喙稍息淮陽廵撫李三才上疏乞休自郎中卲輔忠御史徐兆魁等劾諭三才而金士衡叚然等力保三才前後凡一年有餘紛如聚訟于是三才自疏求退兵部郎中錢策言三才氣魄才情儘堪揮霍然檢柙不周防閑不宻責以皭然不滓之純操不能也宜與士衡然等俱賜罷黜不報福建廵撫陳子貞條議海防六事一重海道事权以資弹壓一省汰除汛兵以熟操駕一覈虚冐名粮以釐夙弊一清侵占屯田以復舊制一禁往倭大船以絶勾引一公出海利澤以安内地得㫖允行丁亥皇太子第四子生命名由模母選妃李氏五歲薨尚膳監太監馮進朝家人相争致死訐吿刑部部發宛平縣撿䆒知縣李
