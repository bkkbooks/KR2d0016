body:
  text: 顯皇帝本紀三萬曆三十二年甲辰正月壬子朔大計河道侍郎李化成上泇黃河自開歸而下合運河入海有道有三由籣陽道考城過堅城出茶城向徐邳為中路是名濁河由曺單經豐沛出飛雲橋從昭陽湖出秦溝為北路是名銀河由潘家口過司家道口經符離道睢寧入宿遷出小河口為南路名符離河較而言之中路差勝不如泇河之開其善有六蓋由宿遷入運則徐邳涸而無水難由豐沛入運則豐堤壞而有水難泇河開而運不借河其善一以三百六十里之泇河避三百三十里之黃河二洪自險鎮口自淤不相關善二運借河則河為政運不借河則我為政察機冝而治之善三先年估全工以三百九十萬今直二十萬善四開河必行召募及此時召募則春荒役興麥熟人散在冨民不苦于賠在窮民亦淂以養此兩利之術也善五糧船過河約在春盡畏河漲爾入泇河而安流送浪早暮無妨過河之禁可弛善六請開泇河以通運泇河者在滕嶧之間受沂洙下流南通淮海舒應龍嘗鑿韓莊中作而罷劉東星在事欲遂成之會病卒未果至是化龍建議開之漕河别出一間道矣大學士王家屏卒贈少保諡文端家屏器局慱大操履嚴正論者謂其忠誠體國抱大經濟不及盡展以致太平有餘思焉二月大學士沈鯉辭會試主考首輔沈一貫題次輔沈鯉禮部右侍郎唐文獻主考鯉辭次輔主考以祖宗朝有入京朝賀舊臣暫留典試略倣遺意可絶弊端乃改命朱𢋫取楊守勤等三百人山東巡撫黃克纘奏稅監委官解銀于路詭稱被劫纍地方賠償此輩習成嚇詐局套攘奪日甚請通行申飾禮部左侍郎李廷機條陳宗藩簡便事例時宗藩請封諸事所費不資天潢之胄等于無告故疏言之江西禁山所屬七縣民包納山價二千兩認買盜竊守衛將軍金牌各監稅進銀二十餘萬兩下户部收取金珠寶玉入宫三月廷試賜進士楊守勤孫承宗吳宗逹等及第出身有差考選庶吉士二十二人駙馬楊春元棄職私赱回鄉詔削其父官四月辛巳朔日食改初五日享太廟司禮太監陳矩上妖書獄𥘉株連捕冶已非一起最後淂皎生光廷訊時康丕掦錢夢皋皆欲坐郭正域而御史牛應元等指天為誓沈裕厲聲折之生光從重論恐株連多人無所歸獄生光自誣服歎曰朝廷得我結案如移一口諸君何處求生活乎李廷機趙世卿又告輔臣朱𢋫既淂生光可具獄𢋫亦勸一貫如廷機言事稍解遂移生光刑部論斬上欲加等以謀危社稷律論磔定歲貢于四月十五日初試五月十五日再試著為令詔景府遺下莊田地租悉送福府崇文門外皇店聼福府𬋩理五月兩廣總督戴耀極言中官採珠之害初粵中香山澚九夷貿易畨舶所艤漸乃築城聚室儼然立一畨主交搆中官流毒一方云廣東稅監李敬進礦金珍珠千兩張忠等進金銀八萬兩有竒巡按四川李時華奏勘界事難結局𥘉播州之役安疆臣不惟假道又且助兵戰甚力有功將士分功蔽之僅以虛銜酬賞竟負𥘉約其靖邉等地疆臣據于掦酋存日撫臣必欲反之于酋亡之後所以怏怏卒不服六月光祿卿王守素奏寺帑屢竭光祿每年錢糧入𢾗不過二十二萬又時有逋欠不如額者萬曆𥘉張居正作相限制用十二萬多至十五萬止以後漸至三十萬出浮于入寺臣束手城狐社鼠莫可問矣羽林衛等官奏稱徽寧二府稅契銀十五萬蘇松諸府稅契銀二十萬著太監邢隆繳進山水衝諸陵蟲食陵樹葉殆盡諭內閣傳諭各衙門修舉切要時政以昭畏天至意諭內閣朕自聞祖陵災異至今尚驚懼叔安卿等屢奏應行時政少俟簡發其召見至誠候旨從容行之所請詣門起居已知道大學士沈一貫等言今日夜思四方之政如寢針氊如坐火薪何能頃刻待臣等非不欲俟而天下危亂恐有不能俟者乘天下未變而圖之則權在皇上但一下明詔而海宇大定待天下有變而圖之則權在匹夫一經嘨聚便難措手不報七月大學士沈一貫沈鯉朱𢋫各素服賫疏赴文華門叩頭投進懇賜施行實政淂俞旨時霪雨連綿都城崩壞主事徐鑾上言弭災實意請收回礦使户部尚書趙世卿諫言蒼生縻爛已極天心示警特嚴礦稅貂璫掘墳墓姦子女侮官虐民成何世界皇上嘗曰朕心仁慈自有停止之日日以繼日更待何日也諭天雨連綿京城􅔐壞房屋𢾗多壓死人民甚衆朕心惻然便著太僕寺給發銀十萬兩交與該部科及五城御史會同查勘每房一間欽賞銀五錢以資修理賑濟及醫藥津送之費務先儘貧難下户仍不許官吏侵冒必令沾受實惠又諭户部京師米價日貴著于通州倉糧暫借十萬石運付京倉支放該月折色軍匠米糧五城房號銀兩除舊例免徴外再免一月以昭朝廷權冝救災德意大學士沈一貫等條應天實政一西山被災窑户當恤二鎮撫司獄房雨傾各犯當矜三播州戰功久未敘當行四江北地方疊災當賑五教習庶吉士館師當補六部院大臣及四省巡撫當用七牧地為水所占當緩賦諭嘉慰之原任兵部左侍郎許孚遠卒賜祭葬如例河決蘇家茌水淹豐沛八月都給事中田大益疏言皇上邇來亂政不減六代之季屢疏泣陳而皇上堅塞兩耳宵人姦棍妄謂小亂易治搜括竒巧蠱惑聖心恐積怨之民窮極計生斬木揭竿四向而起文武大小九卿科道官齊赴文華門叩頭上疏諭內閣前有旨修省實政靜俟次第發行文武大臣俱著安心供職共濟時艱如何又來瀆激奏優恭照祖宗制度朝儀靜肅尊嚴凡有軍國大計許實封本從會極門投進聼候裁奪近來不知何物設意作俑朝廷但行一事若妨已之私弊便哄然群起挾迫君上要譽沽名全不思君臣大義恣肆成風是何理體沈一貫等言上欲朝儀肅靜當收天下之心欲收天下之心當恤天下之言近年以來天下久罹礦稅之苦而又習聞停止之言跂望恩綸以日為歲諸臣感時多故千言萬牘總出懇誠君臣大義正當如此伏望皇上取逆耳以悅心圖宗社之永計曠然下明詔罷礦稅于羣慮不及之時使言事之口淡而無味憂國之心化而若忘朝儀自肅天位自尊都俞吁咈之風當不逺矣武􅋮衛百户陳起鳳請採巨木充國用上震怒曰上天示警朕正修省舉行德政起鳯指稱採木誑惑朝廷好生欺玩姑革職為民福王因天變辭免官店不準仍令禁戢騷優九月以畿南災䘲異常敕刷出堪動銀錢賑濟豫前吏部尚書倪嶽曽孫倪翰儒補廕不為例建參隨程守訓王維忠等追問陳增參其僣匿龍文竒珍異寶及家人供稱銀四十萬為撫按會報客星變釋詔獄等官何棟如華鈺等二十四名為民回籍分水河成大學士沈鯉乞休不允鯉念時事艱難天聼未盡回不積誠無以報主乃列謹天戒惜民窮等十事書之于牌每入閣則率兩房官拜禱願天啓聖聰或讒鯉為詛咒上大怒立命中貴取觀之曰此非詛咒語也讒者曰其詛咒但不出聲爾上默然不應閏九月楚宗人藴珍等殺湖廣巡撫趙可懷楚事既寢楚王遣人奏謝因遺書幣謝諸貴人楚宗知之率衆邀諸途副使周應治鄞人也恐事露率驍騎盡縛之械繫于獄明日可懷出視事三司使者環列宗人羣而欣于可懷可懷譙讓之起至溜下欲訊審珍等遂以手械擊其首因仆立殺之餘宗起遍擊諸司踰墻赱應治亦被重傷巡按吳楷奏聞上怒敕盡法拿治諭內閣播功平定一國拓土開疆不行封爵之賞不可以勸後大學士一貫謂在事文武衆難以濫封特加總督李化龍少保總兵劉綎陳璘左都督十月紅夷肆劫于福建𥘉紅夷為姦啇所誘貪漢財物而來入閩不過二舶久之賈人欺紿盡沒其資夷為具告守土大吏不辨佅􅍣之言惟慿通事顛倒以致夷人忿而稱亂自後時時見告不可復止海西友帖等衛泰寧等衛夷人各進賀萬壽長至二節禮部疏覆楚宗上曰宗室有賢有愚這釁亂的必有民間棍惡乘機夾雜其中分别擒處一直榜諭善宗恪守禮法毋得黨姦取戾以後各宗俱不許聚衆褻體擅入公門把持囑託威制有司楚王著用心照舊整理八郡王協心分職綏靖所屬毋仍縱玩廣東兵備姚善掩殺黎人致敗瓊州生黎以香易土牛巡兵奪其牛黎憤殺𢾗人去參將幸功聞于兵備姚善率衆掩之大敗督府遣師援之又大敗後調𢾗萬人擊之黎赱入深險莫可奈何得老弱首𢾗顆報捷十一月以畿輔飢發通倉糧十萬石平糶朝鮮國王解外洋所獲被虜人民及倭衆于中國敕奬賚之十二月命部司御史領太僕寺銀兩速行賑濟輦下飢民巡撫湖廣梁應龍奏楚宗罪狀分别五等以聞會勘時布政使薛三才與撫按二臣力辨諸宗不反應龍云世有不反而敢公然殺一巡撫大臣者乎獄詞既上溫純亦言今日諸宗之罪最重在毆死重臣一語遂執以斷斯獄衆議帖然萬曆三十三年乙巳春正月丙子朔給事中胡欣言獻歲發春宸情悅豫聞山臺二厰鳩工運材起架鰲山以備遊賞而小民為礦稅所困為中使參隨所魚肉輦轂之下物耗價騰畿輔之間析骸易子江之南北山之東西無地不流離無人不愁苦誠于此時急下明詔一切報罷則渙號風行歡聲雷動矣不報考察京官時主察當屬侍郎楊時喬輔臣沈一貫憎其方嚴請以兵部尚書蕭大亨主筆上以時喬亷直竟屬之與都御史溫純力持公道執政使人語喬曰此番計事凡舊嫌宿怨當一切破除又曰各屬賢不肖一聼其長以受成于明主不得有所侵奪喬嘆曰此挾天子以令諸侯爾及疏上久持不下給事中錢夢皋以妖言誣大臣罪當外補中旨留之喬乃請罷不許于是郎中劉元珍御史朱吾弼主事龎時雍後先論一貫權姦誤國有旨元珍等俱謫外廣東巡按御史直指楚藩假王亦坐謫時有吳中布衣在一貫坐夢皋戲之云昔之山人為山中間人今之山人為山外逰人布衣對云昔之給事給黃門事今之給事給相門事一坐咍然二月乙巳朔開採太監沈永壽以廣西地多猺獞礦場險逺請令有司包解上命酌派河池永康等州富州思恩等縣歲納銀一千兩有竒巡撫侍郎楊芳請賜豁免以惠遐方不報三月乙亥朔諭吏部都察院大察各官本內科道不稱職者甚繁豈皆不肖或因忿恚以泄怨者有之因結黨以排去者有之欲𥪡權以挾人者有之欲立威以制人者有之大察朝廷巨典非以公濟私之案牘大臣當以尊君體國為要以詳慎休容為美務去成心同寅協恭共濟時艱以成平明之治部院因會奏臣等恭奉聖諭不勝戰栗嘉靖以來察處科道其𢾗恆多各官多缺察𢾗太減今次員𢾗視昔不逺而議處科臣四人道臣七人皆參質衆論矢公矢慎不敢苛求惟是臣等不職不稱任使亟冝罷黜上曰既矢公慎各安心供職不必陳優命太監田義會泰寧侯陳良弼戎政尚書蕭大亨御史李楠閲視三大營將領等官分别賞賚及罰俸降黜如例改題長陵石碑曰成祖文皇帝之陵工部言長陵碑石原刻太宗文皇帝之陵世廟改太宗廟號為成祖陵亦因之惟碑石未敢輕動仰祈欽定以著孝思上曰碑石鼎新理冝改題議徙寬奠新疆居民六萬餘口入內棄新疆為甌脫總督蹇逹巡撫趙楫布政張中鴻總兵李成梁以招回華人敘功東虜酋首宰賽誘殺慶雲堡備禦熊鑰及拆毀墩臺戕虜軍役事聞詔停革市賞行督撫鎮道相機處置山東巡按奏濟寧魚臺單縣等州縣被河衝決其錢糧除應免者餘俱照被災八分以上事例每石折銀五錢俟水退地出另為徐議部覆從之庚戌刑部會府部九卿科道覆議楚宗罪狀得旨藴鉁等二名處斬華雋等三名及二等內華勒令自盡英嫶等二十三人押發髙墻禁錮藴芳等二十二人及四等內華璠定熙常淨分發逺府間宅禁住藴𨨮等十五人降爵一等未封者俱不準封五月甲戌朔大學士沈鯉以疾乞休上優詔勉留之兵部郎中劉元珍疏劾大學士沈一貫曲庇私人蒙上箝下給事中錢夢皋翼贊一貫搏擊朝紳引用匪類乞賜罷黜疏入不報一貫隨具疏剖白并乞明示獨斷之意以釋人疑上溫旨慰留之夢皋亦力詆元珍謂其謗毀君父指為左都御史溫純鷹犬又言今大臣忿純辨疏不下相約一時求去以示要挾意指大學士沈鯉與吏部侍郎楊時喬也疏留中南京兵部條陳馬快船事冝列為四欵一申明注選之規三年之內不淂别差則官久而事専一裁冗設之員庶無十羊九牧之虞一申差遣之規明旨由飾酌量省併𬋩運內官務選老成安靜者則驛騷之害免一廣赦宥之恩乞分别帶徴全徴隨糧同解下兵部議覆從之豫安南祿州夷官韋逹禮贖罪自新仍令頭目鄭松嚴加約束不得再犯先是逹禮聼叛目陸佑等誘執思陵土官韋紹勇奪其印督撫戴耀楊芳責令鄭松擒獻達禮惶懼送還官印官兵勦陸佑達禮奉拿姦細十八名督撫以其悔罪用命請姑待以不死從之敕諭中外大小臣工朕近年雖事靜挕而一日萬幾未嘗不親自處斷二三輔臣雖時有獻替而亦必取自上裁其于咸福豫奪之柄從未有下移者也今歲大察疏朕簡閲良久見科道𢾗多不能無疑又思近年行取及散館起輔各官諸衙門屢來市恩瀆優未經簡彂恐差用乏人是以恤念將被察科道一概留用仍嚴諭切責以警將來皆斷自朕心誰能參預乃聼補郎中劉元珍以補官未遂輒造言生謗排擊元輔株連蔓引搖惑人心將使人主事事徇人漫無主宰大臣時時畏謗不敢擔當然後為快歟則何以振紀綱成政體也治亂所關特兹諭知爾中外大小諸臣務冝捐私體國臻于蕩平毋淂更起疑端淆亂國是劉元珍冝重治但念寬小臣所以安大臣姑降一級調極邉方用再有隨聲附和的併治不貸故諭虜犯戚家堡殺虜人畜甚衆參將劉宗漢等革職提問有差六月甲辰朔大學士朱𢋫疏請亟視事其吏部本章積而未下者一一點票以收人心以召和氣大學士沈鯉以久病曠官乞賜罷黜以應天變并請采納首輔及九卿科徑批云南京吏部疏催考察庶官得旨各致化降黜如例改江西新城知縣髙江為直隸東光縣教諭湖口太監李道鷙暴大肆威福江與抗禮及議稅江曰新城濱江瘠壤啇賈不集何稅之有道索庫金江曰新無積儲浚民膏以為中貴人歡令實不能道大怒慢罵去復檄新城包稅江一切拒之新民某所居山不𢾗畝下為廬以居上葬其親道欲鑿之江再為牘白上官爭之力道黨王金吾復至新求賂語侵江江不堪忿抑獵纓起曰鼠輩豈以吾重去官耶吾歸矣遂上牒乞歸御史史弼欽其亷明慈愛再三留不得以改教題請去之日民扳轅羅拜有下淚者後輔東光教諭署吳橋縣事編審徭役親為勾校大服民心大璫盧受延之賞雪體寒令吏索衣未至璫出貂裘衣之以衣至即解還礑曰裘值百金而少之耶江笑曰子思不受狐白裘于子方吾貧不若子思君裘不啻子方故不受尓璫侄從旁強衣之江拂袖而起其介直蓋如此江仁和人萬曆乙酉南榜魁致仕吏部尚書陸樹聲卒華亭人恬默嚴重寵辱不搖云壬午以黃河洶湧運船過淮過洪照先年例量寬一月其衝決處所著總河嚴督司道作速修治郎中賀燦然降三級調外燦然疏主察與被察者俱冝罷吏部楊時喬言國是難定主權下移懇辭印務上諭時喬䇿勵供職燦然等降極邉大學士沈一貫沈鯉朱𢋫皆疏救不從戊子上諭閣臣當今天變頻仍人心翕訿維新庶政協和萬邦正在今日朕以一人焦勞于上而股肱心膂自顧身名杜門不出如國家大事何古人任天下之重委身于利害是非之場者當不如此著鴻臚寺堂官宣諭朕意即日入閣辦事戊戌夷酋五路台吉悔罪認罰仍許貢市原革舊賞準量給與仍命督撫宣諭朝廷恩威以後但有挾賞犯邉定行誅討賞順義王忠順夫人銀幣八月壬子蘇松常鎮稅監劉成以米糧免稅額𢾗難充請乞特賜裁減上曰前有旨米糧柴薪民生日用之需不許徴稅以昭朝廷德意今奏四府額稅六萬之多米糧居半還會按撫委令有司酌徴四萬兩解進應用俟殿門工有次第奏請停免不許困纍啇民以南直隸礦務銀兩聼有司包納解進其原差百户王遇桂回衛己巳詔今歲暫免行刑各稅監梁永等進內銀十一萬餘兩禮部侍郎馮琦奏言自礦使出而天下之苦更甚于兵稅使出而百姓之苦更甚于礦皇上欲通啇而彼專欲困啇皇上欲愛民而彼專欲害民皇上戒以勿信撥置而撥置愈多皇上責以不許騷優而騷優愈甚皇上之心但欲𥙿國不欲病民群小之心必欲瘠民方能肥已運謀如鬼蜮取財盡錙銖逺近困嗟貧冨交病疏入不報九月壬申朔浙直及陜西撫按各疏請停減織造不聼楊應龍餘黨楊守隆等七十九名處斬發邉逺安置釋放變賣納價各有差從四川巡按李時華勘議也録陕西河洮等三次擒斬破虜功巡撫顧其志而下升賞有差大學士沈一貫乞休御史吳逹可疏陳維新庶政因劾一貫狎昵憸人私相比監一貫乃三疏請假修墓上仍溫旨慰留之隴川叛逆士舍多罕降詔發永昌府拘留以彰朝廷不殺之仁十月江西巡按吳逹可薦布衣章潢纂修經世諸書遙授順天府訓導巡撫貴州郭子章請討叛苗得旨苗惡既稔天討冝加一切征勦事冝俱許便冝從事務保萬全以安逺人準思明府土知府黃承祖幼子應䀻承襲從兩廣督撫戴耀之議也十一月辛未朔工科以至日屆期城工未畢乞敕工部酌議何工可以暫停何工可以減作嗣歲一意城工併日修築以固保障大學士朱𢋫亦言民窮財盡殿門大工寧緩母急得旨覽奏具悉詳慎今河工國家咽喉城工切近保障最為緊要便當設處錢糧刻期奏績其鼎建殿門理不可緩但工程浩大財盡民窮之時且內外帑藏空虛各處奏報災傷委應逺慮議處次第落成以昭朝廷寬民固本德意以薊遼昌保四鎮及宣大山西三鎮修舉大閲八事敘録文武各官各起用升廕賞賚優恤有差甲申皇太子第一子生是為熹宗皇帝上喜得元孫諭禮部尊皇太子生母恭妃王氏為皇貴妃命皇太子正宫封妃餘皆才人俱照皇明典禮書載內閣揭稱閣部無此書當令搜覽上各降一部為定式聖母壽屆六􅐆適皇孫誕生尊上徽號曰慈聖宣文明肅貞壽端獻恭僖皇太后詔告天下覃恩中外旌表鄭世子載堉賢行載堉曽祖見泳永貢成化中以庶子封東垣郡王正德四年鄭王見濍誣廢以見泳永貢子祐檡進封鄭王祐檡子厚烷襲爵東垣郡封以祐檡庶子厚炯承襲載堉乃七疏乞正倫序請令見濍曽孫載璽𬋩理府事于是禮部覆見濍之以誣枉廢也生既蒙孝宗之矜釋死又沐世廟之册恤見濍之爵既復則見濍之子孫冝襲此載堉所以久遜必欲改而歸之載璽也載堉翊錫仍以世子世孫終身翊錫身後其子襲封東垣王以接見泳永貢之統厚炯孫翊鎧另封一郡以接見焹之統今載堉年髙德卲慱物洽聞仍當給其父子郡王之祿以示優賢之義賜敕褒嘉樹坊表宅從之十二月辛丑朔罷開礦抽稅內外官回京閉各處礦場稅銀有司徴解內官監太監陳永壽進秋冬二季煤課銀兩上曰昨已有旨停礦調稅念畿輔煤窑係小民日用營生除官窑煤炸照舊內監開取供用其餘民窑稅課盡行停免以昭朝廷優恤根本地方至意總督河道曺時聘條議大挑事冝一處錢糧一募夫役一嚴稽核一議禁戢一酌蠲恤一明激勸一固上源敕諭朝鮮及時淬勵振拔自強一應戰守機冝著實修舉仍逺偵密探不論有無警息每兩月一報山東偵探委官并無動靜徒兹煩優其令召還户部會計天下錢糧出入之𢾗因極言借支截留之弊得旨積儲空虛支吾不給各地方即有急務自冝查照額項多方區處豈淂動稱借留以虧國家根本之計今後各京邉錢糧俱令隨徴隨解不許久停以致借抵有司私自那解該部參治原任參政今調茶陵知州范守已請開賈魯河及沁口以濟會通河之窮下工部議覆行總河及河南撫按勘議具奏諭內閣傳示講官撰寫論法講章進覽仍命擬撰重刋大學衍義輔序文以昭示朝廷明德新民圖治至意輔給故大同巡撫張文錦祭葬禮部言其不附逆濠及創建五堡有功邉境死于悍卒為可憫也萬曆三十四年丙午春正月庚午朔降原任修撰焦竑廣東都司斷事𥘉元子出閣定講官六人竑與焉因私纂養正圖説一書內璫陳矩得之以獻由是物議疑駭遂以浮察處越八年始補今職鳯陽巡倉御史蕭如松條上倉儲八議一明職掌二專責成三查積逋四核屯糧五嚴查參六議改折七議糴米每歲秋成于豐稔地方收買糧米出陳易新八革姦役下户部尚書趙世卿集議稱便從之命清勘兩淮鹽場直隸御史喬應甲言國家設鹽課以實軍需而課辦于灶灶依于蕩蕩之關于鹽灶至為喫緊法久弊滋姦豪侵占楊州廟灣一場開至九萬九千二百餘𤱔一場如此其他可知三十郡縣論地當分等則應否納價作何分種論租當有多寡誰為徴收作何支銷海防兵備張鳴鶚泰州知州李存信興化知縣楊潤接攘海濵素知灶情可令沿丘踏勘以清弊端從之兵部侍郎魏允貞卒直隸南樂人生平亷直特立寡與抗疏極言礦稅之害內使孫朝飛語誣之南北諸臣疏救稱為天下清官第一部民詣闕白其冤者𢾗千人撫晉九年不調乞終養至二十餘疏乃得請歸途行李蕭然詔建咸陽知縣宋時際降咸寧知縣滿朝薦一級火稅使梁永誣其抗劫稅銀刑禁稅役也輔臣沈鯉請收前旨另敕撫按勘奏不報雲南殺太監楊榮榮在雲南殘害軍民軍官賀世勛韓光大紏衆焚其第殺之上聞大怒朱𢋫奏言陛下無以一人故變動一方𢾗日有旨首事者正法中使罷不遣乃拘世勛于獄福建稅監髙宷激變閩中民大閧巡撫袁一驥輯㝎之宷肆虐于民一驥時為左轄已力厄而制之比開府又盡捕其爪牙置之法會粵璫死上使宷兼管粵稅宷故垂涎粵既被命則造樓船艅艎治戎器招集亡命徴集百貨將闌出諸夷市而躬自往粵閩人麇集其門索市直不豫民大譁宷所殺傷百十人射火箭焚民居無算閩大優又率其黨介而馳闌入中丞轅門以請救為辭一驥叱曰爾虐吾民何救為時蚤衙初散一驥方坐銓閣治文書旁無侍者寀挽之出至通衢則介士畢集將殺寀一驥目止之後觀察兵道聞變冒白創馳至以大義責寀寀得歸署而民心少輯定督理礦稅太監張忠參夏縣知縣韓熏才力不及竟擬量調簡僻事下部議言撫按職在察吏猶下吏部題覆而後處之今中使而可以參人則朝廷設撫按何為哉得旨韓熏應調與否聼撫按查實具奏幽殺慎嬪魏氏嬪魏縣人太子七歲時微有水厄嬪力護得無恙好直諌會元夕御宴嬪勸停礦稅取君民同樂面訶鄭貴妃為妹妲忤旨幽之七日卒後頗著靈異上嘗念之恤最厚真保薊永開礦太監王虎奏繳開採進過金銀𢾗目自萬曆二十四年閏八月至三十二年正月共金五百五十七兩零銀九萬二千六百四十二兩零石青一百一十九斤然計歷年間開礦所費工值物料亦至十餘萬得不償失也以皇孫生遣修撰朱之蕃給事中梁有年敕諭朝鮮賜王及妃紵絲錦絹有差二月庚子朔御史史弼疏陳治河之患言大役已興而議未決丁夫方集而技已窮驅飢疲之民于嚴寒之候枵腹墮指纍纍而是此不能慎始之過濱河守令半集河上沿河赤子悉赴工所徴發太煩期會太促洶洶生心憂在瓦解此不能防微之過昔挑黃家口費金錢百餘萬今挑朱旺口又需金錢八十萬竭澤可虞勞薪何繼此不能長慮之過泇河之役亦一時權冝但河塞而後議泇則泇成冝必可以代河今導河而河流愈漫濬泇而泇河日枯二役並興一役莫竟此不能圖終之過為今之計固當廣集方略而其要務則莫急于措處錢糧綏懷衆庶分銀斗粟務沾實惠則應募者必衆應募者衆則可免調鄉丁褁糧而赴千里之役棄家而失農桑之期豈若應募就食者得斗粟分銀之惠免流離飢凍之苦哉至于錢糧丙帑可捐外帑可借而漕糧必不可留臣聞河南山東江北地方頗稔誠厚值以募米啇而捐其稅米啇必集米價自平轉三省粟以供𢾗萬之衆何憂不及又臣觀今日諸臣人持一心山東諸臣利河南流河南諸臣利河東下兩議相持阻撓四出敗乃公事莫甚此曺乞亟選賢能同心戮力以幾成平之功不報陜西開礦太監趙欽掊剋無厭復命之日驛遞申報除牛負馬馱外箱九十六擡用夫四百名尚顛踣不起户科給事姚文蔚奏乞逮治不報山東巡撫黃克纘言往者民苦稅監為其牙爪羽翼之流毒慘也今已革稅監委官復用有司之委官是百步五十步之間爾臣議不用委官止用行首使司其事蓋以啇賈而偵察啇賈計甚便也又稱本省稅銀十三萬有竒皆以威劫取盈乞量行減免得旨允行吏科給事中翁憲祥上論銓政一曰明職掌大􅒼之有會推蓋冡宰不獨受其權而慱謀以示公若冡宰舉手而聼則所司何事至于吏部司屬亦待會舉尤屬無名二曰復選法掣籖之法久為笑柄果無心兮天官之職一吏可代如仍有心則官原預擬何必于大廷中支吾三曰警曠職臣之去就悉由君命自便身圖恣行已意撫按不即參處以患病具題漫無懲究緩急奚賴焉入計復任當有限期優遊鄉井仍得照常升轉有官名無官實所責成謂何四曰杜趨避有司薄不善之地選而求改未經到任旋有調煩方面官一遷逺方遂不復去待遷近地依然就列庶常館選概從多留或預度難盡留姑引疾以幾幸日後人心不正僥幸何由自抑五曰禁保留方靣官加銜保留因為地方惜才遂有相與體面以完故事有司沽名要譽明示意指使士民奔訴上官倡效成風安可底止隄防末流正在此時疏入不報倭酋源家康代平秀吉為王盡誅其大臣移秀吉子秀賴于大板三月己巳朔庚午上遣文書官盧受諭元輔沈一貫曰朕恭上聖母徽稱大典在即卿為元輔冝率百官行禮恭祝聖孝且卿眷委年深任勞任怨朕所鑒知豈可執浮言引身求退宜即出贊襄以副朕惓惓佇望至意一貫終不出具奏稱賀諭禮工二部朕第三子福王出府成婚有年冝遵祖制分封預建藩府合行事冝二部會同擬議來看輔臣沈一貫又上疏乞休諭留殊切給事中王元翰言臣度一貫萬無復出皇上亦當垂念俯允勿使具瞻重地有進退維谷之嗟不報南京內官監太監徐壽偽造關防文移指稱上用取南工部杉枋三千塊事發敕令南京守備劉朝用嚴提追究正法不許扶同回護工科給事中孟成已乞將壽拏解來京究問仍諭內監衙門所用錢糧皆須奏請如移文請討該部竟寢不行永著為令不報丁丑仍以江西湖口稅務歸稅監征時江西稅監李道詭稱歸稅而有司固辭原不干預請照舊𬋩理遽從之給事中孫善繼江西巡按史弼疏爭不聼户科都給事中姚文蔚言先朝重科道之官而升轉不拘內外蓋內外一體𥘉無軒輕故才賢忠節之士列于內則耳目明出之外則方隅重未間有年例左遷之説也自丁酉年科道推轉年例留中不下至今十年遂成故事殊傷國體乞自今于科道外轉立賜俞綸上伸主權下全士節不報吏部侍郎楊時喬遵新詔起廢例疏萬曆十二年至三十三年內詿誤觸犯各官范俊等一百三員發單咨訪給事中周曰庠言詔旨不信八事曰簡大􅒼而九卿員缺如故曰考廉官而考選中格如故曰通章奏而公車不報如故曰飾邉備而樞撫虛席如故曰罷礦稅而採遣使制如故曰惠京啇而內官叢斂如故曰搜逸才而草澤沉淪如故曰釋冤獄而圜扉繫縲如故遂使中外翹企之心轉為􅔵望不報丁酉以災傷命蠲賑真定順德廣平大名等府是月儀真太監暨祿進銀十萬餘兩蘇松稅監劉成江西稅監潘相天津稅監馬堂共進銀十萬餘兩河南稅監胡濱進礦金二十八兩銀四千七百八兩遼東稅監髙淮進人參一百五十五斤給事中姚文蔚言自採榷並行天下嗷嗷震恐幸蒙恩旨停礦分稅歡如更生乃未幾而梁永楊榮激變滇陕潘相李道仍行抽採馬堂又借取魚而復用委官詭詞漸肆聖意日格章奏安得不煩人心安得不懼則知分稅不如罷稅之為便不用參隨不如盡撤稅使之為仁也至于山西有無地懸坐之租乃以代州等處民壯工食扣抵解稅夫雁門係衝要之邉民壯乃守邉之役撤邉備以辦租銀舛錯若此豈宗社之福哉不報夏四月己亥朔命藺州夷奢崇明承襲祖職𬋩宣撫事仍行貴州撫按嚴諭土婦奢世續勒限歸印毋怙終取勦並禁安疆臣不許隂助阿利致生釁端乙巳輔臣沈一貫乞休甚力至是七十一疏上之上終不允貴州巡撫郭子章討平貴州苗賊斬獲酋領吳老喬等十三人俘斬苗衆三十餘名招降男婦一萬三千餘口諸苗盡平詔發秦府宗室敬鎓等于髙墻禁住以私出禁城毆殺衛官也保定巡撫孫瑋疏劾天津稅監馬堂罔上欺君戕民怙惡悖旨迷亂六罪伏望嚴旨撤回庶威福出自朝廷而􅍔亂消于瞬息不報癸未大挑河工成自朱旺口逹小浮橋延袤一百七十里用衆凡五十萬費金錢八十萬兩自十一月至今五閲月而工成河道總督曺時聘報聞兼請建祠賜祭以旌河神破格蠲征以酬力役上皆從之京師大旱五月戊辰朔江西礦稅太監潘相以礦撤􅔵望移駐景德鎮疏請専理窑務又言描畫瓷器須用土青惟浙青為上廬陵永豐玉山縣所出土青顏色淺淡請變價以進從之科臣蕭近髙孟成已疏劾相先移札而後題知自擅要君宜撤回相仍歸窑務有司不報癸酉以平定閩妖吳建功撫臣徐學聚以下升賞有差套虜火落赤分犯中西二路官兵擊赱之斬馘二百有竒仍復池河營市稅從南兵書孫礦議以此項係留都原額冝照舊征取以免紛更也壬午宣大總督楊時亨奏北虜稱臣納貢三十餘年近以京賞市貨不堪虜王不肯領受上獻愆期若不及時挽回逮斂怨益深強場之患不可言矣上諭署工部侍郎沈應文京賞衣假係撫夷大典近皆濫惡短小以致狡虜生心即行各省直撫按及督造內官務合先年式樣逐一驗確方許印解其有不堪具參無縱丙戌北虜順義王扯力克等始進萬曆三十三年表文鞍馬弓矢官其貢使閃察蒙素等二十八人俱為百户照品給賞仍降敕勞諭虜王丁酉四川巡按孔貞一言蜀中開堰灌田故名沃野近為王府有者什七軍屯什二民僅什一而已正供之外歲進金扇四萬八千四百餘柄絲絹四千四百匹兩中使入川又歲出稅銀三萬兩委官漁獵歲且五萬兩自奉旨歸有司後又于稅額三萬兩沠一萬八千徴解稅監作為公費而貼兊及差官舍類解剝削夫馬之纍不與焉巴蜀皮毛已為稅使所盡宜亟罷撤以滇南為前車不報加雜谷安撫司貢番口糧樞臣蕭大亨言本司北抵黃毛韃虜東抵孟梁諸寨歷年惡番狂逞皆賴率衆救援與長寧等司不同而食糧反居其下冝其欲請益也兹議以後計番口共一千二百七十四名每十二人給糧一分每分八斗俱于該邉附餘銀米內支給從之奪漕運總督李三才俸五月三才疏言恩詔既布旋復中泥道路所傳其説有二一謂前日新政原非上意不過一時喜心旋開旋閉一謂輔臣恐沈鯉朱𢋫通已之位忌其有成故賄買左右百計相傾以惑聖聼或借秦指滇以激聖怒遂使一應美政俱不得行疏奏上震怒云三才執任撫綏不思盡心本職逞意妄言排誣上下狂肆當治念河工多事姑奪俸于是大學士沈一貫疏辨求去上慰留之六月戊戌朔郭暖樓人家口河決北股至茶城鎮口癸邜雲南𬗟夷阿瓦擁衆𢾗萬攻圍木邦宣慰司我兵不援失之事聞黜鎮守副總兵陳寅遊擊劉素錮其終身革新平參將王士弘職上因諭邉臣凡將領不拘本屬他鎮但在百里內者遇警即併力策應功罪一體其以士弘為戒丙辰以上聖母徽號覃恩敕存問舊輔申時行王錫爵各賜銀幣羊酒辛酉停浙江二十九年織造徴沠未完從工部侍郎沈應文請也是月河南太監胡濱進稅銀三萬五千八百餘兩礦銀四千八十一兩金十五兩廣西稅監沈永壽進稅銀八千九百六十萬礦銀三百八十兩秋七月戊辰朔以災傷蠲真定順德廣平大名四府行派諸稅大學士沈一貫沈鯉並致仕遣官護送馳驛降南京給事中陳家訓二級調外任奪御史孫居相俸一年先是家訓居相交章言一貫姦貪諸狀一貫上疏詳辨其言臣求去疏八十上而皇上不允以致人言愈出愈竒皇上有意憐臣則幸放臣乃下溫詔許之因以家訓居相朋謀誣衊淆亂國是各淂降罰鯉以年老乞休遽淂俞旨且御批于一貫準給假理俟痊可之日撫按具奏召用于鯉直準致仕論者不得其故僉疑一貫使然矣通政使沈子木薊遼總督蹇逹各上疏乞休以孫居相劾一貫疏波及也上皆諭留之時居相又言致仕兵部侍郎賈應元賄一貫起用今應元已物故而一貫銀不還于是應元亦上疏力辨奉旨言官論人生死尚不一審安得事情之實顯然誣言可無體訪也上諭各邉鎮防秋事冝務照連年申飾事理兼酌近日虜情倍加隄備以保萬全仍候草木枯稿之日燒荒盡絶以斷虜騎駐牧便官軍瞭望谷不許仍前怠玩自取罪愆安南都統使國王黎維新刺死常逹禮函首以獻八月丁酉朔上命特減廣東稅課一萬兩停解廣西鹽稅銀一千一百五十六兩留充兵餉從撫按之議也始令將軍鎮輔中尉得與生員一體應試進士二甲選知州三甲選推官知縣其以鄉舉出仕者亦照常除授俱不得選除京職直隸巡按陳宗契以聖壽屆期陳金鏡四事一臨朝受賀二便殿召對三重枚卜簡大􅒼下行取四急却諸稅不報大審獄囚釋重辟七十一人俱遣戍餘減算有差而曺學程不與焉于是刑科給事中梁有年等交章請同仁併宥不報九月丁邜朔除順天中式第四名舉人鄭汝礦名遣戍汝礦大賄役割截取中貢生馬顯忠首二場文獲列魁選事覺併姦黨俱擬究𥘉議以顯忠補解既以五策不出顯忠不果顯忠鬱死士論惜之河道總督曺時聘以朱旺口既塞疏聞因條議十事一移置專道一增設河官一創築隄防以建立鋪厰一分别賞罰一久任責成一申明職掌一嚴那借一議處河夫一除豁占田工部覆如議行上諭部臣連歲公帑民力俱竭于河上役不可再冝懷永圖既稱大􅄵已成全河東注必使盡出中路方保無虞趂此秋涸將一應南北隄岸儘力修築屹如山峙自然水得所歸方堪永賴所議十事俱依擬可即行與河上諸臣知之薊遼總督蹇逹奏東西二虜與長昻合營共圖內犯上乃諭兵部虜謀之叵測非一大創無以遏其狂逞各鎮督勵兵秣馬聼總督調遣相機防勦不問所犯何地都要互為聲援母得稽遲觀望致有疏虞釋御史曺學程于獄遣充湖廣寧逺衛軍大學士朱𢋫因萬壽聖旦疏請釋放翌日即傳旨釋赦云上命欽取南京户部錢糧供御署部事侍郎葉向髙疏奏自萬曆二十年以來庫中存貯尚二百一十餘萬其後日朘月削耗費殆盡今總計每歲出計可四十餘萬入𢾗止二十萬逺不相當今見在庫銀未及二十萬尚不足半年支給若欽取之錢糧繼此不已則户部之帑立空而枵腹之變可立待矣况所取之物名為供御而實則羣小營謀視為竒貨射影鑿空巧立名色一聞詔下蟻聚蠅趨姦啇之冒濫吏書之橫索匠役之虛縻百孔千瘡展轉姦利一金之直動費十金比入御府亦徒委之泥沙俟其朽爛而已朝廷被其虛名羣小享其實利當事者苦無米之炊旁伺者幸不耕之獲似此姦弊陛下不得而知之也乞額外欽取盡行停罷即歲貢物件悉心節省不報稅監髙宷私與紅毛夷人市貢閩南路參將施德政聞之曰是延寇也力言于御史奏之謂若許其入貢福閩將無寧時上可其奏宷大恨會德政召入禁旅或語宷云其槖中多珍異胠其篋可冨也且釋憾寀然之遣人禦之塗發篋廩金𢾗兩而已復籍以還之山稅務奉御孫朝奏參巡撫魏允貞倡阻朝命下部院參看允貞秉性太剛任事太執孤立獨行多讐少與舉朝明知內臣之非然畏以蜚語相加但相和解而已冬十月丙申朔總督川湖貴王象乾參論安強臣讎害五司給事中吕邦耀因劾貴州巡撫郭子章受疆臣賄縱姦長惡子章疏辨言播州未破則欲臣作使安氏用之惟恐其不速播州既破又欲臣裁抑安氏逺之惟恐其不踈疆臣本一孺子原無他腸處之有道自是瓜牙土司讎殺自其常態夷狄相攻中國之利若蜀為蜀夷而讎黔黔為黔夷而讐蜀是為夷狄而罷中國也因求去甚力上慰留之十一月丙寅朔大修都城重城自三十三年正月始事至是報竣儀真稅監暨祿請罷天下稅使不報兵科夏子陽册封琉球回獲鳯陽妖民劉天敘伏誅天敘與其黨三人擡一小佛像厯鄉村募化妄言有法術能畫地地陷指天天開且知人生三世南京衛軍某者素黠得其情即告之操江等衙門時長至百官當詣孝陵上香將出城兵部忽傳城外有反賊萬餘人次日操江捕得四十九人付應天獄為首者天敘也事聞詔磔天敘張名二人斬應鳳等五人餘俱遣戍故事戍者必立枷時方兩枷大中橋不一夕已有死者沙壅其尸俟滿日方埋都御史丁賔署刑部大理寺念其脅從皆無知愚民召錦衣與兵馬官語曰如此十日必盡死朝廷開以生而我輩乃欲死之且以骨戍乎搭蓬與坐飲食之餘人乃得全活都察院右副都御史詹沂等奏覲期在邇合無責成吏部等等各嚴拒餽遺奉旨餽遺申飾已久有仍前違犯者小則拏送大則參奏十二月乙未朔總理惜薪司內監楊致中杖殺燕山右衛指揮僉事鄭光耀給事中汪若霖疏劾致中十罪兵部尚書蕭大亨亦言衛官為天子瓜牙無兼啇應役之制而世職皆勛臣苗裔非閹官可殺之人致中貪暴彌天冝嚴正法紀俱不報重修南海普陀寺成命所司建碑其地御製碑文記之互調薊鎮總兵尤繼先為延綏鎮總兵延綏總兵杜松為薊鎮總兵繼先收養降夷至八百人倚為精鋭薊遼督臣蹇逹議以薊鎮與他鎮不同修守為上收息蕃多恐夷情難馭致貽後患請調繼先于别鎮樞臣蕭大亨以杜松亷威素著議令更調仍令繼先將所畜夷丁携到新任安插停妥上皆從之陜西總督李汶以將離任條議安邉五事一葺松塞一創衝堡一明順逆一傳邉烽一停畨堡從之輔臣朱𢋫言考察之期不越二三日而主察大臣尚未蒙批出伏望即賜乾斷又請亟命考選行取諸臣不報給事中宋一韓言定亂之主不飾銷鋒息馬之威而以鋤暴綏良為威耀德之朝不務招携納欵之名而以閉關謝質為武竊見貴州銅仁府紅苗不靖朝廷軫念遐方詔以議處撫臣曰苗依山阻箐不可繩以漢法已之便臣固心韙之然猶以為未盡者則勦撫之策當決主客之兵當議而首從之罪當分也夫銅仁之苗黔剝膚之災也則冝以黔為主邑梅麻陽之苗是助黔為虐者則冝以川湖為客調撥土漢官兵犄角並進無慮不破刑一百二十里之小醜即不煩三省之力可也交夷不庭自黎惟談復國不貢者十年子維新嗣立一旦叩關請襲都統之封朝廷猶未之許也無何而貢獻至矣撫臣曰來享來王自是聖朝盛事許之便臣心亦韙之然猶以為未盡者則印信之豫太急而安插之令太徇也夫其既臣則為貢其未臣則名為賂堂堂天朝而可以賂遺乎則代身之金人補過之方物事不經見也今冝責成貴州撫臣搜捕首惡龍許保吳黑苗庶其塗炭可拯而中國之威常震又責成廣西撫臣待維新承襲都統之後收其貢獻其議安插莫氏亦須悉心計慮無使暮戚朝讐一方重罹荼毒庶其絛籠在我而中國之勢常尊上令兵部詳議以聞皇太子第二子生名由㰒四歲薨天啓二年追封簡懷王是年旌貴州烈婦薛氏周氏屈氏李氏雲南烈婦趙氏從巡按金忠士沈正隆請也萬曆三十五年丁未春正月乙丑朔巡按陜西御史余𢡟衡劾稅監梁永並乞休不報時永與樂綱諸罪狀已著聞𢡟衡入境恐不自保遂謀毒之𢡟衡至靖邉旋至寧塞中毒者再取方下之得不死搜之厨役得所受行毒金及褁中餘蠱皆屑黑蝌蚪也于是鞫問盡得諸姦狀疏陳其罪并乞休致自是言官攻永不置上亦知永縱橫䆮有撤回之意矣吏部奏言方直缺官太多吏治廢弛已極乞賜點用兩司郡守以修實政上是之署吏部事侍郎楊時喬請辭印務不許時當大察時喬與副都詹沂協同行事屢疏請補正官或各部尚書代挕不報命時喬與沂協同行事察已兩日𥘉四日忽復有户部尚書趙世卿代理之命時喬以印為辭上言察典舊例二日舉行已著楊時喬與詹沂協同行事如何又有此奏昨誤發舊日批紅文書即已追寢今乃不遵已降之旨而請未出之令輒自耽延成何政體冝即依行以竣大典是日時喬乃還視事時喬與沂皆勵清節署禮部左侍郎李廷機如之當除久上在宫中謂左右曰此際廷臣受朝覲官書帕開宴打閙惟楊李詹三老清寂可念永平伯王棟母趙氏為孫王明輔乞襲祖爵許之吏部侍郎楊時喬疏言皇親不襲封爵祖宗令甲甚嚴準襲一輩棟襲父偉伯爵已屬曠典今明輔安得襲封恐此端一開漸不可長將來戚畹皆以特恩為常典效尤者衆覦覬安窮上竟以特恩許襲後不為例南兵部以擒獲妖黨上諸將士功攻下兵部查議以妖黨伏辜命禮部具告謝之儀從南京內外守備請也時南中文武爭功張皇牽纍不逞者因而播私帖驚優上下南兵書孫礦奏妖黨屢布妖言等事奉旨留都根本重地陵廟尊臨設有內外守備衙門及兵部參贊機務俱有專敕如何事多掣肘致使妖黨妄肆跳梁一切善後事冝責令孫礦悉心經理終始其事毋得疑畏罪人既得此後只冝撫綏鎮靜宣布朝廷德意以安重地湖廣巡按御史史學遷論聖心三好曰好貨好疑好逸又言大臣以傴僂周密為謙恭小臣以奔赱依托為本事傳舍其官者以連化鳴得意代庖他職者以因循為積習黨同伐異者白日而倚氷山嗜利肥家者暮夜而伺金穴皆由此三好之心為之也乞留神省覽不報敕諭天下朝覲官貟曰朕惟治天下無先安民安民無先計吏邇年災異頻仍民不堪命而繆懦者偷安武健者恣臆藩臬或庇私人郡縣間持長上詔令之下視為虛文急不在公而在聲施務不先民而先􅌩橐甚且籍口朝廷為朕斂怨兹當三載黜陟幽明之期申命所司罷汰不職于貪酷之懲尤加嚴焉顧廉靜之吏守斤墨而憂緣飾或無以延譽貪殘之輩多資而善營便文巧脫爾等自今冝赤心白意拊循元元均賦平刑持亷奉職毋比黨而撓公論毋倚法而壅上恩毋沾沾而愚小民毋悻悻而事操切其或剝窮閭赱津路三尺無赦二月甲午朔停四川敘州府富順雙流二縣儒童歲考禮部侍郎李廷機言士風驕橫陵轢有司辱及學使一年之間楚浙相繼蜀復效尤不一大創復將安極冝比常熟事例停其歲考首犯俱發口外為民並申飾各省秋試罷大收事從之下監廣寧門內監邢朝等于獄擬辟九門之稅徴及士紳歲值計偕孝亷縉紳垂槖而出猶有稅者正月中泰興知縣龍鏜覲畢出城羣璫需索繼之以挺去𢾗步遂斃于民舍時值日者趙祿而朝等共為凶熖兵部以朝為首讞上即付法司究問正法于是監豎少戢士紳亦以是故末減巡關御史吳宗禮上邉防五事一議固陵寢一議嚴清勾一議蘇戰馬一議葺土堡一議度山城部覆從之總督河道曺時聘言全河既已就軌泇功委應厚終開泇于漕梗之日固不可因泇而廢黃漕利于泇成之後亦不可因黃而廢泇兩利俱存庶緩急可賴因條泇河善後六事議築欷山之隄削頓莊之嘴平大泛口之溜浚貓兒窩等處之淺建巨梁吕沖之閘增三市徐塘之􅄵以終泇河未就之工又議設河官置官夫建驛遞立巡司嚴禁閘加裁展以成新渠善後之務自去歲冬月凡三請乃允從之總督宣大侍郎鄭汝璧以病告歸汝璧𥘉至陽和守將偵言五路台吉萬餘騎挾賞叩邉汝璧意五路跳梁邉新易帥恐有他虞乃調諸將分兵守險留麻董二帥帳下久之虜騎不至稍稍來講舊賞貢馬如平時巡撫喬允升言五路虛聲要喝督臣破膽張皇始則集兵糜餉以自防繼則委心加幣以媚虜汝璧疏言禦虜之要我弱則虜肆侵凌我強則夷知斂畏五路老姦巨猾最為梟獍新河得志至今猖狂向使防禦不先則虜謀益熾脫有不測則總帥謂何今抗虜無犯尚有媚虜糜餉之説倘蹈新河之輒又將坐以何罪乎允升又揭言五路入犯之説皆發于守備燕賓欲加宣府之賞借虜以喝督臣即五路之貢馬皆守備道之于是汝璧遂謝病去從之先是長昻之事科臣與督撫論左兵部疏言中國之馭夷狄在察其情形之順逆以合勦撫之機冝而已奉旨但著撫按從長計議應勦應撫酌定勝算務操縱萬全毋得互持意見推諉以誤封疆吏部催請考選諸臣點用臺省疏留中既而下考選堪任部屬官等共十六員會試天下貢士以掌詹事府禮部侍郎楊道賓協理詹事府禮部侍郎黃汝良充主試官取施鳯來等三百人甲寅西朝房火三月甲子朔緩浙江織造歲運從撫按之請也大學士朱𢋫復入閣視事先是𢋫疏陳時政良久有旨以廷試屆期趣命入閣𢋫再疏陳謝益條時政所不可已狀上心許之諭曰枚卜閣臣朕已知之簡任大􅒼及考選諸事俟即檢點發行于是𢋫遂入閣再請枚卜簡考選諸事上甚嘉恱署都察院副都御史詹沂疏言陵祭故事監視御史十八員今在京御史僅二三人無可應者禋祀大典缺焉不光吏科熊鳴夏亦疏言前會推宣大督臣集闕下僅三侍郎一大理卿四人而已堂堂天朝何遽乏人至是今廷試屆期讀卷官止一閣臣未知果能趨朝否列之試録以傳天下載之史册以垂百世謂今日何如景象乎不報延綏巡撫凃宗濬陳安邉四事一明莭制以肅軍政一簡有司以振吏治一革流弊以𥙿軍實一清班價以𥙿城守兵部覆議從之湖廣巡按史學遷勘白誣奏郭正域事言楚王𥘉疏上亦希當道意為應敵之兵及事久情見而其誣始白詔南都京營在册餘丁挑選操練每年終仍將選補實丁照例奏報從南兵書孫礦議也詔蠲免河南裕州十二州縣新墾逋糧廷試賜黃士俊施鳯來張瑞圖等及第出身有差楊漣是科所得士也選庶吉士林欲楫等十八人命掌翰林院禮部侍郎蕭雲舉詹事王圖教習夏四月癸已朔復宰賽市賞戮哈大得俸以示關外長昂復貢而後宰賽復請開市執哈大得俸以解新河之忿又遣中軍鑽刀説誓督臣為之疏請許之仍分别治失事將臣等罪死事熊鑰襲升二級詔尚寶司及兵仗局補鑄京營金銅牌靣盔甲金瓜刀仗令如舊額順義王扯力克薨修築陜西沿東一帶上堡從總督徐三畏議也五月癸亥朔敕宣大督撫諭順義部落不得久駐青海從甘肅巡撫之議議減旅順防兵令山東與北直分餉以倭事已寧也丁丑召禮部尚書于慎行入東閣未至卒諡文定慎行東阿人髫年赴鹿鳴深沉徑挺不為町畦大為正人所倚信後與江陵不合乞病歸及江陵敗復携書丘蕣引大體調護營救極其切至天下稱其仁至義盡焉以葉向髙李廷機為禮部尚書各兼東閣大學士閣臣朱𢋫年七十獨任久病疏不啻十餘上皆極哀苦至是復籲請速輔閣員上感動手諭卿屢懇請枚卜朕已明悉但任大責重而新進喜事私結朋黨牽引瀆優是以遲疑卿可傳示吏部即會九卿科道推素懷忠義堪是任者六七員來簡用時𢋫子左通政敬循病殤于家𢋫求去益懇上復俞旨慰勞尋會推于慎行趙世卿劉元震葉向髙楊道賔李廷機孫丕掦七人是日楊時喬等十人先集東閣會議已定頃之臺省入揖舉單傳示吏科給事陳治則顧謂同列曰公道猶不盡泯廷機乃在推中刑科給事曺于汴病其瑣屑諸臣皆舉其清正爭論良久于是治則上會推始末折于聖衷上點于葉李三人批曰廷機日講有年功多啓沃署部屢遇大典勤勞懋著衆議素負清節朕已點用當以國體為重不必紛紛瀆優廷機三疏辭職報曰卿近在輦轂冝直前任事仍猶趦趄周讓急公之義謂何遵旨到任不必再辭科臣曺于汴宋一韓王元翰胡欣相繼疏劾傳諭吏部近來兩衙門專以揣摩猜疑杜害良善逞臆制人全無國體昨日枚卜各官皆有品隲請自上裁有何密囑而王元翰胡欣呶呶求勝不已姑且罰俸半年是日李廷機楊時喬黃汝良諸疏俱下皆切責言官慰諸臣心上復傳諭內閣朕思舊輔王錫爵輔贊多年忠誠正直國家多事之際可以共濟時艱欲卿等夾輔協恭辭事吏部承旨加少保建極殿大學士遣官敦趣入閣錫爵具疏謝恩辭不至六月壬辰朔巡撫鳯陽李三才以稅監暨祿病故請罷天下稅使不從祿在諸璫中最願見啇民病苦請以稅課還歸有司並請停免身自回京故三才申議及之上以門工未舉俟有次第乃許蠲免稅事仍令理鹽內官兼攝河南巡撫沈季文疏徴稅之法當稅冨民不當稅貧民言啇賈之中有開設典當但取子母無賦役之煩車舟之榷江湖之險此冝厚稅反以重賂而得輕至于小民負擔之微終日經營不過銖兩反以輸納而得重此甚非平也當有官稅不當有私稅言各省抽稅之初先開行户應納之𢾗多寡已定不復旁加而中州不然如未抽稅以前原有小稅既抽稅以後小稅不減公稅又增各行戶每年換帖納榖備賑而𥿄贖之追不問俱為稅槖矣當稅有稅之稅不當稅無稅之稅言歸德汝南十六州縣河決久衝水災淹沒稅額四千二十餘兩臣已另疏題免乃欲追賠將何所出致仕南京吏部尚書曽同亨卒同亨性明逹與物無忤清節著于銓部密理見于大工宦迹所至人皆思之閏六月壬戌朔致仕左都御史溫純卒三原人居平講一貫歸仁之學其出處伸屈不激不隨三拂柄相而卒以通顯終亦逹人之進于道者歟命依順義王祖父事例給與扯力克恤典仍降敕書一道撫諭各夷許長昻復通貢市給三十一年以後恭順歲賞仍敕道將詳察情偽以為操縱機冝從蹇達劉四科之請也許火落赤擺言汰沙三酋復通貢市三十一年以後恭順者俱許補賞仍敕將領加意隄備聼督撫指授戰欵機冝從徐三畏凃宗濬議也京師大雨如注晝夜不息各衙門皆成巨浸平陸成江內外城垣傾塌二百餘丈大內紫金城亦塌壞四十餘丈會通運河盡衝決皇木漂流殆盡損糧船二十三隻失米損軍雨霽三日正陽宣武二門外猶然波濤洶湧輿馬不得前城湮不可涉詔發銀十萬兩付五城御史酌量濟救仍照甲寅例發太倉米二十萬石平糶以濟飢民大學士朱𢋫疏奏礦稅之優末云兒童赱卒無非怨詛臣之言流離瑣尾無非感悟臣之狀乃者齎捧官即説礦稅各處書來未開緘而知其説礦稅令臣等如何抵對皇上于章疏可以留中而臣等之書揭不可無答語時時户外羅無對業之冤家日日階前列不欠錢之債主按劍相視誶語橫加輔相之地真苦海矣不報秋七月辛卯朔刑部右侍郎沈應文以獄囚久淹乞暫豁諸矜疑者需命未下于是諸臣司查發囚徒除凌遲斬絞鎖鈕牢固外軍徒杖罪及各輕犯已結未結總五十三人俱發大興宛平二縣監候續疏以聞上亦不罪也撤稅監梁永還京逮咸寧知縣滿朝薦于獄永在陜西橫甚咸寧長安特其黨惡諸亡命稍稍叛去其渠魁方裝具恐為有司所疏則托內遣持鎗劍負弓矢方陳而行按臣屢疏陳其反狀上以御史固為危言不報永遣人解馬匹者已乘郵傳發矣而楊逹官王九功等急出欲與前郵傳合縣快知其亡命也追及之交摶互傷而前郵傳去已逺遂為渭南兵快所獲御史余懋衡以賊黨叛殺奏聞永窘懼乃遣人繫書髮中入都言奪貢事誣稱楊逹官王九功魏二等各貢名馬持孝順錢糧槖金鑲珠石睛緣縧環鐸簮耳墜等物咸寧知縣滿朝薦承余御史旨命馬快伏渭南道劫之時懋衡疏已先至上見永疏怒甚謂御史固無恙而朝薦創為御史報讐命錦衣趣逮朝薦著撫按差護還京並撤樂綱以陜西稅務併之河南于是陜西之民始蘇而朝薦坐詔獄者十餘年陜西撫按各揭稱貢馬八匹扛七擡俱安穩無恙不報以班白移帳南行久兩邉墻傾塌命薊鎮督撫嚴行道將等官躬親巡閲加意修築防守以保無虞八月辛酉朔大學士李廷機以藺州鎮雄事久未決復上疏言邉餉告急户部求借馬價三十萬太僕與兵部連章告乏姑括老庫及東西二庫銀十五萬與之其苦難已如此加以處處水災所在空竭即欲用兵餉安從辦臣等竊見安氏功不可泯而罪尚可貰印已獻矣崇明已𬋩事矣兵已撤路已通矣即與崇明怨恨未消仇殺未免此皆可以勿問也時阿利已死安堯臣度印必出託言得之阿野遂還崇明黔撫謂真印已出即可結局閻宗傳安堯臣皆可赦不問而蜀撫以堯臣之篡必不可赦再疏請用師廷議未決會有邉餉告匱之事輔臣計征播時費二百萬今驟無所出于是切責蜀將張神武等意蓋與黔合而給事中王翰以輔臣之揭只冝告于密勿不可以播逺邇請勿發抄于是又有發抄之禁並禁諸訕君沽直亂政市名疑詞謾語排擠良善者以為皆不可傳而禁發抄之議自此始命釋放奢世續並赦閻宗傅等罪訪求隴氏子孫為鎮雄後并令安疆臣約束堯臣歸土本司聼選遙授職銜不許冒襲隴職并命四川撤兵時按臣馮奕垣孔貞一等俱言夷狄不可以中國之治治與政府議合從之九月辛卯朔江西參政薑士昌降三級調用士昌追劾舊輔王錫爵于是大學士李廷機朱𢋫各上疏自明士昌坐誣罔得罪琉球國中山王尚寧奏獻前使所却餽金上嘉其欵誠並以禮金還其來使而褒給事夏子陽行人王士禎却餽亷正得使臣之禮以災傷發通糧五萬石行薊鎮平糴冬十月庚申朔直隸巡按鄧澄以畿南災困俵馬多艱為請改折從之命延綏各酋男惹得能台吉奔把什力刀見計及松柏台吉各準給冠帶授試百户職銜凡欵虜事例每鎮各輪敘二名延寧諸虜𥘉以犯順稽敘既以效欵追功則併敘之外必停隔一年方得再敘惟松柏台吉久赴鈐束應與職銜于是再為申飾福王庶第一子生命名由嵩凡藩封生子五歲請名例也福王以未之國疏言臣男生于京師若拘于例則臣父子直都之時不無呼抱之情入朝皇祖母父皇御前寧無歡愛承應且請名填注非敢請封下禮部覆上命即百日命名大學士李廷機復自陳宜去者十內言近日奉旨處分皆御筆親書如雲漢昭回有目之所共覩其他票擬或出首輔而外輒歸之臣至于禁發抄一旨亦謂出臣所擬欲箝人口而壅聖聼一疑百疑至言者始比臣于包拯王安石今比臣于秦檜豺狼循此以往何所不至上曰卿勤誠敬慎朝野共知每章疏票擬皆朕親覽裁斷有何專擅豈得以浮言疑似介意遽求休致何忍于心即出安意輔政工部侍郎劉元霖以鋪啇煩難請再僉報從之𥘉工科諸臣屢請僉啇也上以僉啇之優不下于派辦故慎重者久之至是上言內供啇役偏纍五六疲民殊為可憫冝酌定人𢾗會同來説其該優免人家不得仇誣報派如核虛實杜囑托減墊費禁需索等項俱要從公執議加意體恤務使人心樂從稱朕愛養畿民之意福建督稅內監髙宷薦福建布政陳性學堪升福建巡撫事下部凡推巡撫廷舉𢾗人以待上點即一二大臣不得獨薦雖衆人共薦亦不執定何人今廷推一人舉用五人宷不俟上裁指定性學一人堪為巡撫大可異也湖廣巡按史學遷薦隱逸舉人瞿九思及華陽王奉鋭賢孝九思黃梅縣舉人本縣張維翰激變小民借九思求解不應反誣禠革撫按辨白張居正持之沉閣閉門著書三十餘年後徴為翰林待詔華陽王分封澧州建拱宸以表嵩祝匾思親以事繼母歲租不及千盡散貧宗積書幾萬卷躬披朝夕先世莊靖以純孝稱溫懿以崇文著王實象賢實當旌奬詔給京軍布花時應給者十九萬三千有竒工部以缺乏那處請詔內庫暫撥九萬匹工部再請詔如𢾗與之蘇州五年內欠至八十萬二千餘匹載入考成嚴追有司停俸河南災上諭各該𬒳災地方著撫按上緊勘實具奏照分𢾗蠲免其積榖去處就便從冝放賑災重者多方設處户部奏畿內災民委實異視上曰六郡災傷之處準照順永賑糴事例發臨德二倉米五萬石平糴以蘇民困價銀竟解該鎮抵充年例十一月庚寅朔大學士葉向髙至京入閣辦事以李廷機資俸在前受事日久乞以資俸為序從之廷機以枚卜欽點向髙名在前乞從枚卜時名後向髙上已從向髙請而兩嘉其能讓云大學士朱𢋫亦以是日趨朝陕西撫按余懋衡條上延鎮四事一稽錢糧二廣屯種三核經費四疏鹽法上嘉其深切時務命如議舉行十二月己未朔𬗟夷阿克等作亂破嵩明祿豐殺吏目韋宗孝知縣蘇夢陽上諭兵部滇夷作孽撲滅非難何日久蔓延任其焚劫失郡邑戕官民如入無人之境撫鎮官平居防守何為臨事制馭何策陳用賓沐睿俱著住俸戴罪殺賊自贖其保身失事為國死事官負著巡按速勘處分又粵地逺在萬里交夷竊發果否逃遁作何防勦失事地方作何保禦撫按亦從實勘報昨余懋衡閲視條奏邉務業已有旨未見奉行具奏仍還傳諭各邉守臣一體振刷以稱朕意安南賊突入欽州巡撫蔡夢説等戴罪切責總督戴耀剋期討賊仍嚴督黎惟新合兵同勦擒獻首惡下户部辦七公主婚禮金珠價逾十九萬兩御馬監開𢾗又復倍之尚書趙世卿以嘉禮伊邇時絀難支皇上婚禮用止七萬公主雖貴典禮雖隆視之至尊自冝少減冝每減三分之一應用從之萬曆三十六年戊申春正月己丑朔吏科給事中姚士慎陳四事一曰渙俞音以昭大信一曰謹中旨以絶幸竇一曰正刑典以正紀綱一曰停營繕以蘇物力不報許班白二酋照舊貢市兵部題其悔􅍔就罰議許貢市仍傳諭諸夷使知朝廷恩威報可以災傷免畿內粒錢糧十分之三緬夷阿克等賊攻羅次諸縣熊尚謨拒却之守備王之瑞乘賊不備進抵元謀賊潰赱賊黨吳良傑來爭遊擊裴希擊斬之官兵大集乘勝進薄武定參將張名世掦兵而進賊皆鋌赱官兵入城大掠已復躡賊賊拋金于道官軍爭拾勿逐賊盡赱東川巡撫陳用賔遂奏大捷二月戊午朔安南頭目鄭松潛計刺死䘵州夷官韋逹禮函首輔貢論功加總督戴耀太子少保升賞湖廣巡撫楊芳以下有差追贈先朝吏部左侍郎孟春為工部尚書吏部議其守貞持正夷險不易故有是命豫原任總督薊遼右都御史萬世德祭葬山西人恢宏大略慷慨雄才有定國之勳焉贈原任左都御史溫純少保三原人正議瑣垣振綱憲府典南北大計者五黜陟允協于公論察機勇退壽考令終贈原任南吏部尚書曽同亨少保吉水縣人三朝耆德膚功偉績出處大節允協輿論三月戊子朔禮部疏陳東夷違貢冝詰責之若其輸情悔罪許令自新倘果驁負固則冝暴其罪狀革其爵賞敕户兵二部從長計議整頓兵餉以耀威武而防侵暴庶中國之體統尊外夷之觀聼肅矣大學士朱𢋫等言建州桀黠非常旁近諸夷多被吞併悖強不貢已經二年又勤買參斤多索車價遼陽凋敝一區一旦內犯何以支吾伏望聖明速將臣等擬票兵部題覆總督蹇逹前疏省發以便遵行陕西巡撫王基洪條議甘肅孤懸天末處處鄰虜戒備冝豫請改設將領以重機冝更調官軍以資緩急創修邉寨以固疆圉合併冗所以實營伍申明屯戍以強兵食選用班軍以資實濟酌量戰欵以昭威信保衛西畨以固藩籬凡八事部覆咸采行之大學士朱𢋫等題國家三處軍情一時告急其一為廣粵交夷乘虛突入城中失守其一為遼左建夷蓄謀甚久跋扈可知臣等謹擬敕一道請皇上裁改亟彂兵部以振法紀以收人心其各處用兵監軍紀功實惟巡按御史之責考選一事尤其急之急者統乞鑒察允行夏四月丁巳朔雲南巡撫奏楊禮安銓遺孽作亂詔副使羅希益都司張先聲俱革職戴罪殺賊豫原任兵部尚書張佳胤祭葬銅梁縣人才猷卓犖遇事勇敢屢平大難中外倚重户部尚書趙世卿備陳財用出入之𢾗與額課虧損之由大學士朱𢋫言隆慶𥘉兵餉二百萬兩今日四百萬兩不知虜未欵貢前塞下多事餉何以少今日安寧餉何以多至于宫中買辦歲進二十萬故事取之于監者皆責之于部自礦稅立正供多被侵削曽未十年虧損已四百六十萬出者日贏入者日詘莫知策之所出乞嚴責邉臣稽查兵餉痛革虛冒剋剝之弊其買辦上供錢糧一概停止稅使即未能盡罷亦當權其利害如遼東雲南多事之處先行撤回不報遼東前屯軍變欲殺稅監髙淮不果大學士朱𢋫等言淮在遼東敲骨吸髓遼人合男婦𢾗千人投虜賴將官攔住衆怒未平誓欲殺淮望皇上亟下一令𢾗淮罪過撤令回京遼安而天下舉安矣户部尚書趙世卿戎政尚書李化龍亦疏論淮事俱不報大學士葉向髙言臣惟古來致亂之故多矣然未有上下隔絶中外乖離如今日者皇上試思一旦有事中外何人可以倚伏何項錢糧可以動支何處兵馬可以殺賊何方百姓可以知感朝廷恩德可以得其死力念及于此豈不寒心望亟講綢繆之䇿以淮萬年基業臣旦夕去國有餘寵焉上優旨慰留不允辭五月江南大水無麥禾南京科道內外守備大小九卿應天巡撫各揭帖地方霪雨連綿江湖泛漲自留京以至蘇松常鎮諸郡皆𬒳淹沒周回千餘里茫然巨浸二麥垂成而顆粒不登秧苗將種而寸土難藝墟岸無不衝決廬舍無以傾頽暴骨漂尸凄涼滿目棄妻失子號哭震天甚至舊都宫闕監屬向在髙燥之地者今皆蕩為水鄉街衢市肆盡成長河舟航遍于陸地魚鱉遊于人家蓋二百年來未有之災也閣臣朱𢋫亦奏故鄉水患異常上曰連日見南直隸浙江各處報災方深軫念覽卿奏益用惻然即行各撫按官分别蠲賑請寬袍假量留稅銀朕已知之其改折等事通將省直所奏酌議來看詔留稅銀五萬兩賑濟蘇松常鎮四府又彂監課儀真稅銀共十五萬兩賑濟浙江杭嘉湖三府朝鮮國王妃金氏奏前王昖卒于去歲立光海君琿請命科臣胡欣駁謂臨海君珒居長琿居次珒因倭患被虜復歸遂有立次之請未允今擅立非次當改上曰立子以長萬古綱常該國素尚禮義何乃敢行廢立自取亂亡移文秉公詳究臨海何以廢光海何以立具奏定奪兵部奏滇雲元凶未獲報捷冒濫冝防上諭曰賊首未擒府印未復戕戮甚慘師老無功乃猶屢報捷音豈無掩殺避罪之弊且張名世正在軍中報功獨多尤屬可疑行巡按公勘以慿議處撫鎮二臣失事不小始令戴罪殺賊必以獲酋復印方可自贖仍另推勘任者刻期前往夾勦毋得久延誤事命總兵劉綎往雲南討賊請給關防有旨給與事平之日奏徼又諭該省人民既遭賊害地方官若復掩殺避罪豈不更慘今後用兵務在除害安民不許沿習舊弊自取罪愆劉綎沿途須安靜無優若量度地方寧息爾部即另行推用六月詔撤髙淮還京淮差舍需索錦州軍户軍户殺舍吏部侍郎楊時喬力言邉情叵測遼左重困乃有旨撤回秋七月乙酉朔御史方大美以南畿水災言蠲之條有四而賑之條有二曰漕糧冝蠲也條鞭冝蠲也存留冝蠲也疊稅宜蠲也曰目前無依之民冝賑也來歲用力之民冝賑也疏留中大學士葉向髙言自古災異之生説者謂天心仁愛然不過日月告蝕星辰災異之類今乃舉天下財賦之區東南𢾗千里盡為馮夷所據自江淮以北如陕西河西等處又旱魃為虐赤地千里則是天下無一樂土百姓從何安生官司從何設法明歲邉餉漕糧從何措辦目前查勘料理全賴巡按而考選一事經今已及三年十百待命之臣前路欲窮壯心且盡又况九列空虗百司廢曠甚至綸扉重地乃使寥寥一人出入其間瑣尾蕭條不成骵統真有如言官所陳列者臣顒望處分以日為歲旨報間八月乙卯朔大學士朱𢋫以萬壽屆期再請亟下考選上嘉其忠愛令即出輔政尋有旨考選諸官都依擬用且閣部院催請再四朕非困吝但因彼此訐辨瀆擾爾皆繇汪若霖起意生疑部寺吳正志等訐辨奏優汪若霖調外任用部寺吳正志汪元功黃汝亨黃一騰都各降一級調外任用今後考選科道務要精核真才勿徇虛譽私囑以亂政治授考選喻安性等科道各官逮雲南巡撫陳用賔總兵沐睿雲南報擒賊首上曰賊夷連破城池八處殺戮平民無算乘虛直入幾失會城鎮撫三司各有地方之責平居備禦謂何臨時束手無策徒以印信餌賊為退虜全身之計却又上下蒙蔽妄冒報功據獲首惡是真愈見前報之偽陳用賔沐睿俱械送至京從公問擬其餘文武諸臣聼勘降調有差直隸巡按李雲鵠陳賑濟災民六欵一請發帑以救燃眉一議平糴以定人心一勤積貯以行遠糴一便間納以資荒政一興工作以寓賑恤一寓煮粥以救窮獨九月乙酉朔雲南巡按周懋相條上事冝設武備以嚴防禦清隱占以廣訓練復汰折以實行伍重兵備以修邉防復衛營以壯威武寬文法以綏土夷劄鄰夷以絶邉釁部覆允行兵部言逆賊阿克等宜生縛闕下亟正顯誅得旨阿克等俱解京正法獻俘事臨時再議命順天府通州于漷縣永樂店創造景命殿成中官護守聖母誕育之地也總督陕西兵部尚書徐三畏卒于邉任丘縣人屏翰勞多封疆績茂畢生勤瘁輿疾以殞豫祭葬如例宰賽入犯開原殺掠男婦六百餘口冬十月乙丑朔許朝鮮次子光海君琿襲封十一月甲申朔大學士葉向髙疏奏今日九卿大僚缺乏已極每衙門不過一人而又或以真病或以𬒳言皆杜門求去其見在供職者惟戎政尚書李化龍禮部侍郎楊道賓工部侍郎劉元霖三人而道賓又欲給假化龍又偶感寒疾尚未出户長安道上幾遂無九卿之迹又户部尚書趙世卿以邉餉匱乏無可設處困苦悲號幾無生趣工部又以夷賞無措兵部光祿寺又以供應難支求借户工二部彼此束手相怨相尤又京民困苦逃亡流竄每聞號訴盡為酸心叩其受害之故半為鋪墊半為姦胥于國家曽無分毫之利而徒竭民脂膏填此溪壑其亦倒置之甚也倘有風塵之警及于國門九列無官倉庫無錢京師無民即有民亦不肯為我用臣不知何所恃也不報大學士朱𢋫卒贈太子太保諡文懿𢋫山隂人其遺疏請補閣臣忠悃可掬兵部尚書蹇逹卒四川重慶衛人策事百不失一其督薊遼也髙淮橫甚參劾不下二十餘疏皆不報因乞骸歸三日而疽發于背猶草疏傳檄如故為書與長安縉紳曰民力中乾虜情中狡兵餉久乏稅使日橫封疆之臣計無復之有死而已上卒採其言而撤淮人謂其功萬于誅虜焉十二月甲寅朔御史史學遷條陳屯馬等議四事曰議並徴專責成一比較核荒徴户部覆允行巡視厰庫工科給事中何士晉條陳節省四議一曰酌領狀而嚴其冒二曰慎關防以絶其竇三曰議修造而求其實四曰折弓矢而更其制因更言鋪啇之困亟冝蘇放不報補贈陳獻章諡文恭胡居仁諡文敬是年旌表節婦七人萬曆三十七年春正月甲申朔薊遼總督王象乾言河流口之失各屬夷伯牙兒滿旦屠記等皆踵賴蠎之後率部夷講賞挾以必犯而賴蠎復紏集東虜黃台吉更欲入犯喜峰口其狂肆如此勢不得不協力一勦所以勦之者曰簡精鋭核客兵搜將才預備儲蓄食足兵強又冝嚴諭市虜勿許西行明諭宣虜勿使助逆如此則賴蟒之勢亦自孤矣上曰逆夷不思朝廷恩德敢于犯邉挾賞不一懲創為患安窮所奏俱依議行逹虜在邉講賞民間訛傳警至街市喧優安寧德勝二門百姓爭入避難輔臣以虜賊窺伺人心驚惶如此一有事變盡皆離心誰為國效守禦之力兵部尚書兩署止李化龍一人軍旅一動凡百倥偬何以答應乞將兩侍郎先行簡下亦使緩急有人不至臨時失措兵部請申飾京營添設哨探事下部薊鎮總督王象乾揭報虜情急迫軍士飢餒非但不能禦虜恐生他變起原任吏部郎中顧憲成為光祿寺少卿纍辭不赴御史畢茂康言朝政亟冝更新條上四事一枚卜之途當廣一直臣黜逐之冤當雪一言官升轉之法當平一逃臣失律之罰當嚴諭禮部朕第四子瑞王長成理冝婚配命選民間淑女擇日行禮合用錢糧敕户工二部辦造輔臣葉向髙言今日錢糧一事非但內者不出亦且外者不入承運庫督拖欠御用監請瑞王婚禮薊鎮督撫疏請軍糧至危至急每當票擬終無他策往者閣臣得關其忠全在票擬票擬不行尚賴疏揭十九不報乞俯徇中外之請暫許借帑庶幾人情稍安都察院照磨郭良翰陳時政缺失內言因事廢謫之臣嘉隆間議禮諸臣罪矣大禮㝎而諸臣起紏分冝者罪分冝敗而忤分冝者起陛下𥘉年紏江陵者罪矣江陵敗而忤江陵者起今猜疑一起憐才頓微至于首劾江陵如鄒元標者獨暫起而旋罷屢推而不復起其他如儲宫建而爭建儲者不起東征定矣而論東征者不起四明罷矣山隂逝矣而忤四明山隂者不起礦稅停矣而爭礦稅者不起甚者陳奉逮而奉之誣者並逮梁永逮而永之誣者並逮髙淮王忠逮而淮與忠之誣者並逮諸因事觸諱遷謫淹淪時政既更局面不改畢世而怒自臣計之非聖明之所忍也不報二月癸丑朔吏部左侍郎楊時喬卒于位上饒人署銓五年兩司大計謝絶私交時論罔間贈尚書諡端潔禮部左侍郎楊道賔卒于位晉江人溫良端亮一時正人倚以為重將屬枚卜遽卒不盡其用贈尚書諡文恪雲南逆賊阿克等俘至京師給事中宋一韓言武定之變不過起于夷民之讎殺成于郡縣之疏防該省生擒欲成其獻俘敘功之計以明非貪功妄殺爾上與兵部言阿克係小醜本非勍敵盈城之祻慘而執訊之功微命免獻俘誅之吏部紏擅去諸臣工科孫善繼劉道隆長往顧天峻等出都咸不候命奉旨孫善繼革職為民劉道隆顧天峻李騰芳王元翰陳治則降三級用三月壬午朔虜銀歹二酋犯寧夏中衛遊擊潘國振等連營堵勦獲級八十餘顆兵部請行巡按勘覆從之𥘉正月虜警訛傳實總兵王國棟赴薊不奉關白以令牌挑選屬夷一百八十八名隨調聼用以致各夷隨路搶掠居民驚竄宣大巡按吳亮請敕薊鎮總督將隨征屬夷安插得所事定之日即便發回駐牧國棟量加罰治章下兵部北虜忠順夫人率部夷補三十六年貢又五路台吉補三十四五兩年貢馬所乞升夷人打來倘不浪等三名量授百户賜夷酋六枝敕書六道仍宣諭忠順恪守貢約毋得聼信姦人致誤欵事拱兔夷攻大勝堡陷之遂入小凌河先是總兵杜松夜馳至哈流兔勦殺拱兔夷一百四十六級拱兔以忠順見勦怨甚小歹青激之入犯遂引衆深入遊擊于志忠被傷失士卒千餘署吏部侍郎蕭雲舉條上八事曰定國是遵典制補大僚惜人才奬恬退懲貪偽省議論慎更調不報原任南京刑部尚書趙參魯卒諡端簡鄞縣人言事忠讜風裁凛然一時月旦奉為指南云四月壬子朔兵部尚書李化龍上救遼患保疆土三事一急收人心一急助兵食一急議戰守上曰遼左孤懸民困軍疲稅銀準留充本鎮餉用以昭朝廷體恤至意軍餉匱乏照薊鎮發馬價銀十萬兩户部湊處十萬兩作速解赴備用其戰守事冝督撫鎮守官務相機進止其餘修邉制虜還著條議詳細來看分訊滇城失事罪巡撫陳用賔總兵沐睿知府陳典知縣毛文彩推官白明通俱論死五月辛巳朔復起孫丕掦為吏部尚書丕掦初至上四事不報既受事兩月百餘疏俱不報窘甚丕掦疏陳明乏知人誠未格主天厭素飱老病陡暈乞放回籍閣臣葉向髙亦極言皇上篤念舊臣委以重任乃推舉諸疏概留不發以致鬱抑請病大失人心上乃發丕掦疏曰卿公清瑞亮簡召方新何遽稱疾求去且目下推升大選迫近冝即出供職不準辭其起輔內外官俟朕詳覽即與簡發仍慰諭向髙于是督撫以下等官稍稍得旨向髙竭力綢繆閣部號稱同心雖不能止臺省之聚訟而其説亦卒不行建昌土官安世隆為其僕那固所殺妻祿氏討那固殺之鳥蒙土官祿承爵縱兵要挾欲祿氏承襲四川巡按錢桓請令安氏親枝安崇業𬋩理以弭叛端從之立阿章為鎮雄土官改名隴自得六月庚戌朔遼東巡按熊廷弼言虜讐未解敗局冝收當事雖有主欵之議地方曽無任疑之人乞寬馬拯新任之限暫留三月以終𣢾事至于開原危急作何救援尤當急為設處方是時宰賽擁衆入搶瓜兒兔等國圖犯開鐵遼瀋也兵部尚書李化龍言秋防屇期中外多事請申飾九邉戰𣢾事冝大都謂九塞惟薊遼最近患最迫宣大稍緩關係最大陕稍逺虜情最黠上曰邉防事冝依議嚴行申飾遼東緊急著户部即發應還太僕寺漕折銀十萬兩太僕寺發班價銀五萬兩南京兵部備銀八萬兩戶工二部共七萬兩解赴該鎮以為募兵免餉之用仍著各該鎮撫巡官用心整理邉備訓練士伍設法修復屯田以助糧餉秋七月丙子朔皇太子第三子生名由楫母選侍王氏八歲薨兵部原議以有馬壯兵萬人半增開原半增遼陽上既發餉三十萬部復條言冝如遼東按臣請于開原各堡瀋陽寧前諸處皆量增千餘以濟其弱議處班軍以為經久之計又言戈字庫收貯盔甲乞敕發七千副給赴遼鎮改製萬甲即令本部員外葉世英解發前銀仍令彼中試驗兵馬上曰朝廷軫念該鎮處糧增兵地方官當仰體至意悉心料理務使新舊各兵俱有實用發去糧餉俱有著落方見實心任事振刷一畨如仍前虛冒必加罪責差去轉餉官亦依議行盔甲照𢾗給發對馬島倭酋玄蘇平景直等賫國王源秀忠書欲假道朝鮮修貢朝鮮乞下諭書以伐其謀給事中宋一韓以朝鮮主少國疑人心未附不妨便冝一札以折其謀仍即詔該國毋得徒恃天朝督令集兵浚湟整甲峙餉為自固許兵都給事宋一韓言遼左戰𣢾機冝略謂戰則􅍔小而速𣢾則祻遲而大杜松事非而心是也馬拯事是而心非也離諸夷之合檄朝鮮之助皆制禦之權竒也詔增遼士解額五名中過以後禁其圖便遷移以致地方空虛旌故四川副使王綸額其門曰顯忠綸真定人正德時任主事以諫南巡被杖幾死也白言台吉部夷盜馬出邉操守李希梅追之被殺明暗台吉領兵馬與卜石兔爭講人畜忠順夫人及五路台吉馳解之明暗者素囊之黨挾賞阻封者也宣大御史吳亮言不正賊夷之罪白言之賞當革不襲虜王之封順義之賞當停科臣李瑾言停賞之説亮輕言挑釁亮復疏言無順義王而有順義之賞賞之無名彼若失王之賞必且利王之封不過隂陽而操縱之非挑釁也時白頭表貢已奉旨依三十六年行竟不停其當吏部尚書孫丕掦等公請東宫講讀南御史曽陳易奏言祖宗付托至重東宫廢學堪憂懇乞皇上亟命皇太子出閣聼講不報以雲南逆酋猛奉等平升巡撫陳用賔右都兼侍郎仍巡撫總兵沐睿右都督各廕子錦衣百户黔公沐昌祚本兵及文武將吏各升賞有差禮部復題西人琍瑪竇涉逺貢琛擬於賞賜之外量給所進行李價值并給冠帶遣還不報蘇杭織造太監孫隆及巡撫應天曺時聘俱以蘇州民變事上聞隆疏言亂民葛賢等聚衆焚逼要挾罷稅其疏詞頗激時聘疏言隆入蘇會計五關之稅額𢾗不敷參隨黃建節交通地棍湯莘徐成等乘委查稅擅自加徴妄議每機一張稅銀三錢人情洶洶訛言四起于是機戶皆杜門罷織而織工皆自分餓死一呼而應斃黃建節于亂石之下付湯莘等于烈熖之中然不挾寸創不掠一物及湯莘等被責枷示一揮而散葛賢詣府自首願即償刑不以纍衆其憤激之情亦可原矣四郡額賦歲不下𢾗百萬何有于六萬之稅不亟罷之以安財賦之重地哉奉旨召􅍔姦民湯莘及為首鼓譟葛賢等八名著撫按官窮究正法其餘脅從俱免追究以靖地方通政使沈子木言建文祀典不冝久湮禮部覆請于懿文太子廟别立一廟四時致祭不報八月山西宣府大同飢福建江西大水徐州以北畿南六郡及濟青等府蝗湖廣四川河南陜西皆旱遼東巡按熊廷弼疏請防邉時夷以萬騎修築南關故塞已又闌入靖安堡聞那林孛羅子金台失新立有備去已又勒騎住撫順關脅蠎假牛酒已又勾西虜宰賽暖兔等窺開原遼陽邉吏日夜告急廷弼因請添募兵及改三協兊寺馬厲鎧甲急撫北關收宰暖以折其謀九月議條遼屯巡按熊廷弼上其議略言遼地可耕遼兵八萬簡十之三歲屯可得粟一百二十萬石省年例銀不下二三十萬上曰自古養兵多取給屯田我祖宗專以屯政實邉轉輸甚少自屯政漸壞軍餉日增以致今日庫藏空虛內外窘急此奏于邉務有裨該部即詳看具奏通行九邉一體修復于是户部覆言行之便其敦堡屯塞月糧犒賞等項費約該銀一十二萬責成內外措處上仍命兵工二部各詳細條議來説倭至昌國遂至溫州麥園頭燬兵船抵飯灣登岸詔參將王元周革任劉炳文降調總兵楊宗業兵備常道立各罰俸署院左副都詹沂刑部尚書沈應文祭酒周如砥各以人各封印出城輔臣極言目前最急者無如都察院刑部兩官都察院有考察之事刑部有審録之事且審録往例近已逾期又各處報災或蠲或賑即未必能大有所濟要當使窮民知朝廷有不忍坐視其死之意不省南御史蔣貴參南內監陳永壽夙稱姦狡肆行無忌冒破工程物件侵欺御用錢糧贓私百萬的確有據即皇極門工自許承包秋抄工完今既阻秋涉冬未立一柱駕言皇上不允而遲之以為利伏乞大奮乾綱嚴刑正法不報御史王萬祚疏言齊魯淮徐流民載道五月不雨三農失望兩浙閩廣江西洪濤漲天幾為蛟龍窟穴晉楚宋豫延邉省郡無處不報災無處不請救飢寒洶洶誠可寒心虜入錦州屠戮遊擊李惟喬擁兵不戰總兵杜松帥師搗巢徒斬塞內士民婦女充𢾗狀極慘毒李反以柱松援引之力報功轉升何以激勵將士不報冬十月乙酉朔以湖州府桑田淹沒詔三十六七二年絹匹盡行改折給事中何士晉等上言婚禮太浮請以瑞王視潞王潞王以愛弟之親費八萬餘福王浮溢至十九萬餘一時偶然不可為制輔臣葉向髙因謂皇上即未能全依潞王但就中減省以示樽節所禆于今日國計不小不報以銀歹部虜突入石空寺堡殺掠軍丁命革守備韓體仁任併把總楊衡俱行巡按提問南給事中黃起龍上言建文五年正朔統順系明迄今正史尚懸因循祖號殊乖明旨即廟議難處留京魂魄所依或冝祔食髙皇帝側以存祀典至于死事諸臣忠難竟泯冝采録事迹褒賜易名給事中彭惟成亦以為言不報御史喬允升以四方災變陳救荒之議內言理財莫若重農重農莫若專官屯田之制必東起遼東西盡甘涼相其土冝給以牛種設立亭障溝塹為烽遊騎以備寇均田之制口分世業請限制其將來一丁惟許買田一頃以丁配田定為役法行之𢾗年田值日賤民産亦均此皆所謂藏冨于民之道也不報十一月戊寅朔御史劉光復上言安邉諸策曰立保甲勤樹藝習車戰信撫賞育將才精選鋒備邉墻習守禦利器械嚴賞罰申馬禁上命俱從實行山東巡撫王克纘言兩疏報災槩不蒙發已將災重濵州等縣十七處權冝改折征收請治專擅之罪命部勘覆户部以朝覲屆期錢糧考成為言上曰災傷窮民朝廷未嘗不行寬恤至于原未被災及被災未及及𢾗地方豈得一概拖欠依議嚴行查核咨送該部議處不許姑息輔臣葉向髙言臣與李廷機挂議既均請一切本章仍諭廷機票擬廷機言鄧澄所議不過章疏中一二語未有損于向髙之品望惟令如嘗票擬而亟放臣亟允錫爵之辭亟簡當世名流與向髙共襄聖政是日文書官宣諭朕自入冬以來動火頭暈又害眼怕風服藥調挕本章擬票關係國家大典卿當仰體朕意照常票擬進覽庶政務不致廢弛又鴻臚寺官宣諭向髙國事多難豈可因小臣譛言堅欲求去還即入閣輔理以慰眷懷向髙疏謝仍優旨報聞凡兩勤宣諭五奉溫綸焉以直隸巡按李光輝言畿輔旱蝗特甚氷雹異常得旨今歲各處奏報水旱災傷朕深為憫畿輔重地又復如此益軫朕懷著該部通行看議作何蠲賑分别來説不得遲緩戶部以推廣事例為請許之戎政兵部尚書李汶卒任丘人以禦虜功世廕錦衣千百户砥躬樹品不愧旗常十二月戊申朔薊遼總兵杜松聼勘兵部覆言杜松奉檄出塞堡內屬丁皆執縛而殺之欺誑之罪重于失律冝罷職不敘至于壓買貂參扣減功銀仍專令巡按勘覆從之遼東巡按熊廷弼請給故給事中賀欽諡義州衛人為躬行實踐之學邉將有撲殺獻績見欽即吐服城中亂卒焚劫欽往諭之羅拜而散遼人稱為醫閭先生禮部以革除大禮諸臣賜諡為請言成祖于革除諸臣雖誅其頑而心實賞其忠大典之議諸臣引經守舊批鱗受杖世宗未嘗不為心動皇上登極恩詔令有司特為建祠賜諡易名不靳于諸臣明矣乞敕下臣部列名核實上請不報𥘉御史劉光復所上安邉策一擇守令上諭吏部邉事整刷不但守令各道官吏要為要緊今虜酋狂逞封疆需人卿還會同兵部咨訪選擇毋致誤事輔臣葉向髙以會議兵餉詣文華門叩首請宣府𬋩糧郎中王興言諸軍久飢難堪户部覆聞上曰軍餉拖欠𢾗多邉計何賴著撫按官上緊催解其災傷地方當分别輕重不得一概藉口上下户部所奏借給邉餉疏有旨遼鎮等鎮兵餉急缺朕心憫惻欲發內帑公用尚且不敷準借馬價二十五萬工部稅銀十五萬解給各鎮支用其北直山東河南山西陕西福建四川當年徴在官聽解內帑稅銀準留以二分解部以充軍餉一分賑濟飢民移文彼處撫按官務要分散得冝窮民獲沾實惠敕宗人府修輯玉牒倭併琉球虜其王聲取雞籠淡水侵閩廣時朝議允于釡山港開市本島啇船歲以二十為率事後即回海上嚴飾舟師以待萬曆三十八年庚戌正月戊寅朔大計群吏尚書孫丕揚署都察院孫瑺考功郎朱世守科臣曺于汴御史孔貞一主計考察方面有司沈麟祥等得旨罷斥降調如例吏部以清亷卓異陕西右布政汪可受等上聞上命紀録即與不次擢用輔臣葉向髙疏請太子及福王出閣講學不報延綏巡撫凃宗濬總陜西三邉顧其志以斬獲孟沙二酋捷聞升廕賞賚有差二月丁未朔雲南巡按鄧渼疏論審議論核名實各八事疏入不報修理龍虎山宫殿留本省稅銀三萬兩戶工給事中孟成已何士晉各疏請惜民膏急先務收回成命停止稅銀俱不報會試命吏部侍郎蕭雲舉掌翰林院事王圖為考試官取韓敬等三百人工科給事中馬從龍以工部郎中房楠督造河南府第估值八十二萬太濫議準潞府二十五萬因條上三項一姦蠧當袪一內外冝協一西木冝用疏入留中虜大入遼東三月丁丑朔以薊遼邊餉匱乏上命借工部稅銀十五萬給之命內官監少監冉登往朝鮮册封嫡世子李祉從國王李暉請也𥘉以四川東川土司並聼雲南巡撫節制從巡按鄧渼請也廷試賜進士韓敬馬之麒錢謙益及第出身有差先是閣臣上言庶吉之選往年隔一科自丙戌以來科科皆選以至翰林官壅滯日甚請照例仍隔一科上從之給事中假然參內官楊一魁畏罪架揑蜚語中傷乞下明旨懲姦以清積弊章下所司吏部尚書孫丕掦請留朝覲各官疏略曰頃年仕途壅滯州縣官八九年不轉進士應選皆無現缺必轉升舊者以處新者省其復任一以為朝廷存舊章一以為銓部通選法一以為地方省勞費下部知之閏三月丙午朔復遣科臣閲邉𥘉俺答受封邉烽寢息閣臣髙拱恐邉吏宴安忘警請歲遣重臣臨邉閲視后定為三年一遣𥘉用卿二重臣改用科臣又間一用京堂官萬曆二十一年後議惜糜費歸并各巡按御史僅存其名大失遣閲𥘉意頃邉事隳壞臺諌請復閲視舊制得旨允行酉陽土司冉御龍與永順土司彭元錦搆􅍔御龍甥彭象乾為保靖土司與元錦不相能聲言元錦必反督府通議勦之辰州知府瞿汝稷謂朝廷之治土司不過羈縻而已且黔楚自征播後城市與田野皆非昔日之舊何堪鼓鼙復興哉請以檄諭之諭而不順用兵未晚遂草檄千言使人持諭元錦元錦柔服再諭保靖酉陽二司亦服一方帖然汝稷尋以卓異命破格超用升天柱巡檢司為縣天柱巡檢朱梓以德化苗蠻教之耕田治生息鬪睦里苗蠻服之仍選其子弟之俊者教之讀書習禮而身自率之一方遂為善俗知府瞿汝稷請于監司題請天柱為縣朱梓為知縣起楊鎬巡撫遼東輔臣葉向髙言今天下必危必亂之道蓋有𢾗端而水旱災傷夷狄盜賊物怪牛妖不與焉承平日久一也上下隔絶二也士大夫好勝喜爭三也多藏厚積必有悖出之釁四也風聲氣習日趨日下莫可挽回五也此非皇上奮然振作簡用老成布列朝端將年來廢弛政事一一講求修舉臣恐宗社之憂且有萬倍于建夷者矣疏入不省銀歹部落闌入寇劫守備鄭宗雅百户康衢等戰殁命厚加贈恤巡撫周盤總兵柴國柱等奪祿參將李可愛等提問巡關御史金應時疏條十四欵一添將統兵以固陵寢一選將久任以責成功一查復經制以裕邉餉一議慎委任以革冒濫一修補要害以防衝突一嚴禁撥補以實營伍一比例印馬以杜私更一儲將材以重封疆一精訓練以壯營壘一議朘削以蘇軍困一議偵探以豫防守一議邉工以責實效一汰夷丁以消隱􅍔一議馬政以收實用部覆允行戒諭火落赤不得東西異狀陜西總督顧其志題言火落赤鷙悍最于諸夷未敢輒犯西寧兾市賞爾今議令守備河西五道每年秋畢無事量賞五百兩五年無事再議欵賞則費不侈而可以收犬羊之心惟是兩河皆朝廷之封強若此酋安靜河西仍跳梁河東則五百金之賞祗為貪餌而將來之欵市寧有復期今當嚴諭本酋督撫鎮臣仍冝督厲所屬毋得恃疑弛備兼用戰守以保萬全報可夏四月丙子朔丁丑正陽門前樓忽火至次日辰未熄器皿厰火大學士葉向髙疏揭自去冬及春概不批發至是始得旨云知卿憂國苦心忠愛至切今春以來恆風亢陽又兼門殿被災朕甚警惕所奏關係朕躬事情稍俟而行還著鴻臚寺堂上官宣諭朕意佇望速出贊襄慎勿再陳禮部以禱雨未應疏言請修省上因諭百官曰旱災異常朕心深用敬惻每于宫中竭誠祈禱緊要致務次第舉行爾大小臣工亦當仰體至意戮力同心共圖消弭上諭户部今年北直山東山西河南四川各處災傷朕心懷惻恭承聖母慈諭發銀十萬兩賑濟朕將御前積餘及方至浙直稅銀五萬兩又諭宫中各出費剩不等一併給發爾部酌量災傷輕重分派多寡選差亷慎官齎解各處會同該撫按官啇議賑濟務使分散得法實惠及民其畿輔災民及各處流來飢民發還京倉米三十萬石一體給賑各省撫按等官仍多方計畫便冝措處共拯民窮所有罪贖銀兩盡行買榖濟荒四川福建水旱特甚亦準留三十八年春夏二季稅銀給賑百姓如有乘機搶奪即係亂民法所不宥上諭北直隸宣大等處山東河南陕西𢾗省春夏二季稅銀仍留賑濟飢民從通灣太監張燁河南太監胡濱山西太監張忠請也虜酋狡兔兒歹青等聚衆𢾗萬住牧爛蒲河意欲犯遼按臣熊廷弼擬留總兵王威以原官統領自已現在戰丁駐防河東俟邉情大定别行推用部覆如議從之薊遼總督王象乾揭報虜四五萬衆侵犯遼陽道臣田立家尚未到任請敕該部弓推才望官一員立令到任協濟邉務疏下部遼陽巡撫李炳奏言逹酋願去車價減貢夷退還地界建夷差遣火真稟驗貢本乂續來回話朝貢事冝炳以建州慕義相從相應準從以安反側姑行覆審的確事聞于朝部議許之五月乙巳朔給事中周永春以晉地災傷疏請有三一曰撤榷稅之使一曰罷無地之租一曰蠲應徴之稅疏入留中工部侍郎王汝訓卒于官聊城人清介孤貧士論仰之特諡恭介户部員外王家賔𬋩臨清鈔關以本關稅徑齎保定巡撫賑濟議扣留今歲通灣春夏稅銀抵足部劾其擅得旨地方已有賑濟此稅銀係濟邉錢糧著發還照舊解部王家賓擅那關課作何處治部擬且奏六月論長定堡失事罪巡撫李炳回籍聼勘總兵佟鶴年論死監候處決餘俱降罰有差閣臣葉向髙題請刑部掌印無人獄囚莫為問斷囚米無措三年恤刑之差亦難再緩不報大學士李廷機乞歸疏已百餘不下至是自往會極門拜表求去得旨覽奏知卿病尚未瘳特遣太醫院堂上官診視卿還善加調挕慰朕至意七月甲辰朔以災傷畿南六府及江南州縣正糧準徴折色八月癸酉朔遼東巡按熊廷弼歷陳搗巢受報之害請以守為戰翛邉築堡十有五利虜騎不得驟決一零騎不敢窺邉省境外無時之備二墩軍得墻為恃覘候嚴明不致失悮軍機三虜穵墻填濠我得預知為備使虜無所掠四本堡軍民自足拒守營軍免分散帖防五虜入有時軍馬免遊防奔馳之苦行旅無禦人大盜之懼營軍無空壁涉逺之煩七士馬得間操練養精蓄稅以待戰八軍不死于飢瘦而軍伍自壯馬不死于奔馳而馬價自饒九虜憚于備嚴不敢要挾而欵益堅撫賞之費各省十居民安心耕牧無人畜禾稼抄掠之虞十一邉民安堵免逺寄城郭得婦子饁耕之便十二邉人弓矢之徑膽力之壯過于營軍若使據險人戰家守亦可助我兵威而杜虜之覬覦十三民鮮畏虜塞下之田不待軍屯而告墾者衆漸可足食十四邉人骨肉無係纍之患每歲存千萬人為遼儲軍為皇上守邉十五疏入未報九月癸卯朔工科給事馬從龍請停蘇杭新派織造復旨準三之一南御史王萬祚奏言御用監咨部備辦門殿陳設等木料皆海外嶺南之産樣式甚大不比尋常無論湖閩部庫之銀不足即足矣必至非刑拷比使百姓納銀于官司苦絆啇人令貿易于險逺况粗為上用精入私囊該監享實利聖上受怨言深為可恨不報召起趙煥為刑部尚書南太常少卿劉曰梧請復懿文太子及建文君諡號廟祀不報直隸巡按蘇惟霖疏陳黃河泇河利害請專及于泇以濟新運略言黃河正月𥘉旬後洶湧自天而下又其水挾河而來河口日髙一日七月𥘉輒淺涸十倍無一時可由者為害甚劇泇河一水安流終鮮風波率而由之計日可逹或有稍冝拓而濬者但得實心任事之河官嚴其稽核因利乘便不三五年缺略悉輔可成𢾗百年之利疏入留中十月壬申朔刑科給事中周曰庠參承天守備太監杜茂放恣專擅乞撤回給事中杜士全亦參茂諸不法事俱不報禮部侍郎兼學正翁正春疏皇太子及諸王出閣講學不報時皇太子弗親講筵六年矣然睿性夙成一日聖壽同諸王入賀賜以玉帶即下階忭舞謝上上顧謂諸王曰汝兄讀盡知禮義汝當效之又一日賜以慈慶宫居住潛遣內侍覘其坐向皇太子北直謝恩訖逡巡西向坐內侍回奏上亟稱知禮者再故枯菀雖分而儲位益定云大學士葉向髙以章疏不下東宫不講讀枚卜不行起廢考選邉餉皆寢屢疏求去臺省遺書向髙責其不能率九卿勳戚伏闕死爭向髙曰伏闕事我朝兩見未嘗一聼每次杖死𢾗十人大損主德况正德嘉靖間止爭一事今將何所指乎抑將概言之乎毋論不聼即幸而聼一二事其他之不聼者又將伏闕乎今冝該部連疏苦請而躬于文華門候旨庶幾伏闕之義冡宰以下咸以為然故衆喙稍息淮陽巡撫李三才上疏乞休自郎中卲輔忠御史徐兆魁等劾諭三才而金士衡假然等力保三才前後凡一年有餘紛如聚訟于是三才自疏求退兵部郎中錢策言三才氣魄才情儘堪揮霍然檢柙不周防間不密責以皭然不滓之純操不能也宜與士衡然等俱賜罷黜不報福建巡撫陳子貞條議海防六事一重海道事權以資彈壓一省汰除汛兵以熟操駕一核虛冒名糧以釐夙弊一清侵占屯田以復舊制一禁往倭大船以絶勾引一公出海利澤以安內地得旨允行丁亥皇太子第四子生命名由模母選妃李氏五歲薨尚膳監太監馮進朝家人相爭致死訐告刑部部發宛平縣撿究知縣李
