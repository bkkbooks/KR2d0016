body:
  text: 顯皇帝紀四萬暦四十年壬子正月丙申􅃋掌翰林院侍􅀰王圖給假囬目辭闕出城已八閲月今又移郊候命上以圖􅀡講啓沃令即供職大學士李廷機等請准其給假勒限復職翰林院印令右庻子郭淐暫署從之二月丙寅􅃋吏部尚書孫丕掦疏懇乞休不允掛冠去命孫瑋署吏部尚書事三月乙未􅃋河南廵按曽用升奏睢陽衛經歴李光􅂋委解稅為監稅内官􅂙隨徐炳髙登等勒索打􅀧無計身死請撤回稅使胡濵并􅀅炳等提問如律以雪死􅁈慰中土不報寕國府涇縣等縣童生毆辱縣官撫按以聞上諭近來士風薄惡提學官還嚴行約束涇縣等五縣童生不准進學有司亦當秉公正已以服人心代王請立其庻子􅂦莎為世子代王元配無子御人裴生􅂦渭王以其母賤令妾張氏母之張有寵進封次妃後生􅂦莎兩人爭嗣閣臣李廷機在禮部時主立􅂦莎至是人攻廷機遂有立長之説大同撫臣汪可受言渭莎皆庶也渭母未受封而先故莎母已生子而後封此其昭昭者四十五年乃立􅂦渭為庶子御史張五典上言迩來上下姑息百事委頓法但加于微賤强梗者即干紀壞法而莫問禮雖設于朝廷為下者或犯分越理而不顧頃有不奉主命徑自㱕田之大臣猶曰置而不用用而不任亦不可則止之義也摠戎無叙功之例有之自􅈙鎮麻貴始則摠戎而侵冐功之典府官無弹劾之任有之自知府錢策始則府官而擅糾弹之􅁠宗屬稔惡之儀賔辱天子守土之郡臣則􅆏陶有不執之法代籍始何以立卒有後言遂至子得抗父婢得汚主父子家庭之間不應有此舛戾儒童有何􅁈抑敢于掲竿狂逞窮簷蔀屋之下不應有此悖逆留都重地􅀻鑄盛行一統無外之世不應有此闘志病國之利徒且也奸衛久耐弹章悍卒目無主帥一切不公不法摠是無綱無紀不但已也有言責者不必言而􅀻有比附者亦言當􅀡言者可以無言而暗為驅除者亦言此又不綱不紀之大者也原任南兵部尚書邢玠卒贈少保玠益都人為人易直能肩艱鉅􅀣功海外臨卒有遺疏請破黨用人􅀤帑罷税數千百言南京中和橋馬草塲攅典舖户草堆火􅁸兵部奏言草者軍馬之性命也户部􅀤銀舖啇領買一包領銀一分一厘每虚報堆􅂾至放日賤買軍籌抵塞然前草未完又􅛽圖再領後價以完􅃇價舊未得完而新仍掛欠年乆􅂾多溜雨積爛放未及半露出荒原不得已而鬻産以賠之賠之不足則逃逃不能脱則死獄一人逃衆人共賠計出無􅂓于是付之一炬以㓕其迹但曰天火此弊畱都人人􅀎知之亦人人切齒請下法司推詳鞫䆒照邉場事例以儆後來事下所司廵􅈇御史孫居相言􅈇􅂳缺少雇募民􅂳脚價盡屬有司設處民間苦累至極相率逃匿請以缺􅂳料銀􅀘作募􅂳工食􅂳户必且樂從部覆僱募民􅂳雖一時􅁠冝之計䆒之于國計不便不若仍復舊額議于八月興工十月駕赴水次則來歳有􅂳民􅂳永不募而民間免騷􅅰又言覈歳修之􅂾稽銀􅂳之實防侵冐之奸得㫖依行四月乙丑􅃋叙延鎮大㨗功摠督顧其志廵撫凃宗濬摠兵王威等陞䕃賞賚有差先是雲南撫按奏鎮臣沐昌祚荘田自欽賜外多至八千餘頃横征􅁀歛以致荘户刦掠公行滇民如在水火請㱕併有司徴􅀵下部覆行至是昌祚疏請自行徴􅀵大學士葉向髙掲言若是与該鎮地方必復紛紜内外必復争執且詔㫖前後相違朝更夕改亦非國體伏望留中不必􅀤行則本鎮与地方相安所全實多矣閣臣葉向髙言朝政不行日復一日紀綱盡壞國體盡傷皇上即視臣進退去留可以置之不問乃官僚可盡空乎言路可盡廢乎各省之按差可終不代乎浙江湖廣貴州之科塲可不用監臨乎臣方深􅁨皇上之孤危而皇上顧閉塞愈深務與臣下隔絶帷幄不得関其忠六曺不得舉其職至于閣臣冡卿亦視若可有可無舉天下無一可信之人而自謂神明不測之玅用臣恐自古聖帝明王無此法也非敢以去要君實念在位有愧願早罷黜時廷機久處廟中復還舊寓請吿一百二十餘疏向髙復杜門閣中虚無人者幾五閱月欽天監推筭月食不合有㫖改修暦法禮部侍􅀰郭正域卒贈尚書謚文毅江夏人正直不受請託然見困阨者必救妖書事起吿㱕舟阻氷邏卒圍之忽一卒上舟云九卿意在大人請自裁正域曰即有不可知當一言而死何得草草自屏其處患難死生無異安常􅂂順故不為動事後卒解命法司審䆒罷閑大同衛所鎮撫史晋部院以晋違禁􅄭奏撓亂察典奏聞上命枷號一月􅀤口外為民􅀡􅀠処税監魯保卒撫按題請裁革上命㱕併天津馬堂俟三殿功有次第奏請停免馬堂聞命赴任以此爲利附堂者復藉堂爲利由淮抵楊所過無不抄掠邑鎮罷市鹽啇􅏉竄廵江御史恐激變地方疏請撤囘天津不報五月甲申􅃋叙貴州平苗功摠􅇂郭子章摠兵陳璘等陞􅄻賞賚有差土司安彊臣贈三品職銜温粛端静純懿皇貴妃􅀤引禮部主事髙継元言三衛女􅀡貢夷先後輻輳計九百人行李多至千櫃資買禁貨物宴賞程􅅒費以􅂾萬三夷借貢規利且漸生心不可不思患預防請制其流者六清其源者三一戢強横一選通伴一申舊規不許徃來街市交接閑人一核貿易一革當房當令館夫供其買辦一復押送庻各夷不致逗遛而内地亦安夷人恃衆則氣焰方張􅀔分則寡弱易挫裁其入貢之􅂾而不使咆哮于内地所謂清其源者一也三衛入貢僅換布叚而止女􅈂囘夷置買􅀻貨遷延不去勅行邉臣每起止送􅂾人入京餘俱在邉候賞所謂清其源者二也遠人輜重太多則驛路輿馬太費議在本鎮領賞亦在本鎮開市計其所需不過布絹磁器之􅀋募啇與賣所謂清其源者三也六月甲子朔副都御史許弘綱開列䑓臣缺乏各差􅂃急之状以聞不報給事中韓光祐疏􅂙錦衣衛左都督王之禎見被軍政拾遺註籍已乆三月間借名派撥忽出視事臨朝儀仗全不成體貴妃之嬪乆沉不􅀤而􅀤引之儀亦復簡慢如㝠器錢粮内監冐支鉅萬及至􅀤引粗惡不堪墳工所費不貲盡為内官穴窟其中冐破塞責䘮葬大禮奸帥閽人欺罔侵漁事聞上一槩不問而帥􅆆反得庇䕶輕重不倫大為中外不平申嚴通海之禁仍勅撫道稽查海外夷人貢使并移咨朝鮮國王嚴禁倭夷之人全羅慶尚者一如中國之禁時日本以三千人入琉球執中山王遷其宗器叠遣貢使入懷窺伺近又用對馬島之故智以愚朝鮮而全羅慶尚四道半雜倭奴矣于是浙江摠兵官楊崇業奏請申􅅚從之七月癸巳􅃋虜犯寕夏塞官兵禦之于毛青口沙山湾再㨗斬銀定頭目白奈哈擒斬甲首七百七十餘顆琉璃國夷使栢壽陳華等執本國咨文言王已㱕國特遣修貢福建廵撫丁継嗣奏言海外􅈙絕㱕与不㱕誰則知之况貢有常物何以突増日本諸物使有常􅂾何以多至百有餘人冝留正使及夷伴􅂾名題請処分餘衆量給􅅒餼遣還本國非常貢物給付􅅁囘始足壮天朝之威正禦夷之體且言閩中奸民視倭為金穴赱死地如鶩絶興販以杜亂萌又今日所冝亟圖部覆如議行夷人武永禎屡犯欽州學正李嘉諭死之軍官祝國㤗等獨攖其鋒􅀅卒俱􅃿失事知府凃巍坐營張國威聼勘八月壬戌􅃋虜婦忠順夫人死撫臣言其納貢四十餘年最稱恭順宜加褒卹以勸有旨與􅀕綵叚表裏布匹照例以示􅄖卹套虜犯延綏保寕邉􅀅敗之于白土澗斬其頭目啞班哈等十二人斬􅀗首虜二百五十四級馬二百餘匹上諭輔臣葉向髙朕自入夏以來時受暑濕頭目弗清卿為輔弼重臣豈可乆居􅀻寓且朕壽節在迩正冝出閣賛理其􅀘大僚考選諸事朕次苐簡􅀤向髙疏謝視事上以嘉恱報聞釋宛平知縣李嗣善于獄䧏一級調外任嗣善獄具三年臺省累以為言不得請至是刑部因􅀬審言大小輕重之獄皆有矜疑减等之恩嗣善猶囚冠在繫罪罸已深矜恤冝早乃報可鄕試考官以命下遲陜西移􅀄塲於十九日應天移于二十二日江西移于二十六日浙江湖廣移于二十九日九月壬辰朔内監趙進朝梁􅄹女等毆駙馬都尉冉興譲于府中既而復毆于朝門吏科給事中曺于汴等疏劾婦寺恣横已極懇乞大􅁬乾綱速正典刑不報万進朝毆之于府也公主倉惶徃救進朝動罵無耻至令公主造室跪謝興譲八日三疏皆不得逹葢以巨璫盧受李恩用事進朝遺􅂾十箱金寳餽之因而壅閉多方阻絶進朝反得單詞膚愬上苐知両璫囘覆東厰奏聞而駙馬屡次被毆与教習官賈之鳯御史耿鳴雷各疏言國體凌夷之極皆不得上逹於是駙馬掛冠于長安門而迯東厰以聞上大怒下旨切責錦衣衛㝷訪奪其父職為民併罸教習主事賈之鳯俸興譲原籍蠡縣至十月中訪得于完縣葛洪山伴囘至良郷託疾不行衛使馳奏奏㫖送國子監習禮儀一年具奏禮部侍􅀰翁正春再疏言今第一要務無如皇太子講斈乃一輟八年百疏不報或以􅌖質天成宫中不廢講習臣恐貂璫未必周召諷誦必未典謨即使􅉏御皆正終不若前凝後丞之􅀚摩燕居皆學終不若抽関啓鑰之聳悟况轉盻秋老又復各􅀄乞即舉行􅀧用閣臣所推侍班講學等官不報三遣官諭李廷機入閣廷機陛辭出都門葉向髙為之請乃得温㫖加太子太保馳驛囘籍以俟召用賜路費表裏遣官䕶行改趙煥為吏部尚書以翁正春為禮部尚書召王象乾為兵部尚書四川建昌夷猓作亂行撫按官相機撫勦十月辛酉􅃋考選之命始下御史楊鶴奏時事􅁨危者七首言三大營軍卒半役冢􅀻恐有人不受甲府無見兵之慮及中外公􅀻困竭東方群盗可虞人才摧折上無賜環之期下有龍蛇之厄又言東宫所習見者皇上二十年以後罷朝輟講齋居無事之状其以前蚤朝晏罷勵精圖治不得而見也皇上􅇣冝令東官知勞皇上安冝令東宫知危皇上􅄹成􅂂運福分非常冝令東宫知􅁨知懼豈有日與宦官宮妾䖏而不一見士大夫之面者乎自皇上静攝以來說者謂􅁠無旁落然頃者愛女蹂躪于宫奴舘甥受撻于朝市叩閽不得入上封不得逹亦可謂􅀩蔽隔絶播弄之極矣命修萬暦二十七年以後玉牒御史田生金疏言邉患河患孔􅇻邉臣河臣可議論勒楊鎬隐匿邉情劉志忠不報河决臺臣楊州鶴亦言􅈙事大可寒心􅂙鎬不冝􅀻庇李如梅累行薦用乞賜罷黜十一月辛卯朔考選軍政命下閑住錦衣王之禎有㫖效勞多年准馳驛歸通政使吳逹可奏納言􅀜係國體父前子名君前臣名古今一定乃章奏常稱邑里如吳門歸德之􅀋又有隐語謎字同于射覆莫可卜度者皆無禮于其君者也而制誥之詞以君䛕臣近時益盛皆當􅁵正者大學士葉向髙求罷言九列空虚見在者又皆閉門趙煥孫瑋翁正春許弘綱皆當􅄩下温綸督令供職而蚤放臣㱕則去留各淂時事可舒時煥以御史李􅀂星論山東廵撫李同芳事乞罷瑋以御史田一甲論四川摠兵楊一元事遂以兼攝成病乞休正春弘綱亦因㑹議科塲爲科臣孫振基所駁咸在註籍㝷俱得㫖慰留命兵部尚書王象乾􅅁理戎政革順天舉人童學賢罸科舉人􅀓皇謨及䧏罸進士鄒之麟中書于􅀤藻等各有差二人同出之麟之門列魁選學賢從􅀤藻房落卷搜出䑓省􅀤其事上命奪􅀤藻及主考郭淐朱延禧俸之麟䧏選給事中孫振基疏言議郷塲而不議㑹塲緣畏韓敬湯賓尹之故遂奉㫖併勘起原任四川摠兵劉綎仍鎮守綎至建昌旋定山東廵按張五典以奉旨勘明功次叙原任薊􅈙摠督王象乾廵撫楊鎬摠兵麻貴及文武􅀅吏功冝錄賞与軍亡冝卹者有差御史田生金奏吿廟宣㨗冝慎功罪賞罸冝明言粛皇帝時邉臣􅀗世􅄻者十不二三保首領者十不六七今邉臣不以㨗聞者幾何人不􅀗世􅄻者幾何人豈今日之邉臣皆超軼前日哉閏十一月庚申􅃋給事中麻僖請急易􅈙撫責成鎮臣以保危疆言楊鎬謀逐新􅀅以為李如梅地致張承胤一籌莫展惟有拊膺流涕是誤􅈙者鎬誤鎬者如梅也御史崔爾進奏王信以門璫誣奏科臣張延登而門吏致􅀍詰䆒擅奪関防変亂祖制刑科亦抄􅂙㑹典開載皇城九門有関防三十三顆俱撥門吏収􅃹各􅍐撥由于吏部月糧支于兵部而查照分于各科与守門内官不相渉也葢吏􅃥無甚威力未必重為解官啇􅃥之累即有奸弊可以䆒懲此祖宗立法本意今北安門王信視関防為竒貨必欲奪之駕言祖制豈祖制有在㑹典外者乎給事丘懋煒言倭警可虞設防冝早條列八議以上一􅀅領一器械一練習一城堡一船隻一間諜一屬國一財計䟽上不報命檢討錢象坤徐光啓周炳謨丘士毅黄立極張鼐知起居注禮科給事中亓詩教條陳考察四欵一窮是非之㱕一極虚實之辨一致去留之决一破􅂆懲之格並請􅀧用左都御史主計事吏部請申􅅚朝覲事冝一撫按註考冝􅃀一咨訪評品冝慎一斥遣輕重冝當一掲報異等冝嚴一􅀻揭害人冝禁一冐禁摭辯冝處一禁革餽遺冝申俱報可虜犯曺庄殺男婦二千餘人啇店一空吏科給事中張延登恭陳無黨之論以定國是論人者不必爲一綱打盡之謀論于人者不必爲三窟藏身之計旁􅀚者亦不必爲黨同伐異之舉大學士葉向髙疏言近來諸臣之言意見未平門戸未化各執成心彼此求勝如有人于此本平平尔或過稱其賢矯之者必以爲不肖再爭則爲大不肖矣又有人于此亦平平尔或過者其不肖矯之者必以爲賢再爭則爲大賢矣賢不肖之品于本人全不相似而但以供爭者之唇吻又其甚者則居已于賢居人于不肖又而株連蔓及附之以黨乃其本又在閣臣矣徃時閣臣常四五人辛酸甘苦相爲調劑故獨見不用而群猜不生今臣孤身任事已五六年雖兢兢自矢不敢蹈狥􅀻植黨之罪而當局既乆則淺見易窺受任既專則物情難厭使得新臣三四人居此彼其受事方新未􅀩緣染空空洞洞何偏何黨下之猜疑既釋則上之疑厭自消轉移世道之大機實在于此此尤臣之所為皇上望也且請今後論事如黨人名色不許形之章奏以省羅織十二月庚寅􅃋禮科給事中范世濟上言歳暮祫􅀕請皇太子代為行禮以慰祖宗光大典予遼東廵撫楊鎬請吿仍命料理邉務候代改孫瑋為左都御史陞甘粛廵撫周盤副都御史兼兵部侍郎恊理京營戎政萬暦四十一年癸丑正月己未􅃋大計群吏趙煥孫瑋許弘綱考功􅀰張養正科道翁憲祥余懋衡主計推舉孫承宗李起元石崑玉等命􅈙東廵按諭朝鮮招募訓練防倭仍責成海盖道簡練軍實以壮聲援廷臣請福王之國時張家湾以南沿河一􅅁行􅂳盡皆封禁􅂳戸􅂾萬嗷嗷行期無定故群臣力請給事中官應震論閣輔獨相之非向髙力請推補乞休疏留中時上已有意􅀘用而仍中輟二月己丑􅃋革應天廵按荆養喬職為民提學御史熊廷弼囘籍聼勘養喬廷弼素以意見牴牾不相下及治宣城縣生員梅振祚姦獄互有輕重養喬劾廷弼不斥振柞等而反斃􅀤姦芮永縉于杖為殺人媚人謂永縉與湯賔尹有㕁中之故云拜疏􅄬劾而去廷弼再疏辯謂永縉之杖本以行劣非以􅀤姦故章俱下所司議左都孫瑋請革養喬任而勘廷弼上是之給事中官應震吳亮嗣等俱攻瑋上置不問命大學士葉向髙主㑹試起方從哲吏部左侍􅀰副之取周延儒等三百五十人謫給事中曽六德為香山縣典史主事李春熈知縣程􅉇舉以不職被察六德為之䟽辨語侵趙煥孫瑋于是煥瑋各紏其挾恨外轉撓亂反噬㫖責黜之給事中官應震言廷對関防冝宻均二甲而州部何以分均三甲而中行知推忽前忽後漫無定衡冝准禮闈法糊名易書以一定先後為選法差别庶幾各安其分三月廷試賜進士周延儒荘竒􅂋趙師尹等及第岀身有差考選庶吉士二十三人給事中郭尚賔言粤東自萬暦二十七年至今解過稅銀二百七十萬此他省所無而粤民空抒軸以應者財力已竭即稅使李鳳亦曽具疏請减乞慨賜俞綸不報命修建倉厫㱕併户部禮部請􅄩行瑞王婚禮桂王選婚起李起元石崑玉廵撫陜西大同御史張􅀖俊奏惡璫梁永虎噬于秦中髙淮狼顧于􅈙左咸寕知縣滿朝薦廣寜同知王􅀖才憤百姓之遭荼毒剪其羽翼以示裁抑乃聼其單詞揑誣反置拘禁已幾三年非所以為平也群臣再請福王之國内傳今春已暮伺明春行葉向髙封還奏本附揭云俟改日期雖皇上慈愛難割而衆口呶呶非所以自明也王國田粮悉視潞府例地租已多六千矣河南山東搜括已盡尺寸盡屬民産豈可強為使地方􅅰動王亦何能安享之乎四月御史吕圖南以浙江廵按改南􅀡􅀠學差科臣周永春疏論圖南不任其任給事中丘懋煒御史陳一元与永春互相紏駁圖南竟謝病繳勅印㱕摠督薊􅈙薛三才言建州日熾窺伺開原志不在小章下所司五月左都御史孫瑋引疾求退上報曰朝廷委任甚專豈得以已􅀻紛紛奏辭左副都御史許弘綱陳情尤切上曰法司事務繁重大臣豈得不恤國體堅臥求去仍諭吏部都御史曰凡遇缺官吏部必与九卿科道從公㑹推堪任者奏請􅀧用及到任未幾小臣以疑似之事懷􅀻逞憤􅄭言攻擊使各官不安其位皆欲求去國事何人分理再有不諳事體恣肆煩言誣詆要譽者必罪不宥其各註籍官即出供職毋􅀒簡任之意給事中余懋孳言伏讀聖諭責臣下之紛爭惜老成之去國至抉其病根一則曰疑似一則曰疑畏大哉王言固已洞物情若􅀚火矣然臣謂群下之相疑由詔令之不信也何以明之皇上之于章疏也不曰朕皆省覧乎而不報如故于詔㫖也不曰出自獨裁乎而􅀼弄如故于􅂃要大政也不曰次第舉行乎而􅆸閣如故夫九閽萬里焬竈蔽明道路有口可駭可驚為言官者既不能􅀡奏宸扆又不得之中涓則通中外之関而效感動者舎閣臣無責矣閣臣或不能盡得之皇上而時或得之者絡不外閣臣也則有得有不得而疑必生欲釋群疑亦使閣臣無不得于皇上可矣皇上計不出此而欲以罪譴使臣下塞兊乎左副都御史許弘綱以御史宋槃劾奏叩闕辭印出城上以大義責之不􅁢辭仍奪槃俸一年孫慎行以禮部右侍􅀰署部事劉元霖為工部尚書六月錦衣衛百户王日乾訐奏孔學等詛咒聖母皇上及東宫語多渉貴妃福王上覧疏震怒閣臣葉向髙言曰乾孔學皆京城棍徒結吿刑部事尚未了擅入皇城放砲進本刑部以其禁地放砲欲擬死罪遂譸張至此無所顧惜此事大􅀋徃年妖書而妖書匿名無可䆒治故難于處置今吿者與􅀍吿者皆見在法司一審其情立見皇上但静以處之不必張皇一或張皇則中外紛􅅰其禍􅀅不可言上覧之意觧遂置不問諭閣臣葉向髙卿忠誠清正凡事開陳朕所倚毗堅欲求去朕心何安且國家政務朕未嘗不行止因憸邪群小不諳事體生事激凟故詳覧遲緩皇太子與福王名分不同大義已定明春之國必不再遲諸臣何復煩聒􅀂夫礦稅爲三殿非爲福王養贍田土有前例可比煩言阻撓甚非國禮卿輔弼重臣冝即岀安心賛理不得過爲疑忌封虜酋卜失兎順義王把漢比妓忠順夫人兵部以卜酋新王諸部未恊冝勅沿邉􅀅吏嚴加備禦上是之吏部尚書趙煥左都御史孫瑋副都御史許弘綱各累疏求去上􅀤各疏擬留㫖向髙言許弘綱出城久其􅀔必難再入昨言官謂臣假借中㫖困苦弘綱昨臣辯疏尚在御前今􅀂再擬慰留又􅀅生出議論謹請上裁還聼其去去後再行召用則君恩臣義兩全無失摠督兩廣張鳴崗言粤與閩浙同一防倭而浙未嘗與夷市閩市有徃無來彼瞭海上䨇鳬亂飛皆彎弧向之無敢闖入乃粤則與諸夷互而而謝絶之難市則夾􅅁倭夷雜處而辨别之難澳夷盤據内地近且匿養倭奴以爲􅀲牙則驅逐之難閩廣奸人竄入澳中搬唆教誘則隄防之難至近日白艚盛行在閩者以販米為名拒之則病隣而不拒則交通百出在粤者以貿貨為名禁之則阻生理而不禁則通澳通倭􅁦不勝䆒法不勝設然為地方弭隱􅁨則必嚴禁曲防母姑息養亂為得也從之七月􅀄命韓府立宗學徴􅈇粮每石永折銀五錢予許弘綱囘籍御史魏雲中劾文選􅀰周應秋引進匪人流毒天下給事中吳亮嗣以銓政固所當清群才亦自可惜如近日行取諸臣皆極一時之選不應摧折至是更列雲中所攻擊者􅀂史継階黄克纉等􅂾人不分黒白皆以一筆盡其生平說為匪人之􅀃造無形之羅綱徒以門户起見何以服天下也山東淮南大水左都御史孫瑋文華門叩辭出城賜原任摠􅇂兵部尚書蹇逹􅀕葬如例逹于三十六年七月卒于官議者謂逹一腔忠赤三輔壮猷寓折衝于談笑作鞏固于金湯鞠躬盡瘁云兵部尚書王象乾言自工役相因遂至班政廢弛近京營科道條陳一應工􅃥令工部自募民夫入衛班軍盡􅀤營操上班之時務選壮正身㨂汰老弱詔如議行八月釋滿朝薦王􅀖才卞孔時于詔獄以輔臣力陳也禮臣孫慎行請東宫講學吏部尚書趙煥請􅀧用各省廵撫九月建州遣子入質還之時廵撫張濤請議􅀁處樞臣以真僞難辨留之反為所紿不如遣還遂不受貴州勦賊蜡菜阿袍克之以延綏寕夏甘粛三鎮大㨗􅀕吿郊廟命万從哲吳道南為大學士入閣辦事吏部尚書趙煥拜疏岀城十月廵按􅀡􅀠御史薛貞請申􅅚出海越販之禁從之建州圍金白二酋二酋吿急上曰北関為􅈙左籓籬豈容建州吞併其􅄩令該鎮救援不得違誤已而摠督以餉請上亟命戸部給之予孫瑋趙煥歸上諭内閣聖母稀齡在迩朕當率皇太子及諸王恭祝大典慶賀禮成于次歳春三月内着欽天監擇吉之國時外庭喧嚷謂上欲借聖母賀壽以留福王擬共詣文華門伏闕力請聖諭適䧏又有疑次歳為四十三年者盖聖母七十在四十二年聖上􅀄意不欲預慶俟至明冬後之國􅀔不容緩竟定于來歳之春給事中亓詩教言今日之爭始于門戸門戸之禍始于東林語侵輔臣葉向髙為東林所誤于是向髙言朝端所以紛􅅰至此言官所以敢于喧閧者固由臣之不才貽累君父亦以大僚乏人無有碩德重望以鎮壓其􅅝故相持相角雖以天威臨之亦無奈何爾當孫丕掦在日力薦侍􅀰吕坤􅀰中鄒元標皇上誠急召此二人處以要地人心必自粛然其餘如趙南星逯中立髙攀龍何喬逺之輩吏部􅀁屡推舉者亦陸續起用但得􅂾十人布列朝端天下事必不如是之决裂也瀕海竈民災傷特甚廵按御史潘之祥請捐􅅒賑濟并免本年灶課十一月廵撫􅈙東張濤拜疏徑行下所司議騰驤千戸蘓應詔訴太監邢洪廵城御史凌漢沖為之理械洪校役來德􅃳等繫之獄洪于冬至朝賀日紏衆毆漢冲于朝復群誶獄門欲奪其校􅃥漢沖列状以聞御史余誨等連疏請䆒擬不報署吏部事王象乾言官寮廢缺推擬皆窮諸􅀅節次推􅁸諸疏􅄩賜俞允無令天下萬世疑皇上有禁錮諸臣之心増設南􅀡􅀠湖廣學臣一員十二月福王請减荘田允之定額二萬頃葉向髙六年考滿加少􅀓建極殿大學士賜宴禮部皇太后失豫上日夜恭侍薬餌䖍禱願以身代㑹勘庚戍塲􅁦韓敬湯賔尹等分别議䖏敬為賔尹隔房中卷跡有可疑實亦門戸各别也皇太子妃郭氏薨召大學士沈鯉入朝固辭不赴大學士向髙從哲等以歳暮請􅀤停留諸疏一䕶送福王文臣未推一吏部㑹推大􅒼俱冝􅀧用一候􅀘科道官一充􅀘日講官一各差御史當代不報萬暦四十二年甲寅正月甲寅􅃋戸部侍郎李汝華奏屯邉一策既可􅁕國亦能禦虜撫臣張濤石崑玉徐鍳開田各有成績而行之深有益于度支者御史盧謙言屯田以養􅀾士非以養􅀅官今立為養贍之名或占之或鬻之則所支常俸謂何必大修農政而清影占始為國家之利遼東廵撫疏進建州訴状大約憤恨北関頼婚匿婿開原人不當助之詞多譏切工部尚書劉元霖以歴官三十四年未彼父母封誥乞煥一命特榮二親上從之時霖母年九十二也劉綎辱馬湖府知府􅉟淑奪綎俸半年淑改調别用二月慈聖皇太后李氏崩頒遺詔于天下寛釋楚宗人幽禁摠督薛三才先因開原吿急請募兵一千七百名併麻承恩􅈠文煥所統援兵共四千名合營備變給事中郭尚賔廵按御史翟鳯翀皆以無兵則不能救無餉則不能兵請㑹議長策務保萬全從之􅈙東廵撫張濤請築邉墻因言建州情形利害之當審救勦之冝密兵餉之當集然後救則實救勦則寔剿或先令金白二酋從此兵東以激建州之出闘或用大兵從清撫而入􅀡搗其巢或赱奇兵從横江間道星夜遄廹以出其不意或浮大衆于朝鮮絶流而渡以防其遯去乃臣全遼之迂計惟在築墻昔郭墻大同戚墻薊鎮二武臣竟饒為之今何視二臣為絕響也下所司議命􅀤工部銀五十萬兩給薊餉上火行皇太后尊謚􅍿定貞純欽仁端粛弼天祚聖皇太后三月􅀘賜贈太常少卿楊継盛造墳安葬工部尚書劉元霖卒賜􅀕葬如例贈太子太保䕃一子命各省額進稅課准以所徴三分量减一分以彰慈恩恤民德意詔起廢遺建言謫戍等官分别叙用福王之國河南百官送于郊外四月㱕子顧疏請濬吳淞以救三吳屡嵗渰􅃿之患開江南無窮之利留中建夷分遣人牛臨邉住種廵按翟鳯翀請急行驅除盖建擅貂参海珠之利蓄聚綦冨獨其地磽􅇤糧苦不給欲為廣墾儲糧之計今不論新墾舊墾但係南関之地則不當容建夷住種有五利焉一不得逼近内地偵我虚實二不得附近北関肆其侵􅅰三不得粮料充􅁕卒飽馬騰而生戎心四令其糧餉不敷如遇飢荒叩関乞哀於撫順之市暫准和糴如四十一年故事以彰我生養之德五則市糴可多可少視其順逆緩急以操駕馭之機􅁠且南関三百六十三道勅書建奪而有之我置不問而以南関之賞賞之是誨盗賞叛也損威辱國莫甚焉下部議給事中姚永濟言御史黄士彦開荒一疏當今講求地利生財之法信無踰此司禮監太監盧受以為侵御􅁐傷龍脉于國家遠大之圖所妨非細疏入留中五月御史董定策言原任學正􅃆池曺端先薛文清而倡明道學冝從祀以光俎豆原戸部主事河南龎時熈吏部􅀰中新安沈化鯉渊源王文成力學著書冝專祀時熈於本郡化鯉于其邑用奨翼後學畱中給事中姜性􅂙太監盧受􅀼威播虐不報存問原任大學士申時行沈鯉潞王翊鏐薨謚曰簡祖制親王妃薨率遣内官弔􅀕給與勅書若親王薨無致􅀕之例今上念親親之情破格􅄖恤敕令王妃􅃹理本府事免其奏請福建稅監髙宷播惡無忌置辨賈倭貨物􅂾十萬金不與小民賠累怨憤激變宷揮兵殺民燬房執廵撫袁一驥刼道府都司等官質于署中撫按疏聞大學士葉向髙方從哲及給事中姚永濟等先後􅂙論不報御史田生金疏稱紀綱倒持可慮聖朝整􅅚冝先備陳十事工部林如楚酌議水衡事冝責成經手慎􅀤預支申􅅚外觧祀地于方澤閣臣方從哲禮臣孫慎行行分獻禮江西廵撫韓浚疏陳江西之稅課尤當罷稅使之李道尤當撤六月葬孝定皇太后􅀤引日大雨傾注上跪禱雨止方行俄雨少微皇上太子送之承天門外十五日閣臣葉向髙奉命詣山陵行題主禮禮畢奉神還京上跪接于午門行奉安禮大學士葉向髙感觸聖孝乞休不允七月吏部王象乾奏慈綸久􅆡事刑部􅀰中沈珫為東昌守清亷素朴食未嘗副衣未嘗帛治民以孝弟禮義為先㝷遷兖東道值旱蝗飢變各司道咸給假去珫併治事載印纍纍捐俸借庫銀以散飢民三年麥稔即吿致仕民慟􅂘挽留家為設祀焉給事中姚宗文言各省災傷紛然見吿乞􅀤帑大賑蠲稅翔仁大學士申時行卒贈太師謚文定八月廵撫甘粛都御史荆州俊陳禦火酋五欵一復土兵以資援應一修榨口以固彊圉一撫屬畨以重藩籬一復原伍以實孤堡一申恊謀以聮聲􅀔詔舉行朝鮮國王李暉請追封生母查氏賜勅齎囘致仕吏部尚書孫丕掦卒丕掦生平以名節自期頻致人言百折不變歴終始險夷如一日云大學士葉向髙乞休得允上表謝并效餘忠乞東宫講學瑞王􅄩婚􅀘大僚􅀧科道起廢罷稅􅀤餉命鄭継之吏部尚書九月吏部疏賜環原有恩綸屯膏似虗明㫖謹彚分諸臣去國之因以便聖覧仰祈俞允擬上羅大統鄒德泳等七十九員留中廵按御史翟鳯翀疏建州反側見吿中外議論沸騰􅀼謂救北関以固籓籬存外籓以安内地此大開鍵也張聲􅀔以懾建州使不敢動姑覊縻以繫建州使不忍離此大机权也今諭令退地則退地罷兵則罷兵以為姑退姑罷借外寕以備内治則可認為真退真罷􅁯逺慮而貽近􅁨則不可時樹碑定界建大書番字碑隂有建州本部盗靉陽馬即戮之碑下以示恭順禮部右侍􅀰何宗彦疏請慎擇王府長史等官令撫案查有司賢者單題陞􅀘考滿著聲得陞􅂙議僉事等官下部議廵視京營給事中姚宗文等言諸監侵占兵馬錢粮請按法追䆒以清宿弊而粛軍政畱中旌表百歳節婦唐氏雷氏萬暦四十三年正月戊申􅃋福府中使出勘汝州地租杖殺佃民闔境軍民奔竄又中使占住省城貢院又入兖州東昌所在播虐撫按各疏聞不報署吏部侍􅀰李汝華請亟下廵􅈇之命上可之令御史朱堦速行浙江疏議江㑹䔥山海塘改砌石部覆善治氷者不與水爭利䔥山築塘逼海故十年十築竟無成功則循行相度爲始基計者當講也史稱吳越王築塘于杭立基之法先挑去地面浮沙丈餘比見青泥然後下樁壘石故至今錢氏隄屹然䔥山之立基得無異是乎則經畫為永乆計者當講也興大􅃥必先明賞罸䔥山所委者非縣佐貳則雜職此輩苐與衙蠧為奸利尔必遴選府佐二員亷能勤慎者頌之功成􅄖處如十年有傾圯追論處分則以賞罰明激􅂆者當講也上從其議給事中官應震一言情愛不可偏溺皇太子十二年來以講學請則不報瑞王二十五齡以婚請則不報恵王念二齡桂王十九齡以選婚請則不報獨福王隨請隨報屡請屡報寵盛而驕恐階之為禍二言貨利不可偏狥三言􅀻人不可偏任惟皇上去此三偏逺貨財斥群小以為福王先不報給事中吳亮嗣勘奏尚書李三才盗用皇木㫖付法司長蘆廵鹽御史潘之祥條議鹽法一防沿河夾􅅁一嚴營軍􅀻販一禁啇民之影射一止奸啇開引于邉中如議行􅈙東廵撫郭光復言南関既失止靠北関如綫之籓籬故今日籌邉必以救北関為主建州反覆靡常惟當一意决絶處置得冝乘其外寕修我内備如敵楼火器急為建置城堡墩䑓蚤為修􅀘設守瞭之軍夫禁出邉之樵牧稽查虚冐移置􅀅官責北関以訓練之議寛罪弁以使過之人挑選援兵期得精壮皆内修之寔所當舉行旨曰制馭机冝其便冝以行大學士沈一貫卒二月戊寅􅃋摠督兩廣張鳴岡疏叙平􅀺之績御史魯之賢劾其招㓂媚璫乞勅罷斥以遏邉境邀倖之謀不報禮部􅀰中洪世俊疏皇太子美質英挺而講幄塵封青宫雲鎻此于逺紹之義何居二祖當干戈倥偬之際鋭意儲教而皇上以承平之時坐令忨愒此于法祖之義何居皇上冲齡踐祚朝夕典學今雖深居静攝而中外情形洞若􅀚火不示之以􅀄年之勵精但教以近日之暇􅇣此于身教之義何居且不特皇太子也皇長孫年登十六亦古称出就外傳之時夫以聖子神孫茫然不知學問此可為盛世景象乎疏留中准留都各衛所官承襲聼南部勘結􅀋奏即移咨兵部候命不必赴闕命給福府葢造從官房屋價銀二萬両各王不許援例南􅀡􅀠廵按陳玉輝修復屯政三欵一定營費扣除新増冐濫銀兩以為修理奨賞之費一嚴行令􅃹屯指揮春時督修不力而冲突者革任􅂙䧏隄防無虞者薦用一恤流離四十二年貧戍額賦難輸合無照四十一年輕災例每石折銀三錢五分以紓軍困報可御史金汝諧言時事有軍伍虚冐一條謂邉省之兵患其聚聚則易驕京營之兵患其散散則易弱古者慮其聚而驕故分寓之于屯田今日􅁨其散而弱必練習之以行伍冝自營􅀅而下令各習器械平時則分隊比試團練則分􅂾嚴明此亦以守之法練之者也弘治間五軍營常撥一千五百名戍黄花鎮神機營撥守紫荆関等䖏故營軍每撥十之一輪畨于近邉葢習險夷則不致遇敵輒北嘗勞苦則不致驕悍難使今獨不可倣其意乎此以􅀾之之法練之者也湖廣廵按錢春言天潢繁衍禄入不給至于開之以四民之業屡輕建議未􅀎断行臣廵長沙惟長沙王子得列膠序王亦以此自樂夫諸宗冠進賢而􅂷大􅅁其自視至不如一青衿然則何不令天下學臣于凡分封䖏少闢其途以誘掖之乎粛王紳堯奏還五所屯田一千餘頃資助新邉兵食上嘉其忠義遣官齎勅建坊旌奨三月丁未􅃋建州海西使人進貢諸部世受撫馭進貢許一年一次每次貢使􅂾踰千名天順成化間量議裁減後復加至一千五百名迨建州冨強日甚當事復議裁抑遂不貢者幾年禮部條議欲令照北虜俺答事例免其入京俱在邉守候齎賞照例給􅀤自退地鐫碑益謬為恭順止以大針等一十五名進御史錢春疏論輔臣方從哲不能阜安宇内登進人材獨於福王諸事請乞委曲聼順以悦君心從哲引罪求去上諭安心佐理弗介浮言工部請建殿門箭樓給事中官應震等劾内官監王朝用歴盗内庫等物􅂍敗應各䆒擬俱不報廵視廠庫給事中何士晋等言水衡欺冐􅁦端莫甚于啇匠預支請設法以清其源定其制扼其要重其責杜􅁦􅀅來覆可浙江撫按劉一焜李􅀖華奏言普陀山遠眺日本俯瞰黒洋年來法令漸弛募建繁興亡命無頼皆藉此為生涯奈何以奉佛之虗文醸封􅆠之實禍乞罷建鎮海寺不報四月閣臣吳道南到任有男子張差持赤挺突東宫傷門者内侍執之下法司問上即詣中宫王皇后迎見上遂坐語其故后曰此事老婦亦不敢知須與哥兒面講哥兒者東宫也少頃東宫至后問之東宫曰此事只在張差上身結局足矣上撫其背曰竒兒是萬萬年太平天子提牢官王之宷重加詰問科臣何士晋請窮治上大怒召皇太子及諸孫詣慈寕宮太后几筵前行吿慰禮悉詔群臣入見上執皇太子手示群臣曰此兒極孝我極愛惜言未竟御史劉光復從後抗誦上慈操南音聲髙上疑有他語􅃍怒命内侍執付法司皇太子諭諸臣曰尔等無聼流言為不忠之臣使我為不孝之子上悦㝷誅差于市斃劉成龎保于内庭再諭内閣張差事不必株連事遂寝于是罷王之宷官􅀘何士晋于外工部侍􅀰林如楚請循祖制停織造内官以甦東南民困諭工部修築胡良巨馬二橋督理工程内外官都給與勅書関防應差科道擬定來奏其擇日興工照例行大學士方從哲言今日部院大臣除崔景榮􅀄到未任尚止一人侍􅀰止五人而五人中進部者一杜門者三兹林如楚又以不得其職抗疏去矣臣以為欲挽其去當安其心欲安其心在行其志如楚之疏固以朝門未建箭樓未修邸第􅆍閣諸工未竣為不得其職若何宗彦之求去非以儲講未開王婚未舉諸吉凶大禮未盡行乎張問逹之求去非以院堂未􅀘代攝難支各處廵按御史之差未盡􅀧乎望皇上􅀅諸臣請吿之疏盡賜簡􅀤勅令即出視事後凡奏請慨然􅁢行明良合而庶事康端有望于今日矣五月着刑部重擬劉光復罪該司官調外任増各􅀡省郷試觧額命相皇太子妃墳地給東宫生母皇貴妃墳戸原任大學士沈鯉卒􅀕葬有加禮予謚自正月不雨至是月上因祈禱連日簡􅀤吏部舊疏􅈙東廵按翟鳯翀請隨地方量置常平倉括省贖鍰公費買榖儲蓄上是之行各鎮督撫等官遵行禁左道異教于天下㫖坐劉光復􅀡欺大不敬律論斬方從哲吳道南疏救不報致仕禮部尚書陳經􅀖卒福建莆田人德器温文操持端慎寅清匪􅈈月旦共推焉六月以祈禱雨澤遣張惟賢等􅀕吿南北郊社稷山川雷雨等神旌奨沿山恭荘王継妃楊氏未婚守莭大小九卿各衙門官俱為劉光復乞恩求宥嚴㫖切責䧏􅂙政姜志禮三級福王遣人至登萊丈田志禮上言福王荘田連跨三省迄無成規今日之始謀肇他年之籍口使籓王得與天子争土不可不蚤慮也上怒責䧏諭吏部都察院年來科道呼朋引􅀋横噬旁擊撓亂朝政朕因未暇簡閱諸疏故一概􅄖容此輩再無底止使老成不淂安其位今後尔部遵照憲綱舊規不時指名􅂙奏仍查推過年例外轉科道官何士晋等照原擬地方前去任事不許推病給假廣西御史董元儒言夷㓂日驕土司日削請増兵設備蠲稅餉兵聯屬土漢申􅅚各司勤修撫輯詔如議行􅇚馬三道等嚴􅅚門禁令弗阻絶内市陞右庶子掌坊事劉一燝為國子監􅀕酒掌司經局事顧起元為南京國子監􅀕酒叙甘鎮延綏累年􅀾功顧其志周盤柴國柱徐宗濬張承亂等􅄻襲陞賞起吏部左侍􅀰劉楚先禮部尚書諭刑部都察院錦衣衛􅀬審遣刑部員外􅀰関􅂹等往江南北浙江各省恤刑以靈雨應祈令前遣朱純臣等􅀕謝七月丙午孟秋享太廟命吳汝胤恭代遣梁世勛等分祀諸陵畿輔飢先􅀤通倉米七萬石賑之督撫諸臣請大􅀤臨德二倉平糶以遏亂萌命出十萬石給之黄承玄祁光宗為都察院右副都廵撫福建甘粛瑞王婚禮成大學士方從哲等請設官開講開設武科于甘粛額定三十名山東蝗旱飢撫臣錢士完請賑樞部署事左侍􅀰崔景榮題秋防事言九邉情形各冝戒備上嚴諭􅅚之太常少卿史孟麟疏奏二事一曰皇長孫冊立當議一曰􅀡臣愚戅冝容為御史劉光復也上大怒下㫖切責䧏五級調外御史劉廷元言頃者皇上于歴年除書一朝沛􅀤乃于給事中梅之煥一疏責以擅權疑以窺探夫君尊如天臣子事君如事親聼人隂使而􅄭肆窺探義所不敢出也人臣此身尚不得自有况言路有議論而無事􅁠安􅀁容其擅乎皇上如厭近日之煩􅅝請于論人論事之章無一不􅀤閣票無一不勅部院勘議其中事情也亟與施行其渉風聞也姑與􅄖容其緣之以護黨借之為㨗徑也操吏議隨其後則何至讙呶臣又謂内䧏之諭不可狃為故常内票之㫖毋容承訛襲舛也閣臣之設固所謂備顧問而伐絲綸者何可舉其職掌而侵軼之臣之區區敢自效于皇上者曰今之言官惟患其不敢言弗􅁨其多言誠舉其言而程量之則􅄭言無由乘而忠􅀃畢集矣政府惟患其不任事弗􅁨其􅄃事誠使任舉其事而綜核之則招􅁠無所施而謀断相成矣詔予潞王妃歳禄减半荘租給與自収部臣以非祖宗舊制爭之不報令今歳各省􅀡暫免行刑淮南大雨八月命吏部左侍郎李誌署都察院印福建興泉漳三府水災廵按李凌雲請􅀅原題稅銀五萬兩或全或半存留賑恤不報魯王進馬十疋金鞍一副慶賀萬壽上􅄖詔答之以東省旱災􅀤臨德二倉粟米十萬石平糶賜輔臣金銀萬壽字二副及金箓字金書紅符從哲銀五十兩紵絲四表裏吳道南銀四十兩紵絲三表裏福府長史張士俊求罷疏承奉樊用罪惡乞諭王免行開店原任通政司左通政今陞太僕卿吳黙引病乞休不允浙江撫按劉一焜李和華疏言織造停止内遣已奉有明㫖㱕之有司奸民紀光先等擅行保奏内監吕貴􅃹理織造且不由納言而徑逹是皇上深居之裁决奸民得以窺覦内庭之差遣奸民得以保舉目中尚知有三尺乎不報駙馬都尉王昺上疏申救劉光復曰陛下欲釋外廷之猜不得已而召對既謂召對寕可皆嘿嘿而出必有忠諫方成盛典光復當進言時意氣激然聲髙膝前寕暇計生前禄位死後榮名得㫖拏問遂成忠臣死諫之名人誰無死光復死不朽矣陛下二十餘年不臨御廹而一出别無紀載惟執諌臣坐之大辟聖子神孫􅀄侍臨御亦無所見惟見中官窘撫御史自教者從臣危之矣上大怒以黨救譏謗革其衣冠押囘原藉為民内㫖給蘓杭織造太監吕貴勅書并掌稅務閏八月青州盗􅁸安丘城䧟庚戍三殿及箭樓開工以甘延二鎮斬􅀗宣㨗􅀕如河南水旱災改折兊米之半命沐昌祚照舊鎮撫雲南沐啓元待昌祚年老撫按官奏請襲替不許再行凟􅅰九月套虜分㓂延綏孤山副摠兵全軍覆􅃿屬夷虎墩兎憨犯廣寕錦義十月郭尚賓再糾四川廵撫吳用先縻費金錢損傷民命多殺老弱以冐功級用先引病乞㱕㫖令供職北関白酋以老女婚暖兎子建州􅀤兵爭之御史王雅量疏稱向救北関恐籓籬一失建州與暖兎合而遼不支今與暖爭婚􅀔不驟合北関依強援于暖兎適為中國利請設防􅈙陽以東按甲不動以􅀚進止建若不聼宣諭我督関兵隂約暖兔從南関入大兵從清撫分道而東兼以山東之民利其参貂順呼响應金白角之朝鮮我兵犄之其亡可翹􅁕待已旌孝子邢雲衢等五人節婦李氏等八十二人萬暦四十四年丙辰正月壬申􅃋大計㑹舉卓異沈儆炌王在晋等李誌為刑部尚書革任廵捕提督凌應登毆御史凌漢翀于端門上以毆辱御史􅅰亂朝儀責應登科道韓光祐劉廷元等言朝章國體所傷實名不報奪給事中余懋孳御史李養志俸閣臣上言行􅇯之廢并未見䖏分執法之言官先􅀩譴責國體不無少傷不聼給事中熊明遇言驛傳之設或使臣啣命而賦皇華或四夷緹譯而貢共球或京朝官賦事于外或監司再見于京㑹典臚列弗敢奸也先臣有官九列而一介行李不以累郵卒何近日濫觴之無等也一都通􅂋僕從如雲供帳賦馬百姓騷動驛官窮于鞭撻有闔門自縊者奈何不為之釐正乎謹條十欵以上從之南右都御史蔡應科奏近來諸臣言事皇上每不見聼納反加切責是皇上有疑于諸臣也臣謂若多言官相継上言必其心之無可疑也亦明矣言謹則意必忠議同則謀無􅀻如近者皇太子之講學皇長孫之就􅀓税璫之罷免内帑之給彂科道之允􅀘諸臣单疏合疏言之皇上亦何疑而終不聼哉不報遣御史過廷訓往賑山東飢民貴州廵撫張鶴鳴奏紅苗蹂躪三省乞􅃯楚蜀徴兵助餉務期撲㓕以靖封疆㫖依議行御史翟鳳仲上言宦官三事謫外二月壬寅􅃋淮徐飢命􅀤見貯溢税并正項銀一萬六千七百八十兩煑粥賑濟青州舉人張其猷上所繪東人大飢指掌圖各為詩咏之有母食死兒妻割死夫之語見者酸鼻御史梁州彦上言國無重臣則主危左右太親則身蔽今大􅒼如向曙之星逐臣等辭條之葉夫有罪不赦有缺不補祖宗朝所以裁抑貂璫者奈何賜之于朝紳乎皇上誠能召閣部大臣􅀡啇幾務科道輪􅀡對仗駁弹在廷議論惟患其少尔一事一疏可了一官一推即用雖􅃐之使言更于何䖏関􅀃伏願御朝講停内批無偏抑言官而代北司之報復無怯惜補授而甚言路之䔥條疏入奪俸半年給事中郭尚賔言人主親裁冝審言官􅂋諍非􅀻上怒曰尚賔明為余懋孳解救實為凌漢冲窺探欲使閣臣對還内䧏謂朕為何如主姑䧏三級調外㑹勘凌漢冲凌應登事應登姑免死􅀤戍瀾滄漢冲例不謹閑住大學士吳道南禮部尚書劉楚先充㑹試考官取沈同和等三百五十名既放榜下第舉子憤憤不平或泥汙同和名或聚衆聲闕于是科臣􅂙其懷挾本房亦具疏檢舉上命禮部覆試曵白除名磨勘原卷内四經稿皆第六名趙鳴陽原稿􅂗抹者俱遣戍京師有断么絶六之謡三月辛未􅃋廷試賜進士錢士升賀逢聖林釬等及第岀身有差命兵部􅀤銀六萬兩解濟黔師剿苗山東廵按王雅量以登萊歳荒請海運陳言六利下部議四月庚子􅃋勅旌舉人梁知德四川梁山縣人少有至行舉童孝子應郷試考官閱其卷擲之地忽有神曳還几上如是􅂾次乃入選人謂至德之感御史毛湛言銓屬不冝廣額舘選不冝􅂙差謂銓部官至四十四員輪逓視事頃突増册庫一員遂至今日每缺増三四人長此安窮且每年外轉止一人其餘皆需次典選翹足清卿者既無言責又鮮年勞雍容家食坐致華膴安可容此濫觴也舘選之舉与其多留于一科莫若精擇於每科弗淂派臺省而遺部屬狥托病而啓規避庶多寡適均儲養得體不報雷火焚稅監張煂房給隴川宣撫司多安靖印信給事亓詩教上言時事借漢唐宋為証曰漢之賦法壞于武帝作鹽鐵算舟車造錢幣利析秋毫矣又令民得買爵其後浸淫遂至有開西邸賣官入錢者今之營利水陸􅅦関之外益以攘奪之中官粟銀事例之嬴居為戸工之竒貨璫稅酷于平凖貲􅀰劣于武功大内牣于西園此殆􅀋漢者也開元天寳間設􅂆農使虚括客户八十餘萬歳増緍錢􅂾百萬鎮兵歳供衣千二百萬疋粮百九十萬斛至元和比天寳稅户四分减三天下兵仰給縣官者三分増一大率二户資一兵矣今之邉餉取之愈窮愈促用之愈濫愈増以十室九空之民半養有名無實之軍半飽有去無來之虜追呼􅆭于簡括物力耗于虚靡削弱成于貢市此殆􅀋唐者也靖國改元正月􅃋即有流星及赤白黒氣燭地亘天因而彗飛􅌌著龍見茶肆狐升御榻是時宦者開邉釁倖臣領花石荼毒生靈所在騷然河北山東盗賊四起馴及于金人之難今天鳴地震物孽人妖水旱蝗蝻道殣相望両河東省劇盗横􅀤復報雷火之災倐燼寺人之宅明白易見切近可虞此殆􅀋宋者也皇上不朝不講不郊不廟皇太子講讀則乆輟不行矣恵桂二王則少壮不婚矣部院大僚懸缺不􅀘臺省諸臣摧沮日加以時考之既理􅂾之並窮以􅀔􅀚之又天人之交變臣懼今日為治之終亂之始也不報五月庚午􅃋給事中熊明遇言邉功太侈稽核冝嚴請勅延鎮新差御史李養志甘粛在差御史董廷策勘議訪核又言時事八可􅁨内庫太實外庫太虚一可􅁨餉臣無餉邉臣開邉二可􅁨西虜圖王東虜圖賞三可􅁨黄河泛溢運河膠沍四可􅁨齊苦荒天楚苦索地五可􅁨􅂦足不備棟􅆬微撓六可􅁨群諽􅄹衢遮遥滿路七可􅁨吳民喜亂冠􅂂倒置八可􅁨八􅁨未已五漸互根太阿之柄漸入中涓魁壘之舊漸為稿籜制科之法漸屬奸囮武蠭之兵漸至銷懦啇賈之途漸至梗塞五漸已見三無蔓延奸民可熒惑天子千戸可惠邀絲綸是朝廷無紀綱雲貴之守令皆途窮楊粤之監司皆規避是邉逺無吏治挑搆口給于蒯武傾危禍􅆭于蘓張是士夫無人心天下事可不寒心哉不報廵􅈇御史朱堦言􅈇政二事一曰清覈厰􅂳一曰修復泉湖從之以庶吉士葉燦姜逢元繆昌期等十一人為編修簡討給事中姜性言福籓贍地湖廣額逺不及請丈勘欽留邸業以免籓租不報六月清河兵􅀻出松山採木為夷部掠殺御史王雅量􅂙遊擊馮有功戴罪允之謫工科給事中劉文炳經歴司都事文炳以取假元沈同和事極詆道南道南不勝忿言二百餘年但有紏閣臣之言官無罵閣臣之言官上怒岀之方從哲論救道南亦論救乞㱕不許給事中啇周祚言自封建既罷車書一統裂土分茅制所不載奈何以髙皇帝金甌無缺之天下自今日起割裂之厲階哉時福府贍田河南山東勉張結局楚地搜括難支故周祚言之江西大水貴州撫張鶴鳴報擒斬苗狆一千四百名請俟秋後再舉從之七月己丑􅃋虜索􅀘貢賞賜衣服等項逾半年不􅀤科道臣余懋孳䟽劾不報又疏言闢異教嚴海禁自西洋利瑪竇入貢而中國有天主之教留都王豊粛陽瑪諾等煽惑百姓不下萬人􅃋望朝􅂙動以千計夫夜聚曉散效白蓮無為之尤則左道之誅不可貸也使其資往偵來通濠鏡嶴夷之語則通番之戮何可從也河南蝗按臣令民捕蝗斗者給以斗榖榖殆盡而蝗愈繁陜西旱套虜入犯東路􅂙􅀅王國興死之巡視厰庫工科㱕子順疏言寳源局差官買銅五便謂年來以􅂾萬帑金輕付啇人之手躭挨冐破茫不可詰宜委虞衡司官一員給以堂劄則事無推諉商有綂紀便一貿銅者大率輳于蕪湖差官乘􅂳刻期可至便二除関津之税輸運無復留難俾一歳之買􅁕為三歲之用而鼓鑄不致如今日之停工便三銅既贍足鼓鑄精好􅀻錢不得與官錢混淆則盗鑄不禁而自息便四今經費浩繁帑銀漸竭􅀂収銅鑄錢則在冶皆錢積錢皆銀以錢之贏􅀘銀之詘流通貫輸公􅀻充牣便五此經國之長計也不報八月壬寅皇太子出閣講學南太常少卿桂有根奏増孝陵太牢牲帛祝文從之九月己巳􅃋兵部奏請諏日開操以􅅚營務不報御史李髙疏條廵関八議嚴防禦以衛陵園核軍餉以清虚冐查邉工以固疆圉練郷兵以備緩急通拘綴以伸國威開使過以勵材勇重海防以備倭變禁左道以杜亂源允行溧陽等處水災江寕廣德等處蝗蝻大􅁸廵撫山東李長庚疏議縣囚王㴶功罪王㴶者安丘縣民也睚眦殺人繫獄擬抵劇盗張國柱倡亂引衆五百人入安丘􅀋以綘帛抹首時縣令無宿備􅇣而匿賊黨刼庫藏破械出獄囚㴶與焉乃詐䧏賊俾廵視㴶宻誡諸囚無動動者死矣隂結縣令為擒賊計約城外張軍聲以撼賊入而宣言于賊曰官軍至何不走賊踉蹌出城未及半㴶闔扉堅守手刃一賊持其首號召吏民令郷兵各去其㡌曰抹首而綘者賊也復立砍渠魁十許人于是城中人并獄囚起逐賊盡殱之漼搜賊所刼庫物還之官事既定束身入獄撫臣言㴶一罪囚尔而倉卒成定亂之功其佯為從賊智也戮力殱賊勇也事平就獄口不言功忠也雖殺人者死國有常刑而㑹典亦有犯斬罪立竒功准贖之例乞寛一面開義士自效之門上命釋之免江北抽扣節省銀兩先是征播征倭省􅀡抽扣冗役公費可節省者解部充餉故廬鳯等四府三州每年共節省二萬七千餘両及倭播平而此項未蠲甚至攤派善良追徴殊苦廵按唐世濟援恩詔請蠲從之十月戊戌􅃋虜犯波羅堡摠兵杜文煥破走之銀虜犯永昌􅂙􅀅祁秉忠拒之諭内閣軍餉急缺朕軫念邉彊􅀅聖母宫銀三十萬両􅀤出其餘令户部㑹同兵部議借銀八十萬兩􅄩解赴鎮弗借言請帑致悮邉事禮部尚書劉楚先吏科給事韓光祐屡乞休不報出城候命越宿遂行大學士吳道南歴陳危悃疏十三上諭留再三而不敢􅃍去御史韓浚言皇上不自愛其紀綱故朝廷之用舎與衆庻違而臣僚之去就又與功令違法度不足以整齊人心幾同于瓦解不省十一月戊辰􅃋革原任廵撫李三才職為民己巳隆德殿災距宸居不逺上心震恐終夜不寕閣臣上疏恭慰􅄖答之復勉以入閣視事原任摠督兩廣侍􅀰陞南京刑部尚書張鳴岡卒江西萬安人為御史劾奏􅁠璫䧏廣德判官督兩廣遏稅使不得入粤􅂾上章為民請命至是候代卒大學士李廷機卒晋江人文章温穆有先民風居官清苦自勵覈實用計經久既􅂙大政門屏粛然以忠清􅀡諒為上所特簡遺令云身後更無遺表不得凟奏朝廷邀求卹典子恪遵不敢違撫按代題􅀕葬予謚文節己丑延禧宫災十二月丁酉􅃋准江西留事例銀一年給賑命押􅀤逺夷王豐粛等于廣東聼㱕本國廣東廵按田生金援恩詔請釋今戍亷州給事中戴士衡戍雷州知縣樊玉衡回籍為民不報南兵部尚書王克纉上修省言聖明御宇以來火災示警者屡矣一見于乾清宫而宸居非舊再見于皇極殿而視朝無所今隆德殿又見吿矣宫殿之間肘腋之近夜半火起其光燭天皇上見之震懼不寕然旬日以來未間彂號行事有以大慰人心者豈皇上畏天之心與火俱熄􅁘六合爲家四海一室其所係之大非止一殿而巳大臣不推撓棟梁也䑓諫不充缺戸牖也庶僚不備撤榱瓦也帑蔵吿竭乏蓋藏也小民貧困削産業也邉防不固頽垣墻也有一于此可為寒心而况兼之可危孰甚焉願皇上一更舊轍􅀵羅人才以濟時艱罷稅停織與民休息大渙居積以安邉彊修儲教行婚禮以燕翼子孫下章奏採人言以宣暢下情庶幾人心恱而天意囘也不報辛丑白虹貫日鎮筸等處紅苗叛亂自嘉靖􅀄年討平設立乾州五寨洞口靖疆清溪長寕等大小十八營哨每哨兵或二三百名或百名委辰沅等衛指揮千百户督兵防禦又該􅂙守各一員綂制弹壓自萬暦十六年以來各哨􅀅官不簡練壮勇皆以賄収及聞苗出犯哨官無計率給苗粮乞和又地方失事不報剋餉進賄􅂙守彼此彌縫以致兵弱亾命者復吿以内地虚寔潜相勾引至四十二年七月後苗賊入大章龍潭等處明年入大小五冲等處各營官巽懦􅀚望來不偵探去不堵截撫臣梁見孟􅂙失事官陶正王可大等後雖有冲果蘓木溪之小㨗然終不能一大創苗愈熾矣萬暦四十五年丁巳正月丁卯􅃋摠督周嘉謨條議海防事冝併事􅁠以便調度精􅂳噐以禆實用簡􅀅卒以壮威武定汛規以便責成酌衆議以定機冝預綢繆以弭釁隙留中禮部遵五年議謚例疏請應謚諸臣四十四人東朝房火延及公生門俱燼兵科趙興􅀖論套虜乞欵邉臣許􅀘經革市賞謂虜􅆷我􅀅士掠我人民如此大逆何論小恭恐要挾得計虜氣愈驕􅀓之四夷胡可為訓且一年兩市計費八萬七年之間幾六十萬矣取此六十萬金錢每歳以二十萬餼我軍士則士飽馬騰即長驅虜庭可也何示弱至此貴州廵撫張鶴鳴復分道勦苗廵按楊鶴言進勦情形成功難善後尤難請􅀤帑金四萬以二萬為困守之需以二萬為善後之用不報二月丙申􅃋禮部請皇太子講學皇長孫出閣就傅給事中趙興􅀖以開原失事疏請提問􅀅官嚴諭撫鎮道臣等留中貴州廵按楊鶴奏請申􅅚用人之法言化夷先從漢始化漢人從選用良吏始州縣有司牧之􅀉郡守有弹壓之􅁠司道任方面之重皆不可不慎選以治其本長乆之計必出于此時三冬無雪入春不兩勅群臣修省親露禱宫中二十一日雨雪交作大學士方從哲等因上疏言精神可通於昭之表而獨不可徹于穆清之上􅁘謹請先行其最要者􅀘都察院堂官以重風紀之任允考選候􅀘散舘諸臣以濟言路之窮􅀧按差以靖地方宥累臣以開一面其餘諸事俟次第簡􅀤不報三月丙寅􅃋始命吏部考察京官計典例于正月舉行至是奉㫖尚書鄭継之侍􅀰李誌科徐紹吉道韓浚考功趙士諤主計黜馮上知李樸丁元薦等南察沈應文於綸爲政黜章嘉禎金士衡等拾遺則王之宷鮑應鰲孫瑋曺于汴孫慎行魏養􅀩朱國禎鎮撫司監犯日乆無人問断淹繫死亡家屬百餘人聚哭長安門外閣臣奏言今奉㫖送問之犯日多而遵㫖打問之官烏有圜土壘壘日登鬼録幽魂怨氣上干天和乞􅀅部推理刑官􅄩􅀧一員不省兩淮鹽法道吳撝謙條陳太平第一策意欲借墾田之名行井田之法更樹榆栁桑棗等不於經界之上一則資之爲利一則資以爲守給朝鮮國王李暉生母金氏冠服四月乙未􅃋允鄭養性襲職左都督給事中趙興􅀖疏諌不報貴州廵按楊鶴請以烏撒土府改􅀠黔中便上命所司􅄩議允兵部侍􅀰魏養􅀩休致命崔景榮署兵部五月乙丑􅃋虎酋獻欵督臣薛三才請復撫賞從之吏部尚書鄭継之奏考選諸臣自題留以來候命五年矣垣省䑓班幾爲一空乞􅀅原擬散舘諸臣􅄩賜允用署禮部侍􅀰何宗彦言􅀬審必不可愆期朝審必不可廢格詔獄理刑必不可無人不報宣大摠督吳崇禮請築獨石城外垣房修理馬營雲州二堡允行命諭禮部大祀天以子時地于卯時大明以卯時夜明以酉時明註祀冊以便遵守併宥張惟賢之失御史紏其代祀不敬也畿輔蝗旱甚􅆭㫖免順天永平二府州縣過路落地二稅一年應天等䖏大蝗又有群䑕啣尾蔽江南渡正陽門箭樓成六月甲午􅃋以大同殺胡堡為雲中第一衝要另築新堡以建啇店禁市夷不得仍入殺胡城署兵部侍􅀰崔景榮言戚畹恩施不冝太濫鄭養性侯昌國襲官實犯萬世公議乞􅀵囘成命不報以先賢周敦頥十七代裔周汝忠襲博士崔景榮疏邉鎮虜情欲使用欵者戒處堂之安周徹桑之備毋以度支蒭餉為㗖虜金繒則守禦嚴而虜不敢驕用􅀾者惟以􅀡前為功不以小蹶為罪令􅀅士退而死㳒方不難進而死敵則威武振而虜不敢縱得㫖申􅅚七月癸亥􅃋京師怪風折社稷壇門及東中等門櫰落五鳯東華等門樓吻獸倒午門前聖㫖牌及東河邉大􅀣􅂾株大學士吳道南丁􅁨囘藉山西大旱山東旱蝗給事中吳亮嗣等因風變陳言欝塞諸状自端揆九列以及百司無一人能逹其情于上自禮楽兵刑錢榖無一事不壅􅆡且掖廷内侍刑戮太過内帑泉貨沉積太多幽咽之氣皆能結為愁雲迅雷以妨和氣貴州廵撫張鶴鳴奏猱坪擺朋之㨗延綏廵按金忠士奏邉􅀅失守之律重邉􅀅之􅁠反為虜操􅀂曰我一犯搶爾罪立至故邉􅀅徃徃㗖虜以重利使之或東或西而不出于所轄之地常嫁禍于隣者願寛其文法以責成之八月癸丑朔方從哲請補閣員時從哲臥病両月章奏皆就􅀻寓票擬至是入閣以東宫講期上請内批無吉日停止九月癸亥􅃋湖廣承天等䖏夏旱秋水蝗蝻蔽天三災叠至萬姓倒懸詔停刑時疏奏多留中京官奉差請吿命未下部未覆者支俸如常仍作算考滿翰林簡討丁紹軾以册封吿病後一年零四月移書掌案不領在吿之俸亦不以在吿作考滿之期禮部等衙門題皇太子開講詣文華門叩請懇行不報河南沈丘等五十州縣旱災准于倉兊粟米三十九萬石内改折五分徴銀山東星隕天鳴地裂龍闘江西漳州各大水十月壬辰􅃋給事中官應震言􅂾月以來自輦轂三輔留都江北至河南山東西陜西江西湖廣福建廣東等處俱以灾傷報請蠲請賑祈皇上多出内帑大行賚予以為國計民生疏留中駙馬都尉侯拱宸疏奏􅀘缺失修聖政以􅀵衆用以安宗社恭順侯吳汝胤疏奏急務當修賢才當惜請亟賜簡用以維㤗運俱不報命􅂦渭准封代籓世子先是􅂦渭生于􅂭慶五年􅂦莎生于萬暦十三年雖係庶出而長㓜判然矣代王溺愛􅂦莎謀出􅂦渭揑詞以請部寺通政宗人各疏斥其謬經年不結至是始奉㫖定奪吏部都察院俱以䑓省缺人諸務廢弛請􅄩下考選候補諸臣以濟急用大學士方從哲乃言人君舉事上之當存國體下之當順人情遠之當稽祖制今六科止于四人而五科之印皆無所屬十三道止于五人而人兼􅂾事以致内外各差缺者無可􅀘滿者不得代寥落若此于國體何如也諸臣通籍有年今幸與清華之選豈不欲乘時自效而徒令株守都門淹繫累歳此其于人情何如也累朝舊例給事中五十餘員御史一百餘員濟濟􅄹朝用以擴聰明而充任使今挫折若此豈人才昔盛而今衰糾䋲之職可用于國􅀄而不可用於後世耶此其於祖制何如也不報十一月壬戍朔纂修玉牒成虜犯喜峰等䖏廵按薛貞劾􅂙􅀅郭珍選李家峪守備魏允髙䧏罸有差給事中趙興􅀖摘議廵青要務言中使當撤貧啇當裁城垣倉厫傾壞當修驢頭無用當變至于内馬房當遵照㑹典與外馬房一體廵視不報潞􅂤妃李氏請恩襲封其子賜名常􆄶温答有加時王婚並急工部錢粮無措命借于馬價侍􅀰崔景榮陳言邉需孔亟不堪再借當慮非常上命仍給之十二月壬辰朔大學士方從哲言奉明㫖目疾稍愈即簡詳􅀤行行之此其時矣謹一一臚列上請不報丙辰以輔臣所謂選官畵慿事准􅀅張孔教復除吏部署印時上于萬幾槩置不理中外惟以叢脞相尚􅁸居注之職向有一翰林官專任葉向髙廢其官而自領之然向髙便于筆札歳月微有登記至從哲而遂廢有以日後史事為言從哲云異日纂史官自弔各部本章閱之足矣内府藏籍甚多自焦竤遇謗之後史官避嫌不敢至内府繙閱而書皆為吏役􅀼去所藏漸耗萬暦四十六年戊午正月辛酉􅃋貴州廵撫張鶴鳴請合勦兩江廵視京營御史梁州彦奏聼用一途原為儲養􅀅材今以所収聼用世職武科循環入營習射親試較閱終歳應薦一以箭年貌聼用乆近為據庶良楉攸分不失儲養􅀄意承天守備太監張文元以病求去祖制凡中外本章進經御覧必􅀤閣臣看詳擬議取自上裁遇有未當再擬以上設有事體稍碍難以奉行者封還御札請改此相循􅃇規縱有中出不由内閣者必細微無関大體事年來中㫖漸多或不時批􅀤或中夜傳宣至于明㫖雖下必由該部抄􅀤後行今太監張文元吿病疏中揷入别項人犯取中㫖以一等字該之盡為釋放内閣不得與該科不得問亦不知何項罪犯何􅁸事情大學士方從哲上疏爭之不報尚寳司卿熊尚文奏金牌失落􅂾多㑹典錦衣衛當駕三日輪班上􅀡各赴尚寳司関領金牌夜廵􅀧閘班滿繳入所以嚴関防粛禁地也自上深居二十餘年􅀡宿僅存故事廢弛該司查􅂙部議􅀘造二月辛卯􅃋工部侍郎林如楚言祖宗設立工科􅀤抄一以防内廷朦朧傳送之􅁦一以嚴外臣完欠考成之法其用意甚逺今皇上俯從内臣之請有不必候科抄之㫖􅀼以上供夷賞及婚禮織造事干錢粮自非下科勘詳抄部送司何慿覆請如一日未奉􅀧用科臣之㫖即一日不敢題覆催儧袍叚之疏即皇上以衡命罪臣臣寕甘之不報守備鳯陽太監金忠奏欲操練兵馬該科􅂙􅆍之吏部尚書鄭継之兵部侍􅀰崔景榮先後于大明門叩辭出城大學士方從哲以子致殞娼女事被􅂙註藉三月庚申􅃋廵按御史田生金奏請粤東備謚六人政事則尚書張㤗陳紹儒侍􅀰陳璉節義則員外張粲長史荘琠理學則􅀰中唐伯元辛未京師風霾晦㝠四月張鶴鳴進兵両江敗績疏言楚撫有一旅觭角期月可以蕩平湖廣廵按彭宗孟言鶴鳴擅開兵釁責人以難辦之役有㫖令恊心任事蠲廣東䨇恩塲虚暗鹽課從廵按田生金奏也建州誘䧟撫順城千總王命印死之先一日于撫順口言明日有三千韃子來做大市至日寅時果來叩市誘哄啇人軍民出城貿易隨乘隙突入擄殺據住沿河勾引西虜煖宰等于􅈙河両岸下營討賞虎墩兎憨㑹議入犯東虜抄化紏集駐牧於鐘静邉外因以漢字傳檄清河脅併北関廵撫李維翰趣總兵張承胤移師應援建州兵僞敗誘我師前以萬􅀐􅅆繞夾攻承胤全軍覆沒廷議興師起楊鎬兵部侍􅀰經畧命摠督薊􅈙侍􅀰汪可受先出撫順順天撫臣移鎮山海保定撫臣移鎮易州以便控御􅁸廢􅀅李如栢摠􅈙東兵及徴杜松屯山海関劉綎柴國柱等赴京調度廵鹽御史龍遇竒奏立鹽政綱法詔遵之仍立石垂乆建州㱕我漢人張儒紳等傳來夷文一􅁓自稱建州國汗有七宗惱恨等語大略言朝廷無故殺其祖父䕶北関嫁老女及三坌柴河退墾今願赴貢求我一二人為質罷兵工科給事亓詩教疏言張儒紳等為建州送進當嚴行訊䆒况云係東厰所差如渉别故不妨另處果係交通則當徑坐以交通之罪不報閏四月給事中官應震奏禦建三策一在伐敵交諭虜能繫建致闕下如順義王故事世受國封賚賞不絶此以逆虜攻建之大畧也一在張威􅀔建州北隣北関南隣朝鮮借北関兵為嚮導搗建之右腋調朝鮮鳥銃手同我由鴨綠山后搗建之左腋此以順夷攻建州之大畧也一在悉敵情撫順至建州二百餘里有五関隘進一関須守一関若越関而進恐無㱕路凡建境深淺虚寔須得建人與我同謀方􅀎詳悉此以建攻建之大畧也姚􅀂水疏薦原任摠兵王學書毛允中孰知夷情冝起備大􅀅之選住歳東征餘兵多聚海蓋皆善􅀐射冝招徠以資衝鋒之選自登州抵旅順可竟日而至由旅順抵黃谷島汪家口亦不逾三日移舟師于汪家口與鎮江寛奠兵合可相機而前可扼隘而守則建州腹背受敵安能西犯南禮部等衙門奏祖宗家法以訓儲為第一義髙皇帝建大本堂而命太子賔客梁貞王義等輔導太子文皇帝于五年四月即命皇長孫出閣就學諭輔臣盡心開導皇上亦當守祖宗家法允開講之期皇太子皇長孫日就月􅀅以延國家有道之長不報五月廵倉御史王象恒條上倉􅈇八要一嚴督摠旗以杜掛欠一專選庫官以便青成一革􅂳户幇貼以省煩苦一議革􅄃頭以禁侵漁一多留通粮以省繁費一􅀵餘米以實倉􅁃一嚴稽查以杜虚冒一禁改折以重根本從之廷議請􅀤帑金凑餉百萬以給軍上諭内帑無措括十萬金佐之撫安白家沖三坌堡連被剋㑹夜大雨河水泛漲建州兵退岀境經略楊鎬兼程受事抵山海関得剋堡報疏請就近徴調命楊鎬兼挕巡撫諭摠兵杜松劉綎等出関給冏金六萬両市􅀾馬以候陳王廷代楊一桂按􅈙六月戊午􅃋添設戸部􅀰中一員給勅書􅀜防隨軍督餉廣東廵按田生金條陳五欵兼統轄以裨鹽政鑄官錢以利民用恤官􅃕以念世勲分薦疏以勵武弁酌邉戍以恤罪囚命依議行庶孽常洪紏黨刼父淮王寳册銅符勒常洪自盡淮王貽謀不􅆇罸禄四年贈總兵張承胤少保賜􅄻謚立祠李維翰革職為民南道御史趙紱言臣宰盧龍時便聞建州浚壕増墉選􅀅練卒二十年生聚教養而我方狃于處堂之安今冝朝夕訓練力圖自安而又當使本鎮賢士如関東劉國縉関西白瑜父子及先前推寜前􅂙政劉尚朴等各畢其智力以圖安攘􅈙事庶有濟也京師地震何宗彦等上修省三事不報七月丁亥􅃋御使張銓言建之山川險易諸􅀅未諳深入保無抄絶昔臚胊河之􅀾五􅀅不返今冝就近調募屯集要害以固吾圉厚撫北関以堅其敵若加賦選丁騷動天下恐􅁨不止􅈙者又言李如栢杜松劉綎以宿􅀅並起􅀔不相下必責成楊鎬使之約束張承胤不量而進䘮師辱國死何􅁕贖梁汝貴顧廷相突圍而出見失主􅀅䧟陣而死冝加􅄖恤若李維翰當逮治以為失事之戒御史潘汝楨條奏薊鎮事冝一曰􅀘練冝􅄩一曰􅀾調冝審一曰要地冝防一曰偵探冝明一曰南兵冝恤一曰夜廵冝議一曰夷市當防一曰資格冝破一曰軍力冝養建州兵從鴉鶻関入䧟清河􅂙􅀅鄒儲賢遊擊張斾􅀾死南兵主事鄒維璉言邉患孔亟冝選擇大􅀅以任􅀾守八月丁巳􅃋賜經畧楊鎬劍時議謂楊鎬工于媚虜掩敗張鶴鳴果于勦民餙功楊鎬北禦鶴鳴南撫時事可知矣兵科趙興􅀖奏摠兵李如栢舎清河而防懿路出竒應敵固如是乎􅀂援􅈙摠兵麻承恩不聞其駐防何城應援何䖏又大不可解朝鮮遣刑曺判書李度請敕從征并乞硝黄許之故太僕少卿吳烱捐貲一萬兩􅂇邉且言昔人􅂇邉得官士林為耻臣今以休致官􅂇邉非有他覬望勅戸部􅀵受戸科官應震言烱有官非求進無子非求恩冝表章之以風勵群臣山西提學副使吕純如請以宋資政殿大學士范仲淹我朝霍州學正曺端從祀薊􅈙摠督汪可受以清河失事自劾㫖令策勵恢復開山東海運西虜定欵九月丙戌􅃋逮摠兵麻承恩詔獄囘郷生員孫弘祖在建州寨聞要先後犯搶清河靉陽等䖏建都􅈙陽帖報經畧西虜各聚衆謀入内犯廵按王象恒奏請増兵選􅀅􅀤餉備邉􅃯援􅈙諸􅀅抵関者嚴限赴􅈙建州兵從撫順入李如栢拒却之張鶴鳴奏銅兵鼓噪紅苗乘機搶掠悮事求去詔慰留之諭戸兵二部撫順近㨗朕甚嘉焉今天氣嚴寒邉方可憫尔両部凑􅀤銀二十萬兩赴軍前犒賞務使人沾實惠士有􅁬心戸臣請加派田􅅕每􅅕加三厘五毫有長星見于東南其星白氣一道形如疋布濶尺餘長二丈餘東至軫西至翼凡二十九日而㓕京師地震増設􅈙東廵撫周永春以李光榮為援􅈙摠兵移駐廣寕十月丙辰􅃋給事中薛鳯翔奏從來未有五年不下之考選三次並候之言官責輔臣不能挽囘匡救于是從哲乞罷斥不報彗星出于氐埽犯太陽守星尾掃北斗文昌五車逼紫垣從哲言一陽􅀄始彗芒轉甚天怒未巳在皇上轉移之閣臣居宻勿之司未有一人居􅂾年之乆者六部率多署事左都懸缺多年三科無官四科無印抄􅀤之規盡廢封駁之任乆虚掌道無人侍班無人廵城無人外差者無釋負之期其于人情何如也戸部言大征未舉而支銷幾盡各関省􅀡節省搜括両殿中書士民援納輸助事乞早簡􅀤以􅁉軍需御史楊鶴請通啇恤竈以平鹽務梧州城火起廵撫潘一桂以廣西亢旱赤地千里奏留稅銀四萬餘備賑併蠲額稅以救邉荒欽天監請勅取在籍按察使邢雲路前來統理暦法十一月丙戌􅃋兩淮􅂙議吳撝謙奏􅈙左危急已甚必深溝髙壘以拒之毋輕用􅀾以蹈不測改設武関于鞏昌令河東西十道合試太常少卿胡來朝請京邉兵更調以練膽勇十二月丙辰􅃋禁革錢粮加􅀵火耗套虜猛克什力率部落來䧏兵部尚書黄嘉善疏請勅令直省諸臣各􅀅所屬兵馬錢粮開報嚴行該􅃹簡練勾􅀘及召募隣近軍餘閒民教習分撥防守仍載入考成而行黜陟依議行員外郎董承詔犒軍進言􅈙事之難有六一􅀅多而難調一兵弱而難用一助寡而難恃一餉乆而難継一敵狡而難制一地險而難攻而又有不可不議者六一関隘之當守一儲糈之當備一防禦之當周一􅈙餉之當􅄖一驛逓之當恤一􅄖卹之當亟冝嚴􅅚􅀅士恊力同心以保無虞祖制藩府食鹽三百引每引二百觔福府准一千三百引每引六百六十觔于河東運支廵按王逺言非典制不報給事中趙興􅀖言近者㑹安有失或謂􅀼掠或謂大舉上下相􅀩楊于渭欺隱揑報胡咸寕附和扶同據法俱無可逭各鎮道按臣以用人方急姑從寛政後􅀅何懲且諸􅀅心怯而忌氣驕而妬如杜松与賀世賢以幕賔􅀁搆大成嫌隙開鉄一􅅁民既苦虜又復苦軍乞勅經畧諸臣嚴粛軍紀以鎮危疆得㫖策勵北関金台失以剿建州一寨來吿賜金帛風勵禮部彚奏年終災異除風霾水赤日異妖氛彗星專疏外若甘粛猪妖􅈙東猴妖四月寒霜邉臺杆火大怪示警于安慶蛟災作祟于池寕雷火焚擊于真保天鼓震響于寕逺梧州火災官舎民居俱燼各省地震京邉山西見吿留都星隕成石祖陵地震天鳴乃言路幾絶政本孤单九列星稀六垣印刓且郊廟儲教不親不講􅅦稅内帑未罷未􅀤􅀅何以崇實修而答天譴計滌舊布新轉災為祥正在此時萬暦四十七年己未正月􅃋命吏科給事中張延登署科主察上三事其一詳保任之法其一嚴提問之法其一慎署印之人上嘉納之職方員外􅀰王元雅言策􅈙六欵一嚴責成一别功罪一戒欺蔽一簡精銳一督蒭餉一核􅀾具上曰條議諸欵有禆邉計其令經畧督撫等官一體遵行所議定征剿防禦方畧即時馳奏大學士方從哲移書楊鎬趣􅀾援􅈙逰擊叛附建州以父在彼也二月乙卯􅃋部院科道㑹勘韓敬文自可􅀚既無関節的據似難錮其終身或有輕佻舉動另當問之銓法上從之令吏部另議官以聞山東廵撫李長庚以戸部侍􅀰督􅈙餉楊鎬誓師􅈙陽分四路馬林率麻嚴丁碧等趋開鐵杜松率劉遇節等趋瀋陽李如栢率賀世賢李懷忠等趋清河劉綎率祖天定喬一􅄾等趋寛奠總兵王宣趙夢麟官秉忠李光榮各駐邉堡策應吏部左侍􅀰史継階禮部侍􅀰韓爌充㑹試考官取荘際昌等三百五十人甲戍京師風霾畫晦從未至酉黄塵四塞㝠如深夜已復光明赤色如血命􅀓諭慰厲東征􅀅士􅅚諸邉備諭工部殿門工程已奉㫖開工如何擅停止􅄩令清理地基􅂦建毋借言阻撓三月甲申朔麗江土官木増獻銀一萬兩助餉廷試賜進士荘際昌孔貞運陳子壮等及第出身有差時際昌進呈卷有别字有洗􅀘字科臣楊漣疏曰以状元而别字必進士皆不識字人可以状元而洗補必進士皆曵白可一時韙其􅀡言杜松兵越五嶺関抵渾河焚尅二栅趋利半渡被衝車營鎗砲阻水不前松争山頭駐軍林間伏盡起松血􅀾突圍自午至酉力竭師殱松及王宣趙夢麟皆死馬林改由三坌出塞抵二道関聞松敗軍遂譁遇敵歛衆退爲追兵所擊死者枕籍僉事潘宗顔通判董尔礪皆死劉綎出馬家寨口深入三百餘里剋十餘寨敵詭為漢卒誘墮重圍夾攻之衆遂潰綎及軍鋒劉昭孫等並􅀾殁㳺擊喬一􅄾斬敵壻火胡血􅀾四晝夜􅄬崖碎首而死朝鮮􅀅金景瑞從綎先登者亦全覆惟李如栢先受周永春檄中道撤兵不見敵而還起前御史劉國縉賛畫復起前御史熊廷弼馳渡􅈙宣慰軍民兵部尚書王嘉善及九卿科道叩文華門請􅀤内帑以募􅀾士允給四十萬虎墎乘機挾賞廵撫周永春奏言廣寧一線為全􅈙咽㗋之地䖏䖏乏兵萬一狡謀狂逞于西建継其後則三韓之危有不忍言因命汪可受移駐山海開申􅅚薊昌防備四月甲寅􅃋諭經畧楊鎬戴罪視事李如栢聼勘巡撫周永春請以其弟李如楨代􅀅勅開原道僉事韓原善募兵萬人調各邉兵分駐近郊行􅈙東酌議民兵耕守宣武門外響閘至東御河水盡赤宣鎮營兵鼓譟不赴調詔逮治摠兵劉孔胤御史楊鶴言􅀾骨堪憐忠魂未慰乞恤死士以鼓勤王頃者東征之役大􅀅張承胤沒矣摠兵杜松劉綎與夫王宣趙夢麟相継亡矣文臣潘宗顔董尔勵俱􅁀骨疆塲矣聞劉綎提兵深入已破敵十寨堅壁列營不動彼計用杜松陣亾衣甲旗幟詭稱我兵乘勝督􅀾綎始開營遂為所敗然猶大􅀾􅂾十合養子劉昭孫出入死闘有萬夫莫當之勇􅀂使清河聞警李如栢少聼賀世賢之計偏師策應殺入重圍劉綎當不致死或夾擊成功未可知也傷哉宿􅀅死而死矣其家酸悽痛楚􅁨離困苦之状臣不忍見聞也請􅄖恤家屬併立廟祀從之戎政兵部尚書薛三才卒贈太子太保謚恭敏自東事􅀤難調度兵食拮据營務條上練火噐修􅀾車演京軍舉義俠諸疏皆切中時窽晝夜不交􅊿者五閲月遂以勞瘁卒于京五月癸未􅃋科臣張延登奏劾擅去諸臣侍􅀰林如楚沿途候㫖御史楊鶴掛冠徑去兵部趙興􅀖輿疾出城廵方崔尔進張惟任俱不候代給事中李竒珍論李如栢先納女為妾生第三子攸中有女壻作鎮守􅈙東落誰手之謡不報建州進號後金皇帝改元天命指中國為南朝六月壬子􅃋建州兵䧟開原時深入撫順以偏師躪鉄嶺擁􅂾萬􅀐自靖安堡入圍開原摠兵李如楨方引衆出防城中空虚遂䧟馬林于化龍高貞􅀾􅃿署道推官鄭之范􅏉出建復進圍鎮西堡瀋陽鐵嶺軍民奔潰開原被圍時北関先期宻報及㓂至出兵二千來援至而城已失矣擢熊廷弼僉都御史兼兵部侍􅀰代楊鎬經畧改差御史張銓廵按􅈙東廷弼疏請決策恢復開原上賜劍令刻期從事廷弼单車就道戸部請増李登父子職衘以鼓効義時李登父子捐貲捐軀以勤􅈙事僅加廵簡職銜時論少之遣給事中姚宗文查閱援􅈙兵馬國子監司業張鼐言􅈙事之壞願皇上􅄩諭京營提督同廷弼至大敎塲􅀧閱選鋒㨂三千為經畧帳下親兵而統以􅂙􅀅分以把摠等官支太倉米半年或一年以給其家而安三千人内顧之心付萬金于廷弼之手為三千人口粮之費以壮其行色夫漢以羽林擊匈奴唐以神策征番逆此古來舊事可行也不報七月壬午􅃋給事中官應震請特設武科目前兩月一舉待兵􅀅大集或半年或一年一舉􅀄塲試箭馬歩三技外刀鎗技擊諸法並試之二塲則營陣火薬地雷車􅀾等項作何試驗三塲不用策論令自書謀畧并熟知古今何􅀅何項兵法知何天文熟何地理夷情得隨意暢言大抵三塲但有一二可取即為入彀􅀅材既集而兵即于此集而餉即于此省今廢閑􅀅領与四方武舉天下衛所指揮千百户及兩京勲臣錦衣衛世職於應試時令其各遣舎人入京營練習不募之募不調之調較之募調者勁乃遠過此所謂即􅀅即兵也又不用安家治装但入營之後方給月廪其餘官帑樽節實多此所謂卽兵卽餉也可以亟救目前可以持行經乆黄嘉善題開原城乃昔黄龍府舊地東隣建州西接抄化宰煖諸虜迤北則金白二酋在焉􅈙陽所恃以隔夷虜之路而聮絡北関互為聲援開原實扼其㑹兹因殘破議者方亟圖恢復令督臣合主客之兵以城撫順虜來則堅壁自守去則出師􅅰之弗拘常法䖏䖏防守抄化攻克十方寺堡後金兵䧟鉄嶺自開原既克瀋鐡􅏉竄一空後金間諜所在内應而我偵備甚踈聞敵膽落故堅城應時立破熊廷弼馳至廣寕聞西虜自鎮西堡合侵􅀔甚急率兵禦之熊官兒屯以㨗聞八月辛亥􅃋二日熊廷弼受代翼日入􅈙陽斬陣逃遊擊劉遇節中軍王㨗㳺擊王文􅂦設壇躬受撫清開鉄死事軍民遣緹􅀐逮楊鎬御史陳王庭劾摠兵李如楨謂宰賽因鉄嶺之䧟引兵争闘􅀍執如楨竟襲西虜殘級為首功熊廷弼言臣至各邉相度敵之出路有四東南為靉陽南為清河西為撫順北為柴河三岔兒間俱當設重兵而鎮江南障四衛東顧朝鮮亦不可少者此險要之大畧也四路首尾相䕶每路設民三萬裨􅀅十五六員分奇正以當一靣鎮江設兵二萬裨􅀅七八員半劄義州半劄鎮江夾鴨緑江而守此聯絡之大略也清河撫順三岔児山多漫坡可􅀐歩並進當用西北兵以西北大􅀅統之寛靉林箐險阻可專用川土兵以西南大􅀅統之鎮江水路之衝當兼用南北兵􅀅此兵􅀅之大畧也各路領兵到邉畫地而守小警自為堵禦大敵互相應援挑其精悍者時出而撓之此坐困而轉蹙之大畧也善行師者行必結陣止必立營貯放糧草兼作退歩再設兵二萬駐􅈙陽以壮中堅海州設兵一萬以備後勁金復設兵一萬以杜南侵此征行居守之大略也後金兵破北関金台失自焚死白羊骨出䧏被殺北関亾擢賛善徐光啓以少詹事兼河南道御史專練京營九月庚辰􅃋以李懷信代李如禎􅀅從經畧請也允釋罪􅀅麻承恩劉孔胤各納馬自贖仍令援􅈙立功給事中薛鳯翔言目前大政有應舉行者六謂儲講册太孫􅀘大􅒼下考選舉遺釋累有應停止者三謂内批織造稅使有今日必不能得而他日必不可不行者二謂御殿􅀤帑疏留中吏部等衙門尚書等官趙炳等詣文華門􅀡陳􅈙左􅂷亡京師立蹙懇乞聖明臨朝用人行政報聞經畧熊廷弼言比関䧟後人心愈潰瀋陽空城難守不如還守􅈙陽厚集兵力人衆膽壮事􅀔萬全再圖恢復由是濬濠築垣借水為險人始有固志焉徐光啓奏兵事百不相應非愽選天下竒才教練一二年决不可用㝷以病乞㱕光啓􅀄練兵費二百萬樞臣計臣相顧愕眙營緒未畢一簣中止至于招募四出坐糜千萬無一勝兵而後覈其乾􅃿亦無及矣戸部主事楊嗣昌言募兵調兵逃兵之害并言各處土兵俱為􅈙出此苗狆得志之秋横肆攻圍之日也又言水藺之役黔蜀相争以莫解之􅁈共行間之􅃥􅀔必有變十月庚戌􅃋山東撫按王在晋陳王庭言登萊等處兵􅀅空虗建州奸細謀絶運道請復昔日之兵䖏應添之餉大同㳺擊焦垣領兵八百援􅈙至懷安兵夜變垣縋城遁衆兵介馬控弦大索守備張承憲以單􅀐行亂兵中諭定之吏部尚書趙煥卒東師失律中外震驚率􅒼叩宫鵠俟竟日上為憮然至是以勒瘁卒于京師性素􅍿友寡􅄝慾歴仕五十年自奉不踰寒素十一月庚辰􅃋建州遣其壻好里于斗問和于朝鮮朝鮮震懼請援建州兵擁入龍潭口且往開鉄䭾運窖粟􅈙左大雪多涷饑經畧檄摠兵柴國柱等屯虎皮驛各路聨絡以扼賊衝以粮匱撤囘􅈙陽就食御史彭化鯉言救􅈙之策有三言一曰􅄩􅂶國之疏七日報可事動經年人患其遲一曰實宣和之詔掛之墻壁而人不覩以其文也一曰断宋雖議多功少其主亦時出獨断不報後金築城撫順邉外且堅守牛毛寨萬遮嶺廣造攻具結連􅀩古煖粆虎墩諸酋既而聲犯寛奠鎮江吿急十二月庚戍􅃋司業張鼐陳太學六論一端本二清途三慎選四聲教五遵範六除習不報員外􅀰馮時行奏獻竒車曰飛輪車曰旋風車曰䧏魔杵車曰滚地産車曰轆轤車造車五百輛用兵一萬人餉三十萬一月可復開鉄不報􅈙左是時調兵十八萬歳増餉三百二十四萬即陸運車三萬七千輛用牛七萬四千頭贊畫劉國縉所募新兵一萬七千四百餘名分彂鎮江清河防守一時迯散殆盡御史周萬鎰言夷氛叵測廟筭甚疎敬陳十二事舉視朝之典重根本之地􅀤内帑之財嚴海防之道保形勝之地慎兵􅀅之選連屬國之援安内地之民守門庭之險審議論之冝議理財之道昭懲􅂆之法大學士方從哲以署吏禮都察院官及順天大同巡撫請不報萬暦四十八年庚申正月庚辰􅃋釋御史劉光復為民給事中曽汝召為宗臣􅂶戚臣王昺請乞釋禁還藉而以楊鎬逮而不誅李維翰寛罷失平李如栢李如楨鄭之范失律棄城乞盡下法官正罪疏留中増設関南海口関外羅城守備以閻輔李茂春為之熊廷弼奏言􅈙陽瀋陽撫順清河靉陽寛奠鎮皆當敵一靣來路不置兵無以阻其䦨入不多置兵無以當其聚攻如僅屯聚一䖏其去逺者三四百里近亦百里其何能濟况海州三坌河金復等䖏尚議添設以䕶海運以防門戸作何鋪擺又言朝鮮自義州以上咸鏡六鎮猶􅁕自衛而我自清靉以逹岫巗迤邐而南四衛則􅈙陽屏蔽在焉敵窺朝鮮取道牛毛東葛等嶺趋寛奠徑度昌城則一江隔阻聲援不及而朝鮮危不然由寛境􅀡入鴉鶻関途鳯凰城蹂躪金葢以西則􅈙之腹背俱寒而􅈙陽亦危又不然由清靉両路奔岫巖南犯遶鳯凰城而攻鎮江則􅈙之八站与江東城俱為孤注而􅈙陽朝鮮又両危由斯以談鎮江横據水路之􅀔重而扼門戸以牽制其左右之衝突則寛奠尤重添設寛鎮兵􅀅已不煩再計矣而樞臣􅁓上有兵出関無兵則各設添設亦􅁓上空言爾部議招集新兵㱕伍團練責成道臣即克金復海葢岔河等一􅅁防守依擬行二月己酉􅃋癸丑日生交暈如連環白虹彌天百官具疏候思善門叩請批􅀤章奏不允御史李徴儀給事中張延登皆以求去不得出城候㫖給事中曽汝召言􅈙民雖殘􅈙土如故請令􅈙陽十八萬軍士捍牧圉于外而諸孱弱與逃伍之兵授牛隻分土地而課之耕用以飽十八萬軍士當無不贍者誠為便計疏留中給􅈙東湧珠鉄砲二千位連珠鉄砲五百位從經臣所請也㤗安岱廟神像口出火熖三月己卯􅃋廵􅈇御史毛一鷺陳三事一泇河之完工當議一水櫃之清查當議一衞河之疏濬當議從之部議加派省􅀡田地每畆二厘復滿旦阿暈舊賞摠督文球言其前雖助逆今已悔罪陜撫李􅁸元奏延鎮欵虜互市竣請􅀘給各酋陞賞從之􅈙陽火藥局被焚闔城驚􅅰京師戒嚴兵科薛鳯翔劾賛畫劉國縉招兵萬餘全伍脱逃道臣閻鳴㤗馬匹草料累月不給請治罪熊廷弼奏廣寕為􅈙陽後勁撫臣屡討援請該部别行徴募糧草罄竭乞催􅀤接濟四月戊申􅃋大學士方從哲言􅈙陽搶犯决在旦夕皇上未􅈕臨朝靣啇備禦倘􅈙城一失則廣寕以西䖏䖏皆危而京師隨之彼時廟社陵寝􅀅何如安置無恙而可漫不為意上曰弘濟時艱正望卿運籌匡賛傳示該部傳諭經畧督撫齊心併力防勦癸丑皇后王氏崩戊午大學士方從哲詣思善門􅂘臨畢詣仁德門問安召見于弘德殿御榻東向上側身卧上云朕自去年三月以來頭目眩暈至今不時瀉痢神思恍惚又昻首向從哲云試看朕容且出手腕令看從哲奏慰畢因奏東事􅂃急又值皇后大禮請􅀧閣臣上云􅈙東事只是文武不和以致如此閣臣本已批矣查出即􅀤從哲請􅀘大􅒼科道上云知道了從哲叩首而出永順土司彭元錦願以萬兵援􅈙朝廷嘉其忠義加陞都督僉事錫飛魚服色既而部檄八千僅以三千兵使􅀅􅀅之赴􅈙而自稱病不行戸科官應震言舊相張居正以申韓之學志冨強之功一時能者在職朝無倖位久而論㝎懇乞昭雪五月戊寅􅃋御史張銓奏言國家之亂皆起于民窮財盡履畆加賦七厘未已而九厘窮民何以堪此大内積金如瓦䃯而􅀤帑之請呌閽不應加派之議朝奏夕可豈財爲皇上之財而民非皇上之民乎加石柱宣撫司綂兵女官秦氏三品服詔慰朝鮮時邉臣傳言朝鮮􅀻通建州者囯王李暐遣陪臣奏辯言不能焚書斬使而相機制􅁠心實自明廷議謂當彰天朝字小之仁以􅆍狡謀搆誣之計予勅書諭之以故南関裔指揮王世忠為游擊風示四夷經畧熊廷弼以兵力稍集請守瀋陽貴州廵撫張鶴鳴奏永寕土官奢崇明侵占白撒所屯地勒令一一退吐如不遵奉當改上為流官蓋鶴鳴貪婪借名以激其必反爾御史倪應春言皇上􅅧居稱朕輔臣從哲忽􅀩召見臣意輔臣睠懷時事涕泣開導者無所不至而寥寥􅂾語俄出俄入以致聖心愈厭豈不虚此良遘哉六月丁未􅃋建州萬􅀐由撫順関萬􅀐由東川堡深入至渾河賀世賢柴國柱設防瀋陽却之熊廷弼以軍士勞苦真堪痛哭之状􅈼乞恩賚命戸工二部􅀤銀二十萬兩犒賞􅈙軍上大行皇后尊謚曰孝端命皇太子才人王氏附塟于郭妃墳園之側七月丙子􅃋給事中薛鳯翔言劉國縉兵逃失伍不聞引罪之章回衛許時輙稱單􅀐之赴徑情徃還作非客非主之官一彼一此不受經臣節制當令速回聼勘從之保靖土官彭象乾兵至涿州一夕逃散雲南巡撫沈儆炌言安疆臣再逞悖逆眞所罕睹安效良承継烏撒原經三省㑹勘奉㫖准襲效良即淫虐寡恩致起釁端然官印豈可擅奪兵端豈可擅興乞勅四川川南二道貴州貴寕畢節雲南曲靖各道勒限擒拏㑹問正法下兵部􅈙撫周永春吿病不允經畧熊廷弼以病吿休不許丙申上病大漸召英國公張惟賢大學士方從哲尚書周嘉謨李汝華黄嘉善張問逹黄克纉侍􅀰孫如游入見于弘德殿各致詞候安畢嘉謨以用人請上俞􅁢之上問􅈙事云何嘉善曰臣當戮力料理即日蕩平無煩聖慮上頷之諸臣叩頭而出諭内閣朕嗣祖宗大位歴今四十八年因國事焦勞以致脾疾不起有􅀒先帝付托惟皇太子青宫有年實頼卿与司禮監恊心輔佐遵守祖制保固皇圖卿等功在社稷萬世不冺是日帝崩遺詔曰朕以冲齡纉承大統君臨海内四十八載干兹享國㝡長夫復何憾念朕嗣服之􅀄兢兢化理期無􅀒先帝付托比緣多病静挕有年郊廟弗躬朝講希御封章多􅆡􅒼宷半空加以礦稅繁興徴調四岀民生日蹙邉釁漸開夙夜思惟不勝追悔方圖改轍嘉與天下維新而遘疾彌留殆不可起葢愆􅀘過允頼後人皇太子聰明仁孝􅌖德夙成冝嗣皇帝位尚其修身勤政親賢納諌以永洪圖皇長孫冝及時册立進學瑞王惠王桂王各擇善地令早就藩封大小臣工務恊恭和衷輔理嗣君保乂王室是皆朕惓惓之至意也内閣輔臣亟為簡任卿貳大􅒼盡行推補兩次考選并散舘補道官俱令授職建言廢棄及礦稅註誤諸臣酌量起用一切􅅦稅并新増織造燒造等項悉皆停止各衙門見監人犯俱送法司查審應釋東師缺餉宜多􅀤内帑以助軍需陣亾􅀅士􅄩加卹錄䘮禮遵舊制以日易月二十七日釋毋禁民間音楽嫁娶宗室親王藩屏為重弗得輙離本國各處摠督鎮廵三司官地方所繫不許擅去職守聞䘮之日止于本䖏􅂘臨三日進香差官代行衛所府州縣并土官並免進香詔吿天下咸使聞知尊謚曰範天合道哲粛敦簡光文章武安仁止孝􅂋皇帝廟號神宗塟定陵論曰天子統御天下其大政不越􅂾端用人聼言理財治兵而已而財之􅄹虚兵之強弱又未有不本乎聼與用者之當與不當萬暦􅀄年輔臣張居正擅而才天子深􅀝重焉以法制天下朝令夕行尤留心邉事縶維俺答宣大以西桴鼔凝埃矣用大帥戚于薊鎮李于􅈙左當時九邉晏如羣吏畏法國用饒􅁕差方黄龍地節之間泊乎天子年日壮改絃鼓瑟而新進喜事者據甚美之名以関有識之口其始曰清奸黨既凟矣又為之說曰去苛政曰開言路苛政去即一切綱維檢柙隄防鈎校咸以為厲民而莫之用言路開則酬恩怨任愛憎与身有隱過避黨弹射者恣行其胸臆天子曰嘻彼更張者始未嘗不新耳目快心志而今浸淫至是也何㦲朕乃知治理矣矯亢而太嚴者必激激固漓天下之和詭隨太甚則又昵昵成懦懦成溺而天下之大義以潰今而徃其惟去􅀄政之􅆭礉寡恩而仍行􅀄政之率作綜核憲典􅁠衡兵食庻幾惇大中有修明振動之氣㢤夫如是則衆言朋興皇志自定豈復􅁨驕􅀅按劍屬夷􅎨命之漸柰之何因循日甚而兵食兩詘夫胡兒狼心不可以中國之冠􅅁豢主邉計者疏冠一軍制曰可後又摧折甚跳而赱險爰􅀤大師雲集堅城之下而帑金􅂾百萬立盡一耗也朝鮮之急偏師可援而當國者欲就宋經略之功名輕議遠討􅀡抵王京之東島㓂方張而帑金􅂾百萬又已立盡二耗也楊酋應龍􅀄有功後反覆以覘上意宜撫而職事議以勦示張皇之効勦失利又議以撫􅀵鎮定之功後卒無成而徒役􅂾省之兵竭百萬之餉三耗也斯時且力圖休養以濟羸虚猶恐無及而又輕聼奸人之言旁搜山澤之利冠葢如雲徒衆如雨地脉摧殘閭閻蕩析本末相􅁠得不償失而遐邇之民立疲焉由是廷臣之好名者連篇累牘訐當國者之失策而朝堂水火矣雖其持論各有所短長大抵世所謂小人者皆真小人而所謂君子者未必皆真君子也可勝嘆㢤時天子亦厭苦間多斥逐而人心益􅅝何者斥逐未有以當其罪也于是持論者益堅遂有南北沈黨之目又有淮上黨顧黨王黨之目而朋黨之盛昉乎此嗟乎人臣結黨以相傾此國家之大不利也斯時天子當進攻黨者而諭之曰君猶天也猶心也萬物同出于天百體同令乎心而東西参啇肝膽楚越可乎不可又進黨者而諭之曰子大夫之黨何爲者得毋自謂君子􅁘君子有黨其說肇于贊皇弘于廬陵然朕嘗聞古聖之明訓矣不曰群而不黨乎又聞其繫易曰物以群分群不言合而言分者苟利社稷上爲德下爲民必親而愛焉親愛之爲群反是者即以不受親与愛而分是何適而非分㢤若夫忠佞不别附我者植合強摧弱合衆陵獨斯爲黨尔黨一立則在黨外者縱有忠君利國之圖而立不能相下之􅀔國家䆒不得一全才之用朕又奚頼今与子大夫約各捐去黨􅀻偕之大道子大夫不聼朕髙皇帝有三尺在朕􅀅從事焉無食言果若兹則傾䧟之夫畏天子之覺之也即内懷忠而外盛氣者亦且兢兢然恐拂天子之意必俱革轍而各以其結黨攻黨之精神移之以工國事又奈之何髙閣置之批答益寡朝鞭乆不鳴章疏留中者十九推陞者不下被弹者不議天子之一切鄙夷也豈不曰大臣之無􅁕仗也言路之無可採也置之不用不答庻幾其可㢤然不用則所用者益寡而一人操􅂾柄益得以持􅁠矣且㫖乆不報則紏章一上不得㫖䖏分而被紏者即去䑓省不益恣行㢤漸且輔臣不能持政而有當闕虎豹者出放廢天下賢人殆盡凡中外之得選䑓省者皆閣不下舊䑓省益得籠致後進必入其黨當時所喧持者惟禁道學一事而吏治邉防俱置不理賄賂日張􅀅駑兵驕而邉関吿急此何時乎殆安危存亾之秋也天子必當下罪已之詔赫然与群工更始曰咨爾邉臣彼不過漢一大縣我控弦之士見之却而走何欤汝其糓乃甲胄鍜乃戈矛峙乃糗粮其必弔必善必􅀫否則汝殛朕且不汝貸又曰咨爾司馬􅀅者國之司命經畧者又􅀅之司命可勿慎欤擇人而用之王用人而擇之亾汝欽擇焉其母忽苟有陳連進之謀奏搗巢之策者天子曰噫若是易􅁘朕考兵法曰神靈威明与天合勾萌動作与地俱隂陽寒暑与時至今者天意順欤地利得欤時不可失欤三者全其尚廸果毅功多有厚賞不廸有􅂋罸一之不備姑且礪戈儲糧以待彼􅀺庶者父母妻子所仰之身愼毋􅃍驅之鋒鏑下又慎毋以􅂾十年來朕所頼西平哱賊東平倭南平楊酋諸渠帥一旦漫置之荒漠之野俾進退失據而若等􅀒濫首之謗于天下㢤夫然後技精而氣充見可而進知難而退庻収萬全之效又奈之何無知人之鑑衆言揺亂又不克折衷如樞臣以邉才薦楊鎬夫鎬者敗群之羊駕而復馳義不可許天子曰允㦲汝諧閫以外􅀅軍制之首輔方從哲以腐枝持大厦天下寒心而天子以為忠命之曰進止機冝汝實代朕詔諸邉以作朕􅀅軍之氣由是紅旗督􅀾三路䘮師大􅀅􅀂劉杜軰一旦云殂餉竭財匱而邉難益􅀤賦加民貧流㓂乘之土崩瓦解禍􅀤于天啓崇禎之代惜哉當萬暦朝天下方全盛倘任得其人而章疏又無中閼之象寕有兹患㦲故曰欲天下乆安而常治在乎財贍而兵強欲財贍而兵強义貴乎主之􅀎知人与善聼言又論曰顯皇帝􅀩襲承平享國長乆恬熈蘖釁坐蹙彊土卒貽􅁇世之患豈真委轡失馭㢤帝之所患在于智術有餘􅀚世太熟而有厭薄其臣下以為不􅁕當吾輕重長短之意夫人主者天下之大身也大小臣工其心膂股肱耳目也身之所能以不用為用者為幸其心膂股肱耳目之所自愛而収其用人主幸其臣之自愛其道德也而収其啓沃之用幸其臣之自愛其功名也而収其諷議之用幸其臣之自愛其冨貴也而収其勤勞敬慎之用今吾一切土苴置之談笑麾之曰是纍纍者牘人之情僞盡知之矣是􅀅矯拂其君以楽居于隂陽禍福之間而重􅀗其名髙厚實以自利焉吾姑勿與為喜怒可否以無令窺吾短長緩急以便其身圖而亦使知玄黄水火之無用也而矍然其自已嗚呼使人臣盡撤其名髙厚實之􅂅人主誰復與共天下者㢤且人臣委身筮仕必不能舎其道德功名冨貴以獨立于無事之地明矣既不􅀗邀君之喜怒可否以効其用􅀔必横溢四出以嘗試而求勝而焬灶之徒坐起而収之于是一時之短長緩􅇥不在人主而在人主床第醉飽之間威神隂蝕不与同盡抑巳鮮矣自昔朋黨之盛莫如東漢及宋元祐熈豊間方其大􅁠在上諸君子挾其道德功名之志與營據冨貴之小人爭勝于人主之喜怒可否而力持于消長之介人主雖不􅀎盡别其淄澠而靈爽所及常居中而互収其用及夫主聰既塞􅀼命者乘瑕鬻􅁠節義禮學之氣散而求聚不能遂上殿之争而從事穴中之闘畢期焦爛卒殄國祚由此觀之凡有血氣莫能􅁯争一薫一蕕猶有餘􅆨人知熹廟委命上公不惜挈其心膂股肱耳目以投刑餘之一燼而不知非定陵四十餘年之留中不省彼痿痺思振之氣亦何至橫溢難禦甘蹈清流之覆人亾􅀖瘁無辭階厲哉蓋帝􅀄亦自任其智術謂不為人臣之所用而孰知有從旁而用之者之禍至此烈也嗚呼古之以不用為用者非大智孰能當此乎又曰治天下之道譬猶弓然更張太驟則一弛而不復収神廟􅀄年中有母后外有貴強相綱紀振粛是時也􅀂弦方張􅀂弓在檠天子冲齡敬恭師保亾敢侈度恣情以貽慈聖􅁨及江陵相卒而朝講漸疎批答漸􅆡人心風俗漸委靡百司庶􅒼承江陵操切之餘楽于寛弛而自便宰輔大臣深懼􅄃􅁠任事之名而務為委順謙光之習上不敢忤天子而下不敢讎庶司當江陵相時天子若􅀒芒刺􅀂嚴師傳江陵一死而唯諾􅀅順者共矯江陵之所為深居九重稱朕不聞誰復正色而紏哉故貽神廟末載隳􅆸之􅁨者實江陵當國時􅍾之太急有以致之也江陵固才相罪不掩功使彼當柄時稍知以恭謹歛其傲而以柔道劑其剛毋以恣愎失主心毋以束濕賈衆怨天假之年久在相位而從容調爕務為萬全善後之圖主德以夾輔而勵精政化以乆道而不變政成請老薦賢自代使守畫一神廟一朝之治豈不始終備美㢤而惜其不出此也交驩馮保以結宫闈假母后以鉗㓜主凡平日握權專断徑行無阻㓜主固已悒悒不快矣特制于母后而陽尊禮之一旦時移􅀔改􅀤攄夙憤䟦扈臣死恨晚尔寕復念其勞績而遵成盡乎盡改其法理固然也人情強其所不甘至于太甚必有悱然欲變之情神廟天性純柔江陵事之以操切以嚴濟寛相輔有功而無如其難合也申王軰継之瑟琴專一如水濟水大􅀔痿痺而不可返矣以若臣居幃帷而奉深居拱嘿之主然猶闢土夜郎振旅寕夏用兵海􅀖威行絶域雖驛騷中土勞敝士卒而文武大吏頗能敵愾天威所加㒺不糜碎是實江陵操切之成效也豈神廟深居拱嘿二三相臣唯諾順承之所能致㢤且非持三征也神廟􅀄年江陵用殷石汀平嶺東用曽􅃀菴平都蠻用凌雲翼平羅旁徴調或􅂾十萬拓地􅂾百里而所遴擢才臣名􅀅立功邉徼者不可勝􅂾三征特籍其餘威尔乘令行禁止之􅀔加以山壓卵之兵什圍伍攻其愁不克帝始能委任江陵大綱振舉雖恩禮不終亦􅁕警後􅁠姦之圖假托者末年倦勤堂陛不交政務􅆍閣醸数世叢脞不振之􅁨然忽置繁􅃈而大事能断􅄖容士夫而􅉏御􅋺息􅂾十年間九重髙拱中外􅁨疑太阿獨持未嘗旁落廟號稱神豈不信夫又曰神廟于世事無所不濡緩而尤莫緩于建儲建儲之緩一阻于􅃩妃之煽二激于衆議之淆三惑于宰相之無定識􅃩妃之煽衆議之淆猶可言也宰相之無定識不可言也天子不能絶衽席之寵而有立愛子之疑所頼大臣正色百執事昌言而顧乃持迎合之􅀃以奸大統並封之掲王太倉得辭其責􅁘雖勉狥公論儲位卒定而遲之􅂾年議論煩多猜沮百出馴至三案之訟幾貽黨錮之􅁨邪正既分水火遂激其原皆為國本而神廟所以遲之不决致開天下之疑者實太倉先入之言為之祟也彼慿寵匹嫡者猶惮􅄹廷之議即小臣交章天子殊厭忽不理宰相一言天子所籍以資剖畫庻司百僚所恃以囘天聼而蚤為逢悦之策天子安得不厚自觧免而有詞于天下哉及後來悔過矢力挽囘而終不能掩並封之誤也大臣當國欲定危疑决大事而進􅀃于人主可不慎乎且自來朋黨之禍未有不起于􅄖柔不断之朝者也人主英明是非立剖刑賞不淹賢者無所開號召之門而小人亦無所為植黨之計其次則天子寛仁相臣明决猶能渙群和衆而不使日滋諍議之端萬暦􅀄年門戸未熾以江陵為之相也嗣後建白繁興衆言淆亂九重拱嘿而不聞大臣叩閽而莫應君子懷杞􅁨而讜論莫申相率有孚號同志之心小人蓄姦䛕而刑憲無章亦競圖黨邪醜正之事國家一有風影之疑糾紛之事君子倡大義而建言小人肆讒􅀃而傾正貌君子者亦欲借事以邀譽附小人者不惜違心以狥􅀻百年之間朋黨之􅍔竟与國運相終始始于争國本極于論三案而敗于攻魏璫忠臣節士肝腦􅂗地名甚正心甚苦而事甚難其中雖有敗􅀋而不􅁕為衆正累其嫉君子者當論國本時已窃窃然倡調停省事之說以圖定策邀冨貴刺訊君子而摠㱕其罪于好名理亦近似殊􅁕蠱惑天下之聼聞及逆閹横行濁亂海内所抗章犯難而振髙岡之鳴者䆒止一二圖定策邀冨貴之君子而碌碌調停省事者方且奴顔婢態入逆閹之門而施下石之毒也至是而猶欲以好名排議君子而快小人之心是尚有人心也㢤嗚呼使神廟蚤定立長之計毋􅁸天下易儲之疑浮言既息論辨自消必不遺兩朝邪正傾軋之患諸君子罹􅍔不􅁕惜而後之門户日以紛攘議論益多事功不講而馴至于隳敗是非神廟􅄖柔不断之所醸􅍔乎由今追昔不無志感焉且以警後世也
