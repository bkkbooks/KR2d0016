front:
  text: 嗣善刑訊之進朝恐誣奏嗣善索錢肆虐職官命嗣善同進朝下法司問給事中周永春疏因一近侍而䖏縣官此屈縣官執法之心長近侍驕蹇之氣慚不可長乞􅀅嗣善免行提問不報大學士葉向髙請􅀘户禮二部尚書言户部事務最急者如各邉請餉無人給彂各䖏解銀無人批収如咽㗋哽塞一切飲食出納皆不得通最為困急礼部則頒暦賀冬皆其所典如進貢畨夷六七百人遂至停􅆡不􅀎􅀤遣留一日費光禄寺一日供給此関係最急疏入不報吏部侍􅀰孫継臯卒贈禮部尚書無錫人時娄江有女仙化去乞為之傳固謝不敏曰天子春秋􅂦盛事出大臣家􅀔且上聞吾恐安期羡門之説從此興矣人服其逺識十一月壬寅朔泰寕等衛屬夷各求加賞准各加三表裏衣服一襲以為夷人効順者􅂆時冬雪不䧏命順天府竭誠祈禱以聖母萬壽詔今歳暫免行刑十二月壬申􅃋大學士葉向髙厯疏辭恩命上􅄖詔答之不允閣臣葉向髙請撤回承天守備太監杜茂茂縱􅂙隨劉文藻藺光􅁉等肆横承天知府馮勞謙拘光􅁉等禁之茂遂訐奏勞謙上令文書房官傳諭照碑文岀㫖向髙因言皇祖􅃯諭雖有守備官校事犯重大奏請䖏治之文而光􅁉等平日􅀁為士民怨憤已甚廵按官經過其地遮道􅂘訴􅀔甚洶洶恐致生變令該府官先行拘繫而後奏聞此􅁠冝觧紛保安重地之計非得已也擬􅀅文藻光􅁉觧送法司從公䆒問勞謙奪俸改調杜茂必須取囘不報乙未皇太子第五子生命名由檢是為思宗皇帝母選侍劉氏是為孝純皇后是年原任大學士王􅃬爵卒贈太保謚文粛􅄻其子尚寳司丞太倉州人癯然若不勝衣而强毅方正江陵奪情事起錫爵以省親乞㱕人謂相君不知有父而君顧省父以形其短乎錫爵曰吾知有父遑惜其他後江陵敗人以􅅮擊為名髙錫爵獨調護其間士論多之上雅重其品書名御屏署曰清正眷注獨隆爵遺疏奏言近日祖宗舊章漸至于凌替國家大政多廢于因循邉方之釁隙已萌財計之空虚已極人才之擯棄可惜民心之嗟嘆可虞伏望首勤儲講以重元良速􅀤章奏以振朝綱備設官員以理國事収廢棄之才以從人望罷抽税之使以慰民心節禁廷之供應以􅁉資儲捐帑藏之積餘以濟荒乏惟皇上採擇而断决焉臣雖無路號天亦含笑入地矣上覧奏嘉其忠愛萬暦三十九年辛亥正月壬寅􅃋吏部請考察日期兵部請考選軍政日期原擬正月二十八日聖諭以在二月􅀄二逾􅂾日又不下大學士葉向髙題考選軍政國家所以振粛紀綱修明戎秩者惟此六年一㪯之舊章已經両月未􅀩允􅀤外弁乘之為非人心因而疑駭矣吏部奏國家無任情破法之官常臣子無趋易避難之職業謹條八欵用禆銓政其一申明查補乆缺之例一申明轉􅀤文慿之例一申明進表囘任之例一申明䨇月查慿之例一申明患病改限之例一申明扣缺寛限之例得㫖嚴行申􅅚遵守給事中宋一韓奏東厰之設所以防壅􅀤奸非以籍􅀔肆蠆成化時陳凖提督止緝大盗不問有司細事至今傳為羙談乃太監李浚􅀝任群小表裏為奸冨室大啇肆行需索乞賜斥逐别選公忠持重者安京師以安天下報聞二月原任武昌府同知今繫獄卞孔時以父故疏請釋放奔䘮不報孔時因忤稅璫陳奉被逮大學士葉向髙亦為之請併請釋滿朝薦王􅀖才不省南京刑部尚書李楨不候命下擅自出城上切責之大學士葉向髙因言楨由真病似難過責舊制大臣四品以下官請吿每一疏即允三品以上再疏三疏至四五疏而極並未有十餘疏猶不聼者年來大臣得諸者百無一二至如輔臣李廷機部臣趙世卿皆覊留􅂾載疏至百餘閣臣旅棲于荒廟部卿候命于近郊今尚書孫丕掦李化龍又以考察軍政不下相率求去若復踵楨􅀁為成何紀綱故欲禁諸臣之擅去必先體諸臣之去留可留則留且行其言以安其身不可留則聼明自裁断母事虚拘則臣子之進退得全而朝廷之體統不失矣􅈇撫李三才出境有㫖准去漕事命摠河劉士忠兼挕虜犯蘭州三月御史金忠士等疏言今日行政雖有机務多端疏壅决流摠在章奏一􅀤因列為七􅅃一曰儲教之疏冝下二曰枚卜之疏宜下三曰補大􅒼之疏冝下四曰催考選之疏宜下五曰起廢官之疏冝下六曰釋纍臣之疏冝下七曰撤稅使之疏冝下不報大計京官工科給事中㱕子顧疏言東南賦􅃥莫苦于北運其受累之甚一曰水脚之侵年二曰沿途之需詐三曰交納之留難而其遲延更不堪者則漕􅂳虐阻之也夫軍与民均為王臣一銖一粒皆皇上所頒賜而享之者也獨奈何而公􅀻視之何不嚴為令甲雖五府之中裨得隨到隨行即􅈇艘未過閘何妨民艘之先過也或先或後聼其自便要以不違限為主如此則五六月風波之險既不能及而十一二月守凍之費亦可少省矣兵部尚書䔥大亨卒臨清人乆歴邉郵延􅄃􅓪度凡地形險易軍儲􅄹縮􅀅吏􅀎否虜情向背皆洞若燭然當西陲主􅀾東事主欵皆与石星牴牾雖嚴㫖切責而卒不奉詔其持平秉公盖如此四月庚午准以安靖為隴川宣撫司命多思譚仍以土同知恊理又責成南甸千崖兩司保任從兵部尚書李化龍滇南善後議也削御史金明時籍為民明時奉命廵関吏部侍􅀰王圖之子為寳抵知縣明時疏劾之其中偶犯御諱尚書孫丕掦以聞聖意甚怒即令定罪葉向髙為觧之擬䧏級再下改票削籍聖怒始釋自明時黜論丕掦者藉藉矣刑部主事秦聚奎閒住聚奎論劾王圖孫丕掦結黨欺君假公害正申救金明時及与察湯賔尹等七人丕掦亦􅂙聚奎撓亂察典上􅀤二疏及湯賔尹等訪单命内閣㸔議向髙言煌煌察典二百餘人無一人干犯而聚奎獨有此疏則後來恐無人敢任怨主持至于湯賔尹等列名察典亦􅁕示懲若復下所司窮治則茫無了期似冝只考察䖏分惟亟下考察及年例推陞各疏庶人心定而大典光矣上曰秦聚奎􅄭行奏訐褫黜閒住湯賔尹等照察推陞疏及處分察疏即檢􅀤怡神殿災命隴鶴書承襲鎮雄府土知府爵從廵撫喬璧星議也五月京城大水長安門一􅅁皆成長河水􅅧五六尺時春夏乆旱二麥無収正喜得雨又復過當苗稼盡為損傷山東河南兩廣皆大水大學士葉向髙請留北直􅀠山東山西河南稅銀一半令地方官多方賑濟許之大學士葉向髙尚書李化龍侍􅀰䔥雲㪯史継階副都御史許弘綱各疏求罷吏部尚書孫丕掦以考察為人攻擊乞罷不允王圖辭闕岀城大計報允時王圖為吏部左侍􅀰北察凡非東林者必去史継階為南京吏部侍􅀰南察凡非東林者必留先是史記事于察典未行前極論内閣自時行錫爵一貫􅆳廷机衣鉢相傳􅀅及顧天峻并論沈思孝周孔敎等迨察典既舉御史金明時名在察中尚留中未下遂上疏攻王圖及史記事徐縉芳又疏攻圖及李三才顧憲成丕掦怒明時撓亂大計先以疏中字犯御諱擬明時罪明時復疏攻掌察科道湯兆京曺于汴已而秦聚奎疏攻王圖以救明時舉朝分為二黨羣􅁸交攻攻東林者以王圖顧憲成李三才為首攻之者金明時秦聚奎葉國縉鄭継芳朱一桂王三善周永春徐兆魁姚宗文髙節王萬􅍈張鳯彩趙維成徐紹吉㱕子顧馬從龍周逹王紹徽張延登趙興􅀖亓詩教孫光􅁉田生金吳亮嗣官應震劉廷元張銓毛一鷺趙宗孟韓浚金汝諧劉光復攻非東林者以顧天峻湯賓尹䔥雲舉為首攻之者史記事李炳恭湯兆京丁元薦徐良彦馬孟楨胡忻呉炯張養正喬允升沈正宗洪文衡李廷華曹于汴吉人賀烺李朴錢春周起元劉策李徴儀宋磬吳良輔魏雲中孫居相劉宗周朝廷紛若聚訟大學士葉向髙掲以丕掦留放不敢擅擬請裁断上曰孫丕掦公忠介􅀡着出温㫖勉留供職䔥雲舉許弘綱都着即出以後各官不得立黨植􅀻紛紜攻訐貽􅍔國家違者重䆒六月兵部尚書李化龍奏􅈙左無䖏不守當以欵而佐􅀾甘延兵􅀔甚勁當以􅀾而固欵此其大凢也一言以蔽之曰勿恃欵勿忘􅀾而已合通行摠督鎮撫嚴􅇂文武􅀅吏􅂙酌近日虜情實心料理隨事整頓詔秋防事冝寔心整􅅚毋得怠玩致悞軍机命侍􅀰李汝革署户部事七月工部侍􅀰劉元霖言錢法凌替謂􅀻鑄之禁以其與國家争利􅁠也惟平價以市銅啇賈無惮于官買而􅀻買者自息八月禮部侍􅀰翁正春恭献萬壽八箴援金鑑錄之意一清君心一遵祖訓一振國紀一信臣􅒼一寳賢才一謹財用一恤民命一重邊防倉塲摠督孫瑋以􅈇儲遲緩奏言通德二倉去京師不逺若河氷未結暫以貯之不妨漸致所省陸運之費不貲以舒應龍為兵部尚書提􅇂京營戎政林烴為南京工部尚書九月丁酉􅃋摠督薊􅈙侍􅀰王象乾奏報􅈙東大㨗􅈙鎮自有髙平之㨗虜始震叠求􅅃其後狃􅅃􅁯􅀾虜遂驕横強要市賞至于􅂾萬外庫不敷仰給中帑粆花盤踞鎮城東北居兩河之中有九子之強加宰賽煖兎之助左可窺􅈙瀋右可窺錦義廣寕歴年以來每入犯即要挟每挟即加賞既已題明革賞頃七月間紏衆要挾我兵擊之頗有斬􅀗盖不知我之驟􅀎􅀾也遂㧞營而遁于額力業居焉二十九日天鳴鉋震粆花驚赱再徙過老河距邉幾四百里許而其第三子色特笑父之弱由額力業而南移之可可母林之間圖便入犯哨探已明撫鎮道臣豫戒以待虜前哨入邉果為伏兵斬之又出邉對敵追之白雲山共擒斬三百四十餘名口逺近諸夷聞之皆遣使騐貢辨罪秋市諸部如黄台吉以兒鄧等接踵叩関願伐粆花認罪求欵此関于􅈙鎮安危之機甚大也下其章于兵部南京户部員外曺師建接􅃹銀庫清查西庫該銀一十六萬零止存一十四萬六千萬少銀一萬二千兩尚有老庫未盤事聞上命離任者聼勘待賍有㱕着後分别輕重議䖏按東西老庫三庫錢粮不下􅂾十餘萬厯來相沿舊規未有差滿不交盤者而起自荆之􅄾􅄾聞訃吿㱕接􅃹劉可法亦付不問後遂踵為故常師建窺知其弊鋭志􅁵奸乃始覺察荏苒十餘年祗慿􅁓上空言百萬錢粮竟尔委頓法紀廢弛弊孔多端一至于此御史張􅀖俊請増浙閩秦魯四省解額事下部議己酉皇貴妃王氏薨皇太子生母也薨時秘不外傳越四日閣臣知之為請乃宣禮臣奏上合行事冝奉㫖炤世廟貴妃例行部言歴查我朝皇貴妃薨逝俱未有誕育東宫者惟憲廟淑妃為孝宗敬皇帝母世廟康妃為穆宗荘皇帝母然其薨逝時皆未封皇貴妃未經冊立東宫當其禮儀俱擬從厚况今皇貴妃既膺封典皇太子冊立東宫已乆尤天下臣民觀望所繫禮儀更當加隆謹條上請既而􅀤引無期礼臣疏請上命翁正春同各官詣天壽山看得東井一地覆奏報可户科給事中韓光􅍈言瑞王婚禮自傳㫖下部今已三年徒以錢粮不敷遂致稽緩今戸部辨進金寳珠石已及七萬當此九邉吿匱四方吿灾帑藏如洗必欲如御用監原估二十萬之􅂾俟之何日請卜期㪯行不報兵部尚書李化龍言國家用人理財原非二道納級拜爵原非典章迩來武途冗雜奔競成習痛加裁抑尚未戢止况加納紛紜幾無虚日至于摠兵􅂙􅀅等官既由阿堵納用則臣之推陞銓選更以何爲今分别應行應止列欵覆請乞命户部一體遵行上是之朝鮮連歳送還漂海人口盡係通倭之徒兵部覆准盡􅀤西北極邉充戍虜犯髙家堡殺掠革㳺擊劉國鎮周一䕫任十月􅃋閣臣請上視朝不允時孟冬禮冝頒暦輔臣上掲奏請謂皇上御極頒暦已四十次而聖壽適逢五十聖母又􅀅届七十乘此頒暦之期御文華延見羣臣維新庶政上竟傳免給事中周永春以畿輔灾傷言自太監王昇按􅅕加稅每􅅕原徴一分以上者俱加至三分此監銀所由始也一地二粮民寔重困自加稅以來連年􅀅部銀拖欠其監銀雖有完納不過移觧部者以觧之時和年豐猶冀畏法輸納今地無寸壤粮從何徴昔猶賣男鬻女今兄弟妻子離散而無可售昔猶典屋賣室今房屋地土衝壞而無可質昔猶称貸富户今富者貧貧者迯而無所貸乞􅀅本年監銀未徴并拖欠銀兩俯賜特免至部銀除議徴一半及徴六分外其未徴暫從停徴酌俟豐年免一分民受一分之賜緩一日民􅀗一日之生疏入留中虜酋粆花東紏卜言顧伯要兒等營西紏哈喇漢乃蠻等營入犯清河官兵截殺之潰去申􅅚邉方吏治事冝雲南撫按條上四欵一曰方面􅂆懲兵備道臣請照九邉例保留加銜乆任其􅀄補也務得資望相應以盤錯别利器其陞遷也間以邉腹互轉以調劑平人情一曰有司陞取請以進士貢舉酌量道里逺近相兼選補政成之日行取推陞視腹裏務加􅄖異一曰斟酌䧏調言雲貴兩廣用兵之地四川山陕隣邉之所守廵郡縣多用衰頽䧏調整刷難前凡遇缺出請選道里相近才力􅄖長之人除補另筭資俸􅂭以陞轉一曰體恤卑官言土司吏目驛丞䟦渉險阻人不願赴請行各撫按可裁者裁可併者併或官難議革就近報轉仍于隣近風土相冝除授上曰邉逺地方関係更重近來選授遷轉不得其平以故人情厭薄官偷民困無以称朝廷軫念逺方至意依議實行不得因循玩視復成􅆍閣工部題請皇極殿門擇日􅆆柱以便明歳接續興工時左右二門已建皇極門以方向不利緩至于今做成木料日乆漸朽一木之費常至􅂾千金甚為可惜故以為請户部尚書趙世卿乞㱕久候不下不待報而去十一月丙申􅃋兵部尚書李化龍奏請叙賞薊鎮宣大閲視功次故事閲視之典三年一舉以勵邉􅀅前此一畨已經􅆍閣今次名為三年實六年矣且九邉一體不可異同甘粛之㨗功叙而延綏獨否陕西之閲視已叙而薊鎮宣大獨否此非但人情因此觖望而揆之政體亦俟不平且所叙督撫如蹇逹馬鳴鑾劉四科連標霍􅉇等相継已物故河清難俟人壽幾何可勝嘆息十二月丙寅禮部奏採訪暦學精通之人疏入留中侍郎䔥雲㪯以廣東按察司知事周道昌建言牽引繳印求放上曰雲舉鴻學正儒今大􅒼乏員節旦臨近命即出供職兵部尚書李化龍卒長垣人化龍在􅈙連破虜卒以破倭既又平播拓地􅂾百里至治河秉樞苦心深計隱然稱中朝宁石焉播既平上問輔臣五等之爵輔臣執謂此典乆曠有三中丞六七大􅀅莫与適也事遂􅆍卒年五十贈少師謚㐮毅命刑部尚書趙煥署兵部事上以􅈙東警急命戸部􅀤􅈇折銀十萬兩太僕寺􅀤班價銀五萬兩南京兵部借銀八萬両戸兵二部共七萬兩赴觧以為募兵充餉之用并命修復屯田以助兵餉廵按􅈙東御史熊廷弼奏請行屯田法自陳以常平法積榖至十餘萬而繕城砌䑓修濠築墻為􅈙人建􅂾十年之例上温㫖褒答
