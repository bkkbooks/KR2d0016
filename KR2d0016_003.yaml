body:
  text: 貞皇帝本紀帝諱常洛神宗皇帝第一子母恭妃王氏萬曆十年壬午八月十生姓孝敬寬仁動容中禮出御講筵舉止凝重儒臣進説經旨旁通大義時主鬯未定福恭王母鄭貴妃最幸愛廷臣不無私憂屢有以批鱗得罪者然神宗深念國本愛護周詳而上益小心謹畏父子間慈孝浹洽雅宫闈近幸莫能窺也二十九年十月立為皇太子四十八年庚申七月二十一日丙子神宗大漸丁酉以大行皇帝賔天告于奉先殿發喪發督金一百萬犒九邉且諭父皇特念遼東九邉文武將士勞苦憫恤至意三軍間之歡聲雷動罷天下礦稅撤回太監張燁馬堂胡濱潘相丘承雲等回京其見徴在官稅銀解進兵部尚書黃嘉善請所解者應以本年七月前巳徵者為定毋更以拖欠擾民從之諭內閣父皇遺言皇貴妃鄭氏待朕有年勤勞茂著進封皇后卿可傳示禮部查例來行左侍郎孫如遊言詳考纍朝並無此典其以配而后者乃敵體之經其以妃而后者則從子之義先帝念皇貴妃之勞苦當不在無名之位號殿下體先帝之心亦不在非據之尊崇夫善繼善述當裁以義疏入未報戊戍頒大行皇帝遺詔于午門改兵部尚書黃克纘于刑部督倉戶部尚書張問逹左都御史各疏辭不允升三邉總督張鶴鳴兵部左侍郎補邉省各撫臣贈故兵部侍郎楊應聘尚書賜廕已亥再發帑銀一百萬與戶部充遼餉命别部不得分用并前犒二項共給腳價五十兩毋騷優驛遞丗留滯太倉差官即發按遼左軍與芻餉匱乏稅畝再加物力巳竭尋間事例旋議摉括在折計無所出日以內帑為請先帝不豫米之省也而上養德青宫慮周庶政故特發帑金云申罪臣托辨之禁先是候勘總兵李如柏李如楨具疏辨罪皆擅自投進通政司姚思仁參其踰越祖制上是其議令犯者聼該司參治命考選散館各官悉遵遺詔輔用即日下巡按巡視省直鹽務諸差并南京巡視各差凡五十員辛丑刑部以熱審請奉令旨允行開釋者六百餘名輔給吏剖尚書趙煥恤典煥歷官有清望以伏闕請帑見忤而卒至是部請允之壬寅臣民三上表箋勸進令禮部擇日具儀西酋來貢總督崔景榮報曰西酋卜石兔雖擁王號而力不足以制素囊先是四十六年來邉因素囊不至遂爾空歸竟未貢市今卜酋巳到邉而素囊與其母忠順夫人尚無啓行之期彼急此緩將素之狡詐多端恐卜之羈旅不耐欵局不能保其無變雖鬪穴止在彼中而延林恐及我地防範不可不倍為嚴謹貢之遲逑可不論也已而素囊卒不至甲辰上以天氣炎熱邉臣暴露疆場忠勤可憫賚經略侍郎熊廷弼總督文球巡撫周永春巡按陳王廷及總兵等官銀幣有差仍賜諭奬勞戶部尚書李汝華開查九邉一十三鎮官兵暨總兵家丁并召募新兵共八十八萬合復犒銀一百萬雨乙已募南京浙兵三千至京師按遼邉告警募兵之使四出有司逢迎意指責里甲計户出丁而皆雇募地方不由上著中途逃散仍責本籍勾償壯丁僉點孱弱代更究竟邉塞無兵而內地徒滋紛擾召駙馬都尉王昺復職昺先年以疏救劉光復為民至是大學士方從哲請乃復泰昌元年庚申即萬曆四十八年也禮未踰年不改元因八月之詔既以明年為泰昌元年九月之詔又以明年為天啓元年于是禮部侍郎孫如遊集廷臣議曰萬曆之後即天啓繼之則泰昌之號虛而無寄冝以今年七月以前仍稱萬曆之號八月以後改稱泰昌既不虧神宗之全曆亦無妨天啓之改元庶統系分明人心允愜從之八月丙午朔上即皇帝位詔告天下曰維我皇考大行皇帝奉天臨民四十八載乾綱在握解澤旁流淵穆端居而慮周海內化成九道而誡切日中方埀恭已之衣忽陟上賔之馭顧命神器卑于渺躬仰遵彌留憑几之言俯循臣庶纍箋之請宗社大計弗獲固辭兹于八月𥘉一日祗告天地宗廟社稷即皇帝位永惟皇考啓佑之深慈嗣服覲揚之匪易有懷兢惕若涉淵氷尚賴文武親賢一心一德唯是邦家彛憲是訓是行屬兹蒞祚之𥘉冝渙維新之號其以明年為泰昌元年大赦天下與民更始命吏部用人毋拘資格凡有才能卓異即便破格擢用其養病致仕各官年力未衰素行表著者量材起用吏部尚書周嘉謨奏言建言廢棄并礦稅詿誤諸臣已遵遺詔量用其事關國本抗言得罪降黜謫戌永錮沒身者乞召用恤録上曰此卿部事也可即酌量行之罷開納生員歲貢事例督學御史周師旦極論教化之地先由賄進將人才國體其所決裂者甚大乞罷餉納事例部覆從之御史馮嘉會疏言自古撫軍字民莫急吏亷將義近者邉腹之吏濫訟取鍰積榖折價征糧索耗十分取二甚有以稅契為利藪以找價為竒貨闔境追呼雞犬不寧九邉將吏剝削公行冒破取利月餉時剋隱軍扣銀甚致軍士衣不蓋骭菽不厭口願奔外夷以為樂土請敕所司以後武臣剝軍責在督撫文吏朘民責在司道撫按與言官所摘發俱嚴行追併押發濟邉不但懲貪兼可助餉上是其言虜犯石塘路攻白馬關馬家堡馮家堡諸處禮部奏新主臨朝萬幾攸繫乞少節哀情御門聼政詔以十二日行丁未以吏部侍郎史繼階南京禮部侍郎沈㴶為大學士入閣辨事閣臣方從哲疏言皇上維新庶政輔理之職斷非一人能辦繼階與㴶先帝欽點急冝允用仍乞敕部會推庶群賢並進而政本不孤得旨先點二員允用吏部再推見任在籍素有才望者簡用停江南織造南直巡按田生金言改造假匹一運之供已費三年之料價則二運尚且難完三運費將安出當今民力凋疲入孔既難出孔冝節乞賜停止以濟國用以蘇民困從之戊申諭內閣啓建皇極門殿以文華殿窄小百官朝賀班列不便也時遼餉愈急大工起建有司莫措乃允工部請發內帑二百萬刻日興工詔考選散館各官俱令實授直隸巡按田生金請改折廣德州漕糧謂其地四面阻山不通舟楫征銀于本治市米于外江運赴宣城水陽鎮交兊騷費萬狀乞敕户部議折起解官民兩便得旨仍改折三年已酉侍郎孫如遊疏請册立皇太子給事中楊漣亦以為言上曰遵遺詔于釋服後舉行擇日具儀來奏欽天監以九月𥘉九日吉請行册立大典從之命截􅒩十五萬石豫傋遼東海運從督餉侍郎李長庚奏也起升原任吏部侍郎朱國祚禮部尚書庚戍起升郎中鄒元標大理寺卿御史李宗延光祿少卿馮從吾尚寶司卿參議朱一桂太僕少卿輔周曰庠太僕少卿起升御史劉光復光祿寺丞起復編修林釬原職給事中薛鳯翔上時政二事一曰內旨當慎願自今一切旨意務發閣臣票擬隨覽隨頒庶無假借之患一曰留中當防願自今一切條畫務勤乙夜觀覽隨覽隨發庶無隔礙之患至于閣臣贊襄枚卜尤重資格非可拘于內外巖穴亦可豫于旁求不報命原任户部主事鹿善繼復職先是善繼以遼餉告急借發金花五萬兩被黜吏部屢以為請從之吏科給事中周朝瑞降調朝瑞奏言慎𥘉三要一曰信任仁賢二曰推廣行仁言遼左索賦正急冝留金花不盡之餘省內庫無益之積務使吏卒霑恩誓滅夷寇三曰斥遠嬖侒上以金花銀兩原係舊制進內以傋典禮等費節用之難減者朝瑞要譽妄言降一級調外任閣臣疏言皇上蒞政方新人心望治甚切銓部起廢之疏隨上隨下朝瑞一言即行譴謫殊非政體之平且主事鹿善繼蒙恩復職借金花者業及寬政議金花者獨蒙嚴譴亦非一視之仁相應免其降調奉旨惡其阻絶國用不必申救辛亥兩廣官兵敗倭于烏豬外洋福建海寇袁進聼撫巡撫王士昌奏聞令立功海上自贖起升原任都給事中鍾羽正太僕寺少卿郎中饒伸光祿寺少卿主事秦聚奎光祿寺丞都事劉文炳尚寶司丞知縣滿朝薦刑部郎中主事萬建崑南禮部主事羽正以論儲教降極邉伸以論輔臣王錫爵子衡不冝中科為民聚奎以言湯賓尹不當考察致仕文炳以沈同和場弊論輔臣吳道南降謫朝薦以稅璫梁永訐奏詔獄放還建崑以憂危竑議妖書事妄牽為民者也科臣惠世掦以朝政一新人情共鬯言君子小人之進退關係國家治亂而小人不退則君子不進猶之蟊賊不去嘉禾不生也時論偉之御史張潑言雷同非國家之福要在同心體國則意見自妄爭執自化是非不明則爭明則止乘勝之過至于不能容人主張之過甚至不能自容則亦何益之有上是其議命以後言官務皆同心體國毋彼此紛爭致傷和衷之誼癸丑御史黃彥士疏新政十事一曰隆孝思一曰攝聖躬一曰備輔導一曰勤政事一曰通言路一曰起廢棄一曰振吏治一曰謹閹寺一曰嚴武傋一曰固邉防不報御史舒榮都疏奮乾綱振積習言遼事𥘉興起楊鎬于田間而以李如柏佐之非為戰也本無戰情彌縫衆議就中之微意既不可以告人各路之傳宣似有心于賣國鄭之范一察處縣令耳寅緣入遼虐佟鶴年致養性外叛以陷開原起劉國縉于贊畫縻餉十有餘萬一朝逃脫冝乘此時一加大創以洗從來積玩不報敕陜西四鎮督撫嚴率將吏分布信地加謹防秋兵科給事中魏應嘉等請肅禁門出入并放老廢宫女不報甲寅吏部尚書周嘉謨開例昔年為國本建言得罪諸臣王得完等三十二人科臣周朝瑞亦有疏云盡人而起之猶恐偶遺即日而起之猶為濡滯就使疲癃尫羸均冝沛之寵異以俟其自陳又旦暮古今并當議其贈恤以報諸身後豈可令引領賜環隱身綿上賫志長沙也哉有旨議用由是廢間皆起一寺卿二至十餘人幾于貂蟬盈座御史馮三元陳勸成德政五事一曰永孝思一曰養頥養一曰勤講學一曰容直言一曰蚤教諭釋罪宗充于髙墻以疏救劉光復禁錮五年矣總督􅒩運王紀以為言命赦出之改兩廣總督右都御史許弘綱為兵部尚書協理京營戎政升漕運侍郎王紀戶部尚書總督倉場陜西巡撫李起元兵部左侍郎總督陜西三邉軍務兼理糧餉山東巡撫王在晉工部右侍郎總督河道以山東永平道兵備按察使袁應泰為右僉都御史巡撫遼東代周永春給事中李若圭陳新政五事曰保聖躬定聖志勤視朝開經筵慎枚卜不報乙邜上不豫召御醫陳璽診視大學士方從哲疏起居言皇上至性哀毁又值典禮殷繁聖體過勞以致虛弱少加調攝自抵萬安且十二日為御門視事之𥘉十三日為常朝第一日伏願加意珍攝以承天眷上曰所請御門已知常朝暫免俟調攝稍愈擇吉行延綏兵逃時遼左用兵取盈十八萬調發各鎮省精鋭充之應募率多市人而統伍半為老弱紀律素寬驍悍競起袁大有督延鎮兵至昌平一夕解者七百餘人所至流劫招之不回捕之無策至捕官李承芳見殺叛形成矣兵部言大有領兵階厲叛卒如陶言浪子輩首罪冝誅逐路招回拿獲如陳順邉明等罪有輕重應聼延綏撫臣梟首示惡仍押招回逃兵赴遼大有提究以肅軍政御史鄭宗周疏言不問李如柏之失機而問袁大有彭象乾之故縱何以賞一人而千萬人勸罰一人而千萬人懼哉議者韙之錦衣衛掌衛事駱思恭請選補旗尉從之丙辰萬壽聖節詔免朝賀以大行在殯也御史鄭宗周疏陳時政一曰充仁義祖宗金花銀萬原為濟邉陛下仁覆無疆積者尚渙之使出輸者寧忍其復入冝省剜心敲髓之難以壯士飽馬騰之氣一曰明賞罰人情姑息久已將驕卒惰試問三路敗􅗮誰人借箸誰人傳檄進則有死而無功退則有生而無罪封疆孰守乞下部金花銀兩儲太倉以備邉需應勘諸臣正典刑以震天咸疏入不報給事中韓繼思奏選賢枚卜二事言勞于求賢乃人主之盛事而慎于選擇尤延攬之深心今起廢以次舉行矣為公家而建大節與為私見而分異同者品望難昧會推以次得旨矣守紀綱而率資性與工反覆而趨附和者才具自明大賢大用小賢小用果不肖亟棄之則賢哲不滯下􅒼不肖不至雜進矣不報遼瀋旱飢經略熊廷弼請豫處芻餉章下部覆丁已上御文華門視事畢傳諭閣臣曰朕今蚤御門見班行隨從有執灑金大扇者回至省愆居聼有散班官髙聲前訶朕臨御之初朝儀豈容褻慢可傳示各官務加敬慎違者參治御史史永安敬陳交濟之道略曰皇上至仁浩蕩大政流通人臣當不諱之期奮敢言之氣曰諷曰直何所不可顧未相機冝妄希披瀝設為未必有之事過為不必然之防欲以成聖明之善反以疏堂陛之交是進言者之過也夫人臣當自靖者有二一曰嚴童奏之體寧簡勿煩寧顯勿隱指陳一事逹其事而止劾一人肖其人而止明白正大俾萬幾之暇一覽無餘斯章奏之體也一曰矢獻替之忱言官因事納言非欲言而索事言期于利社稷不必矜名節言期于明是非不必附清流使朝廷得受言之利而人臣無進言之名斯獻替之帎也至若𢾗年鬱結一旦邅逢體下心而茹納之所望于當寧者亦有二尊嚴之下稍有逆耳誰不神懾溫旨而詢和顔而受乃聼言之道冝然是御下之威冝霽也人有瑕瑜言豈無醇駁聼其所可聼以沛江河之決置其不可聼以示山澤之虛乃衆思之集冝然是兼收之益冝弘也如是則明良喜起唐虞即在今日矣奉旨所奏進言納諌有俾交濟之道下所司知之庚申蘭州黃河清凡三日給事中楊漣奏申明禮制四事一曰正朝廷嚴肅之禮言年來防衛廢池出入無禁皇城之內摩肩掉臂午門朝見雜遝無童甚之班行拜起未終喧闐如市豈成法紀當責成該部及巡視皇城錦衣侍御等官查明憲典嚴加整飾一曰通君臣接見之禮言視朝而外冝復祖制午門朝見之儀凡機冝要務與閣部大臣委曲靣啇下至庶僚分任答應庶惰窳知警職守無曠一曰明人臣進退之禮進退貴干自決黜陟取乎宸斷自今凡經彈劾即冝覆核如屬風聞不妨昭雪若罪狀可徵則分别議處即卿二大􅒼邉腹督撫當以國家事權為重以臣子體面為輕冝去者去冝處者處無槩從格套曲賜勉留一曰申章疏入告之體今百官奏對盡入御覽當申飾臣􅒼入告之文務在情辭曉暢言簡意盡庶舉措有童勸懲不爽疏入不報辛酉議大行皇帝尊諡曰範天合道哲肅敦簡光文章武安仁止孝顯皇帝廟號神宗先是內閣擬諡顯宗恭皇帝廷論未愜兵科給事中魏應嘉曰恭乃先朝末運帝諡于先帝大德不稱乃改今諡欽天監奏擇九月𥘉四日恭上册寶從之大學士方從哲言聖體未愈伏望清心寡欲以葆元氣又請皇長子移住慈慶宫選老成謹厚內侍付以阿保之任時與諸臣候宫門外俄傳旨朕以頭目眩暈四肢軟弱不能動履待宣御醫召卿等來見給事中王繼曽疏言遼陽飢荒可憂內地冒破當議冒破者有二一曰召募之兵每募一人安家行糧官剋八錢強者入募弱者候門頂買已更姓名逃歸復煩勾攝今召募在遼者巳十八萬則自後可無募也一曰海運之舟遼海運艘底平板薄非乘風破浪之具必創為尖底如閩廣啇船乃可無患今發造淮陽者既耗八萬金于無用則造舟尤冝酌也遼地亢旱聞山東小米大收每石值銀三錢請那太倉銀十萬給與沿海州郡收買小米其次莫如招啇蓋發糴召啇上納必有逋負之弊不如令啇自為生計能運米萬石入遼者官議重賞其次莫如屯田令宿重兵所在聼邉海自屯永不征其入有水道可通者外深溝以防禦內引水以溉田庶為兩便奉旨下部命户部主事鹿善繼𬋩理遼東新餉户部題新餉一事物力竭天下而安危繫遼左舊止稅餉四百餘萬今益以新餉五百餘萬並收一庫既覺未便一司目檢而手算之亦拮據不遑非以專官總理不可因舉善繼可任從之壬戍御史鄭宗周言聖躬違和不勝驚懼伏祈皇上抑情養性起居有節珍重保護嚴擇御醫仍勑諭閣部大臣二員科道官各一員每日恭詣便殿候安嘗藥將聖心日清聖躬日固宗社靈長之運胥在此矣不報宗周又與刑部主事孫朝肅徐儀世皆上書內閣請調護聖躬册立東宫諭禮部加恩在京文武群臣軍民人等輔六月大選戶部尚書李汝華疏言國家惟正之供自合輸將度支出入之經何取朽蠧如各庫所入者其據為窟緣為市漏為巵者何可勝言當敕巡視官親核其𢾗寬勞民于外解酌改折以濟邉此救時之急著也奉旨工興需用浩煩又各衙門典禮急需爾部酌量緩急遵詔折徵四十八年以後各省直仍派解本色應用不必差官查看順義王卜石兔下畨僧喇麻請給敕命豫之以登極詔命翰林院編修劉鴻訓禮科給事中楊道寅往朝鮮開讀御史馮三元疏陳邉事略曰法有積敝不可不除人以應卒不可不傋民之剝也資官為甚則事例為之濫觴也軍之剝也債帥為甚則職方為之開竇也起家于資惟賄是求將以債取寧無剋剝至若遼東一事天下視以安危今羽檄徵兵飛芻挽粟水陸兼輸調募並用原膏火自煎秋􅕙易盡此立罄之術也兵貴善謀豈必待十八萬𢾗足而後有為哉經臣别有長慮非職所知據其告病之辭似亦強弩之末伏乞敕簡才望可任邉事𢾗人分列六部內為贊襄之助外為不測之需一但有急取資左右不致張皇失措不然疆場重寄祗此一人非萬全慮也不報甲子定封皇弟瑞王于漢中府惠王干平陽府桂王于東昌府惠王乞改荆州桂王乞改衡州從之命禮部左侍郎何宗彥劉一燝右侍郎韓爌俱禮部尚書兼東閣大學士入閣辨事左府都督僉事鄭養性疏請收回皇貴妃封后成命久之乃允乙丑起原任大學士葉向髙于家以南京禮部尚書朱國祚為大學士入閣辦事戶部督餉主事楊嗣昌疏論餉源言臣觀淮比之民飢搶紛然至于江南洶洶嗷嗷竊謂今日不獨有事遼東師行糧食當思結局抑且顧瞻閭左民窮財盡當講開源物極必反閭閻有敦本尚實之思而不能以匹夫之微丕振風氣道窮則變戶部有提綱挈領之務而不能以一切之法遍合時冝是在省直撫按諸臣隨地講求當身幹辦以足食者足兵𥙿民者𥙿國或庶乎其有濟也不然遼事一日未息新餉一日難停今百姓尚知討賊尚可催科將來只恐百姓自已作賊誰為我用今日理財二字不冝諱言君臣決當猛省而後民生可厚國耻可雪疏入下部升禮部左侍郎孫如遊本部尚書丙寅諭免永順宣大山西等處逋稅及通灣房租戊辰上御暖閣召內閣勳爵部院大臣吏科河南道官至御榻前諸臣親聆天語問安論藥以閣臣從哲請命皇長子出見諸臣回奏天資英偉社稷之福上大悅虜犯甘肅副總兵薛永壽千户馬永祿等拒却之庚午祭夕月壇遣恭順矦吳汝胤代獻回奏陪祭者寥寥僅六人上怒嚴旨切責議上皇妣孝端皇后及聖母皇貴妃尊諡先是上以將屆祔葬祔廟之期諭禮部擬諡至是議進孝端皇后尊諡曰孝端貞恪莊惠仁明嫓天育聖顯皇后聖母溫肅端靜純懿皇貴妃尊諡曰孝請溫懿敬讓貞慈參天㣧聖皇太后欽天監奏擇于九月二十八日大行皇帝同聖母梓宫發引從之給事中楊漣疏陳聖躬違和之由保攝萬安之法略言十二日諸臣見天顔頓減不似登極之𥘉十六日奉有不能動履之諭各相驚駭不知其故十七日大選內官出言違豫之故因知外庭所傳進御不節流言絶謬乃是崔文升用藥差誤所致冝發司禮監究問處分并祈召皇長子同諸王子承顔導喜于前以發天性之真和又擇一二通書吏大義內臣誦説古聖帝明王通快可喜之事以清宸聼自獲勿藥之慶又接都督僉事鄭養性懇改封后成命之疏此一事也祖宗典制難干聖明當已有裁決得旨朕母皇貴妃進封皇后朕遵皇考遺囑昨允養性所奏已輟旨不行外庭不得再行瀆優其御藥房提督崔文升已有旨皇長子擇有端人朕已知之給事中魏應嘉疏刑賞治天下之大法而尤重于用兵罪辨李如柏李如楨喪師失地詭辨幸脫此而不誅是謂無法乞逮下法司鞫問明正典刑不然大吏驕蹇文武全軀兵擕餉匱內患將至不報御史左光斗請賑遼東飢寒言遼左荒旱米粟踴貴不患無銀患無用銀之處惟急截􅒩糧二十萬石乘風汛之便運至彼處此救荒苐一著也征調各兵夏秋過都匪惟無堅甲乃更無寸縷久戍客兵轉盻隆冬請發帑二十萬勑户部令亷幹司官速置布花解赴給之此又救寒第一著也不報户部請添設海運兵備駐扎淮安往來津閘間專理運事從之諭禮部議加恭靜端懿溫惠元妃郭氏及昭肅恭和章懿才人王氏尊號先是上謂內閣曰朕妃郭氏才人王氏俱侍奉年久朕念其勤敏各追封為皇后部臣疏謂皇上登嗣大寶元妃冝進􅓻尊之名元子正位青宫才人應酌加封之典得旨議諡禮部請相度元妃墳園并議才人祔葬事冝有旨王才人祔葬從容詳議具奏辛未上疾彌留召大學士方從哲劉一憬韓爌及英國公張惟賢尚書周嘉謨李汝華孫如遊黃家善黃克儧左都御史張問逹都給事中范濟世楊漣御史顧慥于乾清宫上御東暖閣倚榻憑几皇長子侍立諸臣問安畢上命諸臣前連云朕見卿等甚喜又云朕在東宫感寒症調理未痊值皇考妣相繼大喪典禮殷煩悲傷勞苦所致皇長子承旨再申前諭上又諭册封選侍李氏為皇貴妃尚書孫如遊言二后封諡東宫册立諸典禮當次第舉行諸臣叩頭而退戶部尚書李汝華言遼地亢旱既極軍民倒懸可虞遼東經歲需米豆二百萬石今時值旱荒非復截􅒩召買不可以濟旦夕上曰截􅒩及召買米豆俱依議行內外諸臣務皆同心共濟無得爭執推諉致誤軍機加大學士方從哲少保改户部尚書武英殿仍賜銀蟒上命吏部加恩東宫講官范謙等三十五人見任在籍者優擢起用其故者恤廕以示念講幄舊臣之意開定陵隧道遣侍郎王永光行禮右諭德張鼐疏請調民力以裨邉計言自遼左用兵竭天下而供一方兵無了局民無息期徵調絡繹百屋晝驚則有援兵之苦兵符火速派戶千丁募卒在逃里排連坐則有募兵之苦荷戈忍飢亡命山谷倣徨無歸彎刀相聚則有逃兵之苦而又出山海關外其蕭條風景即同鬼方塞草連天膏膄無穢民安有田土官牌夜呼使事如織防護迎送酒漿供傳民安有暇日鞭驢駕牛循環往來間關趨挽頃刻靡停民安有剩力強軍設防弱運趕運大户供辦小户貼錢民安有藏蓄城堡雞犬無聲亭障村煙斷絶不可不賑恤也賑恤之法莫大于墾荒田而廣開種皇上誠捐𢾗十萬金而勸之耕俾小民牛種有本雇募有人東作有時各肆力南畝不半年而禾黍成熟人人飽暖此遼東持久用兵之長計也至于屯田之事亦備矣募兵屯種苐一策也遊食之人募之戰則散募之耕則就矣建置田官而專責其事則事易成又一法也擇將而屯使所領衛兵耕作而兼訓練又一法也揀兵而屯摘戍卒不任戰事者俾事耕稼又一法也蠲除子粒而屯凡拋荒空地不拘軍民土客盡力開墾永不起科又一法也免罪而屯釋贓罪吏給之耒耜牛種而歲收粟以省度支錢又一法也賜官級而屯但能多墾田幾百畝即授以官仍賞賚之又一法也臣觀遼左之費用如大海中外之運輸如逝波亦安有了期而得不為中國根本計哉若夫經臣熊廷弼分兵屯練選將用人和睦行陳愛惜軍士扼吭搗虛出竒制敵亦望皇上並千璽書內責成之疏上下所司詳議具奏甲戍上再召輔臣方從哲等十三員于乾清宫諸臣問安異上仍諭册立皇貴妃從哲等對以册儲原卜期冝移近蚤峻吉典以慰聖懷上因顧皇長子諭曰卿等輔佐為堯舜又語及壽宫輔臣以皇考山陵工有次第對上自指云是朕壽宫諸臣言聖壽無強何遽及此上仍諭要緊者再因問有鴻臚寺官進藥何在輔臣奏寺丞李可灼自云仙丹臣等未敢輕信上即命中使傳宣諸臣退出可灼至同進診視上命進藥諸臣復出令可灼與諸御醫啇確未決輔臣劉一燝言其鄉兩人同用此丸一損一益非萬全藥禮臣孫如遊言此大有關係未可輕易上命趣之諸臣復入可灼調藥進上飲畢曰朕欲少休諸臣出宫門可灼各御醫留日晚出輔臣邀詢之可灼言上恐藥力歇欲再進一丸諸醫言不冝驟傳趣益急因再進訖至次日五鼓宣召急諸臣趨進而上以邜刻上賓矣九月乙亥朔上崩于乾清宫戊寅頒遺詔曰朕以眇躬嗣登大寶夙夜祗懼罔敢寧居于凡用人行政遵奉皇考遺命力疾舉行哀勞交瘁奄至彌留定𢾗莫移考終何憾但念朕纘承洪緒煢疚方新志業未就所期纘述端屬後賢皇長子茂質英資克荷神器冝蚤嗣皇帝位其守祖宗彛憲親賢勤學立政安民朝講一遵典制寇婚擇吉蚤行出入起居倍冝兢慎左右侍御務近端良內外文武百執事之人同心協贊永保基圖朕從皇考在天之靈陟降鑒觀于志畢矣喪禮依舊制以日易月二十七日釋服毋禁民間音樂嫁娶宗室親郡王藩屏重寄不可輒離封域督撫鎮都布按三司官員地方攸擊不許擅離職守間喪之日止于本處哭臨三日進香遣官代行衛所府州縣土官俱免進香詔諭中外咸使聞知上在位一月壽三十九十月上尊諡曰崇天契道英睿恭純憲文景武淵仁懿孝貞皇帝廟號光宗明年九月葬慶陵論曰有天之天有人之天國步艱難賢皇短祚以歷年之延促而杜稷繫之安危者天之所為人謀不得而與焉也長君無祿鼎湖踵泣抵巇樂禍之徒窺伺急于呼吸幸而國靈未墜嗣命方新爾時之賢人君子喜功者不可乘之以為功愛名者不可因之以為名苟其乘而因之為功名焉者小人將有以抵我之巇而樂其禍之所自始何則熏鼠者滋其傷騎虎者難為下以非常之功名而欲誅人以亂臣賊子之實以成之其重而不反者幾希此則人謀之不藏而未可咎天之殄瘁人國也方貞皇帝潛惕青宫閲有年歲妖書未已繼以挺擊慈父孝子之心幾無解于氣節功名之口賴神廟深幾持重貞皇委蛇遵晦天倫樂聚遂鞏苞桑假令當日嫌疑株引先發為謀夜半之啼易工慱望之瑕可伺雖使忠義之牘歎為知言所傷已大國家事變之至固有談笑弭之深于號泣者誰謂聖哲之聰明不邁越倫等哉貞皇大漸選侍褰衣促封雖出兒女微情勢同劫制楊忠烈率先排闥扶正宸極即吕端之升殿審視韓琦之當御撤簾捧日之烈昔人何以逺過向使書笏無慚埀旒有象推宫車簮履之寵泯掖庭怙逼之嫌恩至義盡誰得起而媒其隙者乎夫當邦家不造洊告閔凶閟厥雌晨正我龍見大臣處變當然情非得已若夫麗劍之疑追傷國本嘗藥之討重損正終即令片言伸義二廟在天之靈猶或無辭隱恫奈何披繩無已聲討盈庭亂賊之追有同窮寇一時玄黃之侣亟籍神叢甘心反獄諸君子猶得以駢首遊魂告無罪于萬世設使焬灶無靈亨升在列允厥執言之義引經附律將而不免不至赤驪戚之族磔崔慶之黨喋血宫府驚震山陵其勢固有不可已者不知諸君子又將何以處此語曰不為不可成不為不可復諸君子挾其忠正之氣一往不顧以居夫不可居之功名幾于自發殺機至與社稷同盡又自悲矣夫以貞皇之盛德天錫閲歷艱虞賢姦之辨既清名實之塗將厲當神廟之末諸君子懷忠莫效散成方隅標格自矜劘情鋤擊至于封疆坐蹙而泛然莫任其責幸而神明長世衆正彚征必將厲厥威神以收其旁溢之氣覃核厥施幹扶大命何至猝悼號弓漫甘從穴徒矢懷于鸇逐同懲禍于雉離西曹之血肉方飛東境之烽煙旋逼而國事抑已去而不可為矣詩云君子實維秉心無兢誰生厲階至今為梗嗚呼此亦諸君子既定之天也而責其人定以勝之豈不悖哉挺擊論論曰小人托言省事而刺􅏺君子為好名故為首鼠兩端為寒蟬為仗馬為隟中之觀鬪雖喋血剚戈之變交乎前彼方泄泄觀望圖便利自脫免而有發難端倡大義且羣咻之以為立異傾危戕奪之謀所以屢見于當世也嗟乎安得𢾗好名者而發憤扼腕昌言其間哉以青官嚴重地而狂夫白掊歷階而上如升虛邑當事者詭為宫闈過慮混擬風癲欲死一張差以滅口王之宷首為執言遂犯群怒噫獄情雖隱始讞為定彼初鞫張差者劉廷元也迹若風癲貌實點猾􅌂為謾詞以媚宫闈而持兩可以逃公議公議熄則風癲已足畢其説公議沸則黠猾巳先發其端甚矣廷元工為身謀而不知千古之大義也使差而果風癲也何難質言以告主坐以本律尸諸東市足省後日之紛呶縱有疑者而癲形可驗萬目共擊况有薊州移文在當日儲宫􅌖音亦止一決孰能于決差之後以縱賊不討罪廷元而奈何妄言黠猾以啓通國之猜阻也哉使差而果黠猾則嚴刑訊鞫務得情實儻事由鄭氏則據實上陳以待君相之善處瞽瞍殺人臯陶不能隱也况斤斤為一妃戚諱傾儲之大惡乎即使差實黠猾而欲以風癲文之以息大獄省株連全骨肉亦冝確言風癲不贅他詞而囚差以待上旨或大廷公驗而以薊州原申曉萬衆速為處決可塞衆喙木有隂持兩端首鼠自便曽不慮隱憂過計之士蜂起而乘其後也是役也有不可知者四有無可奈何者三有萬難懸斷者二神廟雖無奪嫡之私而不意有並寵之迹册立遲遲普天憂憤安知非姦人圖僥幸事成而歸罪成濟不成則以風癲解此不可知者一幸闖門及階僅傷內豎萬一僵寶瑟觸殿柱此時庸庸諸臣亦不過籍口省事塞默而已震器坐移隱姦孰發此不可知者二人謂弒逆之舉祕若鬼蜮胡不為反斗淬七劔俠飛行之叵測而徒恃一狂夫寸挺白日蹈必敗之地不知鄭國泰輩庸而狡以為徒手舊摶且假風癲覬自解免此不可知者三禍變固難料趙穿弒君而天下以疑趙盾許伯病薨而天下以咎世子又安知非事出偶然適中其會遂成大疑而不解此不可知者四母愛子抱自古道之即令倉卒禍中前星失耀神皇安肻究貫髙之主謀信江充之窮治儲位默移百㖨何賴此無可奈何者一况復頸血不濺副車空擊癲語滿篇事如風影欲窮究主使如王之宷將必族外戚去愛妃除親籓太子多羽翼已成之勢神皇有食寢不甘之憂虧孝傷慈申生季札之所不為也而何以為君此無可奈何者二縱事有主名猶難徑遂今徒煆錬一妄男子髣佛子虛亡是啽囈號呶有所攀指人誰服之此無可奈何者三且事出意外理非習覩以平日猜嫌之形揣摩幽隱側目鄭氏十人而九我欲排天下清議而執風癲為是是偃然媚愛妃戴藩王仇儲宫逢君惡惡聲駢至為世僇人雖有安全調護之苦衷誰其諒我此萬難懸斷者一我欲發姦摘隱而斥風癲為非又必蔓連宫闈震驚宸御人臣無雋大夫之經術張廷尉之持平而以臆決天下事幾何其不弭禍而激禍慮患而釀患也哉此萬難懸斷者二以四不可知三無可奈何二難懸斷此千古之疑獄也而當時不以為疑橫口所談紛然聚訟一則曰翼東宫一則曰圖定策一則曰全骨肉一則曰媚宫闈我敢一言劑之曰執法紀者不得不請窮治以折姦萌而安國本秉國成者不得不務包荒以全大體而慰君心是時諸法司未聞侃侃持正者僅一王之宷倡言不癲不風有心有膽大臣不言而小臣言之衆惡其立異也共指為籠絡張差教導言語夫既可籠絡可教導是其人誠不風癲而劉廷元所云黠猾也乃復以之宷為矯誣不已過乎首輔方從哲噤無一言以調護主持幸神皇剛斷立決張差兼斃兩豎聖明舉措自異恆常而我終疑其太弛蓋神皇實有旨嚴究主使恨臣下奉行不至僅以龎劉當之使更殛𢾗人以寒姦膽而後一主休息以全國體杜禍源三案可一案決也而惜乎其未及也彼藉口田叔治梁獄然叔必索羊勝公孫詭乃為奏解豈漫無指究亟函燒梁獄詞哉論曰三案何昉挺擊昉乎不知非挺擊昉也咎在神廟不早立太子艷妃煽處愛子並統積纍醖釀以開天下之疑而貽禍遂若是烈也人心惟無疑則已一有疑則載鬼得堡影響猜二皆足以淆衆慮而發難端而况宫門之挺奮擊于前寒熱之劑妄投于後封后埀簾之語溷優其間耶此時忠臣義士不得不奮呼疾爭以破姦邪之膽朝廷不得不持重調護以圖鎮定之謀嘗稽古儲二之變亦往往有之非上有明主下有心計臣不能維持而斷決焉漢髙愛戚妃欲易太子當日張留矦燕居深念假重四皓太子得不易而漢髙不失為明主所謂羽翼已成者豈畏四皓哉誠心指留矦輩也唐德宗愛舒王欲易太子當日李鄴矦委曲進説以宗族保太子太子得不易而德宗亦不失為明主秦政廢扶蘇時任姦相李斯扶蘇安得復漢江充譛太子時任愚相劉屈氂太子安得白神宗建儲稍緩三王並封王太倉悔過挽回功不相掩申相乘便從臾有勞大分已定異變猝發是時秉鈞實屬方德清既不能造辟納牖以啇善全之術復不能審機冝速斷決以破天下之疑徒一疏再疏以了故事幸神宗剛明宸斷逺定召群臣見太子拊摩慰諭出于至情隨磔三凶葛藤立斬宫闈絶驚疑之患中外泯指摘之端從哲身都鼎鉉獨不能早出一語以定國是耶即曰君臣疏隔蔑從請命彼慈慶對臨良會難逢天語藹然如家人父子從哲頗蒙眷注未聞發攄胸臆苐唯唯將順𢾗語未終逡巡欲起如此大臣人主安得不厭倦安得不疏隔安得不深居髙拱叩閽不得哉神皇外示沉默內藴機明召對𢾗言琅琅神斷誠令首鼠者無所贊一語故三案終始溷亂惟挺擊一事雖乏心計臣猶得明主開誠心斷衆惑差快人意及後紅丸移宫茫無主持紛呶日滋黨論遂亟一則曰圖冨貴再則曰圖定策舉公正發憤之士一綱盡之而位降揆宰者坐受􅏺彈若罔聞知嗚呼天下非有暴秦之釁而宫中不無指鹿之姦笑死戰者無保身之智而甘戀位者享庸庸之福以視秦斯漢氂相去幾何哉夫負大臣之名莫效維持之力而更結奧援以傾衆正昌言者為邪黨附和者為同志玉之宷以考察黜孫慎行以病免馴至楊左之獄慘極今古未必皆出自從哲實從哲秉國成時持不斷之議以開群枉之門也吁人咸謂神廟深居簡軌毒餅鴆爵何事不可為而當廣廷稠衆指稱九方上逹宸聼明言露詞播間遐邇圖不軌者若是乎故曰謂從哲弒逆必不受也逮夫鼎湖既泣普天悲憤從哲不能阻妄投于前則當伸國法于後使可灼藥效則立冨貴藥不效則膏鈇鉞令後人不敢以人主身命圖僥幸即念其愛君意本無他庸醫殺人罪冝加等乃不誅不罰而膴賞是頒衆議譁然擬旨溫遣遂貽紛紛之論曰從哲弒逆乃從哲言可灼進藥之𥘉曽令與勳戚大臣議明已非專決是以弒逆之罪嫁諸大臣也賞可灼謂旨出自帝是以弒逆之事嫁諸嗣天子也病狂喪心周章失措何怪一時忠憤之士感激過當而附和之徒一倡百應從哲幾無完膚乃崔鄭諸人反若晏然事外者非從哲處分失冝以自取戾而弒逆實罪卒無可措耶瑣尾之徒從而言翕訿祖挺擊時力主風癲故智厚為從哲解且厚為可灼解自謂省事而不知已列于姦邪矣又何辭烏獨是明末積習大臣一被論輒杜門輒乞骸骨角巾歸里從哲為舉朝攻訐幾無以自容非止紅丸自挺擊聚訟彼已儼然久秉國成矣而靦顔朝端曽不遜避請封移宫猶挂彈章徒供士大夫唾罵謂非有奧援不可也然究之不過一不學無術戀祿固寵之庸人爾位遵品猥衆惡攸歸紅丸票旨倉皇顛錯呶呶群起曰從哲弒逆從哲弒逆是未足以服從哲也論曰國家不幸有姦臣尤不幸有庸臣姦臣決裂禍速而易見庸臣醖釀禍遲而滋蔓彼姦臣者謀必已倡權必已擅禍亦必已受庸臣謀不能倡也而能和權不能擅也而能附身不必受􅍔也而喜嫁祻方從哲庸之尤也可灼未召之前奏請謹醫藥矣而可灼既召之後知丸之不可進也而任投不測之餌且姑令與多官議也何為及進藥帝崩謬賞可灼藉曰先皇遺命奚不可力沮之嗣君也然則從哲非直庸也庸與姦參半者也其請謹醫藥之疏非忠也若曰我苐投此疏後雖有不可知我可髙臥勿問也曰嚮固已請謹醫藥也令與多官議非慎也若曰我既有此議後雖有不可知我可髙臥勿問也曰嚮固已令多官議也其賞可灼非誤也若曰此旨傳自先帝主自嗣皇宰相不過奉行尺一也噫所貴有相臣者定危疑決衆慮若網在綱弓在檠罔弗振肅匡敕也烏用此首鼠兩端茫無定畫之相臣為哉且非第紅丸也挺擊之變迫于人言一疏再疏以了故事也移宫之議迫于人言一揭再揭以謝衆責也封后之事不能效引燭焚詔之李沆而姑查例也丁已之察不能效力救唐介之文彥慱而噤不語也約略平生大概多左右牽顧之情鮮獨斷果行之勇有濡遲畏事之意無昌言犯難之心蓋自張江陵任事攬權一敗塗地後之繼者務以張為戒寧為模稜為伴食不敢私自振刷以招威福自恣之疑所謂不倡而和不擅而附操養拙守雌之術處群疑衆難之時坐使國是日淆謫責交萃挺擊移宫不過以濡緩被議而紅丸之進可灼之賞誅心者徑起攻之以弒逆乃始嫁之會議諸火臣卒嫁之嗣君之令旨而已無與故曰庸與姦參半也然而究竟庸也彼姦臣也謀必已出權必已擅禍亦必已受即為莾冀之毒成濟矦景之逆事止一身惟庸則不敢為非常之事而善養成非常之祻且善起天下非常之疑及事起而自居無罪分責于人必不肯首發一議獨行一斷而天下已孰窺其肺腑也則從哲之謂也國家之大不幸也移宫論論曰當光廟之在青宫也孝端皇后已賓天而鄭妃實有奪嫡之漸熹廟之未正位也孝元孝和皆蚤逝而李選侍實蓄專制之心况聞選侍乃鄭氏之私人也鄭氏以母愛子抱之勢駸駸乎有奪長之意特憚公議礙祖制而止邀求封后志頗叵測所營不遂而不能得之于身者仍欲得之于選侍使選侍慿寵日貴一旦有大故侈然母位之尊挾制嗣君上無兩宫尊重之勢以壓嬪嬙之寵又無長君英發之望以懾柔暗之姦外無威重大臣侃侃正色以寢宫闈之覬覦選侍尊而鄭妃益尊兩姦相濟箝幼主布羽翼結外庭除異已垂簾稱制勢亦冝有縱曰李氏無當年吕武之雄黠然加以鄭氏三十年宫寢蟠踞之姦交煽為虐何所不至况大行已崩嗣主未立而竊踞天子之宫坐待名封之及藉使踞宫不移封號蚤定而嗣君即位將仍居慈慶宫乎是以當陽英主避先朝一嬪御也將同居乾清乎是必母事選侍而盤踞益堅縱不能效埀簾稱制之為而自居保護恩私之素連通鄭妃互相眩惑禍曷可窮且選侍移宫之日逼嗣君即位之期此而不移更于何日乃持邪説者曰宫自當移寧俟迫而後移吁至是而尚謂迫邪持邪説者又曰選侍不聞命不敢擅移吁謂選侍恭順如此耶選侍方將力阻嗣君使不得見諸大臣而肻虔候嗣君之命退處别宫耶及廷臣交章楊左憤爭始得即日搬移之旨選侍失勢故踉蹌而徙避爾使選侍無異志知大體大行既崩啓聞嗣主乾清尊嚴非一介官妾所冝據乞遷别宫以終天年嗣主因而擇善處加優禮以全先皇之愛情義交盡何至紛紛且考神廟大婚慈聖皇太后亦必遷宫以避宸居之重何有一未封之選侍况熹廟是時年已十六大婚期近何籍選侍之撫護而戀戀不出也哉當日倡議力爭肅清宫禁諸臣不可謂無功也而迹其行事亦不可謂無過古大臣安國家定社稷必孤行一意而不作緣于群小方熹廟之任慈慶也宫闈隔絶必得內臣之知事體者傳道語言參詳批答而王安實其人也諸臣非王安無以知李氏之悍恣非王安無以道意于嗣君非王安無以處分于宫寢中外應和實有其迹重以汪文言佻輕小才奔走承悅諸公遂入其彀中王安既斥全局漸變汪文言一敗而淪胥溺矣向使諸公不假王安為奧援如宋韓琦立英宗故事約顧命諸大臣直宿宫門旦夕請見擇柔謹內侍從容善辭以移選侍于别殿毋致驚惶迫遽有傷嗣天子篤念先皇之心既移之後泯然無言殷然加意不必一諭再諭暴掦選侍之過惡以滋天下揣摹之惑即有姦人欲翻案肆誣涅必不能以交結內侍植黨居功為諸公罪也計不出此而因緣習熟竟貽小人口實夫楊左諸君子烈烈孤忠豈有意攀援中貴而事會所邅適然相助其迹若私而意實公也寧慮事定之後言翕訿之口起而媒孽其短長哉彼夫功名之士當事機之會牢絡權姦以為我用有不必屑屑較邪正而慎交通者諸公皆氣節之士也植立最髙建𥪡最大必不稍假借而令後人有遺議乃以千秋氣節而效功名之士之所為使仇口誣衊正人短氣吾不能不為諸公致憾云論曰國家不幸而有大故內有母后尊隆之勢則庶孽不敢萌異心外有大臣嚴重之威則宵小不敢營私竇光熹之間鼎湖再泣坤寧無母儀之貴台閣鮮威望之臣長孫嗣統類昌邑之清狂庶子承藩多如意之窺伺一二宰輔大僚庸庸保位小人乘間巇擇枯菀實繫有徒非臺省諸公昌言扼􅒆沖齡嗣主托在宫嬪隱𧈟伏姦孰可意料縱家法森嚴萬無他慮得不啓天下忠臣義士之隱憂哉移宫之舉楊左之功可揭日月也而卒來居功之謗竊疑諸君子亦有可責備之道三焉外廷孚號共持大義移宫旨降選侍自無敢違者而王安汪文言可不必作緣一也選侍一孱婦爾不逹事體亳無籠絡光廟在時慿寵恣肆則有之無能為也埀簾稱制談何容易諸君子慞惶太甚聲號太急幾以為吕雉復生武曌再出二也移宫之際尚宜委婉恩禮兩盡乃逼期候旨情事倉惶此不過遷一舊宫嬪爾胡為紛紛三也有是三者遂貽宵人口實指為希圖定策借事邀名且舉挺擊紅丸建言憤爭諸臣一網盡之夫事關國本由來有日憸壬欲入人罪何患無辭而顧持苛論蓋古大臣奠安宗社從容沉靜大紛大疑片言立決不示人以張皇之態及事定而口不言功處錞養默不貽人以非議之端三案諸君子誠其人也然未免感憤過當姦邪側目及事定又不能默默屢疏自鳴且為同輩鳴挺擊為王之宷也紅丸為孫慎行原心誅意之文大節克全忍施吹垢索瘢之論乃議論激而水火分意氣興而朋黨立君子斥小人為邪小人亦斥君子為邪吾夷考之挺擊之變辨風癲者惟王之宷而主風癲者十人而九紅丸之議窮主使者十人而九而寬可灼者惟方從哲移宫之役安嗣君者十人而九而安選侍者惟賈繼春何紅丸移宫執言盈廷而挺擊持正之少也挺擊有神皇以主持于上勢不能去愛妃族外戚而戮藩王兼之慈慶召對群疑立剖之宷感憤發姦不可無而蚤斬葛藤亦未為失也至可灼以御躬而試奇藥選侍以宫嬪而抗嗣皇隱姦竊發長此安窮中外危疑孚號共厲是時亟倡危言以破姦膽猶慮不能弭後憂而乃有咡嚅持異議者是尚有人心也哉方從哲賈繼春之罪不勝誅也而賈繼春尤甚何也繼春之入都門在移宫之後而疏請安選侍在群姦之先自謂宫既移不可無此説以全天子止孝之名不知欲傾衆正者得繼春之説而緣附之翻移宫之局立貪功邀利之名以眩沖主之聽聞而二三君子坐賕追贓遂莫救夫血濺獄門之禍彼方從哲不過誤爾及大漸而懼纍已因寬可灼以為自寬地其機尚淺其流毒尚微自繼春疏上而諸君子禍機遂伏且始疏猶謂酌情禮盡私恩不無輔于聖德乃後來被召上言肆詈楊左且云天地不容祖宗必殛乞定爰書以布中外敕纂修以昭史册要典之作倣佛黨碑是時楊左諸公骨碎血舟而繼春何猶忍厚誣若此繼之者范濟世也濟世于移宫時實選蠕蓄異心及繼春有疏屢進𢾗揭汲汲以封選侍為辭縷述先帝之遺言歷𢾗王安之詬誶詞旨委瑣肺肝若燭當日楊左未敗御史霍鍈猶以清正目繼春即左光斗亦以端謹推濟世且以賜環遺繼春為憾是豈欲牢絡異已母樹我敵抑雨人肺腸不易即識耶蓋安選侍者楊左之素心也特未早發爾使諸君子于移宫之後即請封選侍以遵先皇之命成止孝之隆則賈范輩何所挾以肆其讒請寬選侍之侍御以見沒身之敬則劉朝等安所激以變其局不幸而為兩人先發遂使焬灶巨姦借題害正一則曰圖定策功也一則曰借事邀名而陷天子于不孝也一則曰植黨納賄也一則曰與王安汪文言中外交通也一二寡識者或遂謂諸君子意氣太激畛域太明有受禍之道夫以逆璫滔天之焰楊左輩獨奮不反顧𢾗其罪而攻之殺身不悔是豈有功可圖乎名可邀乎黨可植而賄可納乎藉曰結納王安為權利也使媚逆璫權利當百倍于安而何為冒死不顧乎悲哉諸君子大節凛凛而猶不免無識之疑是亦見自比于姦諛設淫詞而助之攻也豫觀三案于紅丸一案殊邑邑竟亡善斷獨于挺擊快神皇之處分移宫悵楊左之竒烈不禁吁噓而不置云哲皇帝本紀上帝諱由校光宗長子母選侍王氏萬曆三十三年十一月十四慈慶宫泰昌元年九月𥘉一日乙亥卯時大行皇帝崩諸臣哭臨于乾清宮畢即同英公張惟賢閣臣劉一燝等於文華殿慰問隨行稱賀擇即日午時登極奉令旨有郊祀諸大典禮未行于禮未協其令禮部即速具儀以聞復傳旨大行皇帝未造寢陵司禮監同內閣禮部堂上官與同欽天監官往天壽山相擇具奏𥘉四日吏部等衙門周嘉謨等疏請李選侍移宮旨令擇日行御史左光斗疏言內庭之有乾清宫猶外廷之有皇極殿惟皇上御天居之惟皇后配天得共居之李選侍既非嫡母又非生母乃儼然居正宫而殿下乃居慈慶斷斷不可者倘不早決斷將借撫養之名行專制之實武后之禍立見于今日誠有不忍言者兵科給事中楊漣疏登極在即必無天子居東宮之理况以天地神明之共主即兩宮聖母若在亦必加以皇帝尊稱今選侍目無幼主稱曰我哥兒安得此大不敬話又李進忠劉遜魏進忠等擅開寶庫盜取珍藏豈必盡取先朝之有而後出宫乎移宫一事斷在今日奉旨命選侍移居噦鸞宫禮科李若圭疏為殿下之正位在即先帝之年號當請恭惟先帝登極之詔以明年為泰昌元年今殿下登極則明年正月𥘉一即為殿下紀元之始宜以今年七月終止稱萬曆年號八月𥘉一起以至十二月終改元泰昌禮侍孫如遊以為於理允協傳示中外臣民遵行欽賞閣部大臣英國公及吏科都給事河南道銀幣有差又賞鴻臚寺李可灼銀五十兩二表裏𥘉六日庚辰皇長子即位以明年為天啓元年大赦天下刑科魏應嘉上疏大略謂聖明紹基有永大臣輔理一新當以實心任事以虛心議事不得稍參意見昵用私人俾臣等亦得效他山之石傋籠中之藥𥘉七日辛已御史王安舜疏列李可灼進藥罪狀不赦乃蒙皇上頒以賞格將酬其藥價乎抑酬其起死回生乎可灼輕于用藥之罪固大而輕薦可灼之罪更不小宜亟賜正法以謝先帝奉旨可灼殊失敬慎但亦臣愛君之念姑從輕罰捧一年崔文升職司御藥乃朦朧擅進不忠之罪難免姑革去秉筆職銜降內官監奉御又御史郭如椘疏欽賞諸大臣中及李可灼夫赤丸不效白雲遽升可灼當席稿待罪乃兩朝顧命邅此殊恩么麼資郎亦得同賞功罪不明體統謂何壬午給事中惠世掦劾奏輔臣方從哲十罪無君當誅上責以輕詆大臣有傷國體從哲奏乞致仕上溫旨留之癸未御史倪應春獻萬世治安策曰保身曰定志曰講學曰勤政曰納諌曰謹微願閣臣以至精至密之心時通帝座以至公至虛之心總持朝綱斟酌以求至當擔荷以鎮危疑聯大小為一心合宮府為一體然後天下事惟所幹旋而靡不如意語曰權臣不可有重臣不可無非權而何以稱重也願皇上豫之以權絲綸無從中降閣臣善用其權意念絶無旁落右春坊張鼐進𥘉服十事一曰養身二曰養性三曰勤政四曰敬天五曰法祖六曰親賢七曰納諌八曰信令九曰恤民十曰持體上嘉納之甲申令禮部集文武羣臣議上皇祖考大行皇帝尊諡祗告天地宗廟社稷丙戍後金兵入撫順以袁應泰巡撫遼東御史鄭宗周疏言慎擇侍臣以保聖躬安天下奉旨李進忠已有處范通孫相降小火者皇墳司香陳堯臣孫惟賢革去𬋩事照舊奉御司香戶科王繼曽請擇期開講旨查舊例奏行命法司逮問李如柏李如禎下獄如柏自縊死吏科周朝瑞復職上諭兵部遼陽孤危深為可慮熊廷弼著益用心料理多方防禦圖勝萬全以舒邉患戰守機冝原不中制母得推諉有誤事機癸巳南京太常寺少卿曹珍上言先帝春秋鼎盛即涉哀勞何至一月之間便爾殂落道路沸傳以為姦黨隂謀醫藥雜進伏思二十年來忠臣義士受杖受謫以爭册立者正以先帝故爾此屬久蓄逆志必有一逞不意倉猝之中竟售其計陛下先帝愛子亦未一問先帝垂沒之事以報地下之恨乎先是言官論崔文升者甚衆珍始訟言隂謀弒逆矣戊戍赤氣亘天自左光斗有收回封妃遺命之請令旨下禮部再議已而上即位禮科給事中暴謙貞抄參寢其事而諸內侍下獄者轉相攀引以動搖貴妃鄭氏并及選侍之父從哲等請自科道所指𢾗人外勿更收捕未允而中外流傳有言選侍自經入公主赴井者御史賈繼春遂上書閣臣大略謂自古未有新君即位之𥘉首勸主上以違忤先帝逼逐庶毋表裏交搆羅織不休如今日之事者左光斗上言當先帝上賓之後人心危疑臣隨公疏後有肅宫禁一疏其時但以安宗廟定社稷為念不知其他今選侍既已移宮自當存大體捐小過若復株連蔓引使宫闈不安則於國體不便亦大非臣等建言𥘉心也辛丑上諭內閣皇考選侍李氏恃寵屢行氣毆聖母以致懷憤在心成疾崩逝使朕抱終天之恨前皇考病篤大臣俱進內問安選侍威挾朕宫欲傳封皇后手推朕向大臣靦顔口傳回避選侍暫居慈慶復差李進忠等傳每日章奏先奏選侍看畢方與朕覽從來有此家法否朕今奉養李氏于噦鸞宫月分年例供給錢糧俱仰遵皇考遺愛無不體悉其李進忠等皆係盜庫首犯贓明證確自干憲典豈謂株連卿可傳示該部院遵行從哲等具揭封還奉嚴旨顯是推諉從哲等上言選侍得罪聖母不惟聖心抱痛臣等亦不勝悲憤但事涉宫闈不宜宣泄且皇上既仰體先帝遺愛奉養尊敬似不冝又暴其過惡以掩德意而滋多議故一時未敢抄發兹蒙皇上面諭且責臣等推諉不勝悚懼除奉旨遍示并抄發外願皇上始終以先帝遺愛曲賜保全上曰皇考選侍李氏已移居噦鸞宮撫養所生八妹選侍東李氏居朂勤宫撫養皇五弟選侍傅氏居昭儉宫撫養所生六妹七妹俱有隨從宫眷各衙門月分年例養瞻優厚各令得所昭朕仰遵皇考遺愛篤念親親之意特諭卿等知之先是兵科給事中姚宗文閲視遼東還奏熊廷弼隱匿敗狀廷弼疏辨乞去御史馮三元劾廷弼辨言欺君庸才誤國下九卿科道會議廷弼請勘御史張修德刑科魏應嘉復劾之命廷弼解在回籍聼勘冬十月乙已兵部尚書黃嘉善罷丙午葬神宗顯皇帝孝端顯皇后於定陵辛亥以巡撫遼東都察院右僉都御史袁應泰為兵部右侍郎兼右僉都經略遼東廷弼連疏與言官相訐乞令馮三元張修德魏應嘉至遼東行勘從之兵科楊漣御史吳應琦等奏自古無言事之人即勘所言之事者必更紛囂有傷政體大學士方從哲等復言之改遣兵科給事中朱童蒙往以薛國用為右僉都御史巡撫遼東添設兵部侍郎二員已未上大行皇帝尊諡曰崇天契道英睿恭純憲文景武淵仁懿孝貞皇帝廟號光宗辛酉中旨以禮部尚書孫如遊兼東閣大學士入閣辦事御史賈繼春等吏科都給事中薛鳯翔等合疏爭之不聼丁卯噦鸞宫災上諭內閣皇五弟與諸公主居朂勤宫相隔甚逺已差人守護噦鸞宫雖燬選侍李暨皇八妹俱無恙特諭卿等知之南御史傳宗臯疏論崔文升因言先帝長君踐祚鄭貴妃以皇祖嬪御留止宫中不聞引避疑有隂謀請收侍御之人下獄窮治不許以兵部右侍郎崔景榮為兵部尚書十一月丙子上皇妣元妃郭氏尊諡曰孝元昭懿哲惠莊仁合天弼聖貞皇后皇妣才人王氏尊諡曰孝和恭猷溫穆徽慈諧天鞠聖皇太后時吏部尚書周嘉謨戶部尚書李汝華並以人言社門上曰近日大臣紛紛求去屢旨慰留通不遵承成何國體朕新政之始方且倚任老成卿等侍先帝憑几言猶在耳豈可恝然大臣愛君體國固如是乎尚書周嘉謨李汝華可即出視事言官論人無得任意訾毀以後章奏冝明白簡易據事直陳無淂故為含糊致人猜忖熒惑聼聞賜袁應泰尚方劍刑部以盜寶獄上有旨王永福姚進忠薑升鄭穩三等各斬餘發充淨軍尚書黃克纘執奏不聼十二月丙午遣司禮監太監盧受王安御用監太監王之元于京師順天府等處司禮監太監李實內官監太監馬鑑於南京應天鳯陽府徐州河南等處選淑女自移宫之後流言藉藉謂不容先帝一妾諭旨既宣其中語不無太甚人益以為疑漣乃上疏自明乞加恩李氏并傳示中外以定人心上乃申諭避宮始末以釋羣疑九月𥘉一日皇考賔天文武大臣科道等官進宫哭臨畢請朝見朕李選侍將朕阻于暖閣卿等再四請奏欲朝見朕不可得當時司禮監等官設法請朕出面見大臣李選侍許而復悔及朕出又使李進忠等請回如此者兩三次不放出暖閣司禮監等官又奏大臣朝見畢即回選侍方許朕出朕至乾清宫丹陛下大臣扈從前導選侍又使李進忠等將朕衣拉住不放若非司禮監奏請朕進前不可退又不能出見大臣矣及至前宫門選侍又差人𢾗次要朕還宫不令朕御文華殿卿等親見當日事勢安乎危乎當避宫乎不當避宫乎是日朕自慈慶宫至乾清宫視皇考入斂選侍又阻朕于暖閣不放出入司禮監王體乾等奏大臣在前宫門恭候扈駕請蚤回選侍全然不聼王體乾等請三四次方許朕出暖閣𥘉二日朕至乾清宫朝見選侍畢恭送皇考梓宫于仁智殿才行禮畢選侍差人傳諭朕必欲再朝見選侍方許回慈慶宫扈從大臣科道各官皆所親見明明是威挾朕躬垂簾聼政之意朕蒙皇考派在選侍照𬋩朕不在彼宫居住其飲膳衣服皆係皇祖皇考所賜與選侍無干只每日往選侍官中行一拜三叩頭禮因不在彼宫居住選侍之恨更深其侮慢凌虐不堪朕晝夜涕泣六七日此閣宫內臣共見而不忍言者皇考自知派與李選侍為誤每自來勸朕見朕涕泣不止使各官勸解朕惟每日往朝選侍以遵皇考之命而不居其宫此於親踈自有分别選侍所行毒惡之事朕曽密諭閣臣不令抄發若避宫不早則選侍爪牙成列盈虗在手朕亦不知如之何矣選侍因毆崩聖母自知有罪使宫眷王壽花等時來探聼不許朕與聖母下原任各官交一言有舊人來問朕安交言者即拏去重處此朕苦衷外廷不能盡知朕今奉養選侍皇八妹飲食衣服各項錢糧俱從優厚且安享無恙各官何乃猜度過計藉為口實如異日選侍患病而逝將用人抵命乎將歸咎于朕乎豈不聞聖母之崩繇選侍之毆朕不加選侍之封號以慰聖母在天之靈奉養選侍之優厚以遵皇考之遺意大小臣工何不體察乃至私于李黨責傋朕躬朕欲出一嚴旨切責內臣執奏以朕在沖齡外廷疑為中旨喧論不休且不深究卿等可傳諭百官其務和衷以供乃職毋得背公植黨自取罪愆御史王業浩上疏言今日御旨傳宣不無微有可酌伏祈更出明綸以與中外共曉或暫收還原議召輔臣啇定而後播傳夫選侍昔為寵嬪今則子焉一婦人爾當噦鸞之火而無虞皇上所以恤而周之者已極優厚舉朝尚有繁言乃皇上之心亦甚覺有不安而靣諭批諭一諭再諭者何居伏願皇上靜思者一先帝青宫育德仁孝夙聞一月當陽千古讓美何至以一女子之微生如此枝節天下萬世不察則先帝止慈御家之盛德不無少損伏願皇上愼重者二天祚聖母起自艱難純和懿德度越后妃篤生聖躬正位素定何至以房闈之細橫來批頰之凶在選侍即死有餘辜在聖母則生豈妬寵伏願皇上斟酌者三且外廷臣工比肩共事一主而皇上亦且分目之曰安社稷安選侍則水火之形既判玄黃之戰方興仇不仇安不安之題目何時才了伏願皇上消彌者四奏入留中方從哲以人言乞休進中極殿大學士就第廕一子尚寶司司丞御史焦源溥上言君臣父子夫婦謂之三綱光宗皇帝神宗皇帝之元子也為元子者為忠則為福藩者非忠孝端孝靖神宗皇帝之后也為二后者為忠則為鄭貴妃者非忠孝元孝和先帝之后也為二后者為忠則為李選侍者非忠此今日君臣父子夫婦之定案也當先帝御極之𥘉忽傳皇祖封后之命及不可得而冶容進矣張差之棍不中則投以麗色之劔崔文升之藥不速復促以李可灼之丸先帝欲諱言進御之事遂甘蒙不白之冤近見南寺臣曹珍升遐未明一疏無不入入痛哭流涕豈皇上獨不動念乎故臣以為鄭養性之都督必不可不奪也崔文升必不可不磔也人臣無將將則必誅為司寇者豈不聞此大義而一疏再疏極為開釋若以放縱逆犯為持法之平是張差當廟食龎保劉成當追贈而先帝冝有此一棍之擊一劑之鴆矣上曰此往事不必追論然以諸臣言之不已降文升淨軍自神宗朝請册立多杖謫以去天下側目貴妃久矣諸臣欲一旦反之屬天子幼沖宫中多有嫌隙將興大獄源溥疏上以三事串合為一至發掦先帝燕私而有所不顧于是三案之形成矣兵科都給事中楊漣再疏乞歸上許之漣先上疏自明旨褒嘉過當人謂其結王安以取旨如響答者漣遂不自安疏歸刑部尚書黃克纘疏辨上切責之辛未上諭百官朕自御極以來祗遵皇考遺訓夙夜靡寧所賴內外臣工奉公守職二三大僚忠君體國表率諸屬輔臣孫如遊為朕首簡何乃以浮言求去使朕不得任用一人尚書周嘉謨黃克纘一事小嫌何難消釋即刑部近以議獄偏執奉旨不必疑慮何至封印杜門連求去國夫大臣爵位已極一去何難皇考顧命諸臣望以佐朕新政豈意兩朝覃賞之後遂為乞身自便之圖忘國厚恩藐朕沖幼責以無人臣禮亦復何辭歲除在即其速出視事不得更為瀆陳朕又覽科道各官章奏持心公平者固多意見偏私者不少亦因大臣身家計重可以浮言搖動以致國是混淆人心惶惑朕奉祖宗法度不能坐聼紛囂以亂朝政特兹再加申飾以後大臣進退取自上裁小臣去留悉聼部議如有不奉明旨擅自去職及挾私逞臆顯肆排擠者下廷議治罪朕無戲言無貽後悔天啓元年辛酉正月癸酉朔上御殿羣臣朝賀大學士劉一燝等請點開講日期詔用十二日開日講以吳宗逹黃立極李標錢謙益知誥敕遼陽告變户部請發內帑上諭邉餉一事屢詔當講求長策不悮軍需何至外解中斷動以請帑為辭姑準發五十萬兩解濟急需還著經略各該衙門如法給散官軍别項不得借用該部仍照屢旨會議足餉清餉畫一之策具奏穆廟竒妃于𥘉三日申時薨諭令喪禮照淑妃秦氏例行庚辰享太廟諭吏部朝覲大典朕方行新政察吏安民行各該撫按官將所屬官員賢否核實注考務協公論以慿黜陟該部臨期仍加詢訪有不遵者指名參奏御史馬逢乞嚴敕會議以定國事上曰所奏事情俱朕親歷諸臣共見有何功罪未明楊漣忠直朕所鑒知暫準病告進退心迹自白不必會議奉旨十二日舉日講孫如遊侍講經筵御史左光斗劾言寅夜暗行再營入閣全無去志别有深機開中旨者自用如遊始則塞中旨者必自去如遊始命大學士韓爌詣天壽山覆視光廟吉地并謁皇祖陵寢十八日補大選甲午上行冠禮科臣成明樞進規言昔周成王將冠祝雍曰使王近于民遠干佞嗇于時惠干財仕賢使能敬闡其義以獻禮科周士朴上言當體元居正之𥘉宜圖修德凝命之實曰敬天法祖崇儉恤民聼言科臣趙時用上疏言官之發姦摘伏莫上於議論而使賢姦不辨摘發不真者亦莫弊于議論皇上俱以票擬歸閣臣無令有中出之旨閣臣盡依公議代絲綸無致有拂衆之嫌則政本清用人當議論安得有逞私搆哉上嘉納之王象恆升應天巡撫張之厚升延綏巡撫陵軍劉馨等挾賞羣噪責降陵監李受等有差賜瑞惠桂三王府莊田復駙馬王昺膳養田租以惠世掦為吏科給事中周應秋升南大理卿二月癸卯朔乙已日暈兩旁有耳若月命張惟賢劉一燝知經筵事韓爌孫如遊同知經筵事周道登等克經筵官太寧矦陳良弼照例侍班御史張慎言條議起廢四説旁搜之道當廣採訪之道當公核實之道當真程品之道當正又當于起廢之中寓甄别考課之法賢者待以不次平常者待以年勞然後人心允服而議論可省遣營繕司郎中王惟光吳之甲督造桂惠二王府第河南道御史袁化中陳言時事漸可憂者八曰宫禁漸弛曰言路漸輕曰法紀漸替曰賕賂漸廣曰邉疆漸壞曰職掌漸失曰宦官漸盛曰人心漸絶禮科楊道寅陳慎始五要經筵愼養德之始召對愼親政之始票擬慎內假之始節儉慎𥙿國之始賞罰慎操柄之始上御文華朝見畢有狂人冒衛士服入班妄言命衛司雜治傳諭錦衣衛檢點扈從員役不淂縱容雇替違者參究諭兵部遼左危急本兵居中調度責任非輕請告杜門堂屬空虛豈成事體尚書崔景榮侍郎張經世職方郎中仙克謹著即出視事不得藉口人言致誤疆事其未到兵部移文守催就道太常寺少卿李宗延請修明禮樂以光祀典內言𥙿祭建文景帝冝入祧廟當酌獻宗睿宗從祀當去十五王輔入歷朝文臣御史周宗建疏制勝全無成局上曰軍國大計廟堂自能主持閫外機冝仍當參合畫一此奏裁定兵餉同志設防及薦舉熊廷弼該部詳確議奏兵部覆經略袁應泰招降制夷上曰處置降夷事冝便行文經督巡撫凡事悉心料理務出萬全閫外事權原不中制不淂困而互諉致誤機冝兵科給事中蕭基諌納降夷言其可疑者四可慮者五夫受降如受敵以殘遼而牧叵測之夷閣臣泄泄置之其真輕國事為一擲哉草場火楊鎬李如楨論死閏二月免親藩貢馬頒天啓錢式御史董羽宸進輔救十説曰絲論之出當平牽制之文當決宫府之法當一政刑之明當速保舉之法當嚴巡撫之任當久遺佚之材當收起廢之法當核輔官之期當一文卷之刷當密御史賈繼春直陳具揭之實旨曰繼春要名滅罪今奏內只言具揭之實不明揭中之語更見欺昧姑著照原揭回話𥘉四日丙子風霾諭內閣傳兵部行九邉嚴加防備命兵部凡關切邉務奏章速行議復并申飾京城譏察防範命大學士劉一燝等纂修神宗光宗實録荆王助餉上嘉其忠義命所司貯之戊寅大風霾御史魏光緒奏申張差罪案請擢用王之宷吏科成明樞請復行取之制歲一舉行封皇親郭振明慱平伯王升新成伯王天瑞永寧伯營慶陵御史劉大受言時政五隔其一上與下之情隔其一大臣與小臣之情隔其一京臣與邉臣之情隔其一腹裏與塞外之情隔其一理財與牧民之情隔起孫瑋南吏部尚書魏養蒙南户部侍郎兼僉都總儲戶科趙時用言遼事三可憂選練之無日調度之失冝招徠之難測兵科朱童蒙勘遼回奏上曰遼事已明熊廷弼力保危城功不可泯因言回藉情有可原該部仍議及時起用以為勞臣任事者勸恤録首請建儲舊輔沈鯉遵例優贈吕坤刑部尚書廕一子入監河西副總兵竇承武加總兵照舊管事河東副總兵賀世賢升征夷總共張慎言髙弘圖王大牟各疏救賈繼春各罰俸仍嚴責繼春回話尋革職為民海州賊吳金祖叛平之三月吏科倪思輝陳修省實政一請下恤民之詔一請下求言之詔朱欽相奏天警日至民生日戚請申飾吏治復懲貪旌亷之舊典欽恤陳亡將吏劉綎王宣杜松各贈少保豫諡廕潘宗顏光祿卿董爾礪張文炳各僉事餘各贈廕有差後金兵入瀋陽川浙將佐董仲揆周敦吉泰邦屏吳文傑等戰死兵卒俱殱遼東巡按張銓告急并奏請恤忠魂治懦師使撫臣薛國用以河西之兵移駐海州督臣文球以山西之兵移駐廣寧令山東水兵從海道抵蓋州通州民兵速遣出關更發帑金𢾗百萬以佐軍需下兵部議奏起劉宗周儀制主事髙攀龍光祿寺丞鮑應鰲祠祭郎中後金兵乘勝舉遼陽經略袁應泰巡按張銓副使監軍何廷魁崔儒秀都指揮徐國全同知冒曰乾皆死之金復海蓋州衛後金悉傳檄而定大學士劉一燝等揭報上震怒切責中外臣工諭總督文球巡撫薛國用死守危疆以安內地加援遼統兵鎮將王威提督勒限出關升髙第右僉都巡撫大同招募豪傑詔曰國家文武並用頃承平日久武事陵夷豪傑解體志士灰心今邉強多故大風猛士深軫朕懷凡山林草澤之間有素懷忠義夙抱韜鈐膂力過人猿臂善射可效一旅之用者赴內外官驗實朕皆不次擢用展其豪傑之才布告天下使知朕意發帑銀一百萬兩給付兵部等部以佐急需務期實用不得冒破起用原任兵部侍郎熊廷弼命地方官敦趨即日就道并催升任尚書許弘綱侍郎張鶴鳴王在晉𥘉伯𥙿疾趨任事添設職方主事二員范鈁耿如𣏌起王之宷刑部浙江司主事四月以李宗延為右僉都御史協理京營戎政諭吏部曰熊廷弼守遼一載未有大失及換袁應泰一敗塗地當時倡議何人將祖宗百戰封疆袖手斷送若不嚴核何以警後爾臣工猶冝各洗肺腸同佐時艱有敢薄視朝廷淆亂國事朕不姑息命僉都御史畢自嚴天津防海王國楨通州護􅒩添設薊州兵備起邢慎言任之遣主事周鼎催兵山西宣大錦衣指揮張茂中萬邦孚往通州天津宣大山西招募精兵修山海城廣寧叛臣黃衣伏誅逮原任監軍道臣髙出自遼陽亡奔航海歸朝揭請割廣寧以餌西虜為御史劉廷宣所劾也遼東巡撫薛國用告病升王化貞僉都代之再發帑金一百萬罪援遼逗遛鎮將王威逹奇勳命科道尹同臯等分營簡練贈遼陽死事諸臣張銓大理卿尤世功陳䇿少保各賜諡廕錦衣指揮僉事崔孺秀何廷魁光祿卿廕錦衣百户童仲揆都督同知吳文傑周敦吉戚金鄧起龍秦邦屏都督僉事命三法司熱審布衣參謀張思任奏遼左情形命部擬用尋授遊擊防素酋起用謀勇將領杜光宇顧尚文張成憲等詔加解額兩京五名大省三名中省二名小省一名以龍飛首科也兵部尚書王象乾起輔提督九邉軍務凃宗濬起輔提督京陵軍務後金兵窺河南巡撫張我續統兵移鎮旨嘉其率先甲戌發册迎皇后張氏獲交通傳報叛人劉保磔之五月戊寅朔以册立皇后張氏詔告天下命御史劉蘭掌河南道印𬋩大察兵部議調四川湖廣上兵浙江民兵共六萬刻期到京册封王氏良妃假氏純妃陕西道李逹請嚴禁內操少詹事徐光啓奏曰眺錯有言器械不利以卒豫敵也卒不可用以將豫敵也今之兵將既不能戰即當嬰城自守奈何列營城外一聞敵至望風瓦解列營火炮皆為敵有反用攻城俾無守兵人知必破合城內潰自然之勢及今不思變著雖征調招募更如前日矣廣寧一帶大城只冝堅壁清野急備大小火器待其來攻慿城擊打一城堅守必不敢驀越長驅數城堅守自然引退至如都城固守尤為至急依臣原疏建敵臺以護銃以銃護城以城護民萬全無害之策也再給戶部帑金二百萬諭令陸續支消務當實用贈馬德灃大常少卿李德陽南户部尚書諭户兵二部自東事軍興以來戶兵等部不能長驅動請內帑請則危言要挾用則任意開銷調募不求精強防禦不合窽會耗費徒多績效鮮睹該部可集廷臣會議目前所需在內在外孰緩孰急其募調兵馬修濬城池整備衣甲器械傋禦三岔山海撫賞河西欵虜賚恤存沒軍士等𣢾逐一開列向來積習蠧弊一一剖析卿等大臣務遵成憲講求軍國大計勿避怨嫌母顧人情其科道各官忠誠體國固不乏人亦有乘機恣肆顚倒是非止快一已私心不顧國家利害無論更置經略破壞封疆貽禍海內即此遼餉查核一事何曽有一人悉心調畫庶條慮改圖勉務職業兵部尚書崔景榮辭任命王象乾代諭免經筵以後春講定以二月十二日起至五月𥘉二日免秋講八月十二日起至十月𥘉二日免吏部都察院傳諭各部尚書侍郎等官杜門請告在衙門辦事止左都御史及新任本兵尚書二人豈成政體適遼東巡撫王化貞奏河西情形最急一切防禦無備各官如何尚未到彼何不查照奏請督發輔任大臣畏憂譏讒動思引避小臣挾私逞臆巧肆排擠忍令朕躬焦勞坐視封疆淪棄撫時省躬能無悚栗輔臣劉一璟已著宣諭尚書周嘉謨黃克纘李汝華王佐侍郎藏爾勸鄒元檢僉都王德完并各衙門大小官員即出供職不得辨是論非不淂托疾言去不得連章求勝册封宗藩吉肅代益德魯蜀周崇等府祠劉綎諸臣于死所歲時致祭賜劉綎潘宗顔等祠名表忠張銓崔儒秀何廷魁等祠名昭忠尤世功陳策等祠名愍忠各加祭二壇諭吏部馮三元張修德魏應嘉扶司擠排致誤封疆降級調外姚宗文隂險傾陷實為禍始革職為民賞賚優恤河西將士遣御史方震儒宣諭杭城火災免春運織造六月大學士何宗彥入閣辦事大婚加恩輔臣一燝爌加少保兼太子太保廕一子尚寶司司丞司禮監太監王體乾王安魏進忠各廕弟姪一人錦衣千户奉聖夫人客氏父客大年與做錦衣千戶户部尚書李汝革致仕汪應蛟巡撫寧夏敘平苗仲功張鶴鳴晉兵部尚書廕一子錦衣正千戶世襲命熊廷弼兵部尚書兼副都御史駐札山海關經略遼東陶朗先右僉都巡撫登萊廣兩雍中額順天增十五名應天增五名後不為例宗生聖裔中式名𢾗準各加于額外但不必擬定一人諭吏部以黔功加恩前任首輔今召用葉向髙進中極殿大學士廕一子中書舍人前輔方從哲廕一子中書舍人見輔劉一燝韓爌加少傳兼太子太傳各廕子入監南科徐憲卿條入覲事冝免朝之數當寬多留循良以撫綏凋敝紏優之罰當重自備腳力母科民優騷違限之法當嚴往來水程稽查議處至于署篆之人速當議定署印之考速當議行釋繫臣髙出降二級降原任監軍道胡嘉棟四級俱戴罪立功七月官客氏男侯國興錦衣衛指揮御史劉蘭等公疏已之不聽時經略尚書熊廷弼啓行有日所需兵餉器械尚推延未定廷弼疏終日講求兵馬全無著落徒滯行期有旨切責該部廷弼請精㨂京營選鋒併各官廩糧優厚從之吏部疏三方布置已定題奏遼東西路監軍參政邢愼言中路監軍副使錢士晉南路監軍副使梁之垣天津監軍僉事胡嘉棟登萊監軍亷使楊述程降原任按察使髙出為山西副使輔添設西平堡監軍牛象坤升山西僉事𬋩盤山監軍命御史方震孺巡按廣寧遊士任巡按登萊以王體乾掌司禮監釋內監田詔劉朝劉忠陳應科于獄降前司禮監太監王安淨軍發南海子墻鋪尋殺之命禮部侍郎周如盤纂修玉牒兵科酌議豫備援兵協濟驛遞之法經過地方厰棚不傋水火不周罪在州縣倘既備而故優居民罪在兵將最衝驛遞量給新餉于援遼夫馬一窽另行造報賜經略尚書熊廷弼尚方劍麒麟一品服仍賜晏都城外府部院堂上掌印官陪餞以寵其行南臺御史王允成論司寇黃克纘定鄭穩山盜寶一案生死不同又辨源溥正綱常一疏刺謬特甚禮部請查遼東徙居登州之士容令額外中式一二以兵部尚書王象乾總督薊遼獲通謀叛賊陳天爵于天津貴州苗作亂熊廷弼請申明經撫職掌起故總兵蕭如薰到京八月廕海瑞子海宴入監議祧廟禮光宗山陵將畢升祔有期當議祧遷之制禮部照纍朝典禮議祧憲宗太常寺卿洪文衡謂􅌖宗以藩入宜祧奉玉芝宫禮部侍郎鄭以偉疏言凡祔以近而屬逺祧從逺而超近禮也入當原其始而祧當稽其序是入一法祧一法也太常題云睿宗非繼統之君不冝躋武帝是議改而非議祧也臣以為不在入廟而在稱宗不在稱宗而在稱考不在稱考而在承大統既承大統矣可不考睿宗乎既考矣可不留乎既入矣可遂祧乎疏入命仍原議行王化貞奏鎮江奇捷𥘉遼東破生員王一寧孑身走朝鮮效包胥之哭秦庭詞臣劉鴻訓以使事未歸一寧投之揭鴻訓曰後書生乃如此我輩當愧死因厚其資給使遍詢諸島可以假途歸朝者一寧遂淂私遊諸將間為説時王化貞駐廣寧問麾下將有能浮海探島中消息者杭人毛文龍好為大言同輩紿之遂承命領二百人駕舟出海探事適後金下檄鎮江將佟養真令捕剿長山諸島養真轉以責中軍陳良策良策領三百人出海挈王一寧以行將謀歸朝海中望見文龍旗幟遣一寧道意文龍不信良策自入文龍舟請合軍文龍疑之一寧曰軍形既露使養真知而襲之則事敗矣乃請文龍給良策旗號乘夜入鎮江克其城而後迎文龍文龍訐之良䇿詐稱軍糧盡自歸與所善軍將葛蘇義等一時俱起夜縳佟養真於廨舍詰朝樹文龍旗幟于城迎以為帥各島主李景先等咸會文龍侈其事上功于撫臣奏之授文龍參將駐鎮江命順天巡撫移鎮昌密給奉聖夫人客氏墳地二十頃遣監軍兵部郎中梁之垣宣諭朝鮮常州監生鄒德基請前驅自效以山東參議孫榖為遼東南路監軍後金兵襲金州守將聞鎮江舉事引兵來赴中道罷歸後金殺之遂屠金州二十七日光宗貞皇帝孝和貞皇后梓宫發引九月御史王心一請裁抑客氏及內侍魏忠賢恩賚謂即保護應酬侍衛可賞何妨優以金帛如加給土田明示敘録昭播聼聞殊傷聖美又况梓宫未殯先規客氏之香火陵工告成強入忠賢之勤勞於禮為不順于事為失冝得旨切責都御史李宗延劾內使王升李添祥後金兵復入鎮江毛文龍走朝鮮戶部侍郎王德完奏言時近深秋大雪驟集請亟發帑金賜衣帛以恤征東將士遼東巡按方震孺請特旌血戰誓死之將張神武經略熊廷弼奏三方布置有名無實延綏巡撫張之厚奏套虜入犯上諭兵部申飾將士隄備拒堵仍調鄰鎮兵馬應援并諭户部催發應解錢糧以濟急用免湖廣災傷田租開東征輸納例御史江秉謙言朝廷起廷弼為經略則三方之進戰退守皆一一當聽廷弼指揮部署乃化貞欲進則使廷弼隨之而進化貞欲退則使廷弼隨之而退化貞之倐進倐退則又使廷弼進不知所以進退不知所以退是化貞操節制之權而經略未嘗有節制三方之權也稟成則無權坐罪則有主國家又安倚此經略哉十月御史馬鳴起言保姆出入宫廷六不便上曰奉聖夫人客氏遵聖母孝和皇太后遺旨保護朕躬于外廷政事有何干預本內線索字樣指何事件是何主意且何故不遵前諭又來瀆優姑罰俸一年先是上諭內閣朕著擇玖月二十六日午時奉聖夫人客氏出去朕思客氏朝夕勤侍朕躬未離左右出宮去訖朕憶泣痛心飲膳至脫勿進至曉安歇不寧頭眩恍惚以後還著時常進內奉侍寬慰朕懷外廷不煩激聒卿傳示大小臣工知之故云吏科給事侯震晹奏曰頃奉聖諭以保姆逺離而涕泣至忘寢食臣且駭然皇上年已出幼外之凝承輔弼內之琴瑟好逑何戀戀于保姆也中涓群小竈焬借叢王聖寵而煽江京李閏之姦趙嬈寵而媾曹節王甫之禍可為寒心不報時科道倪思輝朱欽伯王心一相繼論劾降級調外尚書張鶴鳴奏佟卜年劉國縉胡嘉棟皆經略熊廷弼舉用今卜年的與佟養真同族冝官之雲貴展其所施以報效嘉棟國縉置廣寧立功贖罪禁開礦姦徒陳有繼命嚴訊之鄖陽巡撫楊述中奏川省兵變殺傷撫臣徐可求道將府縣等官據重慶城以叛上曰樊龍等倡亂狂逞戕官據城罪在不赦其中或有激變等情兵部差人行該巡按同鄰省撫鎮等官相機處置亟冝剿定母致蔓延遼東巡按方震孺奏言用兵之法總不越賞不踰時罰不踰刻以為鼓豪傑之壯志悚庸蠢之懦腸爾自有遼事以來從不曽堂堂正正做得一事從不曽斬斬截截殺淂一人人皆知進者之必死而逃者必生彼又何苦必欲尋死乎今河西兵將人人備馬思走廣寧城中冨家大户盡𢾗西奔提督中風臥病兵馬漫無頭緒今撫臣東湊西那千難萬難惟是單弱為憂不敢再言關西策應仰祈速下嚴敇此畨大將偏裨不拚命厮殺望風先走各照信地職掌必殺無赦亦宜宿兵要路地方專殺逃軍逃將使三軍之歸路絶而生路可稍望也命朱燮元為僉都巡撫四川著一應剿定以便冝行事楊愈茂升四川總兵薛來胤湖廣總兵馮從吾大理寺左少卿馮嘉會石少卿諭戶兵工三部頃東土搆禍四川為變深軫朕懷爾屬每將兵餉匱乏請發內帑朕念所彂已多全無實用且兵餉分毫難省而動稱無兵無餉是何故歟經撫各官不思核餉核兵設法征討但言苦椘推罪缷擔甚孤朝廷委任之意自今都務用心料理戰守事務母致疏虞其道將等官但有避縮者三尺具在必不輕恕發出帑金二百萬兩為東西兵餉各頃等用爾等還酌量緩急不得仍前冒破大學士葉向髙入閣奏事上曰知卿辦事朕心嘉悅所奏倡率廷臣協心匡濟屏絶煩囂尤見老臣謀國忠藎至意以王三善巡撫貴州起參政李乃蘭補天津道監軍禮科給事中周朝瑞請推輔臣二人專謀遼事如宋范仲淹主西富弼主北事之類至科臣部二司屬皆以專司圖遼職官姓名别具簡明册籍于朝講畢時一一指問敘延綏甘肅寧夏禦虜功升廕黃嘉善劉敏寬馬從聘祈伯𥙿楊應能及樞撫王象乾魏養蒙等廕賚有差十一月逮李維翰鄭之范于理藺酋奢崇明陷遵義廣東道董翼奏曰蜀于諸夏為斗絶北有劍閣東有瞿塘原是割據之勢中原一優輒有僻處自雄挈泥丸而封之者在往代猶可言也據蜀則去蜀爾我朝幅􅊷四擴蜀之外有黔矣黔之外有滇矣延袤𢾗千里差當天下藩省五分之一而畫處上遊秦椘江淮皆其建瓴而下者也蜀一失守無論滇黔非我強土其為中原禍豈淺鮮哉故蜀患不減遼患而救蜀當與救遼並急時石砫土司女官秦良玉聞變即倡義憤檄所部精兵萬餘自裏行糧率弟明屏等捲甲疾趨倍道榆城軍于南坪關以厄羣賊歸路伏兵四百夜襲兩河斫燒賊船以阻賊泛舟東下先是賊聞良玉起兵大恐厚遺秦氏求其應援良玉斬其使而留其銀率兵水陸並進又留兵護忠州以為犄角移文夔州設防瞿塘為上下聲援上覽甄淑邉情疏諭兵戶二部曰封疆大計豈容意見參差經撫共肩重寄協極危疆如彼此偏執內外推諉致誤事機罪責有歸差部科往諭俾悉心擔當母致敗壞并諭道將等官不得規避交搆起翁正春禮部尚書朱國禎升禮部右侍郎廕趙用賢一子入監贈故輔王錫爵太傅廕子尚寶司司丞虜酋艮定等犯甘肅參將王承恩敗走之十二月恤録遼瀋死事張神武楊宗業贈都督同知廕一子正千戶世襲徐國全梁仲善贈都督僉事襲升三級俱從祠附祭郭有光劉芳聲冉見龍等俱各贈升有差命張我續兵部左侍郎兼右僉都御史總督川湖雲貴軍務吏部尚書周嘉謨罷張問逹仍以太子少保改吏部尚書鄒元標為吏部左侍郎諭兵部援遼川兵在途者領兵官押回討賊劉時俊以太僕少卿贊畫川湖雲貴軍務御史董翼奏言蜀國半就淪亡上曰總督官節制將吏準賜劍一口便冝行事陜西鄖陽巡撫官暫移鎮漢中撫夷防守應援薛來胤督南還川兵入川併力討賊九卿會議經臣奉詔特起每事俱當責成經臣稱進兵之事人馬甲仗糧草件件打透不過不敢不遲疑自阻撫臣欲率兵取海州蓋聞回鄉鄭明經之言而動者毛文龍殺後金兵二千未有的據人皆以為疑撫臣絶不疑當機之勇非經臣所能倣佛也今日之議舍責成二字道無由矣至于髙出胡嘉棟經撫共薦責令建功贖罪大學士向髙疏言廷弼之與化貞作用既殊而使化貞受其節制則舉朝之人皆謂難行文龍所報擒斬即未真確功罪可勿言也乞再下部斟酌如遼事可以專委廷弼則申飾將吏一聼廷弼節制禮部周朝瑞奏時當向午日輪上直中天而光不射目日上恍有一物可比日大混沌無光伏壓日上非雲非霧如蓋如吞頃怪風掦砂通天皆赤天變如此若罔聞知臣工傾擠不協各快其私深可寒心諭兵部差兵往諭經略巡撫同心任事贈原任大學士髙儀少保廕一子中書舍人郭正域贈太子少保廕子中書舍人諭吏部近年建言遷謫已故各官悉行查明應恤的即與一起具題贈祭不必紛行瀆擾升鄒元標都察院左都御史馮嘉會右僉都巡撫河南蕭如熏以原官總兵寧夏許世臣薊永平山海總兵魯欽保定總兵天啓二年壬戌正月乙已朔上御皇極門受朝賀大察行取推官知縣吳亮工等一百二十四員贈舊輔徐有丁太傳廕其一孫中書舍人命廷臣集議遼事時王化貞言臣今與皇上約願請兵六萬一舉蕩平臣不敢貪天功即有不稱亦必殺傷相當俾勢不復振保不為河西憂也稍需時日經臣以三路蹙之遼必復矣如臣言不行乞罷臣專任經臣庶淂一意討賊廷弼亦上言撫臣自許六萬進戰一舉蕩平懇乞聖明急如撫臣約乘時急進免使兵因不戰而怨并亟罷臣以正銷戰士之氣灰任事之心之罪上以遼事重大豈得戰守異意詔多官集議及兵部遵旨會議曰大小九卿科道各有議單臣細閲之再四啇確經撫既不相容勢必專任其一夫以卑避尊當令撫臣退步肰撫臣一撤毛文龍必不用命廣寧土兵必潰西虜必解體而去合無因撫臣自請便冝行事而特賜尚方劍加卿二銜廣寧之事一以委之若經臣威望素著豈可遽退當斟酌别用可也吏部等衙門尚書等官張問逹等言羽書狎至報如流水此時議換經略即身生羽翼不能飛渡本部未敢輕議惟乞皇上嚴責經撫二臣協心報國功則同賞罪則同罰兩言而決爾四川按臣薛敷政奏藺賊攻犯成都攝軍務朱燮元分遣指揮等官冉世淇雷安世瞿英周邦太張愷各領兵守隘邦太至資陽遇賊迎戰不勝降之世淇等至龍泉賊已營山上乘髙下殺官兵不敵世洪安世英皆死惟愷未及行賊擁衆𢾗萬已至城下懸旌僣號四面夾攻燒城外民居寺宇威焰不可嚮邇城中僅有營兵七百名調到松潘茂州兵一千五百名分布防禦力單財匱賊又傍掠鄉村慘殺男婦奪取蜀府莊田米榖為持久計南御史趙世期請速援川蜀速則大兵一至依附之民必自逃遁亂民散而亂兵之勢益孤終歸于散而已不肰久入其黨者處騎虎之勢既尾大而莫掉即未入其黨者受流離之苦亦飢寒而思動禍可勝言哉廕戚繼光子錦衣衛世指揮起原任總兵杜文煥入川討賊舉卓異諸臣布政洪翼聖俞自強洪世峻按察使陸完學程啓南王豫立郭尚友張爾基參政詹爾逹李成名劉洪謨沈自彰魏説王化行副使盧英田徐如珂真憲時參議宋槃知府沈萃禎孫昌裔徐從治王瑊方應明黃元會命部院科道堂官引奏面加奬賞令不次擢用改黃克纘為兵部尚書協理戎政兵部尚書張鶴鳴以河西瀕危自請視師詔嘉勞賜蟒衣玉帶尚方劍加太子太保寵之行以何棟如為太僕少卿隨贊畫禮科惠世掦參摘場弊應天舉人髙如麟順天舉人張惟勤查廷浙江舉人錢千秋提問後金師渡河克西平堡守將羅一貴死之王化貞熊廷弼棄廣寧走城遂陷監軍道髙邦佐死之𥘉西平𬒳圍一貴堅守一晝夜放炮擊死甚衆遂解去圍振武總兵劉渠方集陳有先鋒孫得功者化貞所任心腹驍將也推渠當先未及戰得功呼曰軍敗矣率所部走劉渠略陳馬蹶被殺祁秉忠扶病上馬中箭死後金兵復圍西平攻之不能下三進三却城中火藥盡一貴遂自刎死得功走入廣寧疾呼軍民冝剃頭歸降因令其黨封府庫以待一城閧然爭奪門走王化貞方起視事西將江朝棟排門入呼曰滿城人走空矣化貞股栗不知所為而所坐馬已為左右竊去倉皇整行李以槖駝載之而自騎朝棟馬以行及門亂兵訶止將縳之朝棟至持刀與鬪乃得出得功遂據城降而化貞所招虜騎大肆掠殺逃軍和之難民西奔者十不得一遺棄幼小於途踐死者相望化貞從𢾗騎走閭陽適熊廷弼自右屯引兵至止焉化貞向廷弼而哭廷弼顧笑曰六萬兵蕩平遼陽竟何如化貞慚尋向廷弼議守寧前計廷弼曰晚矣公不受紿慕戰不撤廣寧兵于振武當無今日此時兵潰之勢誰與為守惟有護百萬生靈入關勿以資敵足矣乃整衆西行化貞與寧前道張應吾殿後總督王象乾一一驗放入關按臣方震孺在廣寧尚臥末起聞撫臣去亦單騎走監軍牛維曜邢慎言隨之髙出胡嘉棟韓𥘉命隨經臣走關上惟髙邦佐赴松山同事多諷以西走不聽謂其僕髙永髙厚曰我受國恩義不偷生誓以死報之矣好收吾骨歸以見吾母即葬吾父墓側使知有死事子不絶也髙永等皆慟哭勸之行不聼衣冠西向拜自縊僕髙永亦感激縊于側二月京師戒嚴特命何宗彥朱國祚二閣臣會試主考後遂為例駙馬王昺請招練京兵上嘉其忠義大學士劉一燝致仕命孫承宗為文淵閣大學士入閣辦事詔錦衣衛逮再逃監軍髙出胡嘉棟下獄諭熊廷弼王化貞若能出關保守右屯漸次恢復姑準贖罪如不能立功即拿問正法道將等一體同論戶科陳錫叢捐俸預買煤炭上嘉其急公命支太常庫積銀協濟命宿將杜應魁為副總兵募兵訓練起李懷信總兵大同楊茂基出鎮寧夏吳守德出鎮延綏以王紀為刑部尚書川師克復安嶽樂至二縣賊將羅象乾自拔來歸賊兵潰遁成都圍解傳諭吏兵二部曰朕自登極以來夙夜孜孜惟封強多事民困未舒是念所有加派錢糧俱充兵餉亦惟啚剿除凶逆乂安四方使我民得安干田間室家相保以副朕愛養元元之意無奈東西告變經費日煩以重纍我民朕心憫焉今以將士之戮力士卒之用命共誅西賊蕩平有期惟是東事靡寧轉輸征調未淂息肩地方官當曉諭百姓朝廷不淂已用兵暫時加派我民當以急公為義稍俟平定即行蠲免其帶征錢糧先免二年北直地方騷優苦纍尤甚并免加派以示優恤有司官設法團練鄉兵令各自衛其有智勇才力之人即行奬勸或開送擢用至河西逃難士女尤可憫念地方官即隨委安插給彂倉榖多方賑濟仍撥空間土地屯聚耕作令毋失所有壯勇願充兵者有竒謀異能志在服事者即與録用爾部郎示榜曉諭仍行各省撫按一體遵行朕實不逮負纍我民惟祖宗德澤國家法度朕不敢忘二百餘年金甌無缺之強宇朕不忍棄凡我臣民其悉心畢力共期匡濟以安享太平之福母負朕意元輔葉向髙輸俸助農以原任大學士張位功存國本復原官廕子大朴尚寶司司丞以白兆慶為都督同知王世欽署都督同知𬋩神機營戰兵蕭如熏𬋩神機營戰車兵刑部主事王之宷追理張差舊案上曰事經皇祖處分不必追論起參議閻鳴太小東參政兵部主事袁崇煥升山東僉事同往山海關監軍命逮王化貞至京訊問熊廷弼革任聽勘𥘉御史謝文錦奏經撫罪案云熊廷弼控扼山海調度三方廣寧原非轄外而必欲驅之右屯𥘉因敵報警急移駐閭陽分兵應援未為失策逮至軍民奔潰與撫臣並轡而西不能隻身殉難惡得無罪王化貞專制一方而未見確有成謀𥘉意虎憨外助永芳內應僥幸竒功不覺墮計乃復浪兵催戰守備不設竟棄廣寧馳馬而奔罪復何辭然臣竊歎經臣責任雖重事權實輕不幸與本兵相忤繫手縛足展布無由雖欲圖固守而不可得撫臣意氣既鋭熒感復多又不幸有本兵為之言聼計從雖欲不言戰而不可得是二臣之陷于大辟者實張鶴鳴致之也御史江秉謙亦言樞堂與王化貞相比與熊廷弼相忤明知西虜間諜俱虗而狠於瞞心明知戰守參差難合而硬為責備何處有機會而曰機會可襲何日可渡河而曰過河必勝既欲驅經略以出師又不肯付經略以節制既疏置廷弼于廣寧又未嘗駐化貞于何地一味糊塗一團機械只殺廷弼便可快心縱陷化貞亦所不顧是鶴鳴故壞封疆之情殆有甚于失誤軍機之罪也科臣劉弘化熊德陽亦論之上以鶴鳴視師慷慨謙等妄言亂政俱𬒳罰貴州水西土酋安邦彥叛攻陷龍里甕安圍逼省城巡撫李橒巡按史永安力禦固守總兵張彥芳援兵住于新添調兵應援湖廣御史舒都榮代聞其事于朝𥘉安堯臣冒隴姓并隴地受朝廷招撫得襲兄疆臣世職堯臣之妻曰奢杜輝子安位堯臣死位猶孺子其旁支安邦彥欺其孤寡導以不臣自元年以奢崇明援遼啓釁遂效尤於是年二月𥘉九日統領玀賊苗仲數萬攻省城沿城札營四面埋截殺恩石道副使孫堯恕安順府推官徐朝綱廣順知府鄭鼎虜駐鎮畢烏同知楊以成迤西守備王懋德鎮撫聞變遣李天嘗將兵四千來援戒主招安賊首羅應魁率衆詐降迎之誘入伏中天嘗全軍俱沒中式舉人劉必逹等謝恩特命孫承宗兵部尚書馮從吾左僉都協理院事王之臣僉都巡撫宣府三月以解經邦辭經略不赴任削其籍改命王在晉兵部尚書兼副都經略遼薊津萊軍務禮科給事中惠世揚疏紏大學士沈㴶以募兵為進身之地隂使門客晏日華濳入大內誘劉朝等練兵頓使聖明之朝再見江彬之事外戚鄭養性厚募死士包藏禍心不知㴶引賊入室意欲何為上溫旨慰㴶謫世揚于外贈髙邦佐光祿寺卿廕一子錦衣衛世百户王忠羅一貴贈都督同知襲升三級俱豫諡祠祭義僕髙永優恤收復覺華島島中有人民𢾗萬米豆二十餘萬祖天壽據而有之尚未外屬都司張國卿與天壽有新巡關御史方震孺命往説之曉以利害激以忠義天壽一見即慟哭遂紏衆歸順先載其妻子兄弟及士民千五百人至關而天壽仍暫住島上以通判吳自科往監之共收回兵十餘萬人民萬餘器甲無算牛馬千餘匹巡視禁門御史潘雲翼言有用命之將而後有用命之兵有著落之兵而後有著落之餉乃今內臣外吏無不招兵幕客術士無不談兵無籍之徒東投西竄且此一等餉彼一等餉致有棄少投多安知京營久猾之軍不望厚糈以冒名又安知一石老未之衆不因異餉而解體是招兵實所以散兵也包藏禍心發端作俑誰實為之職不能為協理之克纘解吏科矦震暘以參論葉向髙調外賜進士文震孟傅冠陳仁錫等及第出身有差賜經略尚書王在晉蟒玉尚方劍在晉將行上疏奏防內應外謂根基命脈寄于一丸泥隄防疏密安危立判請陳六略曰防內患曰詰內姦曰飾內傋曰嚴內衛曰節內供曰急內應上納之吏科趙時用言恩典不冝濫徼官序級轉較不容混今乘疏通之會為速化之機以致光祿太僕尚寶之三堂添注幾無坐處而內外南北之例轉倐忽不啻電過久林泉者不復拘常非林泉者往往僥幸至于故官恤贈恩廕新典優厚亦須論人今請者因緣于利即揭者情出于私非借國本為題目則揑邉功為勞勳以致姦汚可以盡洗代口為之遊掦新主曠恩豈為此設賊陷貴州鄖撫楊述中以將及辰沅告急西虜挾賞文書房傳諭閣臣朕覽屢次章奏東西交訌滿酋挾賞土酋僣號姦細密布潛入窺探朕心惶懼元輔向髙輔臣宗彥國祚㴶繼偕乃股肱重臣正賴匡扶濟時豈可以人言偃寓不出况今多事之際卿等還仰體朕衷為同舟之濟速入贊襄佐理兵部尚書孫承宗奏年來兵務多不練兵餉多不核以將用兵而文臣招練以武備邉而日增文官於幕以邉臣任經略而日問戰守於朝種種誕謾因循之象不能追救以一隅壞天下而既壞一隅兼壞天下務在收拾人心以大振之以畢自嚴為戶部右侍郎兼僉都督遼餉張經世改兵部左侍郎總理兼督三部兵餉器械汪應詔署都督同知鎮守山海經理遼東川兵復新都𥘉賊踞新都加髙城墻五尺扎營四門為困守聲言直取潼關副使劉芳謙監軍楊述程會陜兵毛兵于子來鋪共六萬餘因攻新都矢石如雨人莫敢近官兵移至牛頭鎮奢營領馬步兵一萬三千來援官兵從後出秦良玉催兵從左出土官談大孝兵從右出安綿建武鎮逺兵從中出賊奔入城城內脅從乘隙而逃遂進克之賊退入蘭州調刑科給事中熊德陽于外時張鶴鳴奏獲姦細杜茂係李永芳所使通佟卜年者傳旨到科不細開名𢾗止云拿杜茂等德陽因詰旗官等之一字包含最衆恐承行人詭揑那移波及無辜鶴鳴挾其睚眥指為抗違故調四月會審熊廷弼王化貞熊廷弼自詣詔獄起楊漣李若圭禮兵都給事中命太僕卿董應舉兼御史理津海屯田安插遼民時避難入關者二百餘萬人在畿外者安插屯種其流寓京城者查明分派各令安業生儒考試發附科舉川兵復遵義府時有湄潭叛民王倫紏賊焚掠湄潭為川貴險要都司陳一龍引兵追至水西境降之諸軍進駐遵義時惟重慶尚為賊巢以余茂衡為僉都巡撫登萊天津延綏寧夏授毛文龍協理京營袁可立李邦余自強李從各僉都巡撫登萊天津延綏寧夏授毛丈龍總兵王一寧授登州通判贊畫禮部尚書孫慎行請正方從哲進藥弒君之罪及引皇貴妃欲立皇后議上尊諡繆戾稱恭急請移官謂無妨遲𢾗日一切苟且泄沓幾干犯天下之大名義釀成天下之大禍患從哲連疏申辨有旨慰之定熊廷弼王化貞獄尚書王紀都御史鄒元標大理卿周應秋具獄詞云化貞全不知兵用虜而反為虜用用間而反為間用叛逆如孫得功輩日侍左右而不悟聲聲要戰匹馬宵遁驚魂未定是熱心癡心人也廷弼言兵不冝浪戰西虜不足盡信永芳降情叵測若持左劵使堅守右屯死且不朽而疾走榆關平日何等威風作此舉動比鎬多一逃比應泰欠一死矣上從之尚書張鶴鳴奏三衛虜衆近塞惟撫賞為今日苐一緊要即將寧遠前所芝麻灣諸處積聚盡𢾗聽虜人搬取易市兩廣撫督進紅夷火炮張安世為都督僉事總兵宣府張繼光總兵天津贈王德完户部尚書廕子入監光祿少卿髙攀龍奏言釋群疑銷隱禍以固人心當令鄭養性回籍李如禎崔文升速正典刑上曰禁廷安穩何自妄生猜疑保全國戚爾每當仰體朕心何必多言李如楨已成獄崔文升朕自裁處無事牽扯壬辰大兩雹時草七日酉時也自春夏不雨二麥焦枯是日雨澤覃沛忽風雷怒號氷雹併作著屋瓦磧俱碎草木禾稼毀折不可勝紀上下令修省贈張振德光祿寺卿廕一子錦衣千戶振德蘇州人御貢選興文知縣一家相隨清操自勵藍囚變起振德甫出棘圍趨還邑二日而賊兵奄至督戰力盡慟哭入城率其妻媳子女盡投烈焰童僕嚴英顧美等皆殉共二十一人長子張紀以應試先歸幸存一息事聞褒恤祭葬建祠立碑妻錢氏等旌表附祠義僕英美等皆給恤五月江西妖人程鵬伏誅左都御史鄒元標疏言乾坤所以不毀者惟此綱常而綱常所以植立者特此信史讀禮部尚書孫慎行一疏令人神骨為悚即未必有是心當時依違其間既不申討賊之義反行賞姦之典即謂無其言無以解人之疑也方從哲輔政七年未聞其輔相何道但聞一日馬上三書催戰斷送百萬將帥士卒血染黃沙祖宗􅌨風沐雨一片遼東地土盡屬夷人臣身列風憲名在會議君臣大義今日未明再無有明之日臣等不言再無有言之人臣讀學士張鼐疏曰六七年間以言及東宫者為小人不言東宫者為君子此何等景象誰實使之盡除天下之清流隂剪元良之羽翼此真實録真史筆也從來亂臣賊子有所懲戒全在青史一脈失今不成何所底止惟皇上熟思前年之景象勿忘當日之艱危上曰實録據實開載兩朝近事中外所知豈容以意筆削從哲舊輔秉政始末自明卿風紀重臣事關國是正賴持平據奏不勝疑慮意則甚忠朕已知之恤舊輔張居正曰居正奪情専權招致物議但當皇祖沖年輔政十載天下久安任勞任怨功不可泯準復原官豫祭葬文忠諡已追奪其改豫應得房屋仍給與子孫奉祠居住兵部侍郎陳邦瞻敬陳切要之議言內供錢糧及奉聖夫人事刑部尚書王紀御史潘雲翼各疏論閣臣沈㴶之姦皆嚴旨切責復給事中魏應嘉郭鞏御史馮三元張修德劉廷宣等官從左都御史鄒元標奏也趙南星晉工部右侍郎添注𬋩殿門工程馮從吾左副都協理院事山東妖賊徐鴻儒倡亂攻陷鄆城遂破鄒滕撫臣趙彥發兵捕之四川白蓮妖賊洪衆劉應選白仙台等蜂起助賊巡撫朱燮元擒捕正法川師克二關復渝城樊龍等據重慶扼險佛圖二都二關奢酋父子據瀘汭專倚聲援形占三寨以為天險監軍副使伍志充楊述程總兵杜文煥帥兵進攻之直抵賊營石砫宣撫官秦民屏部兵繞出其後賊驚敗遂連復二關殺賊三千餘乘勝進逼重慶計擒賊首樊龍張彤何若海等三十一人遂克之定髙出胡嘉棟李維翰鄭之范等獄俱論斬六月御史周宗建疏言目擊時事之非大臣名節冝重小臣忠告冝寬內臣窺伺冝防外臣附和冝化其窺伺一欵略曰近見朝廷處分一二章奏外庭嘖嘖咸謂奧竅之中莫可測識諭旨之下有物慿焉如魏進忠者目既不解一丁心復不諳大義揭其志慮有何逺謀耳目嚬笑之暇漸與相親宫庭禮法之事漸若相近一切用人行政墮于其説必且東西易面而不知邪正顚倒而不覺中外見者咋舌太監李實織造蘇杭參松江知府張宗衡蘇州府同知楊薑抗違悮解各奪俸有差御史江日彩等疏言李可灼進藥果由從哲引進與否朝臣自有耳目從哲豈無心胸但以大義斷之庸醫殺人律且有條不置于法而且賞之無以解人心之疑也貴妃不封后選侍冝移宫從哲非不兩有揭進但意復悠悠可緩可速非古大臣決大疑定大難之勇乃若以衰世之恭號當神祖之徽稱直是不學無術至于張差處法只合如此從古有明行之法有不可明行之法直以行之史册此類是也以風癲處者所以全家庭骨肉之恩而定中外一時之危有何士晉陸大受諸臣之偉議所以折姦謀之露而維萬古綱常之大有此處法不可無此議論有此議論無妨有此處法兩存之乃成偏執之亦非今獨李可灼未置法為不了之局或辟或遣惟所用之方從哲惟是卑卑庸器識不足決機力無能任巨遇事眼昏當局氣靡青史自有定評萬古難逃斧鉞必欲以春秋誅心之法啓皇上手滑之事亦臣子所不忍為時方從哲自請褫奪不許科臣張鵬雲追理張差案刻劉廷元保姦尚書張問逹覆奏其罪廷元降級調外賜方孝孺祭葬特諡命鍾羽正左僉都協理院事孫祖壽署都督僉事鎮守薊州永平山海備倭總兵李維新署都督僉事鎮守陜西山東都司廖棟破武安賊巢焚之選庶吉士蔣德璟鄭鄤李明􅌖倪元璐楊玉珂倪嘉善黃道周張士範朱之俊張四知楊行恕黃錦齊心孝劉必逹陳監方逢年王錫衮許士柔鄭之玄劉先春李紹芳陳維新陳其美南居仁文安之王鐸杜三策孫之獬李若琳王鳴玉陳演梁應材謝得傳王啓元屈可伸三十五人巡邊尚書張鶴鳴復命尋引疾回籍大學士孫承宗疏請詣關門相度上嘉諭賜蟒玉隆禮寵之馮三元輔河南道張修德輔四川道吏部請復職贈廕官九人馮應京吳寶秀李沂曽學程盧洪春王正志華鈺王翰吳應鴻復職贈官六十六人顧憲成張棟李獻可孟化鯉駱于仁等贈講臣唐文獻太子太保廕子中書命考選勿拘資格即科貢一體與選廷臣集議言官以紅丸事各疏參方從哲戎政尚書黃克纘奏言官信口詆誣欲擠人于弒逆不思臣子之于君父當保全其令名信口汚衊誠不知忠孝為何物祈為先帝雪此詆誣以明當日侍湯藥啓手足之真情吏部尚書張問逹戶部尚書汪應蛟公奏曰當日進藥始末輔臣與九卿科道所共見聞輔臣視皇考之疾妻然共切弒逆二字何可忍言但可灼妄意進藥處分即應重票乃先票罰俸繼票飬病去則失之太輕也輔臣已自請削奪為法受惡亦引罪之道冝爾李可灼非醫官也以紅丸輕進而龍馭上升罪勝誅乎應究問以正刑章崔文升身膺提督可灼輕進之時何不詳察罪又在可灼上矣并應從重究擬如此則肅法紀而公憤泄輔臣之心亦可自明矣上曰李可灼素不知醫􅛽圖僥幸委應重處舊輔方從哲票擬失于太輕然心迹自明何可輕議李可灼拿送法司究問正罪崔文升仍發遣南京此事紛紜多日今處分已定不得牽纒瀆奏再生事端七月添發廣兵以護運道勒贊畫少卿劉時俊回籍川湖總督張我續劾時俊遣賀奢寅及賞銀回帖并為逆賊投遞訴亂上曰時俊素受國恩此事未可輕信著暫回籍查明具奏戎政尚書黃克纘引病回籍太常少卿高攀龍復追理方從哲崔文升鄭養性罪旨責罰俸詔册范氏為慧妃淫雨壞山海邉墻諭東西贊畫監軍兵都歸總兵官統攝料理命太常少卿董其昌兼侍讀學士禮部尚書顧秉謙侍郎周如磐教習庶吉士內旨諭部佟卜年為佟飬真報仇投陶朗先處監軍讒害毛文龍今文龍所獲姦細劉一瓛杜茂明供李永芳致書通卜年刑部尚書王紀不即理問顯是徇私賣法著革職為民賊攻曲阜却之淮徐守備朱兆南驅斬夏鎮妖賊運道始通山東大雨連日總兵楊基乘雨破賊于兖州城南遊擊蔣紹芳都司廖棟分兵夾攻之殺賊千餘人遁至橫河復為山水淹死無𢾗禮部尚書孫慎行乞歸允之以錦衣衛都督許顯純鎮撫司理刑𬋩事二十一日祭告神宗顯皇帝神主奉安太廟大學士葉向髙申救司寇王紀曰紀與閣臣沈㴶相攻但責以大臣爭論失體紀自無辭今乃以佟劉之獄加以黜遂則從來所無之事何宗彥史繼階亦救之俱不允升李若圭楊漣太常少卿川湖總督張我續參奏總兵薛來胤逃避革職回衛勘究朝鮮入貢平遼總兵毛文龍奏登鮮聯合布置之謀大學士沈㴶罷歸安酋復攻陷遵義貴州總兵楊愈茂推官郭象儀與賊戰于白杵營死之賊破烏撒衛指揮管良相死之八月削太僕少卿滿朝薦籍朝薦疏天人交窮歷𢾗朝廷種種顛倒成于陛下者十之一二成于當事大臣者十之八九以祖宗金輝玉烺之彝典屑越于畫蛇指鹿之訛言以祖宗龍攀鳯附之忠賢摧朽于劔腹戟拳之毒螫以祖宗􅌨風沐雨之基圖破裂于昵鷹弄犬之樞策陛下何負于臣子乃臣子之忍負陛下一至于此得旨切責落職為民贈張銓兵部尚書諡忠烈何廷魁髙邦佐大理寺卿敕建祠都門外歲時致祭特贈額曰三忠贈董盡倫光祿少卿盡倫合州人原任鞏昌同知奢酋之變率衆殺賊趨入榆城遇伏兵刺死上嘉其忠廕一子世衛正千戶仍立祠歲祀敇旌朝鮮忠節加賞陪臣吳元謙以下有差詔給奉聖夫人墳價銀五萬兩大學士孫承宗以經略難遽得人願親督理關城兵務許之改王在晉南京兵部尚書以閻鳴泰僉都巡撫遼東山海蠲免磁器等稅武邑妖賊干弘志倡亂天津南援監軍僉事來斯行及巡撫張鳯翔勦平之魏應嘉韓繼思朱童蒙升吏戶兵科都給事中三法司再會審佟卜年仍議流三千里杜茂劉一瓛劉淂功俱斬罪以李維新為四川總兵申飾驛遞冒濫應天巡撫王象恆疏東南賦役獨重民情疲纍堪憐請盡蠲積逋漸減加派欵議改折報聞薛敷政升太僕少卿九月命董漢儒兵部尚書陳薦南吏部尚書改南禮書周應嘉為禮部尚書掌詹事都御史鄒元標副都御史馮從吾乞休不允兵科朱童蒙論元標從吾立院會講為務不急恐起門戶之漸欲元標等修職業惜精神以東林為戒元標從吾各疏言講學有益于治理各求罷優詔答之大學士孫承宗奏大兵屯于山海以選練兵將為實事以結連西虜為活著以東向進取為正而以時乎彌串時乎廣鹿時乎覺華為竒乘風汛之便得兵將之戒舟楫既具器械悉備一鼓而北抵乎皇城廣鹿之間東可以聨鎮江西可以通覺華而三方之聲勢若逺相應合四衛之規畫竟可進取下部議覆命曽欽為湖廣總兵張嘉策署都督僉事徐州總兵西酋受欵經略王在晉開列奏聞有旨嘉慰册皇五弟為信王是為崇禎皇帝吏科給事中甄淑請文武一例殿試以尊主權山東妖賊流劫金山口徐州震動原任經略兵部尚書王在晉豫告回籍恤遼左戰亡將士劉渠祁秉忠贈少保左都廕子世指揮僉事張斌贈都督僉事俱祠祀演象所火藥房燬諭禮部册封光廟選侍李氏為莊妃諭內閣中宫誕育伊邇暫免今歲省直行刑十月官兵破滕城徐鴻儒就擒山東賊平優敘嬰城勞臣加朱燮元兵部右侍郎仍巡撫四川李橒兵部右侍郎史永安太僕少卿仍協心戰守務保萬全鳳凰見于大嵬山九日至十二日去十六日皇一女生詔加黔國公沐啓元都督僉事給敇書責令調度協勦命魯欽以原官總川湖貴州土漢官兵進剿四川獻樊龍何若海等俘祭告郊廟贈義烈土司彭象都督僉事彭象周彭鯤翔彭天祐各都司僉事奉命援遼一門戰沒者左都御史鄒天標四疏乞休允之册封代肅益晉唐韓慶趙瀋福建德樂安各王府遣正副使趙之龍甄淑等二十四員出翰林院修撰文震孟于外震盂疏陳勤政講學之實上以朝儀大典纍朝成規輒肆輕褻比擬傀儡降級調外輔臣葉向髙請召還不聽贈副使孫好古大理卿廕世千戶袁應泰贈兵部尚書廕千戶世襲十一月册封光廟選侍劉氏為貞靖賢妃命趙南星左都御史蔡復一副都巡撫鄖陽耿廷柏僉都巡撫浙江御史蔣允儀請除立枷苛政且言計期已迫當進君子退小人母蹈丁已之羅織旨責罰俸寧夏等衛陜西西安等縣地震諭復前降劉重慶倪思輝朱欽相王心一吳應原官獻逆犯徐鴻儒等俘告廟御史蘇琰疏理財三要一明示會計之𢾗以相稽一酌本折之實以省蠧一究侵冒之贓以塞漏諭考察訪單必書名投送準李可灼遣戌詔賜大學士孫承宗督師總鎮等官王象乾等各貂皮有差升余茂衡左副都御史協理院事周應秋工部右侍郎協理殿門功程楊述中兵部左侍郎兼僉都御史總督貴州兼制湖廣雲南朱燮元兵部左侍郎兼僉都御史總督四川命年例霍維華孫杰即轉京堂贈徐可求右都御史廕世千戶十二月發帑金三十萬餉滇黔之師詔修復孟氏墓廟并存恤孟氏𬒳賊子孫大學士何宗彥奏宗室開科此係特典足光天潢上以為甚淂風勵之意命著為令貴州巡按史永安奏臣苦守貴陽已歷四序自援兵甕城失利賊逼營城下塘報絶迹賊據城外數處山岡作廂樓下伐城樹官兵設計燬之東南隅架廂進攻益急糧米罄于六月至八月民間之米又罄父子母女竟相食矣白骨處處成堆死亡幾盡士民尚欲固守亦古今未有之人情也獨恨撫臣王三善者受命撫黔業經一期當水藺交叛時猶從容就道半載而始至沆州兩月而始至平越又五月音問杳然竟未遣一兵至亦未發一粒至求援之文疾呼而不答有謂其故意挨延希圖賄囑缷擔者至于總督張我續奉旨援黔亦無一兵至黔而總兵杜文煥不知尚在何處此際惟有神兵旦暮間從空而下或可救援臣與張許結友于地下矣上切責三善我續勒作速進剿黔兵擊殺安酋邦俊餘黨潰散張我續以捷聞以山東平賊功巡撫趙彥加升兵部尚書兼右僉都張鳯翔馮嘉會以弭盜安民勞績並著各升右副都俱照舊巡撫以魯王捐資助餉敇奬優賜左都御史趙南星論人臣服官之義以職業操守二者程其才品勤慎主于集事則氷淵自􅏮早夜靡寧者為真才不則厭薄蘧廬驕語髙曠當與委頓不前者併論矣介節矢以持躬則淡泊自甘齒頰不苟者為真品不則往來竿牘仗勢私撓幾與苞苴公行者無殊矣原任御史劉重慶王心一輔山西江西道升熊明遇南僉都提督操江吕兆熊戶部右侍即僉都總漕周起元右僉都巡撫應天王三善進兵黔省圍解三善駐平越候椘蜀兵不至大會諸將曰省城不能待矣外援不至吾輩死法死敵等死爾尚何俟命道何天麟楊世賞督兵為左右部從清水都勻進自將二萬人與道臣向日升從中路進當賊鋒次新安賊報至營中驚優欲退三善曰退即虀粉以死捍之按兵不動卒無賊劉超為前部三善策馬繼之超兵遇賊却超下馬斬兵二人持刀斷賊一標賊首阿成驍勇善戰超與部兵張良俊直前斬其首賊遂披靡適三善大兵至大噪齊進奪龍里城賊衆復集大戰却之衆議曰此地去省會四十里賊必有重兵堵截冝少休三善曰我兵猝至賊無備不能持久急擊之勿失䇿馬先進賊覘者始知新撫自將意有𢾗十萬兵至相顧駭愕安邦彥紿其衆曰吾當增兵來助遂遁去賊相率退屯龍洞官兵奪髙寨七里沖乘勝進畢節賊步騎如雲孫允謨將所製木發貢七門齊發賊死無算楊明楷率鳥羅兵如牆而進賊大奔敗所棄輜重器械山積遂乘勝直抵城下李橒史永安劉玄錫死守者幾十月旦夕且陷忽見賊兵奔潰如蟻喊聲雷震俄五騎衝鋒至城下云新撫至矣軍民大悅慶更生是時三善以二萬人破賊十萬橒等迎入城三善曰賊兵不逺軍心未定我大帥也不可即安遂營于南門外坡上大雪移營宅溪賊遠遁廣陸河外上以言官多命暫停行取吏部奏行文已取勢難中止又命取者復任是後三年一取何熊祥改南吏部尚書天啓三年癸亥正月御史夏之令極言毛文龍不足牽制不必應援不必協助江日彩劾文龍效巡方官例列四六考語特疏舉刺東征將士及海運委官以至朝鮮君臣經略督餉部院司道登萊巡撫海防各道盡入薦牘越爼駭聽俱不報以玉牒成加恩首輔向髙次輔爌宗彥國祚繼階承宗進爵廕子有差吳應琦仍輔大理左寺丞命朱國禎顧秉謙朱延禧魏廣微為大學士入閣辦事南直巡按易昌進車炮製式黔師敗于陸廣鴨池𥘉諸軍視賊過易前鋒楊明楷率兵渡河札營三十里外一軍屯陸廣向大方奢社輝一軍屯鴨池河向安邦彥巢穴賊紏藺酋與雲南安劾良等率衆𢾗萬并力攻陸廣楊明楷奮勇接戰蒙兵先潰衆亂溺水死者𢾗千明楷陷賊中賊乘勝政鴨池兵退威清王三善收兵入城苗仲復肆掠自龍里至甕城尸橫四十里二月提督操江熊明遇奏上元江寧等縣地震應天常鎮楊州地震有聲以顧秉謙朱禧參經筵日講并實録總裁黃嘉善崔景榮張鶴鳴俱以紏拾致仕李長庚改戶部尚書盛以弘改禮部尚書張輔之改南工部尚書奪御史周宗建俸南御史徐世榮劾宗建保舉熊廷弼宗建疏辨詞連郭鞏有結交宫闈獻娼進忠之語中旨切責命鄭養性離脫都門擇便居住為御史陳必謙所奏已經昭雪也工部尚書姚思仁回籍以鍾羽正代起李三才南戶部尚書命中使頒賞邉關將士大學士孫承宗奏曰中使關涉兵政自古有戒皇上使命不遣大臣而遣內臣且多至四十餘人今命使既行無容再議但念兵不可玩或以創而成例臣願皇上毖飾使臣無以此行為常優旨褒答詔賜總兵毛文龍尚方劍璽書關防加其弟雲龍錦衣衛職銜令賫以行三月南科臣徐憲卿奏請揆臣參用內外不聼工部尚書王佐卒贈少傅陳大道升户部尚書吏部奏地方需人甚亟上曰行取定規已有屢旨據內外離任各官員缺既多調輔難以復任姑準今次考選以後仍遵舊制非風憲急缺不得輒請都察院以申明憲職事奏上曰御史回道考核載在令甲邇來視為具文巡按所屬各官舉劾失真貪酷漏網及至報滿復命不論稱職與否概擬回道徇情市恩以致吏治日偷民窮思亂關係豈細所奏差滿舉劾咨訪考察等事開載憲綱遵行以黔師失利詔楊𫐠中魯欽䇿勵勦守何士晉督發沐昌祚赴援輔臣葉向髙朱國祚史繼階屢疏乞骸上宣諭頻留調刑部郎中周以典于外奪其三秩論倪文盜庫罪絞失魏忠賢意也諭內閣邇來科道各官條奏章疏朝上夕下朕未嘗寢何乃在外擅發私揭代人報復私忿排誣善類朋比鴟爭非勝不已全無忠君為國謀益封疆屢有諭旨嚴禁不遵卿等傳示大小臣工都要殫心恪共所職如仍前抗違無端狂逞自干覆蹈欺背之罪必不容恕起李維楨南太常卿贈白瑜刑部尚書豫廕貴州巡撫王三善剿賊于洪邉姑蕩擒賊宋萬化劉洪祖等萬化驍勇善戰洪祖為軍師邦彥倚之至是奪氣四月京師地震欽天監失占上怒嚴旨責禮部尚書盛以弘疏誤司官以下降謫輔臣葉向髙揭救釋之戶科郭鞏疏邪黨亂政上曰朝廷設立言官所賴矢心獻替裨輔國家乃近來科道官不以國事為重封疆為急各持偏私互相攻擊不顧國體以致上天示警亢旱曀霾夷寇妖逆窺伺狂逞不思乖戾干和煩言亂政反諉調燮有失帷幄疏謀本當召問所奏事情力行裁斷且著大小九卿從公會看奏來朕自有處大學士朱國祚豫告回籍禮部侍郎林堯俞南吏部侍郎孟時芳改禮部充副總裁纂修實録禮科郭興治奏孟夏朔日恭遇皇上親祀太廟二更時忽然地震至若蚩尤則見氐房白虹則貫太陽天鼓則鳴塞外風霾則蔽天日自春以來種種變異層見迭出御史吳甡請表章真儒王艮從祀孔廟戶科羅尚忠請敇編建文年號追復位號廟祀并死事陳迪景清黃觀黃鈛王良鐵鉉練子寧陳思賢八人贈廕祀諡其妻子節孝忠貞者并令從祀本廟鄭三俊升左僉都御史協理院事停止侍郎總理三部裁京營添設練兵官川師進攻永寧盡燒賊營復其城樊虎殺死生擒周邦泰降賊二萬副將秦衍祚復遵義監軍趙邦清納降安鑾內官趙進忠韓文逺毆辱給事中賴良佐命司禮監查奏良佐𬒳旨詰責五月朝鮮王李琿為其侄李倧所篡倧久懷逆謀與平山節度使李貴教練兵馬于外而內約其先王庶妃王氏宫中舉火為號領兵入宫縛琿投火中倧遂自稱王登撫袁可立請討之督餉侍郎畢自嚴言不必議討不可遽封安應龍合霑賊補鮓為亂雲南巡撫閔洪學討平之川將羅乾象破藺州焚其巢時奢賊屢敗總兵盧世卿禽偽御史汪澤逺偽參謀文道南副將秦翼明禽偽監軍夏竒雲偽給事孔聞過并偽印十餘獲鎧仗如山奢賊狼狽投降水西以美女黃金借兵合窺遵永官兵復敗之於芝麻塘賊遁入青山以林堯俞為禮部尚書駱從宇為禮部右侍郎充副總裁遼撫閻鳴泰罷以張鳯翼代先是會推遼撫以韓策命已下而為科臣所劾上令部加慎推舉又令明開才略何如何人薦舉于是部以張鳯翼郝名臣翼鳯翀張策四人上係兵部尚書董漢儒吏科程注御史李時榮所薦遂點鳯翼大學士孫承宗乞休溫旨勉留遣官宣諭賜銀幣羊酒勞之禮部尚書盛以弘豫告回籍南京永福永壽二宫災六月吏科郭興言奏人情玩愒法紀陵夷如管大藩之逗留海上而寬梟示之誅陳天敘之夾帶硝黃而緩逮問之條劉時俊潛通逆賊鬻利賣國而竟漏吞舟之網劉國俊托名賑濟冒帑金𢾗萬而不惜並勘之差甚至去年之募兵毀都司房屋汪應蛟每兵給黃錢四百文而去是賞亂也今年之營軍鼓噪大肆凌爍於總督吳汝胤之門而不一問是兒戲也不報內官張守仁等豫索冬衣銀兩群噪于工部堂尚書鍾羽正致仕御史吳甡請舉視學大典寵進儒雅慱求海內經明行修之士如李光縉陳繼儒之流徵詣公車庶幾執經問難之風先朝嶽正舒芬皆以直諌著聲詞林如文震孟輩列在經筵必能剖忠陳讜開悟聖心上諭明年舉行虜犯密雲崖谷邉將禦却之七月南御史李希孔再折邪議懇特敇纂修諸臣據事直書上曰實録傳信萬世自有公論付史館參酌諭吏部戶部司官有奉公革弊曽經苦差著有勞績破格優敘在禮兵二部之上交夷入犯廣西巡撫河士晉率兵敗之大學士史繼階豫告回籍十六日進纂修光宗皇帝實録命吳汝弼至祠行禮加恩監修總裁官命太監王體乾魏進忠等并客氏子姪俱世襲錦衣官尚書董漢儒言會典及軍政條例並無故事一旦使金吾世胄盡為婦寺之胤不幾令武功人人無色哉不聽兵部尚書董漢儒憂去工科方有度為遼事上言兵者易聚而難消也今軍必不可罷矣財者難豐而易耗也今用必不可舒矣衆者難得而易失也今民必不可重困矣計天下正供九邉額餉歲入太倉庫銀約三百四十餘萬今遼餉加派乃至四百八十五萬缺餉一百六十二萬請戶兵二部總合打算要見現在之兵作何養法現缺之餉作何輔法上命戶兵二部詳議具奏八月恤滕縣知縣姫文胤豫祭建祠發內帑銀五萬兩太㒒寺馬價十萬兩充薊遼撫賞命趙彥以兵部尚書回部御史周宗建請查光祿寺錢糧節省過多上曰寺積餘銀係內監減省糧鹽係祖制御食之物輒敢任意議折紊亂成規不必輕議旌奬蜀王助餉葉向髙揭請添注京堂太常少卿胡克儉請正鄉學祀典之缺禁治四書笑劇之非以興斯文端士本詔即行之嚴飾外解軍需入考成參劾將行郊祀合用纓甲馬匹內監令取之民間太僕卿栁佐爭曰御馬監二十四房原備法駕之用每歲費銀十餘萬自萬曆以來何啻百萬而不以供一日之用何也借之民間令有司候交納之苦設久假成例京營將至缺馬有旨量借一千御史劉之鳯諫開內操言虎符重兵何可倒授巷伯之手假令劉瑾擁甲士三千能束手就擒乎李應升黃尊素宋師襄交章論之尊素疏有阿保重于趙嬈禁旅近于唐末等語忠賢尤惡之皆矯旨切責福建海上紅夷築城于彭湖鎮守張嘉策被旨議處以王舜鼎為工部尚書貴州巡撫王三善獻何中蔚等俘磔之九月惠世揚起禮科都給事中李宗延改戶部尚書刑科解學龍奏為會議事曰蘇轍有言豐財者非求財而益之去害財者而巳遼兵舊額九萬四千歲餉不過四十萬今開門之兵亦止十萬而月餉乃至二十二萬二千有竒遞至寧前新兵月糧亦倍于舊此餉之當核也遼潰以來召募四集額兵不問矣乃薊密永昌競招新兵新兵日增而舊額如故此額兵當清也甲仗硝黃給彂不資一入營伍則耗不可問且闔營而逃并闔營之器械盡去甚至汰之自官亦忘器械而不稽此軍需當節也我之長技取勝在火炮蜀兵之克敵以步羅將之死守以銃此馬兵當酌也橫金者如雲如雨則有軍伴書記捍門執㸑皆實餉所養不以摧鋒而以占役此冗將當裁也國𥘉天下文官五千四百軍職二萬八千萬曆間文增至一萬六千軍職增至八萬一千今又不知幾倍矣裁一官則省一官之輿皂公費歲省𢾗十萬也武職襲替舊制比試不中豫半俸三不中者降為軍何不遵也國以民冨民富莫如粟多京邉之米輸之民不啻倍給之軍每斛易錢百文是民費其六兵食其一耳而况展轉作姦以相欺也刑部主事談謙益薦異人宋明時能役鬼破敵兵部員外鄒維璉駁之尋試無驗乃逐吏部尚書張問逹豫告回籍褒賞毛文龍𥘉金州城空有海上遺民二百潛移居之文龍覘知遣將張盤往撫盤畏不敢進屯麻洋島兩閲月後金兵掩至金州盡屠居民遂進兵麻洋燬其城而去文龍報遣兵渡江有滿浦昌城之捷時登帥沈有容又以盤大敗聞下該撫查核撫臣袁可立奏言文龍舉火放炮使敵奔命亦當優敘以勸遂降敇褒賞發帑銀三萬兩賞勞將士十月輔臣葉向髙疏請停刑奪刑部司官余繼繩洪聲逺兵馬假果官一級調外時會審李維翰楊鎬李如楨熊廷弼王化貞等散行入長安門為該科李春燁奏劾得罪命趙南星為吏部尚書贈舊輔吳道南少保祭葬廕諡皇苐一子生而薨追諡懷沖太子加屯田太僕卿董應舉右副都督理順天等處兵屯兵科陳良訓疏修兵民實政焚火耗清詞訟輯佐二遴署官以阜民之植餉本又清兵清餉清馬并責成撫按勿遣司官以去耗餉之弊已卯皇第二子生范妃出也授范守仁錦衣指揮僉事命國公張惟賢祭告南郊伯張慶臻祭告北郊駙馬侯拱辰祭告社稷祭畢百官慶賀給毛文龍􅒩糧十萬石敘畿輔殄寇功升廕巡撫張鳯翔等閏十月諭取太倉庫銀二十萬兩太僕寺銀十五萬兩光祿寺銀五萬兩順天府稅契銀五萬兩以佐給賞改孫瑋為吏部尚書𬋩都察院左都御史事鄭三俊左副都御史楊漣左僉都御史俱協理院事先是陜西套虜要挾犯寧夏報捷兵部覆姚祚端已經勘實欽天監擇十三日辰時郊廟午時宣捷奉旨行大學士孫承宗奏關東情形曰八里鋪兵民六百中前兩所兵一千五百居人可三千田五百頃髙嶺站兵三千民可千餘田可百餘頃前屯將為趙率教望其田表畷若鵝鸛之群登其陴髙厚四周屯可一千七十餘頃歲可收七萬石率教以去年率三十八人出守漸為團結而今穡事穰穰城且巋然兵民可六萬撫夷將為王牧民近遷興水中後所將為魯之甲地饒多資兵民不下萬餘田可千餘頃尚荒其半中右所將為王楹地饒于中後田可千餘頃而僅耕三百頃曹莊民自團結五十餘家回思春秒經過時今居然金盛矣寧逺去關遠去敵近城大而瑕姑以祖天壽司版築汪翥司窰造後先接河東萬餘人合兵民不下𢾗萬此城為必據必爭之地促以今歲完築其田一千五百頃而布種者四百頃覺革島去岸十八里龍宫寺地瀕海而肥土人附夾山之溝而居可五十餘家地蓋六百餘頃舊城遺址可屯兵二萬令龍武兩營分哨覺華而于山巔為臺樹赤幟下泊遼船北望黃毛山南望劉家山相對如兩門其南麓入海可為堡屯萬餘人北之孤起者曰望海圈樹赤幟置炮于上􅋈沙唬舟于下海門天設片帆不能飛渡矣寧逺東陸行黃沙白草墩臺宛肰二十里至雙樹堡蔭木猶存十里至連山堡城垣已盡十里至罩笠山可立為炮臺望大紅螺可百里東南去鎮倭堡三千六百餘步海環其三面東南有徑而險堡南為葫蘆套西有瓦窰衝海山之間可為疑為竒如以寧逺為關此地可當前茅北為塔山即中左所又東北為杏山平衍難守由椵木衝而西北為紅螺山西南抵威逺山其東接康家山折而東南為蠟子山遂至首山其西則白塔谷歷興水以西通于一片石臣擬從望海臺北接首山立關城中有平原河水環其下可為堡直接康家山以戚繼光修薊門法為臺垣約可六十餘丈地當險要可以盡收形勢于內而外截東來之路蓋據大勢于首山而山海關在重垣之內矣開屯之議趙率教以修守之餘試之而效總計五城三十堡兵民不下十餘萬而可田之地當有五千餘頃儘民力可占種者許以三年起科而因煤以鑄錢因地以煮鹽皆關門稍行之而效者令袁崇煥經營寧逺查國寧督水兵於覺華臣與鹿善繼得以備關城者傋前屯以守為戰以貽永逸升蕭雲舉為禮部尚書掌詹事府事進封慧妃范氏為皇貴妃進新城伯王升為侯貴妃弟范守仁都督加輔臣向髙上柱國廕子尚寶司丞爌左柱國廕子中書宗彥承宗國禎秉謙各少保廣微太子太保各廕子入監南京齊庶人􅐶爁監生陳鼎相謀逆事覺捕繫湖廣報牛豕生妖陜西報鼠怪南道御史王允成奏纍朝應諡未諡名臣自開國至嘉隆十五臣學士陶安中丞章溢為開國謀議之臣南昌知府葉琛縉雲伯胡深丹陽男孫炎為開國死事之臣內閣翼儲之臣曰左春坊解縉兵功之臣曰都御史髙明侍郎孔鏞贈光祿卿任環都御史朱紈撫綏之臣曰都御史黃紱徐恪直諌死事之臣曰按察使周新贈光祿寺少卿蔣欽贈御史孟陽近世四人光祿少卿顧憲成塗杰兵部尚書王世揚都御史王象恆事下部議十一月丁巳朔冬至上祀天于圜丘念天寒軍士守衛勞苦禮畢即還宫覃恩諭加講官鄭以偉錢象坤禮部尚書趙秉忠加太子賔容成基命升少詹薑逢元王祚遠升左諭德正字官張邦經改光祿少卿禮科魏大中駁故福撫陳子貞冒濫請諡乞敇該部以會典條例為例不得準舊年破例之例為例戶科孫紹統奏祖宗朝南北卿寺司正少丞各一二人總計不過三十員今籍名起廢添注總計一百三四十員至令無地可置部屬各有職掌厭薄此而覬覦彼引手衣鉢賄賂章行臺省耳目近臣現缺取用今需次候缺比于倉巡下吏甚至弭盜小事而侈言軍功腹裏善地而託言邉俸撫臣節鉞以資彈壓也近來欲疏京堂先速巡撫專制之席未暖而推報已至藩臬司道升轉倐忽人人熱心京堂袛知速化不𬋩績成矣御史黃尊素奏時勢極窮之會綱紐漸解之形雖皇上朝講不廢批發如流不惜名位不吝帑藏而法尤奄奄不振也兵興以來斷送𢾗十萬生靈去百年之強土但見官日增爵日崇而人心玩愒日甚可謂有法乎日日募兵塞上不增金錢徒費干戈𢾗起可謂有法乎日勘日議日逮及至都門即行若東陵或以為西山姦若操莾或以為臯夔到底紛紛未之有已可謂有法乎卿秩滿座督撫畏途但知內地之尊崇誰念關山之險要而既得鷹轉又復兔營濟濟之中轉成攘攘或用挑激或用聨合朝端之纓冕為縱橫押閣之場矣而官常有法乎起廢以收碩望而何庸碌之不遺贈興以旌忠魂而何實姦之不辨名位及于爛羊錫廕輕于敝袴甚至𬒳參者不踰半載而登啓事𬒳論者不踰旬日而晉清卿銓政其有法乎不特此也帑金千萬俱委為不可知之物黃蓋滿街竟不知何處來之官逃亡幾空卒伍鼓噪近逼京師僇力疆場者應從優敘而袖手何以濫無功之賞膏血原野者尚冝憐怛而京觀何以示日後之名則樞政猶有法乎皆以年來徇體面無不周到而求之割情則不能掠美名無不攘臂而求之任怨則不能擇便地無不走騖而求其任勞則不能所以湊成不痛不癢之世界而釀為俱汨俱沒之人情也朗素臨邉索賞官軍敗績于仙靈寺守將王楹𬒳殺命太監李鳯翔守備承天府馮玉提督太嶽分守湖廣行都司尚書趙南星奏銓政之害在干進皆由良心汨沒以為當然雖小民日在水火中而居官絶無救民之意夫救民莫過巡撫誠得德望威稜自能使貪汚解綏其次則知府最急賢則縣官不敢害民皆冝久任而優擢者近且以討缺為常掣籖之法從所未有自萬曆間始用之以示公遂有造籖之法討缺者無不如意宜變之以復祖宗之舊例敘川貴搗巢解圍功朱燮元加右都兵部右侍郎仍總督楊述中升俸一級俟推用王三善加兵部左侍郎右僉都薛貞加右副都俱照舊巡撫以皇子覃恩廕趙南星等子入監凡四十四人川兵入龍場陳獲奢崇明妻安氏及奢崇輝蔡金貴等安位母子遣漢把劉光祚赴鎮乞降楊述中許之授賊黨袁紹等狀令擒奢寅父子自贖而撫按會議亦勒安位母子縛解安邦彥奢寅肰後請旨治罪大抵三善以元凶未窮當用剿為撫而述中一意主撫議遂不合福建逐紅夷擒其酋盡焚其舟十二月諭吏部巡撫久任及各官遷轉皆論實俸深切銓政著實舉行京堂壅滯以後不得濫推其巡撫員缺著照舊例兼推方面官有司賢否撫按官嚴督司道從實開報不得朦朧庇護違者事發并治録延寧邉功賞廕文武官楊應聘祁伯裕等三百八十九人御史髙推劾奏舊本兵黃嘉善張鶴鳴當封疆淪喪一籌莫展而延寧敘捷錦衣世襲清夜捫心何以自安有旨不必追論册封李氏為成妃贈死事安定知縣董盡倫光祿少卿廕子世指揮僉事濯縣知縣左重贈尚寶司卿廕子世千戶大學士孫承宗請去經略而移總督于關城以薊撫居密遼撫居寧前權歸于兩撫而督臣時問焉乞罷臣督師以省二三或令臣姑還闕下比識途之老馬如必不欲臣離關則請去經略督撫只以臣一人督兩撫臣如推督臣則願有請不肯居東者勿推任撫不任勦者勿推同功不肯同過者勿推顧局面不顧安危者勿推如止以臣任關城亦願有請終年不令一覲則不能任不時豫餉用軍需則不能任不斷臣所奏請而令兵部議可否則不能任身同外吏無以自明李泌所謂待聖意殺臣而後求去晚矣于是吏部奉旨總督且不必推承宗又奏登鎮不可議裁登鎮去三坌覺華島只兩日風可至而東江路迂取金州于棄去之後竟不能守乃錢糧之給發先東江而後登有三月不餉者率枵腹之衆而責破浪之功難矣督臣王象乾以憂聞銓臣方急議推而樞輔躊蹰鄭重將議奏撤上曰𣢾夷叩關督臣象乾還著料理撫賞候事完離任叛逆姦細韓宗功等伏誅宗功以副總兵叛去復潛往張家灣探聼𬒳獲并其子韓攀桂俱戮于市元輔向髙以六年考滿晉官太傳上柱國江南地震
