front:
  text: 嗣善刑訊之進朝恐誣奏嗣善索錢肆虐職官命嗣善同進朝下法司問給事中周永春疏因一近侍而處縣官此屈縣官執法之心長近侍驕蹇之氣慚不可長乞將嗣善免行提問不報大學士葉向髙請輔户禮二部尚書言户部事務最急者如各邉請餉無人給彂各處解銀無人批收如咽喉哽塞一切飲食出納皆不得通最為困急禮部則頒曆賀冬皆其所典如進貢畨夷六七百人遂至停滯不能發遣留一日費光祿寺一日供給此關係最急疏入不報吏部侍郎孫繼臯卒贈禮部尚書無錫人時婁江有女仙化去乞為之傳固謝不敏曰天子春秋鼎盛事出大臣家勢且上聞吾恐安期羡門之説從此興矣人服其逺識十一月壬寅朔泰寧等衛屬夷各求加賞準各加三表裏衣服一襲以為夷人效順者勸時冬雪不降命順天府竭誠祈禱以聖母萬壽詔今歲暫免行刑十二月壬申朔大學士葉向髙厯疏辭恩命上優詔答之不允閣臣葉向髙請撤回承天守備太監杜茂茂縱參隨劉文藻藺光𥙿等肆橫承天知府馮勞謙拘光𥙿等禁之茂遂訐奏勞謙上令文書房官傳諭照碑文出旨向髙因言皇祖敕諭雖有守備官校事犯重大奏請處治之文而光𥙿等平日所為士民怨憤已甚巡按官經過其地遮道哭訴勢甚洶洶恐致生變令該府官先行拘繫而後奏聞此權冝解紛保安重地之計非得已也擬將文藻光𥙿解送法司從公究問勞謙奪俸改調杜茂必須取回不報乙未皇太子第五子生命名由檢是為思宗皇帝母選侍劉氏是為孝純皇后是年原任大學士王錫爵卒贈太保諡文肅廕其子尚寶司丞太倉州人癯然若不勝衣而強毅方正江陵奪情事起錫爵以省親乞歸人謂相君不知有父而君顧省父以形其短乎錫爵曰吾知有父遑惜其他後江陵敗人以搏擊為名髙錫爵獨調護其間士論多之上雅重其品書名御屏署曰清正眷注獨隆爵遺疏奏言近日祖宗舊章漸至于凌替國家大政多廢于因循邉方之釁隙已萌財計之空虛已極人才之擯棄可惜民心之嗟嘆可虞伏望首勤儲講以重元良速發章奏以振朝綱備設官員以理國事收廢棄之才以從人望罷抽稅之使以慰民心節禁廷之供應以𥙿資儲捐帑藏之積餘以濟荒乏惟皇上採擇而斷決焉臣雖無路號天亦含笑入地矣上覽奏嘉其忠愛萬曆三十九年辛亥正月壬寅朔吏部請考察日期兵部請考選軍政日期原擬正月二十八日聖諭以在二月𥘉二逾𢾗日又不下大學士葉向髙題考選軍政國家所以振肅紀綱修明戎秩者惟此六年一舉之舊章已經兩月未蒙允發外辨乘之為非人心因而疑駭矣吏部奏國家無任情破法之官常臣子無趨易避難之職業謹條八欵用禆銓政其一申明查補久缺之例一申明轉發文慿之例一申明進表回任之例一申明雙月查慿之例一申明患病改限之例一申明扣缺寬限之例得旨嚴行申飾遵守給事中宋一韓奏東厰之設所以防壅發姦非以籍勢肆蠆成化時陳凖提督止緝大盜不問有司細事至今傳為美談乃太監李浚倚任群小表裏為姦冨室大啇肆行需索乞賜斥逐别選公忠持重者安京師以安天下報聞二月原任武昌府同知今繫獄卞孔時以父故疏請釋放奔喪不報孔時因忤稅璫陳奉被逮大學士葉向髙亦為之請併請釋滿朝薦王邦才不省南京刑部尚書李楨不候命下擅自出城上切責之大學士葉向髙因言楨由真病似難過責舊制大臣四品以下官請告每一疏即允三品以上再疏三疏至四五疏而極並未有十餘疏猶不聼者年來大臣得諸者百無一二至如輔臣李廷機部臣趙世卿皆羈留𢾗載疏至百餘閣臣旅棲于荒廟部卿候命于近郊今尚書孫丕掦李化龍又以考察軍政不下相率求去若復踵楨所為成何紀綱故欲禁諸臣之擅去必先體諸臣之去留可留則留且行其言以安其身不可留則聼明自裁斷母事虛拘則臣子之進退得全而朝廷之體統不失矣漕撫李三才出境有旨準去漕事命總河劉士忠兼挕虜犯蘭州三月御史金忠士等疏言今日行政雖有機務多端疏壅決流總在章奏一發因列為七𣢾一曰儲教之疏冝下二曰枚卜之疏宜下三曰補大􅒼之疏冝下四曰催考選之疏宜下五曰起廢官之疏冝下六曰釋纍臣之疏冝下七曰撤稅使之疏冝下不報大計京官工科給事中歸子顧疏言東南賦役莫苦于北運其受纍之甚一曰水腳之侵年二曰沿途之需詐三曰交納之留難而其遲延更不堪者則漕船虐阻之也夫軍與民均為王臣一銖一粒皆皇上所頒賜而享之者也獨奈何而公私視之何不嚴為令甲雖五府之中裨得隨到隨行即漕艘未過閘何妨民艘之先過也或先或後聼其自便要以不違限為主如此則五六月風波之險既不能及而十一二月守凍之費亦可少省矣兵部尚書蕭大亨卒臨清人久歷邉郵延攬􅓪度凡地形險易軍儲盈縮將吏能否虜情向背皆洞若燭然當西陲主戰東事主欵皆與石星抵牾雖嚴旨切責而卒不奉詔其持平秉公蓋如此四月庚午準以安靖為隴川宣撫司命多思談仍以土同知協理又責成南甸千崖兩司保任從兵部尚書李化龍滇南善後議也削御史金明時籍為民明時奉命巡關吏部侍郎王圖之子為寶抵知縣明時疏劾之其中偶犯御諱尚書孫丕掦以聞聖意甚怒即令定罪葉向髙為解之擬降級再下改票削籍聖怒始釋自明時黜論丕掦者藉藉矣刑部主事秦聚奎間住聚奎論劾王圖孫丕掦結黨欺君假公害正申救金明時及與察湯賔尹等七人丕掦亦參聚奎撓亂察典上發二疏及湯賔尹等訪單命內閣看議向髙言煌煌察典二百餘人無一人干犯而聚奎獨有此疏則後來恐無人敢任怨主持至于湯賔尹等列名察典亦足示懲若復下所司窮治則茫無了期似冝只考察處分惟亟下考察及年例推升各疏庶人心定而大典光矣上曰秦聚奎妄行奏訐褫黜間住湯賔尹等照察推升疏及處分察疏即檢發怡神殿災命隴鶴書承襲鎮雄府土知府爵從巡撫喬璧星議也五月京城大水長安門一帶皆成長河水深五六尺時春夏久旱二麥無收正喜得雨又復過當苗稼盡為損傷山東河南兩廣皆大水大學士葉向髙請留北直隸山東山西河南稅銀一半令地方官多方賑濟許之大學士葉向髙尚書李化龍侍郎蕭雲舉史繼階副都御史許弘綱各疏求罷吏部尚書孫丕掦以考察為人攻擊乞罷不允王圖辭闕出城大計報允時王圖為吏部左侍郎北察凡非東林者必去史繼階為南京吏部侍郎南察凡非東林者必留先是史記事于察典未行前極論內閣自時行錫爵一貫𢋫廷機衣鉢相傳將及顧天峻并論沈思孝周孔教等逮察典既舉御史金明時名在察中尚留中未下遂上疏攻王圖及史記事徐縉芳又疏攻圖及李三才顧憲成丕掦怒明時撓亂大計先以疏中字犯御諱擬明時罪明時復疏攻掌察科道湯兆京曺于汴已而秦聚奎疏攻王圖以救明時舉朝分為二黨羣起交攻攻東林者以王圖顧憲成李三才為首攻之者金明時秦聚奎葉國縉鄭繼芳朱一桂王三善周永春徐兆魁姚宗文髙節王萬祚張鳯彩趙維成徐紹吉歸子顧馬從龍周逹王紹徽張延登趙興邦亓詩教孫光𥙿田生金吳亮嗣官應震劉廷元張銓毛一鷺趙宗孟韓浚金汝諧劉光復攻非東林者以顧天峻湯賓尹蕭雲舉為首攻之者史記事李炳恭湯兆京丁元薦徐良彥馬孟楨胡欣吳炯張養正喬允升沈正宗洪文衡李廷華曹于汴吉人賀烺李朴錢春周起元劉策李徴儀宋磬吳良輔魏雲中孫居相劉宗周朝廷紛若聚訟大學士葉向髙揭以丕掦留放不敢擅擬請裁斷上曰孫丕掦公忠介直著出溫旨勉留供職蕭雲舉許弘綱都著即出以後各官不得立黨植私紛紜攻訐貽􅍔國家違者重究六月兵部尚書李化龍奏遼左無處不守當以欵而佐戰甘延兵勢甚徑當以戰而固欵此其大凡也一言以蔽之曰勿恃欵勿忘戰而已合通行總督鎮撫嚴督文武將吏參酌近日虜情實心料理隨事整頓詔秋防事冝實心整飾毋得怠玩致誤軍機命侍郎李汝革署户部事七月工部侍郎劉元霖言錢法凌替謂私鑄之禁以其與國家爭利權也惟平價以市銅啇賈無憚于官買而私買者自息八月禮部侍郎翁正春恭獻萬壽八針援金鑑録之意一清君心一遵祖訓一振國紀一信臣􅒼一寶賢才一謹財用一恤民命一重邊防倉場總督孫瑋以漕儲遲緩奏言通德二倉去京師不逺若河氷未結暫以貯之不妨漸致所省陸運之費不資以舒應龍為兵部尚書提督京營戎政林烴為南京工部尚書九月丁酉朔總督薊遼侍郎王象乾奏報遼東大捷遼鎮自有髙平之捷虜始震疊求𣢾其後狃𣢾忘戰虜遂驕橫強要市賞至于𢾗萬外庫不敷仰給中帑粆花盤踞鎮城東北居兩河之中有九子之強加宰賽暖兔之助左可窺遼瀋右可窺錦義廣寧歷年以來每入犯即要挾每挾即加賞既已題明革賞頃七月間紏衆要挾我兵擊之頗有斬獲蓋不知我之驟能戰也遂拔營而遁于額力業居焉二十九日天鳴刨震粆花驚赱再徙過老河距邉幾四百里許而其第三子色特笑父之弱由額力業而南移之可可母林之間圖便入犯哨探已明撫鎮道臣豫戒以待虜前哨入邉果為伏兵斬之又出邉對敵追之白雲山共擒斬三百四十餘名口逺近諸夷聞之皆遣使驗貢辨罪秋市諸部如黃台吉以兒鄧等接踵叩關願伐粆花認罪求欵此關于遼鎮安危之機甚大也下其章于兵部南京户部員外曺師建接𬋩銀庫清查西庫該銀一十六萬零止存一十四萬六千萬少銀一萬二千兩尚有老庫未盤事聞上命離任者聼勘待贓有歸著後分别輕重議處按東西老庫三庫錢糧不下𢾗十餘萬厯來相沿舊規未有差滿不交盤者而起自荆之琦琦聞訃告歸接𬋩劉可法亦付不問後遂踵為故常師建窺知其弊鋭志釐姦乃始覺察荏苒十餘年祗慿𥿄上空言百萬錢糧竟爾委頓法紀廢弛弊孔多端一至于此御史張邦俊請增浙閩秦魯四省解額事下部議己酉皇貴妃王氏薨皇太子生母也薨時祕不外傳越四日閣臣知之為請乃宣禮臣奏上合行事冝奉旨照世廟貴妃例行部言歷查我朝皇貴妃薨逝俱未有誕育東宫者惟憲廟淑妃為孝宗敬皇帝母世廟康妃為穆宗莊皇帝母然其薨逝時皆未封皇貴妃未經册立東宫當其禮儀俱擬從厚况今皇貴妃既膺封典皇太子册立東宫已久尤天下臣民觀望所繫禮儀更當加隆謹條上請既而發引無期禮臣疏請上命翁正春同各官詣天壽山看得東井一地覆奏報可户科給事中韓光祚言瑞王婚禮自傳旨下部今已三年徒以錢糧不敷遂致稽緩今戶部辨進金寶珠石已及七萬當此九邉告匱四方告災帑藏如洗必欲如御用監原估二十萬之𢾗俟之何日請卜期舉行不報兵部尚書李化龍言國家用人理財原非二道納級拜爵原非典章邇來武途冗雜奔競成習痛加裁抑尚未戢止况加納紛紜幾無虛日至于總兵參將等官既由阿堵納用則臣之推升銓選更以何為今分别應行應止列欵覆請乞命户部一體遵行上是之朝鮮連歲送還漂海人口盡係通倭之徒兵部覆準盡發西北極邉充戍虜犯髙家堡殺掠革遊擊劉國鎮周一夔任十月朔閣臣請上視朝不允時孟冬禮冝頒曆輔臣上揭奏請謂皇上御極頒曆已四十次而聖壽適逢五十聖母又將屆七十乘此頒曆之期御文華延見羣臣維新庶政上竟傳免給事中周永春以畿輔災傷言自太監王升按𤱔加稅每𤱔原徴一分以上者俱加至三分此監銀所由始也一地二糧民實重困自加稅以來連年將部銀拖欠其監銀雖有完納不過移解部者以解之時和年豐猶冀畏法輸納今地無寸壤糧從何徴昔猶賣男鬻女今兄弟妻子離散而無可售昔猶典屋賣室今房屋地土衝壞而無可質昔猶稱貸富户今富者貧貧者逃而無所貸乞將本年監銀未徴并拖欠銀兩俯賜特免至部銀除議徴一半及徴六分外其未徴暫從停徴酌俟豐年免一分民受一分之賜緩一日民獲一日之生疏入留中虜酋粆花東紏卜言顧伯要兒等營西紏哈喇漢乃蠻等營入犯清河官兵截殺之潰去申飾邉方吏治事冝雲南撫按條上四欵一曰方面勸懲兵備道臣請照九邉例保留加銜久任其𥘉補也務得資望相應以盤錯别利器其升遷也間以邉腹互轉以調劑平人情一曰有司升取請以進士貢舉酌量道里逺近相兼選補政成之日行取推升視腹裏務加優異一曰斟酌降調言雲貴兩廣用兵之地四川山陕鄰邉之所守巡郡縣多用衰頽降調整刷難前凡遇缺出請選道里相近才力優長之人除補另算資俸隆以升轉一曰體恤卑官言土司吏目驛丞跋涉險阻人不願赴請行各撫按可裁者裁可併者併或官難議革就近報轉仍于鄰近風土相冝除授上曰邉逺地方關係更重近來選授遷轉不得其平以故人情厭薄官偷民困無以稱朝廷軫念逺方至意依議實行不得因循玩視復成寢閣工部題請皇極殿門擇日𥪡柱以便明歲接續興工時左右二門已建皇極門以方向不利緩至于今做成木料日久漸朽一木之費常至𢾗千金甚為可惜故以為請户部尚書趙世卿乞歸久候不下不待報而去十一月丙申朔兵部尚書李化龍奏請敘賞薊鎮宣大閲視功次故事閲視之典三年一舉以勵邉將前此一畨已經寢閣今次名為三年實六年矣且九邉一體不可異同甘肅之捷功敘而延綏獨否陕西之閲視已敘而薊鎮宣大獨否此非但人情因此觖望而揆之政體亦俟不平且所敘督撫如蹇逹馬鳴鑾劉四科連標霍鵬等相繼已物故河清難俟人壽幾何可勝嘆息十二月丙寅禮部奏採訪曆學精通之人疏入留中侍郎蕭雲舉以廣東按察司知事周道昌建言牽引繳印求放上曰雲舉鴻學正儒今大􅒼乏員節旦臨近命即出供職兵部尚書李化龍卒長垣人化龍在遼連破虜卒以破倭既又平播拓地𢾗百里至治河秉樞苦心深計隱然稱中朝寧石焉播既平上問輔臣五等之爵輔臣執謂此典久曠有三中丞六七大將莫與適也事遂寢卒年五十贈少師諡襄毅命刑部尚書趙煥署兵部事上以遼東警急命戶部發漕折銀十萬兩太僕寺發班價銀五萬兩南京兵部借銀八萬兩戶兵二部共七萬兩赴解以為募兵充餉之用并命修復屯田以助兵餉巡按遼東御史熊廷弼奏請行屯田法自陳以常平法積榖至十餘萬而繕城砌臺修濠築墻為遼人建𢾗十年之例上溫旨褒答
