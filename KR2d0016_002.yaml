body:
  text: 顯皇帝紀四萬曆四十年壬子正月丙申朔掌翰林院侍郎王圖給假回目辭闕出城已八閲月今又移郊候命上以圖直講啓沃令即供職大學士李廷機等請準其給假勒限復職翰林院印令右庶子郭淐暫署從之二月丙寅朔吏部尚書孫丕掦疏懇乞休不允挂冠去命孫瑋署吏部尚書事三月乙未朔河南巡按曽用升奏睢陽衛經歷李光顯委解稅為監稅內官參隨徐炳髙登等勒索打點無計身死請撤回稅使胡濵并將炳等提問如律以雪死冤慰中土不報寧國府涇縣等縣童生毆辱縣官撫按以聞上諭近來士風薄惡提學官還嚴行約束涇縣等五縣童生不準進學有司亦當秉公正已以服人心代王請立其庶子鼎莎為世子代王元配無子御人裴生鼎渭王以其母賤令妾張氏母之張有寵進封次妃後生鼎莎兩人爭嗣閣臣李廷機在禮部時主立鼎莎至是人攻廷機遂有立長之説大同撫臣汪可受言渭莎皆庶也渭母未受封而先故莎母已生子而後封此其昭昭者四十五年乃立鼎渭為庶子御史張五典上言邇來上下姑息百事委頓法但加于微賤強梗者即干紀壞法而莫問禮雖設于朝廷為下者或犯分越理而不顧頃有不奉主命徑自歸田之大臣猶曰置而不用用而不任亦不可則止之義也總戎無敘功之例有之自遼鎮麻貴始則總戎而侵冒功之典府官無彈劾之任有之自知府錢策始則府官而擅糾彈之權宗屬稔惡之儀賔辱天子守土之郡臣則皋陶有不執之法代籍始何以立卒有後言遂至子得抗父婢得汚主父子家庭之間不應有此舛戾儒童有何冤抑敢于揭竿狂逞窮簷蔀屋之下不應有此悖逆留都重地私鑄盛行一統無外之世不應有此鬪志病國之利徒且也姦衛久耐彈章悍卒目無主帥一切不公不法總是無綱無紀不但已也有言責者不必言而私有比附者亦言當直言者可以無言而暗為驅除者亦言此又不綱不紀之大者也原任南兵部尚書邢玠卒贈少保玠益都人為人易直能肩艱巨樹功海外臨卒有遺疏請破黨用人發帑罷稅數千百言南京中和橋馬草場攢典鋪户草堆火起兵部奏言草者軍馬之性命也户部發銀鋪啇領買一包領銀一分一釐每虛報堆𢾗至放日賤買軍籌抵塞然前草未完又􅛽圖再領後價以完舊價舊未得完而新仍挂欠年久𢾗多溜雨積爛放未及半露出荒原不得已而鬻産以賠之賠之不足則逃逃不能脫則死獄一人逃衆人共賠計出無聊于是付之一炬以滅其迹但曰天火此弊留都人人能知之亦人人切齒請下法司推詳鞫究照邉場事例以警後來事下所司巡漕御史孫居相言漕船缺少雇募民船腳價盡屬有司設處民間苦纍至極相率逃匿請以缺船料銀輔作募船工食船户必且樂從部覆雇募民船雖一時權冝之計究之于國計不便不若仍復舊額議于八月興工十月駕赴水次則來歲有船民船永不募而民間免騷優又言核歲修之𢾗稽銀船之實防侵冒之姦得旨依行四月乙丑朔敘延鎮大捷功總督顧其志巡撫凃宗濬總兵王威等升蔭賞賚有差先是雲南撫按奏鎮臣沐昌祚莊田自欽賜外多至八千餘頃橫征暴斂以致莊户劫掠公行滇民如在水火請歸併有司徴收下部覆行至是昌祚疏請自行徴收大學士葉向髙揭言若是與該鎮地方必復紛紜內外必復爭執且詔旨前後相違朝更夕改亦非國體伏望留中不必發行則本鎮與地方相安所全實多矣閣臣葉向髙言朝政不行日復一日紀綱盡壞國體盡傷皇上即視臣進退去留可以置之不問乃官僚可盡空乎言路可盡廢乎各省之按差可終不代乎浙江湖廣貴州之科場可不用監臨乎臣方深憂皇上之孤危而皇上顧閉塞愈深務與臣下隔絶帷幄不得關其忠六曺不得舉其職至于閣臣冡卿亦視若可有可無舉天下無一可信之人而自謂神明不測之妙用臣恐自古聖帝明王無此法也非敢以去要君實念在位有愧願早罷黜時廷機久處廟中復還舊寓請告一百二十餘疏向髙復杜門閣中虛無人者幾五閲月欽天監推算月食不合有旨改修曆法禮部侍郎郭正域卒贈尚書諡文毅江夏人正直不受請託然見困厄者必救妖書事起告歸舟阻氷邏卒圍之忽一卒上舟云九卿意在大人請自裁正域曰即有不可知當一言而死何得草草自屏其處患難死生無異安常履順故不為動事後卒解命法司審究罷間大同衛所鎮撫史晉部院以晉違禁妄奏撓亂察典奏聞上命枷號一月發口外為民直隸處稅監魯保卒撫按題請裁革上命歸併天津馬堂俟三殿功有次第奏請停免馬堂聞命赴任以此為利附堂者復藉堂為利由淮抵楊所過無不抄掠邑鎮罷市鹽啇逃竄巡江御史恐激變地方疏請撤回天津不報五月甲申朔敘貴州平苗功總督郭子章總兵陳璘等升廕賞賚有差土司安強臣贈三品職銜溫肅端靜純懿皇貴妃發引禮部主事髙繼元言三衛女直貢夷先後輻輳計九百人行李多至千匱資買禁貨物宴賞程廩費以𢾗萬三夷借貢規利且漸生心不可不思患預防請制其流者六清其源者三一戢強橫一選通伴一申舊規不許往來街市交接間人一核貿易一革當房當令館夫供其買辦一復押送庶各夷不致逗遛而內地亦安夷人恃衆則氣焰方張勢分則寡弱易挫裁其入貢之𢾗而不使咆哮于內地所謂清其源者一也三衛入貢僅換布假而止女直回夷置買私貨遷延不去敕行邉臣每起止送𢾗人入京餘俱在邉候賞所謂清其源者二也遠人輜重太多則驛路輿馬太費議在本鎮領賞亦在本鎮開市計其所需不過布絹磁器之類募啇與賣所謂清其源者三也六月甲子朔副都御史許弘綱開列臺臣缺乏各差緊急之狀以聞不報給事中韓光祐疏參錦衣衛左都督王之禎見被軍政拾遺注籍已久三月間借名派撥忽出視事臨朝儀仗全不成體貴妃之嬪久沉不發而發引之儀亦復簡慢如冥器錢糧內監冒支巨萬及至發引粗惡不堪墳工所費不資盡為內官穴窟其中冒破塞責喪葬大禮姦帥閽人欺罔侵漁事聞上一槩不問而帥𥪡反得庇護輕重不倫大為中外不平申嚴通海之禁仍敕撫道稽查海外夷人貢使并移咨朝鮮國王嚴禁倭夷之人全羅慶尚者一如中國之禁時日本以三千人入琉球執中山王遷其宗器疊遣貢使入懷窺伺近又用對馬島之故智以愚朝鮮而全羅慶尚四道半雜倭奴矣于是浙江總兵官楊崇業奏請申飾從之七月癸巳朔虜犯寧夏塞官兵禦之于毛青口沙山灣再捷斬銀定頭目白奈哈擒斬甲首七百七十餘顆琉璃國夷使柏壽陳華等執本國咨文言王已歸國特遣修貢福建巡撫丁繼嗣奏言海外遼絶歸與不歸誰則知之况貢有常物何以突增日本諸物使有常𢾗何以多至百有餘人冝留正使及夷伴𢾗名題請處分餘衆量給廩餼遣還本國非常貢物給付帶回始足壯天朝之威正禦夷之體且言閩中姦民視倭為金穴赱死地如鶩絶興販以杜亂萌又今日所冝亟圖部覆如議行夷人武永禎屢犯欽州學正李嘉諭死之軍官祝國泰等獨攖其鋒將卒俱沒失事知府凃巍坐營張國威聼勘八月壬戌朔虜婦忠順夫人死撫臣言其納貢四十餘年最稱恭順宜加褒恤以勸有旨與祭綵假表裏布匹照例以示優恤套虜犯延綏保寧邉將敗之于白土澗斬其頭目啞班哈等十二人斬獲首虜二百五十四級馬二百餘匹上諭輔臣葉向髙朕自入夏以來時受暑濕頭目弗清卿為輔弼重臣豈可久居私寓且朕壽節在邇正冝出閣贊理其輔大僚考選諸事朕次苐簡發向髙疏謝視事上以嘉恱報聞釋宛平知縣李嗣善于獄降一級調外任嗣善獄具三年臺省纍以為言不得請至是刑部因熱審言大小輕重之獄皆有矜疑減等之恩嗣善猶囚冠在繫罪罰已深矜恤冝早乃報可鄉試考官以命下遲陜西移𥘉場於十九日應天移于二十二日江西移于二十六日浙江湖廣移于二十九日九月壬辰朔內監趙進朝梁盈女等毆駙馬都尉冉興讓于府中既而復毆于朝門吏科給事中曺于汴等疏劾婦寺恣橫已極懇乞大奮乾綱速正典刑不報万進朝毆之于府也公主倉惶往救進朝動罵無耻至令公主造室跪謝興讓八日三疏皆不得逹蓋以巨璫盧受李恩用事進朝遺𢾗十箱金寶餽之因而壅閉多方阻絶進朝反得單詞膚訴上苐知兩璫回覆東厰奏聞而駙馬屢次被毆與教習官賈之鳯御史耿鳴雷各疏言國體凌夷之極皆不得上逹於是駙馬挂冠于長安門而逃東厰以聞上大怒下旨切責錦衣衛尋訪奪其父職為民併罰教習主事賈之鳯俸興讓原籍蠡縣至十月中訪得于完縣葛洪山伴回至良鄉託疾不行衛使馳奏奏旨送國子監習禮儀一年具奏禮部侍郎翁正春再疏言今第一要務無如皇太子講學乃一輟八年百疏不報或以􅌖質天成宫中不廢講習臣恐貂璫未必周召諷誦必未典謨即使􅉏御皆正終不若前凝後丞之觀摩燕居皆學終不若抽關啓鑰之聳悟况轉盻秋老又復各𥘉乞即舉行點用閣臣所推侍班講學等官不報三遣官諭李廷機入閣廷機陛辭出都門葉向髙為之請乃得溫旨加太子太保馳驛回籍以俟召用賜路費表裏遣官護行改趙煥為吏部尚書以翁正春為禮部尚書召王象乾為兵部尚書四川建昌夷猓作亂行撫按官相機撫勦十月辛酉朔考選之命始下御史楊鶴奏時事憂危者七首言三大營軍卒半役冢私恐有人不受甲府無見兵之慮及中外公私困竭東方群盜可虞人才摧折上無賜環之期下有龍蛇之厄又言東宫所習見者皇上二十年以後罷朝輟講齋居無事之狀其以前蚤朝晏罷勵精圖治不得而見也皇上逸冝令東官知勞皇上安冝令東宫知危皇上盈成履運福分非常冝令東宫知憂知懼豈有日與宦官宮妾處而不一見士大夫之面者乎自皇上靜攝以來説者謂權無旁落然頃者愛女蹂躪于宫奴館甥受撻于朝市叩閽不得入上封不得逹亦可謂蒙蔽隔絶播弄之極矣命修萬曆二十七年以後玉牒御史田生金疏言邉患河患孔殷邉臣河臣可議論勒楊鎬隱匿邉情劉志忠不報河決臺臣楊州鶴亦言遼事大可寒心參鎬不冝私庇李如梅纍行薦用乞賜罷黜十一月辛卯朔考選軍政命下間住錦衣王之禎有旨效勞多年準馳驛歸通政使吳逹可奏納言關係國體父前子名君前臣名古今一定乃章奏常稱邑里如吳門歸德之類又有隱語謎字同于射覆莫可卜度者皆無禮于其君者也而制誥之詞以君諛臣近時益盛皆當釐正者大學士葉向髙求罷言九列空虛見在者又皆閉門趙煥孫瑋翁正春許弘綱皆當速下溫綸督令供職而蚤放臣歸則去留各淂時事可舒時煥以御史李若星論山東巡撫李同芳事乞罷瑋以御史田一甲論四川總兵楊一元事遂以兼攝成病乞休正春弘綱亦因會議科場為科臣孫振基所駁咸在注籍尋俱得旨慰留命兵部尚書王象乾帶理戎政革順天舉人童學賢罰科舉人傳皇謨及降罰進士鄒之麟中書于發藻等各有差二人同出之麟之門列魁選學賢從發藻房落卷搜出臺省發其事上命奪發藻及主考郭淐朱延禧俸之麟降選給事中孫振基疏言議鄉場而不議會場緣畏韓敬湯賓尹之故遂奉旨併勘起原任四川總兵劉綎仍鎮守綎至建昌旋定山東巡按張五典以奉旨勘明功次敘原任薊遼總督王象乾巡撫楊鎬總兵麻貴及文武將吏功冝録賞與軍亡冝恤者有差御史田生金奏告廟宣捷冝慎功罪賞罰冝明言肅皇帝時邉臣獲世廕者十不二三保首領者十不六七今邉臣不以捷聞者幾何人不獲世廕者幾何人豈今日之邉臣皆超軼前日哉閏十一月庚申朔給事中麻僖請急易遼撫責成鎮臣以保危疆言楊鎬謀逐新將以為李如梅地致張承胤一籌莫展惟有拊膺流涕是誤遼者鎬誤鎬者如梅也御史崔爾進奏王信以門璫誣奏科臣張延登而門吏致𬒳詰究擅奪關防變亂祖制刑科亦抄參會典開載皇城九門有關防三十三顆俱撥門吏收𬋩各􅍐撥由于吏部月糧支于兵部而查照分于各科與守門內官不相涉也蓋吏役無甚威力未必重為解官啇役之纍即有姦弊可以究懲此祖宗立法本意今北安門王信視關防為竒貨必欲奪之駕言祖制豈祖制有在會典外者乎給事丘懋煒言倭警可虞設防冝早條列八議以上一將領一器械一練習一城堡一船隻一間諜一屬國一財計疏上不報命檢討錢象坤徐光啓周炳謨丘士毅黃立極張鼐知起居注禮科給事中亓詩教條陳考察四欵一窮是非之歸一極虛實之辨一致去留之決一破勸懲之格並請點用左都御史主計事吏部請申飾朝覲事冝一撫按注考冝確一咨訪評品冝慎一斥遣輕重冝當一揭報異等冝嚴一私揭害人冝禁一冒禁托辨冝處一禁革餽遺冝申俱報可虜犯曺莊殺男婦二千餘人啇店一空吏科給事中張延登恭陳無黨之論以定國是論人者不必為一綱打盡之謀論于人者不必為三窟藏身之計旁觀者亦不必為黨同伐異之舉大學士葉向髙疏言近來諸臣之言意見未平門戶未化各執成心彼此求勝如有人于此本平平爾或過稱其賢矯之者必以為不肖再爭則為大不肖矣又有人于此亦平平爾或過者其不肖矯之者必以為賢再爭則為大賢矣賢不肖之品于本人全不相似而但以供爭者之唇吻又其甚者則居已于賢居人于不肖又而株連蔓及附之以黨乃其本又在閣臣矣往時閣臣常四五人辛酸甘苦相為調劑故獨見不用而群猜不生今臣孤身任事已五六年雖兢兢自矢不敢蹈徇私植黨之罪而當局既久則淺見易窺受任既專則物情難厭使得新臣三四人居此彼其受事方新未蒙緣染空空洞洞何偏何黨下之猜疑既釋則上之疑厭自消轉移世道之大機實在于此此尤臣之所為皇上望也且請今後論事如黨人名色不許形之章奏以省羅織十二月庚寅朔禮科給事中范世濟上言歲暮祫祭請皇太子代為行禮以慰祖宗光大典豫遼東巡撫楊鎬請告仍命料理邉務候代改孫瑋為左都御史升甘肅巡撫周盤副都御史兼兵部侍郎協理京營戎政萬曆四十一年癸丑正月己未朔大計群吏趙煥孫瑋許弘綱考功郎張養正科道翁憲祥余懋衡主計推舉孫承宗李起元石崑玉等命遼東巡按諭朝鮮招募訓練防倭仍責成海蓋道簡練軍實以壯聲援廷臣請福王之國時張家灣以南沿河一帶行船盡皆封禁船戶𢾗萬嗷嗷行期無定故群臣力請給事中官應震論閣輔獨相之非向髙力請推補乞休疏留中時上已有意輔用而仍中輟二月己丑朔革應天巡按荆養喬職為民提學御史熊廷弼回籍聼勘養喬廷弼素以意見抵牾不相下及治宣城縣生員梅振祚姦獄互有輕重養喬劾廷弼不斥振柞等而反斃發姦芮永縉于杖為殺人媚人謂永縉與湯賔尹有却中之故云拜疏投劾而去廷弼再疏辨謂永縉之杖本以行劣非以發姦故章俱下所司議左都孫瑋請革養喬任而勘廷弼上是之給事中官應震吳亮嗣等俱攻瑋上置不問命大學士葉向髙主會試起方從哲吏部左侍郎副之取周延儒等三百五十人謫給事中曽六德為香山縣典史主事李春熙知縣程鵬舉以不職被察六德為之疏辨語侵趙煥孫瑋于是煥瑋各紏其挾恨外轉撓亂反噬旨責黜之給事中官應震言廷對關防冝密均二甲而州部何以分均三甲而中行知推忽前忽後漫無定衡冝準禮闈法糊名易書以一定先後為選法差别庶幾各安其分三月廷試賜進士周延儒莊竒顯趙師尹等及第出身有差考選庶吉士二十三人給事中郭尚賔言粵東自萬曆二十七年至今解過稅銀二百七十萬此他省所無而粵民空抒軸以應者財力已竭即稅使李鳳亦曽具疏請減乞慨賜俞綸不報命修建倉厫歸併户部禮部請速行瑞王婚禮桂王選婚起李起元石崑玉巡撫陜西大同御史張邦俊奏惡璫梁永虎噬于秦中髙淮狼顧于遼左咸寧知縣滿朝薦廣寧同知王邦才憤百姓之遭荼毒剪其羽翼以示裁抑乃聼其單詞揑誣反置拘禁已幾三年非所以為平也群臣再請福王之國內傳今春已暮伺明春行葉向髙封還奏本附揭云俟改日期雖皇上慈愛難割而衆口呶呶非所以自明也王國田糧悉視潞府例地租已多六千矣河南山東搜括已盡尺寸盡屬民産豈可強為使地方優動王亦何能安享之乎四月御史吕圖南以浙江巡按改南直隸學差科臣周永春疏論圖南不任其任給事中丘懋煒御史陳一元與永春互相紏駁圖南竟謝病繳敕印歸總督薊遼薛三才言建州日熾窺伺開原志不在小章下所司五月左都御史孫瑋引疾求退上報曰朝廷委任甚專豈得以已私紛紛奏辭左副都御史許弘綱陳情尤切上曰法司事務繁重大臣豈得不恤國體堅臥求去仍諭吏部都御史曰凡遇缺官吏部必與九卿科道從公會推堪任者奏請點用及到任未幾小臣以疑似之事懷私逞憤妄言攻擊使各官不安其位皆欲求去國事何人分理再有不諳事體恣肆煩言誣詆要譽者必罪不宥其各注籍官即出供職毋負簡任之意給事中余懋孳言伏讀聖諭責臣下之紛爭惜老成之去國至抉其病根一則曰疑似一則曰疑畏大哉王言固已洞物情若觀火矣然臣謂群下之相疑由詔令之不信也何以明之皇上之于章疏也不曰朕皆省覽乎而不報如故于詔旨也不曰出自獨裁乎而竊弄如故于緊要大政也不曰次第舉行乎而廢閣如故夫九閽萬里焬竈蔽明道路有口可駭可驚為言官者既不能直奏宸扆又不得之中涓則通中外之關而效感動者舍閣臣無責矣閣臣或不能盡得之皇上而時或得之者絡不外閣臣也則有得有不得而疑必生欲釋群疑亦使閣臣無不得于皇上可矣皇上計不出此而欲以罪譴使臣下塞兊乎左副都御史許弘綱以御史宋槃劾奏叩闕辭印出城上以大義責之不允辭仍奪槃俸一年孫慎行以禮部右侍郎署部事劉元霖為工部尚書六月錦衣衛百户王日乾訐奏孔學等詛咒聖母皇上及東宫語多涉貴妃福王上覽疏震怒閣臣葉向髙言曰乾孔學皆京城棍徒結告刑部事尚未了擅入皇城放炮進本刑部以其禁地放炮欲擬死罪遂譸張至此無所顧惜此事大類往年妖書而妖書匿名無可究治故難于處置今告者與𬒳告者皆見在法司一審其情立見皇上但靜以處之不必張皇一或張皇則中外紛優其禍將不可言上覽之意解遂置不問諭閣臣葉向髙卿忠誠清正凡事開陳朕所倚毗堅欲求去朕心何安且國家政務朕未嘗不行止因憸邪群小不諳事體生事激瀆故詳覽遲緩皇太子與福王名分不同大義已定明春之國必不再遲諸臣何復煩聒若夫礦稅為三殿非為福王養贍田土有前例可比煩言阻撓甚非國禮卿輔弼重臣冝即出安心贊理不得過為疑忌封虜酋卜失兔順義王把漢比妓忠順夫人兵部以卜酋新王諸部未協冝敕沿邉將吏嚴加備禦上是之吏部尚書趙煥左都御史孫瑋副都御史許弘綱各纍疏求去上發各疏擬留旨向髙言許弘綱出城久其勢必難再入昨言官謂臣假借中旨困苦弘綱昨臣辨疏尚在御前今若再擬慰留又將生出議論謹請上裁還聼其去去後再行召用則君恩臣義兩全無失總督兩廣張鳴岡言粵與閩浙同一防倭而浙未嘗與夷市閩市有往無來彼瞭海上雙鳬亂飛皆彎弧向之無敢闖入乃粵則與諸夷互而而謝絶之難市則夾帶倭夷雜處而辨别之難澳夷盤據內地近且匿養倭奴以為瓜牙則驅逐之難閩廣姦人竄入澳中搬唆教誘則隄防之難至近日白艚盛行在閩者以販米為名拒之則病鄰而不拒則交通百出在粵者以貿貨為名禁之則阻生理而不禁則通澳通倭弊不勝究法不勝設然為地方弭隱憂則必嚴禁曲防母姑息養亂為得也從之七月𥘉命韓府立宗學徴漕糧每石永折銀五錢豫許弘綱回籍御史魏雲中劾文選郎周應秋引進匪人流毒天下給事中吳亮嗣以銓政固所當清群才亦自可惜如近日行取諸臣皆極一時之選不應摧折至是更列雲中所攻擊者若史繼階黃克纘等𢾗人不分黑白皆以一筆盡其生平説為匪人之説造無形之羅綱徒以門户起見何以服天下也山東淮南大水左都御史孫瑋文華門叩辭出城賜原任總督兵部尚書蹇逹祭葬如例逹于三十六年七月卒于官議者謂逹一腔忠赤三輔壯猷寓折衝于談笑作鞏固于金湯鞠躬盡瘁云兵部尚書王象乾言自工役相因遂至班政廢弛近京營科道條陳一應工役令工部自募民夫入衛班軍盡發營操上班之時務選壯正身㨂汰老弱詔如議行八月釋滿朝薦王邦才卞孔時于詔獄以輔臣力陳也禮臣孫慎行請東宫講學吏部尚書趙煥請點用各省巡撫九月建州遣子入質還之時巡撫張濤請議所處樞臣以真偽難辨留之反為所紿不如遣還遂不受貴州勦賊蠟菜阿袍克之以延綏寧夏甘肅三鎮大捷祭告郊廟命万從哲吳道南為大學士入閣辦事吏部尚書趙煥拜疏出城十月巡按直隸御史薛貞請申飾出海越販之禁從之建州圍金白二酋二酋告急上曰北關為遼左籓籬豈容建州吞併其速令該鎮救援不得違誤已而總督以餉請上亟命戶部給之豫孫瑋趙煥歸上諭內閣聖母稀齡在邇朕當率皇太子及諸王恭祝大典慶賀禮成于次歲春三月內著欽天監擇吉之國時外庭喧嚷謂上欲借聖母賀壽以留福王擬共詣文華門伏闕力請聖諭適降又有疑次歲為四十三年者蓋聖母七十在四十二年聖上𥘉意不欲預慶俟至明冬後之國勢不容緩竟定于來歲之春給事中亓詩教言今日之爭始于門戶門戶之禍始于東林語侵輔臣葉向髙為東林所誤于是向髙言朝端所以紛優至此言官所以敢于喧閧者固由臣之不才貽纍君父亦以大僚乏人無有碩德重望以鎮壓其囂故相持相角雖以天威臨之亦無奈何爾當孫丕掦在日力薦侍郎吕坤郎中鄒元標皇上誠急召此二人處以要地人心必自肅然其餘如趙南星逯中立髙攀龍何喬逺之輩吏部所屢推舉者亦陸續起用但得𢾗十人布列朝端天下事必不如是之決裂也瀕海竈民災傷特甚巡按御史潘之祥請捐廩賑濟并免本年灶課十一月巡撫遼東張濤拜疏徑行下所司議騰驤千戶蘇應詔訴太監邢洪巡城御史凌漢沖為之理械洪校役來德潤等繫之獄洪于冬至朝賀日紏衆毆漢沖于朝復群誶獄門欲奪其校役漢沖列狀以聞御史余誨等連疏請究擬不報署吏部事王象乾言官寮廢缺推擬皆窮諸將節次推起諸疏速賜俞允無令天下萬世疑皇上有禁錮諸臣之心增設南直隸湖廣學臣一員十二月福王請減莊田允之定額二萬頃葉向髙六年考滿加少傳建極殿大學士賜宴禮部皇太后失豫上日夜恭侍藥餌虔禱願以身代會勘庚戍場弊韓敬湯賔尹等分别議處敬為賔尹隔房中卷迹有可疑實亦門戶各别也皇太子妃郭氏薨召大學士沈鯉入朝固辭不赴大學士向髙從哲等以歲暮請發停留諸疏一護送福王文臣未推一吏部會推大􅒼俱冝點用一候輔科道官一充輔日講官一各差御史當代不報萬曆四十二年甲寅正月甲寅朔戶部侍郎李汝華奏屯邉一策既可足國亦能禦虜撫臣張濤石崑玉徐鑒開田各有成績而行之深有益于度支者御史盧謙言屯田以養戰士非以養將官今立為養贍之名或占之或鬻之則所支常俸謂何必大修農政而清影占始為國家之利遼東巡撫疏進建州訴狀大約憤恨北關賴婚匿壻開原人不當助之詞多譏切工部尚書劉元霖以歷官三十四年未彼父母封誥乞煥一命特榮二親上從之時霖母年九十二也劉綎辱馬湖府知府詹淑奪綎俸半年淑改調别用二月慈聖皇太后李氏崩頒遺詔于天下寬釋楚宗人幽禁總督薛三才先因開原告急請募兵一千七百名併麻承恩曹文煥所統援兵共四千名合營備變給事中郭尚賔巡按御史翟鳯翀皆以無兵則不能救無餉則不能兵請會議長策務保萬全從之遼東巡撫張濤請築邉墻因言建州情形利害之當審救勦之冝密兵餉之當集然後救則實救勦則實剿或先令金白二酋從此兵東以激建州之出鬪或用大兵從清撫而入直搗其巢或赱奇兵從橫江間道星夜遄迫以出其不意或浮大衆于朝鮮絶流而渡以防其遁去乃臣全遼之迂計惟在築墻昔郭墻大同戚墻薊鎮二武臣竟饒為之今何視二臣為絶響也下所司議命發工部銀五十萬兩給薊餉上火行皇太后尊諡孝定貞純欽仁端肅弼天祚聖皇太后三月輔賜贈太常少卿楊繼盛造墳安葬工部尚書劉元霖卒賜祭葬如例贈太子太保蔭一子命各省額進稅課準以所徴三分量減一分以彰慈恩恤民德意詔起廢遺建言謫戍等官分别敘用福王之國河南百官送于郊外四月歸子顧疏請濬吳淞以救三吳屢嵗淹沒之患開江南無窮之利留中建夷分遣人牛臨邉住種巡按翟鳯翀請急行驅除蓋建擅貂參海珠之利蓄聚綦冨獨其地磽瘠糧苦不給欲為廣墾儲糧之計今不論新墾舊墾但係南關之地則不當容建夷住種有五利焉一不得逼近內地偵我虛實二不得附近北關肆其侵優三不得糧料充足卒飽馬騰而生戎心四令其糧餉不敷如遇飢荒叩關乞哀於撫順之市暫準和糴如四十一年故事以彰我生養之德五則市糴可多可少視其順逆緩急以操駕馭之機權且南關三百六十三道敕書建奪而有之我置不問而以南關之賞賞之是誨盜賞叛也損威辱國莫甚焉下部議給事中姚永濟言御史黃士彥開荒一疏當今講求地利生財之法信無踰此司禮監太監盧受以為侵御苑傷龍脈于國家遠大之圖所妨非細疏入留中五月御史董定策言原任學正沔池曺端先薛文清而倡明道學冝從祀以光俎豆原戶部主事河南龎時熙吏部郎中新安沈化鯉淵源王文成力學著書冝專祀時熙於本郡化鯉于其邑用奬翼後學留中給事中薑性參太監盧受竊威播虐不報存問原任大學士申時行沈鯉潞王翊鏐薨諡曰簡祖制親王妃薨率遣內官弔祭給與敕書若親王薨無致祭之例今上念親親之情破格優恤敕令王妃𬋩理本府事免其奏請福建稅監髙宷播惡無忌置辨賈倭貨物𢾗十萬金不與小民賠纍怨憤激變宷揮兵殺民燬房執巡撫袁一驥劫道府都司等官質于署中撫按疏聞大學士葉向髙方從哲及給事中姚永濟等先後參論不報御史田生金疏稱紀綱倒持可慮聖朝整飾冝先備陳十事工部林如楚酌議水衡事冝責成經手慎發預支申飾外解祀地于方澤閣臣方從哲禮臣孫慎行行分獻禮江西巡撫韓浚疏陳江西之稅課尤當罷稅使之李道尤當撤六月葬孝定皇太后發引日大雨傾注上跪禱雨止方行俄雨少微皇上太子送之承天門外十五日閣臣葉向髙奉命詣山陵行題主禮禮畢奉神還京上跪接于午門行奉安禮大學士葉向髙感觸聖孝乞休不允七月吏部王象乾奏慈綸久滯事刑部郎中沈珫為東昌守清亷素朴食未嘗副衣未嘗帛治民以孝弟禮義為先尋遷兖東道值旱蝗飢變各司道咸給假去珫併治事載印纍纍捐俸借庫銀以散飢民三年麥稔即告致仕民慟哭挽留家為設祀焉給事中姚宗文言各省災傷紛然見告乞發帑大賑蠲稅翔仁大學士申時行卒贈太師諡文定八月巡撫甘肅都御史荆州俊陳禦火酋五欵一復土兵以資援應一修榨口以固強圉一撫屬畨以重藩籬一復原伍以實孤堡一申協謀以聮聲勢詔舉行朝鮮國王李暉請追封生母查氏賜敕齎回致仕吏部尚書孫丕掦卒丕掦生平以名節自期頻致人言百折不變歷終始險夷如一日云大學士葉向髙乞休得允上表謝并效餘忠乞東宫講學瑞王速婚輔大僚點科道起廢罷稅發餉命鄭繼之吏部尚書九月吏部疏賜環原有恩綸屯膏似虗明旨謹彚分諸臣去國之因以便聖覽仰祈俞允擬上羅大統鄒德泳等七十九員留中巡按御史翟鳯翀疏建州反側見告中外議論沸騰竊謂救北關以固籓籬存外籓以安內地此大開鍵也張聲勢以懾建州使不敢動姑羈縻以繫建州使不忍離此大機權也今諭令退地則退地罷兵則罷兵以為姑退姑罷借外寧以備內治則可認為真退真罷忘逺慮而貽近憂則不可時樹碑定界建大書番字碑隂有建州本部盜靉陽馬即戮之碑下以示恭順禮部右侍郎何宗彥疏請慎擇王府長史等官令撫案查有司賢者單題升輔考滿著聲得升參議僉事等官下部議巡視京營給事中姚宗文等言諸監侵占兵馬錢糧請按法追究以清宿弊而肅軍政留中旌表百歲節婦唐氏雷氏萬曆四十三年正月戊申朔福府中使出勘汝州地租杖殺佃民闔境軍民奔竄又中使占住省城貢院又入兖州東昌所在播虐撫按各疏聞不報署吏部侍郎李汝華請亟下巡漕之命上可之令御史朱階速行浙江疏議江會蕭山海塘改砌石部覆善治氷者不與水爭利蕭山築塘逼海故十年十築竟無成功則循行相度為始基計者當講也史稱吳越王築塘于杭立基之法先挑去地面浮沙丈餘比見青泥然後下樁壘石故至今錢氏隄屹然蕭山之立基得無異是乎則經畫為永久計者當講也興大役必先明賞罰蕭山所委者非縣佐二則雜職此輩苐與衙蠧為姦利爾必遴選府佐二員亷能勤慎者頌之功成優處如十年有傾圯追論處分則以賞罰明激勸者當講也上從其議給事中官應震一言情愛不可偏溺皇太子十二年來以講學請則不報瑞王二十五齡以婚請則不報惠王念二齡桂王十九齡以選婚請則不報獨福王隨請隨報屢請屢報寵盛而驕恐階之為禍二言貨利不可偏徇三言私人不可偏任惟皇上去此三偏逺貨財斥群小以為福王先不報給事中吳亮嗣勘奏尚書李三才盜用皇木旨付法司長蘆巡鹽御史潘之祥條議鹽法一防沿河夾帶一嚴營軍私販一禁啇民之影射一止姦啇開引于邉中如議行遼東巡撫郭光復言南關既失止靠北關如線之籓籬故今日籌邉必以救北關為主建州反覆靡常惟當一意決絶處置得冝乘其外寧修我內備如敵樓火器急為建置城堡墩臺蚤為修輔設守瞭之軍夫禁出邉之樵牧稽查虛冒移置將官責北關以訓練之議寬罪辨以使過之人挑選援兵期得精壯皆內修之實所當舉行旨曰制馭機冝其便冝以行大學士沈一貫卒二月戊寅朔總督兩廣張鳴岡疏敘平黎之績御史魯之賢劾其招寇媚璫乞敕罷斥以遏邉境邀幸之謀不報禮部郎中洪世俊疏皇太子美質英挺而講幄塵封青宫雲鎖此于逺紹之義何居二祖當干戈倥偬之際鋭意儲教而皇上以承平之時坐令忨愒此于法祖之義何居皇上沖齡踐祚朝夕典學今雖深居靜攝而中外情形洞若觀火不示之以𥘉年之勵精但教以近日之暇逸此于身教之義何居且不特皇太子也皇長孫年登十六亦古稱出就外傳之時夫以聖子神孫茫然不知學問此可為盛世景象乎疏留中準留都各衛所官承襲聼南部勘結類奏即移咨兵部候命不必赴闕命給福府蓋造從官房屋價銀二萬兩各王不許援例南直隸巡按陳玉輝修復屯政三欵一定營費扣除新增冒濫銀兩以為修理奬賞之費一嚴行令𬋩屯指揮春時督修不力而沖突者革任參降隄防無虞者薦用一恤流離四十二年貧戍額賦難輸合無照四十一年輕災例每石折銀三錢五分以紓軍困報可御史金汝諧言時事有軍伍虛冒一條謂邉省之兵患其聚聚則易驕京營之兵患其散散則易弱古者慮其聚而驕故分寓之于屯田今日憂其散而弱必練習之以行伍冝自營將而下令各習器械平時則分隊比試團練則分𢾗嚴明此亦以守之法練之者也弘治間五軍營常撥一千五百名戍黃花鎮神機營撥守紫荆關等處故營軍每撥十之一輪畨于近邉蓋習險夷則不致遇敵輒北嘗勞苦則不致驕悍難使今獨不可倣其意乎此以戰之之法練之者也湖廣巡按錢春言天潢繁衍祿入不給至于開之以四民之業屢輕建議未能斷行臣巡長沙惟長沙王子得列膠序王亦以此自樂夫諸宗冠進賢而垂大帶其自視至不如一青襟然則何不令天下學臣于凡分封處少闢其途以誘掖之乎肅王紳堯奏還五所屯田一千餘頃資助新邉兵食上嘉其忠義遣官齎敕建坊旌奬三月丁未朔建州海西使人進貢諸部世受撫馭進貢許一年一次每次貢使𢾗踰千名天順成化間量議裁減後復加至一千五百名逮建州冨強日甚當事復議裁抑遂不貢者幾年禮部條議欲令照北虜俺答事例免其入京俱在邉守候齎賞照例給發自退地鐫碑益謬為恭順止以大針等一十五名進御史錢春疏論輔臣方從哲不能阜安宇內登進人材獨於福王諸事請乞委曲聼順以悅君心從哲引罪求去上諭安心佐理弗介浮言工部請建殿門箭樓給事中官應震等劾內官監王朝用歷盜內庫等物贓敗應各究擬俱不報巡視廠庫給事中何士晉等言水衡欺冒弊端莫甚于啇匠預支請設法以清其源定其制扼其要重其責杜弊將來覆可浙江撫按劉一焜李邦華奏言普陀山遠眺日本俯瞰黑洋年來法令漸弛募建繁興亡命無賴皆藉此為生涯奈何以奉佛之虗文釀封疆之實禍乞罷建鎮海寺不報四月閣臣吳道南到任有男子張差持赤挺突東宫傷門者內侍執之下法司問上即詣中宫王皇后迎見上遂坐語其故后曰此事老婦亦不敢知須與哥兒面講哥兒者東宫也少頃東宫至后問之東宫曰此事只在張差上身結局足矣上撫其背曰竒兒是萬萬年太平天子提牢官王之宷重加詰問科臣何士晉請窮治上大怒召皇太子及諸孫詣慈寧宮太后几筵前行告慰禮悉詔群臣入見上執皇太子手示群臣曰此兒極孝我極愛惜言未竟御史劉光復從後抗誦上慈操南音聲髙上疑有他語遽怒命內侍執付法司皇太子諭諸臣曰爾等無聼流言為不忠之臣使我為不孝之子上悅尋誅差于市斃劉成龎保于內庭再諭內閣張差事不必株連事遂寢于是罷王之宷官輔何士晉于外工部侍郎林如楚請循祖制停織造內官以蘇東南民困諭工部修築胡良巨馬二橋督理工程內外官都給與敕書關防應差科道擬定來奏其擇日興工照例行大學士方從哲言今日部院大臣除崔景榮𥘉到未任尚止一人侍郎止五人而五人中進部者一杜門者三兹林如楚又以不得其職抗疏去矣臣以為欲挽其去當安其心欲安其心在行其志如楚之疏固以朝門未建箭樓未修邸第寢閣諸工未竣為不得其職若何宗彥之求去非以儲講未開王婚未舉諸吉凶大禮未盡行乎張問逹之求去非以院堂未輔代攝難支各處巡按御史之差未盡點乎望皇上將諸臣請告之疏盡賜簡發敕令即出視事後凡奏請慨然允行明良合而庶事康端有望于今日矣五月著刑部重擬劉光復罪該司官調外任增各直省鄉試解額命相皇太子妃墳地給東宫生母皇貴妃墳戶原任大學士沈鯉卒祭葬有加禮豫諡自正月不雨至是月上因祈禱連日簡發吏部舊疏遼東巡按翟鳯翀請隨地方量置常平倉括省贖鍰公費買榖儲蓄上是之行各鎮督撫等官遵行禁左道異教于天下旨坐劉光復直欺大不敬律論斬方從哲吳道南疏救不報致仕禮部尚書陳經邦卒福建莆田人德器溫文操持端慎寅清匪懈月旦共推焉六月以祈禱雨澤遣張惟賢等祭告南北郊社稷山川雷雨等神旌奬沿山恭莊王繼妃楊氏未婚守莭大小九卿各衙門官俱為劉光復乞恩求宥嚴旨切責降參政薑志禮三級福王遣人至登萊丈田志禮上言福王莊田連跨三省迄無成規今日之始謀肇他年之籍口使籓王得與天子爭土不可不蚤慮也上怒責降諭吏部都察院年來科道呼朋引類橫噬旁擊撓亂朝政朕因未暇簡閲諸疏故一概優容此輩再無底止使老成不淂安其位今後爾部遵照憲綱舊規不時指名參奏仍查推過年例外轉科道官何士晉等照原擬地方前去任事不許推病給假廣西御史董元儒言夷寇日驕土司日削請增兵設備蠲稅餉兵聯屬土漢申飾各司勤修撫輯詔如議行釋馬三道等嚴飾門禁令弗阻絶內市升右庶子掌坊事劉一燝為國子監祭酒掌司經局事顧起元為南京國子監祭酒敘甘鎮延綏纍年戰功顧其志周盤柴國柱徐宗濬張承亂等廕襲升賞起吏部左侍郎劉楚先禮部尚書諭刑部都察院錦衣衛熱審遣刑部員外郎關驥等往江南北浙江各省恤刑以靈雨應祈令前遣朱純臣等祭謝七月丙午孟秋享太廟命吳汝胤恭代遣梁世勛等分祀諸陵畿輔飢先發通倉米七萬石賑之督撫諸臣請大發臨德二倉平糶以遏亂萌命出十萬石給之黃承玄祁光宗為都察院右副都巡撫福建甘肅瑞王婚禮成大學士方從哲等請設官開講開設武科于甘肅額定三十名山東蝗旱飢撫臣錢士完請賑樞部署事左侍郎崔景榮題秋防事言九邉情形各冝戒備上嚴諭飾之太常少卿史孟麟疏奏二事一曰皇長孫册立當議一曰直臣愚戅冝容為御史劉光復也上大怒下旨切責降五級調外御史劉廷元言頃者皇上于歷年除書一朝沛發乃于給事中梅之煥一疏責以擅權疑以窺探夫君尊如天臣子事君如事親聼人隂使而妄肆窺探義所不敢出也人臣此身尚不得自有况言路有議論而無事權安所容其擅乎皇上如厭近日之煩囂請于論人論事之章無一不發閣票無一不敕部院勘議其中事情也亟與施行其涉風聞也姑與優容其緣之以護黨借之為捷徑也操吏議隨其後則何至歡呶臣又謂內降之諭不可狃為故常內票之旨毋容承訛襲舛也閣臣之設固所謂備顧問而伐絲綸者何可舉其職掌而侵軼之臣之區區敢自效于皇上者曰今之言官惟患其不敢言弗憂其多言誠舉其言而程量之則妄言無由乘而忠説畢集矣政府惟患其不任事弗憂其攬事誠使任舉其事而綜核之則招權無所施而謀斷相成矣詔豫潞王妃歲祿減半莊租給與自收部臣以非祖宗舊制爭之不報令今歲各省直暫免行刑淮南大雨八月命吏部左侍郎李志署都察院印福建興泉漳三府水災巡按李凌雲請將原題稅銀五萬兩或全或半存留賑恤不報魯王進馬十匹金鞍一副慶賀萬壽上優詔答之以東省旱災發臨德二倉粟米十萬石平糶賜輔臣金銀萬壽字二副及金籙字金書紅符從哲銀五十兩紵絲四表裏吳道南銀四十兩紵絲三表裏福府長史張士俊求罷疏承奉樊用罪惡乞諭王免行開店原任通政司左通政今升太僕卿吳默引病乞休不允浙江撫按劉一焜李和華疏言織造停止內遣已奉有明旨歸之有司姦民紀光先等擅行保奏內監吕貴𬋩理織造且不由納言而徑逹是皇上深居之裁決姦民得以窺覦內庭之差遣姦民得以保舉目中尚知有三尺乎不報駙馬都尉王昺上疏申救劉光復曰陛下欲釋外廷之猜不得已而召對既謂召對寧可皆默默而出必有忠諫方成盛典光復當進言時意氣激然聲髙膝前寧暇計生前祿位死後榮名得旨拏問遂成忠臣死諫之名人誰無死光復死不朽矣陛下二十餘年不臨御迫而一出别無紀載惟執諌臣坐之大辟聖子神孫𥘉侍臨御亦無所見惟見中官窘撫御史自教者從臣危之矣上大怒以黨救譏謗革其衣冠押回原藉為民內旨給蘇杭織造太監吕貴敕書并掌稅務閏八月青州盜起安丘城陷庚戍三殿及箭樓開工以甘延二鎮斬獲宣捷祭如河南水旱災改折兊米之半命沐昌祚照舊鎮撫雲南沐啓元待昌祚年老撫按官奏請襲替不許再行瀆優九月套虜分寇延綏孤山副總兵全軍覆沒屬夷虎墩兔憨犯廣寧錦義十月郭尚賓再糾四川巡撫吳用先縻費金錢損傷民命多殺老弱以冒功級用先引病乞歸旨令供職北關白酋以老女婚暖兔子建州發兵爭之御史王雅量疏稱向救北關恐籓籬一失建州與暖兔合而遼不支今與暖爭婚勢不驟合北關依強援于暖兔適為中國利請設防遼陽以東按甲不動以觀進止建若不聼宣諭我督關兵隂約暖兔從南關入大兵從清撫分道而東兼以山東之民利其參貂順呼響應金白角之朝鮮我兵犄之其亡可翹足待已旌孝子邢雲衢等五人節婦李氏等八十二人萬曆四十四年丙辰正月壬申朔大計會舉卓異沈警炌王在晉等李志為刑部尚書革任巡捕提督凌應登毆御史凌漢翀于端門上以毆辱御史優亂朝儀責應登科道韓光祐劉廷元等言朝章國體所傷實名不報奪給事中余懋孳御史李養志俸閣臣上言行凶之廢并未見處分執法之言官先蒙譴責國體不無少傷不聼給事中熊明遇言驛傳之設或使臣銜命而賦皇華或四夷緹譯而貢共球或京朝官賦事于外或監司再見于京會典臚列弗敢姦也先臣有官九列而一介行李不以纍郵卒何近日濫觴之無等也一都通顯僕從如雲供帳賦馬百姓騷動驛官窮于鞭撻有闔門自縊者奈何不為之釐正乎謹條十欵以上從之南右都御史蔡應科奏近來諸臣言事皇上每不見聼納反加切責是皇上有疑于諸臣也臣謂若多言官相繼上言必其心之無可疑也亦明矣言謹則意必忠議同則謀無私如近者皇太子之講學皇長孫之就傳稅璫之罷免內帑之給彂科道之允輔諸臣單疏合疏言之皇上亦何疑而終不聼哉不報遣御史過廷訓往賑山東飢民貴州巡撫張鶴鳴奏紅苗蹂躪三省乞敕楚蜀徴兵助餉務期撲滅以靖封疆旨依議行御史翟鳳仲上言宦官三事謫外二月壬寅朔淮徐飢命發見貯溢稅并正項銀一萬六千七百八十兩煮粥賑濟青州舉人張其猷上所繪東人大飢指掌圖各為詩咏之有母食死兒妻割死夫之語見者酸鼻御史梁州彥上言國無重臣則主危左右太親則身蔽今大􅒼如向曙之星逐臣等辭條之葉夫有罪不赦有缺不補祖宗朝所以裁抑貂璫者奈何賜之于朝紳乎皇上誠能召閣部大臣直啇幾務科道輪直對仗駁彈在廷議論惟患其少爾一事一疏可了一官一推即用雖趣之使言更于何處關説伏願御朝講停內批無偏抑言官而代北司之報復無怯惜補授而甚言路之蕭條疏入奪俸半年給事中郭尚賔言人主親裁冝審言官顯諍非私上怒曰尚賔明為余懋孳解救實為凌漢沖窺探欲使閣臣對還內降謂朕為何如主姑降三級調外會勘凌漢沖凌應登事應登姑免死發戍瀾滄漢沖例不謹間住大學士吳道南禮部尚書劉楚先充會試考官取沈同和等三百五十名既放榜下第舉子憤憤不平或泥汙同和名或聚衆聲闕于是科臣參其懷挾本房亦具疏檢舉上命禮部覆試曵白除名磨勘原卷內四經稿皆第六名趙鳴陽原稿塗抹者俱遣戍京師有斷么絶六之謡三月辛未朔廷試賜進士錢士升賀逢聖林釬等及第出身有差命兵部發銀六萬兩解濟黔師剿苗山東巡按王雅量以登萊歲荒請海運陳言六利下部議四月庚子朔敕旌舉人梁知德四川梁山縣人少有至行舉童孝子應鄉試考官閲其卷擲之地忽有神曳還几上如是𢾗次乃入選人謂至德之感御史毛湛言銓屬不冝廣額館選不冝參差謂銓部官至四十四員輪遞視事頃突增册庫一員遂至今日每缺增三四人長此安窮且每年外轉止一人其餘皆需次典選翹足清卿者既無言責又鮮年勞雍容家食坐致華膴安可容此濫觴也館選之舉與其多留于一科莫若精擇於每科弗淂派臺省而遺部屬徇托病而啓規避庶多寡適均儲養得體不報雷火焚稅監張煂房給隴川宣撫司多安靖印信給事亓詩教上言時事借漢唐宋為證曰漢之賦法壞于武帝作鹽鐵算舟車造錢幣利析秋毫矣又令民得買爵其後浸淫遂至有開西邸賣官入錢者今之營利水陸榷關之外益以攘奪之中官粟銀事例之嬴居為戶工之竒貨璫稅酷于平凖資郎劣于武功大內牣于西園此殆類漢者也開元天寶間設勸農使虛括客户八十餘萬歲增緍錢𢾗百萬鎮兵歲供衣千二百萬匹糧百九十萬斛至元和比天寶稅户四分減三天下兵仰給縣官者三分增一大率二户資一兵矣今之邉餉取之愈窮愈促用之愈濫愈增以十室九空之民半養有名無實之軍半飽有去無來之虜追呼慘于簡括物力耗于虛靡削弱成于貢市此殆類唐者也靖國改元正月朔即有流星及赤白黑氣燭地亘天因而彗飛青著龍見茶肆狐升御榻是時宦者開邉釁幸臣領花石荼毒生靈所在騷然河北山東盜賊四起馴及于金人之難今天鳴地震物孽人妖水旱蝗蝻道殣相望兩河東省劇盜橫發復報雷火之災倐燼寺人之宅明白易見切近可虞此殆類宋者也皇上不朝不講不郊不廟皇太子講讀則久輟不行矣惠桂二王則少壯不婚矣部院大僚懸缺不輔臺省諸臣摧沮日加以時考之既理𢾗之並窮以勢觀之又天人之交變臣懼今日為治之終亂之始也不報五月庚午朔給事中熊明遇言邉功太侈稽核冝嚴請敕延鎮新差御史李養志甘肅在差御史董廷策勘議訪核又言時事八可憂內庫太實外庫太虛一可憂餉臣無餉邉臣開邉二可憂西虜圖王東虜圖賞三可憂黃河泛溢運河膠沍四可憂齊苦荒天楚苦索地五可憂鼎足不備棟幹微撓六可憂群諽盈衢遮遙滿路七可憂吳民喜亂冠履倒置八可憂八憂未已五漸互根太阿之柄漸入中涓魁壘之舊漸為稿籜制科之法漸屬姦囮武蜂之兵漸至銷懦啇賈之途漸至梗塞五漸已見三無蔓延姦民可熒惑天子千戶可惠邀絲綸是朝廷無紀綱雲貴之守令皆途窮楊粵之監司皆規避是邉逺無吏治挑搆口給于蒯武傾危禍慘于蘇張是士夫無人心天下事可不寒心哉不報巡漕御史朱階言漕政二事一曰清核厰船一曰修復泉湖從之以庶吉士葉燦薑逢元繆昌期等十一人為編修簡討給事中薑性言福籓贍地湖廣額逺不及請丈勘欽留邸業以免籓租不報六月清河兵私出松山採木為夷部掠殺御史王雅量參遊擊馮有功戴罪允之謫工科給事中劉文炳經歷司都事文炳以取假元沈同和事極詆道南道南不勝忿言二百餘年但有紏閣臣之言官無罵閣臣之言官上怒出之方從哲論救道南亦論救乞歸不許給事中啇周祚言自封建既罷車書一統裂土分茅制所不載奈何以髙皇帝金甌無缺之天下自今日起割裂之厲階哉時福府贍田河南山東勉張結局楚地搜括難支故周祚言之江西大水貴州撫張鶴鳴報擒斬苗狆一千四百名請俟秋後再舉從之七月己丑朔虜索輔貢賞賜衣服等項逾半年不發科道臣余懋孳疏劾不報又疏言闢異教嚴海禁自西洋利瑪竇入貢而中國有天主之教留都王豐肅陽瑪諾等煽惑百姓不下萬人朔望朝參動以千計夫夜聚曉散效白蓮無為之尤則左道之誅不可貸也使其資往偵來通濠鏡嶴夷之語則通番之戮何可從也河南蝗按臣令民捕蝗斗者給以斗榖榖殆盡而蝗愈繁陜西旱套虜入犯東路參將王國興死之巡視厰庫工科歸子順疏言寶源局差官買銅五便謂年來以𢾗萬帑金輕付啇人之手耽挨冒破茫不可詰宜委虞衡司官一員給以堂劄則事無推諉商有統紀便一貿銅者大率輳于蕪湖差官乘船刻期可至便二除關津之稅輸運無復留難俾一歲之買足為三歲之用而鼓鑄不致如今日之停工便三銅既贍足鼓鑄精好私錢不得與官錢混淆則盜鑄不禁而自息便四今經費浩繁帑銀漸竭若收銅鑄錢則在冶皆錢積錢皆銀以錢之贏輔銀之詘流通貫輸公私充牣便五此經國之長計也不報八月壬寅皇太子出閣講學南太常少卿桂有根奏增孝陵太牢牲帛祝文從之九月己巳朔兵部奏請諏日開操以飾營務不報御史李髙疏條巡關八議嚴防禦以衛陵園核軍餉以清虛冒查邉工以固疆圉練鄉兵以備緩急通拘綴以伸國威開使過以勵材勇重海防以備倭變禁左道以杜亂源允行溧陽等處水災江寧廣德等處蝗蝻大起巡撫山東李長庚疏議縣囚王㴶功罪王㴶者安丘縣民也睚眥殺人繫獄擬抵劇盜張國柱倡亂引衆五百人入安丘類以綘帛抹首時縣令無宿備逸而匿賊黨劫庫藏破械出獄囚㴶與焉乃詐降賊俾巡視㴶密誡諸囚無動動者死矣隂結縣令為擒賊計約城外張軍聲以撼賊入而宣言于賊曰官軍至何不走賊踉蹌出城未及半㴶闔扉堅守手刃一賊持其首號召吏民令鄉兵各去其帽曰抹首而綘者賊也復立砍渠魁十許人于是城中人并獄囚起逐賊盡殱之漼搜賊所劫庫物還之官事既定束身入獄撫臣言㴶一罪囚爾而倉卒成定亂之功其佯為從賊智也戮力殱賊勇也事平就獄口不言功忠也雖殺人者死國有常刑而會典亦有犯斬罪立竒功準贖之例乞寬一面開義士自效之門上命釋之免江北抽扣節省銀兩先是征播征倭省直抽扣冗役公費可節省者解部充餉故廬鳯等四府三州每年共節省二萬七千餘兩及倭播平而此項未蠲甚至攤派善良追徴殊苦巡按唐世濟援恩詔請蠲從之十月戊戌朔虜犯波羅堡總兵杜文煥破走之銀虜犯永昌參將祁秉忠拒之諭內閣軍餉急缺朕軫念邉強將聖母宫銀三十萬兩發出其餘令户部會同兵部議借銀八十萬兩速解赴鎮弗借言請帑致悮邉事禮部尚書劉楚先吏科給事韓光祐屢乞休不報出城候命越宿遂行大學士吳道南歷陳危悃疏十三上諭留再三而不敢遽去御史韓浚言皇上不自愛其紀綱故朝廷之用舍與衆庶違而臣僚之去就又與功令違法度不足以整齊人心幾同于瓦解不省十一月戊辰朔革原任巡撫李三才職為民己巳隆德殿災距宸居不逺上心震恐終夜不寧閣臣上疏恭慰優答之復勉以入閣視事原任總督兩廣侍郎升南京刑部尚書張鳴岡卒江西萬安人為御史劾奏權璫降廣德判官督兩廣遏稅使不得入粵𢾗上章為民請命至是候代卒大學士李廷機卒晉江人文章溫穆有先民風居官清苦自勵核實用計經久既參大政門屏肅然以忠清直諒為上所特簡遺令云身後更無遺表不得瀆奏朝廷邀求恤典子恪遵不敢違撫按代題祭葬豫諡文節己丑延禧宫災十二月丁酉朔準江西留事例銀一年給賑命押發逺夷王豐肅等于廣東聼歸本國廣東巡按田生金援恩詔請釋今戍亷州給事中戴士衡戍雷州知縣樊玉衡回籍為民不報南兵部尚書王克纘上修省言聖明御宇以來火災示警者屢矣一見于乾清宫而宸居非舊再見于皇極殿而視朝無所今隆德殿又見告矣宫殿之間肘腋之近夜半火起其光燭天皇上見之震懼不寧然旬日以來未間彂號行事有以大慰人心者豈皇上畏天之心與火俱熄耶六合為家四海一室其所係之大非止一殿而巳大臣不推撓棟梁也臺諫不充缺戶牖也庶僚不備撤榱瓦也帑藏告竭乏蓋藏也小民貧困削産業也邉防不固頽垣墻也有一于此可為寒心而况兼之可危孰甚焉願皇上一更舊轍收羅人才以濟時艱罷稅停織與民休息大渙居積以安邉強修儲教行婚禮以燕翼子孫下章奏採人言以宣暢下情庶幾人心恱而天意回也不報辛丑白虹貫日鎮筸等處紅苗叛亂自嘉靖𥘉年討平設立乾州五寨洞口靖疆清溪長寧等大小十八營哨每哨兵或二三百名或百名委辰沅等衛指揮千百户督兵防禦又該參守各一員統制彈壓自萬曆十六年以來各哨將官不簡練壯勇皆以賄收及聞苗出犯哨官無計率給苗糧乞和又地方失事不報剋餉進賄參守彼此彌縫以致兵弱亡命者復告以內地虛實潛相勾引至四十二年七月後苗賊入大章龍潭等處明年入大小五沖等處各營官巽懦觀望來不偵探去不堵截撫臣梁見孟參失事官陶正王可大等後雖有沖果蘇木溪之小捷然終不能一大創苗愈熾矣萬曆四十五年丁巳正月丁卯朔總督周嘉謨條議海防事冝併事權以便調度精船器以禆實用簡將卒以壯威武定汛規以便責成酌衆議以定機冝預綢繆以弭釁隙留中禮部遵五年議諡例疏請應諡諸臣四十四人東朝房火延及公生門俱燼兵科趙興邦論套虜乞欵邉臣許輔經革市賞謂虜戕我將士掠我人民如此大逆何論小恭恐要挾得計虜氣愈驕傳之四夷胡可為訓且一年兩市計費八萬七年之間幾六十萬矣取此六十萬金錢每歲以二十萬餼我軍士則士飽馬騰即長驅虜庭可也何示弱至此貴州巡撫張鶴鳴復分道勦苗巡按楊鶴言進勦情形成功難善後尤難請發帑金四萬以二萬為困守之需以二萬為善後之用不報二月丙申朔禮部請皇太子講學皇長孫出閣就傅給事中趙興邦以開原失事疏請提問將官嚴諭撫鎮道臣等留中貴州巡按楊鶴奏請申飾用人之法言化夷先從漢始化漢人從選用良吏始州縣有司牧之寄郡守有彈壓之權司道任方面之重皆不可不慎選以治其本長久之計必出于此時三冬無雪入春不兩敕群臣修省親露禱宫中二十一日雨雪交作大學士方從哲等因上疏言精神可通於昭之表而獨不可徹于穆清之上耶謹請先行其最要者輔都察院堂官以重風紀之任允考選候輔散館諸臣以濟言路之窮點按差以靖地方宥纍臣以開一面其餘諸事俟次第簡發不報三月丙寅朔始命吏部考察京官計典例于正月舉行至是奉旨尚書鄭繼之侍郎李志科徐紹吉道韓浚考功趙士諤主計黜馮上知李朴丁元薦等南察沈應文於綸為政黜章嘉禎金士衡等拾遺則王之宷鮑應鰲孫瑋曺于汴孫慎行魏養蒙朱國禎鎮撫司監犯日久無人問斷淹繫死亡家屬百餘人聚哭長安門外閣臣奏言今奉旨送問之犯日多而遵旨打問之官烏有圜土壘壘日登鬼録幽魂怨氣上干天和乞將部推理刑官速點一員不省兩淮鹽法道吳撝謙條陳太平第一策意欲借墾田之名行井田之法更樹榆栁桑棗等不於經界之上一則資之為利一則資以為守給朝鮮國王李暉生母金氏冠服四月乙未朔允鄭養性襲職左都督給事中趙興邦疏諌不報貴州巡按楊鶴請以烏撒土府改隸黔中便上命所司速議允兵部侍郎魏養蒙休致命崔景榮署兵部五月乙丑朔虎酋獻欵督臣薛三才請復撫賞從之吏部尚書鄭繼之奏考選諸臣自題留以來候命五年矣垣省臺班幾為一空乞將原擬散館諸臣速賜允用署禮部侍郎何宗彥言熱審必不可愆期朝審必不可廢格詔獄理刑必不可無人不報宣大總督吳崇禮請築獨石城外垣房修理馬營雲州二堡允行命諭禮部大祀天以子時地于卯時大明以卯時夜明以酉時明注祀册以便遵守併宥張惟賢之失御史紏其代祀不敬也畿輔蝗旱甚慘旨免順天永平二府州縣過路落地二稅一年應天等處大蝗又有群鼠銜尾蔽江南渡正陽門箭樓成六月甲午朔以大同殺胡堡為雲中第一衝要另築新堡以建啇店禁市夷不得仍入殺胡城署兵部侍郎崔景榮言戚畹恩施不冝太濫鄭養性侯昌國襲官實犯萬世公議乞收回成命不報以先賢周敦頥十七代裔周汝忠襲博士崔景榮疏邉鎮虜情欲使用欵者戒處堂之安周徹桑之備毋以度支芻餉為啖虜金繒則守禦嚴而虜不敢驕用戰者惟以直前為功不以小蹶為罪令將士退而死法方不難進而死敵則威武振而虜不敢縱得旨申飾七月癸亥朔京師怪風折社稷壇門及東中等門櫰落五鳯東華等門樓吻獸倒午門前聖旨牌及東河邉大樹𢾗株大學士吳道南丁憂回藉山西大旱山東旱蝗給事中吳亮嗣等因風變陳言鬱塞諸狀自端揆九列以及百司無一人能逹其情于上自禮樂兵刑錢榖無一事不壅滯且掖廷內侍刑戮太過內帑泉貨沉積太多幽咽之氣皆能結為愁雲迅雷以妨和氣貴州巡撫張鶴鳴奏猱坪擺朋之捷延綏巡按金忠士奏邉將失守之律重邉將之權反為虜操若曰我一犯搶爾罪立至故邉將往往啖虜以重利使之或東或西而不出于所轄之地常嫁禍于鄰者願寬其文法以責成之八月癸丑朔方從哲請補閣員時從哲臥病兩月章奏皆就私寓票擬至是入閣以東宫講期上請內批無吉日停止九月癸亥朔湖廣承天等處夏旱秋水蝗蝻蔽天三災疊至萬姓倒懸詔停刑時疏奏多留中京官奉差請告命未下部未覆者支俸如常仍作算考滿翰林簡討丁紹軾以册封告病後一年零四月移書掌案不領在告之俸亦不以在告作考滿之期禮部等衙門題皇太子開講詣文華門叩請懇行不報河南沈丘等五十州縣旱災準于倉兊粟米三十九萬石內改折五分徴銀山東星隕天鳴地裂龍鬪江西漳州各大水十月壬辰朔給事中官應震言𢾗月以來自輦轂三輔留都江北至河南山東西陜西江西湖廣福建廣東等處俱以災傷報請蠲請賑祈皇上多出內帑大行賚豫以為國計民生疏留中駙馬都尉侯拱宸疏奏輔缺失修聖政以收衆用以安宗社恭順侯吳汝胤疏奏急務當修賢才當惜請亟賜簡用以維泰運俱不報命鼎渭準封代籓世子先是鼎渭生于隆慶五年鼎莎生于萬曆十三年雖係庶出而長幼判然矣代王溺愛鼎莎謀出鼎渭揑詞以請部寺通政宗人各疏斥其謬經年不結至是始奉旨定奪吏部都察院俱以臺省缺人諸務廢弛請速下考選候補諸臣以濟急用大學士方從哲乃言人君舉事上之當存國體下之當順人情遠之當稽祖制今六科止于四人而五科之印皆無所屬十三道止于五人而人兼𢾗事以致內外各差缺者無可輔滿者不得代寥落若此于國體何如也諸臣通籍有年今幸與清華之選豈不欲乘時自效而徒令株守都門淹繫纍歲此其于人情何如也纍朝舊例給事中五十餘員御史一百餘員濟濟盈朝用以擴聰明而充任使今挫折若此豈人才昔盛而今衰糾繩之職可用于國𥘉而不可用於後世耶此其於祖制何如也不報十一月壬戍朔纂修玉牒成虜犯喜峰等處巡按薛貞劾參將郭珍選李家峪守備魏允髙降罰有差給事中趙興邦摘議巡青要務言中使當撤貧啇當裁城垣倉厫傾壞當修驢頭無用當變至于內馬房當遵照會典與外馬房一體巡視不報潞簡妃李氏請恩襲封其子賜名常􆄶溫答有加時王婚並急工部錢糧無措命借于馬價侍郎崔景榮陳言邉需孔亟不堪再借當慮非常上命仍給之十二月壬辰朔大學士方從哲言奉明旨目疾稍愈即簡詳發行行之此其時矣謹一一臚列上請不報丙辰以輔臣所謂選官畫慿事準將張孔教復除吏部署印時上于萬幾槩置不理中外惟以叢脞相尚起居注之職向有一翰林官專任葉向髙廢其官而自領之然向髙便于筆札歲月微有登記至從哲而遂廢有以日後史事為言從哲云異日纂史官自弔各部本章閲之足矣內府藏籍甚多自焦竤遇謗之後史官避嫌不敢至內府翻閲而書皆為吏役竊去所藏漸耗萬曆四十六年戊午正月辛酉朔貴州巡撫張鶴鳴請合勦兩江巡視京營御史梁州彥奏聼用一途原為儲養將材今以所收聼用世職武科循環入營習射親試較閲終歲應薦一以箭年貌聼用久近為據庶良楉攸分不失儲養𥘉意承天守備太監張文元以病求去祖制凡中外本章進經御覽必發閣臣看詳擬議取自上裁遇有未當再擬以上設有事體稍礙難以奉行者封還御札請改此相循舊規縱有中出不由內閣者必細微無關大體事年來中旨漸多或不時批發或中夜傳宣至于明旨雖下必由該部抄發後行今太監張文元告病疏中插入别項人犯取中旨以一等字該之盡為釋放內閣不得與該科不得問亦不知何項罪犯何起事情大學士方從哲上疏爭之不報尚寶司卿熊尚文奏金牌失落𢾗多會典錦衣衛當駕三日輪班上直各赴尚寶司關領金牌夜巡點閘班滿繳入所以嚴關防肅禁地也自上深居二十餘年直宿僅存故事廢弛該司查參部議輔造二月辛卯朔工部侍郎林如楚言祖宗設立工科發抄一以防內廷朦朧傳送之弊一以嚴外臣完欠考成之法其用意甚逺今皇上俯從內臣之請有不必候科抄之旨竊以上供夷賞及婚禮織造事干錢糧自非下科勘詳抄部送司何慿覆請如一日未奉點用科臣之旨即一日不敢題覆催儧袍假之疏即皇上以衡命罪臣臣寧甘之不報守備鳯陽太監金忠奏欲操練兵馬該科參寢之吏部尚書鄭繼之兵部侍郎崔景榮先後于大明門叩辭出城大學士方從哲以子致殞娼女事被參注藉三月庚申朔巡按御史田生金奏請粵東備諡六人政事則尚書張泰陳紹儒侍郎陳璉節義則員外張粲長史莊琠理學則郎中唐伯元辛未京師風霾晦冥四月張鶴鳴進兵兩江敗績疏言楚撫有一旅觭角期月可以蕩平湖廣巡按彭宗孟言鶴鳴擅開兵釁責人以難辦之役有旨令協心任事蠲廣東雙恩場虛暗鹽課從巡按田生金奏也建州誘陷撫順城千總王命印死之先一日于撫順口言明日有三千韃子來做大市至日寅時果來叩市誘哄啇人軍民出城貿易隨乘隙突入虜殺據住沿河勾引西虜暖宰等于遼河兩岸下營討賞虎墩兔憨會議入犯東虜抄化紏集駐牧於鐘靜邉外因以漢字傳檄清河脅併北關巡撫李維翰趣總兵張承胤移師應援建州兵偽敗誘我師前以萬騎回繞夾攻承胤全軍覆沒廷議興師起楊鎬兵部侍郎經略命總督薊遼侍郎汪可受先出撫順順天撫臣移鎮山海保定撫臣移鎮易州以便控御起廢將李如柏總遼東兵及徴杜松屯山海關劉綎柴國柱等赴京調度巡鹽御史龍遇竒奏立鹽政綱法詔遵之仍立石垂久建州歸我漢人張儒紳等傳來夷文一𥿄自稱建州國汗有七宗惱恨等語大略言朝廷無故殺其祖父護北關嫁老女及三坌柴河退墾今願赴貢求我一二人為質罷兵工科給事亓詩教疏言張儒紳等為建州送進當嚴行訊究况云係東厰所差如涉别故不妨另處果係交通則當徑坐以交通之罪不報閏四月給事中官應震奏禦建三策一在伐敵交諭虜能繫建致闕下如順義王故事世受國封賚賞不絶此以逆虜攻建之大略也一在張威勢建州北鄰北關南鄰朝鮮借北關兵為嚮導搗建之右腋調朝鮮鳥銃手同我由鴨緑山后搗建之左腋此以順夷攻建州之大略也一在悉敵情撫順至建州二百餘里有五關隘進一關須守一關若越關而進恐無歸路凡建境深淺虛實須得建人與我同謀方能詳悉此以建攻建之大略也姚若水疏薦原任總兵王學書毛允中孰知夷情冝起備大將之選住歲東征餘兵多聚海蓋皆善騎射冝招徠以資衝鋒之選自登州抵旅順可竟日而至由旅順抵黃谷島汪家口亦不逾三日移舟師于汪家口與鎮江寬奠兵合可相機而前可扼隘而守則建州腹背受敵安能西犯南禮部等衙門奏祖宗家法以訓儲為第一義髙皇帝建大本堂而命太子賔客梁貞王義等輔導太子文皇帝于五年四月即命皇長孫出閣就學諭輔臣盡心開導皇上亦當守祖宗家法允開講之期皇太子皇長孫日就月將以延國家有道之長不報五月巡倉御史王象恆條上倉漕八要一嚴督總旗以杜挂欠一專選庫官以便青成一革船户幫貼以省煩苦一議革攬頭以禁侵漁一多留通糧以省繁費一收餘米以實倉庾一嚴稽查以杜虛冒一禁改折以重根本從之廷議請發帑金湊餉百萬以給軍上諭內帑無措括十萬金佐之撫安白家沖三坌堡連被剋會夜大雨河水泛漲建州兵退出境經略楊鎬兼程受事抵山海關得剋堡報疏請就近徴調命楊鎬兼挕巡撫諭總兵杜松劉綎等出關給冏金六萬兩市戰馬以候陳王廷代楊一桂按遼六月戊午朔添設戶部郎中一員給敕書關防隨軍督餉廣東巡按田生金條陳五欵兼統轄以裨鹽政鑄官錢以利民用恤官舍以念世勳分薦疏以勵武辨酌邉戍以恤罪囚命依議行庶孽常洪紏黨劫父淮王寶册銅符勒常洪自盡淮王貽謀不臧罰祿四年贈總兵張承胤少保賜廕諡立祠李維翰革職為民南道御史趙紱言臣宰盧龍時便聞建州浚壕增墉選將練卒二十年生聚教養而我方狃于處堂之安今冝朝夕訓練力圖自安而又當使本鎮賢士如關東劉國縉關西白瑜父子及先前推寧前參政劉尚朴等各畢其智力以圖安攘遼事庶有濟也京師地震何宗彥等上修省三事不報七月丁亥朔御使張銓言建之山川險易諸將未諳深入保無抄絶昔臚胊河之戰五將不返今冝就近調募屯集要害以固吾圉厚撫北關以堅其敵若加賦選丁騷動天下恐憂不止遼者又言李如柏杜松劉綎以宿將並起勢不相下必責成楊鎬使之約束張承胤不量而進喪師辱國死何足贖梁汝貴顧廷相突圍而出見失主將陷陳而死冝加優恤若李維翰當逮治以為失事之戒御史潘汝楨條奏薊鎮事冝一曰輔練冝速一曰戰調冝審一曰要地冝防一曰偵探冝明一曰南兵冝恤一曰夜巡冝議一曰夷市當防一曰資格冝破一曰軍力冝養建州兵從鴉鶻關入陷清河參將鄒儲賢遊擊張斾戰死南兵主事鄒維璉言邉患孔亟冝選擇大將以任戰守八月丁巳朔賜經略楊鎬劍時議謂楊鎬工于媚虜掩敗張鶴鳴果于勦民飾功楊鎬北禦鶴鳴南撫時事可知矣兵科趙興邦奏總兵李如柏舍清河而防懿路出竒應敵固如是乎若援遼總兵麻承恩不聞其駐防何城應援何處又大不可解朝鮮遣刑曺判書李度請敕從征并乞硝黃許之故太僕少卿吳炯捐資一萬兩助邉且言昔人助邉得官士林為耻臣今以休致官助邉非有他覬望敕戶部收受戶科官應震言炯有官非求進無子非求恩冝表章之以風勵群臣山西提學副使吕純如請以宋資政殿大學士范仲淹我朝霍州學正曺端從祀薊遼總督汪可受以清河失事自劾旨令策勵恢復開山東海運西虜定欵九月丙戌朔逮總兵麻承恩詔獄回鄉生員孫弘祖在建州寨聞要先後犯搶清河靉陽等處建都遼陽帖報經略西虜各聚衆謀入內犯巡按王象恆奏請增兵選將發餉備邉敕援遼諸將抵關者嚴限赴遼建州兵從撫順入李如柏拒却之張鶴鳴奏銅兵鼓噪紅苗乘機搶掠悮事求去詔慰留之諭戶兵二部撫順近捷朕甚嘉焉今天氣嚴寒邉方可憫爾兩部湊發銀二十萬兩赴軍前犒賞務使人沾實惠士有奮心戶臣請加派田𤱔每𤱔加三釐五毫有長星見于東南其星白氣一道形如匹布濶尺餘長二丈餘東至軫西至翼凡二十九日而滅京師地震增設遼東巡撫周永春以李光榮為援遼總兵移駐廣寧十月丙辰朔給事中薛鳯翔奏從來未有五年不下之考選三次並候之言官責輔臣不能挽回匡救于是從哲乞罷斥不報彗星出于氐掃犯太陽守星尾掃北斗文昌五車逼紫垣從哲言一陽𥘉始彗芒轉甚天怒未巳在皇上轉移之閣臣居密勿之司未有一人居𢾗年之久者六部率多署事左都懸缺多年三科無官四科無印抄發之規盡廢封駁之任久虛掌道無人侍班無人巡城無人外差者無釋負之期其于人情何如也戶部言大征未舉而支銷幾盡各關省直節省搜括兩殿中書士民援納輸助事乞早簡發以𥙿軍需御史楊鶴請通啇恤竈以平鹽務梧州城火起巡撫潘一桂以廣西亢旱赤地千里奏留稅銀四萬餘備賑併蠲額稅以救邉荒欽天監請敕取在籍按察使邢雲路前來統理曆法十一月丙戌朔兩淮參議吳撝謙奏遼左危急已甚必深溝髙壘以拒之毋輕用戰以蹈不測改設武關于鞏昌令河東西十道合試太常少卿胡來朝請京邉兵更調以練膽勇十二月丙辰朔禁革錢糧加收火耗套虜猛克什力率部落來降兵部尚書黃嘉善疏請敕令直省諸臣各將所屬兵馬錢糧開報嚴行該𬋩簡練勾輔及召募鄰近軍餘間民教習分撥防守仍載入考成而行黜陟依議行員外郎董承詔犒軍進言遼事之難有六一將多而難調一兵弱而難用一助寡而難恃一餉久而難繼一敵狡而難制一地險而難攻而又有不可不議者六一關隘之當守一儲糈之當備一防禦之當周一遼餉之當優一驛遞之當恤一優恤之當亟冝嚴飾將士協力同心以保無虞祖制藩府食鹽三百引每引二百斤福府準一千三百引每引六百六十斤于河東運支巡按王逺言非典制不報給事中趙興邦言近者會安有失或謂竊掠或謂大舉上下相蒙楊于渭欺隱揑報胡咸寧附和扶同據法俱無可逭各鎮道按臣以用人方急姑從寬政後將何懲且諸將心怯而忌氣驕而妬如杜松與賀世賢以幕賔所搆大成嫌隙開鐵一帶民既苦虜又復苦軍乞敕經略諸臣嚴肅軍紀以鎮危疆得旨策勵北關金台失以剿建州一寨來告賜金帛風勵禮部彚奏年終災異除風霾水赤日異妖氛彗星專疏外若甘肅豬妖遼東猴妖四月寒霜邉臺杆火大怪示警于安慶蛟災作祟于池寧雷火焚擊于真保天鼓震響于寧逺梧州火災官舍民居俱燼各省地震京邉山西見告留都星隕成石祖陵地震天鳴乃言路幾絶政本孤單九列星稀六垣印刓且郊廟儲教不親不講榷稅內帑未罷未發將何以崇實修而答天譴計滌舊布新轉災為祥正在此時萬曆四十七年己未正月朔命吏科給事中張延登署科主察上三事其一詳保任之法其一嚴提問之法其一慎署印之人上嘉納之職方員外郎王元雅言策遼六欵一嚴責成一别功罪一戒欺蔽一簡精鋭一督芻餉一核戰具上曰條議諸欵有禆邉計其令經略督撫等官一體遵行所議定征剿防禦方略即時馳奏大學士方從哲移書楊鎬趣戰援遼逰擊叛附建州以父在彼也二月乙卯朔部院科道會勘韓敬文自可觀既無關節的據似難錮其終身或有輕佻舉動另當問之銓法上從之令吏部另議官以聞山東巡撫李長庚以戶部侍郎督遼餉楊鎬誓師遼陽分四路馬林率麻嚴丁碧等趨開鐵杜松率劉遇節等趨瀋陽李如柏率賀世賢李懷忠等趨清河劉綎率祖天定喬一琦等趨寬奠總兵王宣趙夢麟官秉忠李光榮各駐邉堡策應吏部左侍郎史繼階禮部侍郎韓爌充會試考官取莊際昌等三百五十人甲戍京師風霾畫晦從未至酉黃塵四塞冥如深夜已復光明赤色如血命傳諭慰厲東征將士飾諸邉備諭工部殿門工程已奉旨開工如何擅停止速令清理地基鼎建毋借言阻撓三月甲申朔麗江土官木增獻銀一萬兩助餉廷試賜進士莊際昌孔貞運陳子壯等及第出身有差時際昌進呈卷有别字有洗輔字科臣楊漣疏曰以狀元而别字必進士皆不識字人可以狀元而洗補必進士皆曵白可一時韙其直言杜松兵越五嶺關抵渾河焚尅二柵趨利半渡被衝車營鎗炮阻水不前松爭山頭駐軍林間伏盡起松血戰突圍自午至酉力竭師殱松及王宣趙夢麟皆死馬林改由三坌出塞抵二道關聞松敗軍遂譁遇敵斂衆退為追兵所擊死者枕籍僉事潘宗顔通判董爾礪皆死劉綎出馬家寨口深入三百餘里剋十餘寨敵詭為漢卒誘墮重圍夾攻之衆遂潰綎及軍鋒劉昭孫等並戰殁遊擊喬一琦斬敵壻火胡血戰四晝夜投崖碎首而死朝鮮將金景瑞從綎先登者亦全覆惟李如柏先受周永春檄中道撤兵不見敵而還起前御史劉國縉贊畫復起前御史熊廷弼馳渡遼宣慰軍民兵部尚書王嘉善及九卿科道叩文華門請發內帑以募戰士允給四十萬虎墎乘機挾賞巡撫周永春奏言廣寧一線為全遼咽喉之地處處乏兵萬一狡謀狂逞于西建繼其後則三韓之危有不忍言因命汪可受移駐山海開申飾薊昌防備四月甲寅朔諭經略楊鎬戴罪視事李如柏聼勘巡撫周永春請以其弟李如楨代將敕開原道僉事韓原善募兵萬人調各邉兵分駐近郊行遼東酌議民兵耕守宣武門外響閘至東御河水盡赤宣鎮營兵鼓譟不赴調詔逮治總兵劉孔胤御史楊鶴言戰骨堪憐忠魂未慰乞恤死士以鼓勤王頃者東征之役大將張承胤沒矣總兵杜松劉綎與夫王宣趙夢麟相繼亡矣文臣潘宗顔董爾勵俱暴骨疆場矣聞劉綎提兵深入已破敵十寨堅壁列營不動彼計用杜松陳亡衣甲旗幟詭稱我兵乘勝督戰綎始開營遂為所敗然猶大戰𢾗十合養子劉昭孫出入死鬪有萬夫莫當之勇若使清河聞警李如柏少聼賀世賢之計偏師策應殺入重圍劉綎當不致死或夾擊成功未可知也傷哉宿將死而死矣其家酸悽痛楚憂離困苦之狀臣不忍見聞也請優恤家屬併立廟祀從之戎政兵部尚書薛三才卒贈太子太保諡恭敏自東事發難調度兵食拮據營務條上練火器修戰車演京軍舉義俠諸疏皆切中時窽晝夜不交睫者五閲月遂以勞瘁卒于京五月癸未朔科臣張延登奏劾擅去諸臣侍郎林如楚沿途候旨御史楊鶴挂冠徑去兵部趙興邦輿疾出城巡方崔爾進張惟任俱不候代給事中李竒珍論李如柏先納女為妾生第三子攸中有女壻作鎮守遼東落誰手之謡不報建州進號後金皇帝改元天命指中國為南朝六月壬子朔建州兵陷開原時深入撫順以偏師躪鐵嶺擁𢾗萬騎自靖安堡入圍開原總兵李如楨方引衆出防城中空虛遂陷馬林于化龍高貞戰沒署道推官鄭之范逃出建復進圍鎮西堡瀋陽鐵嶺軍民奔潰開原被圍時北關先期密報及寇至出兵二千來援至而城已失矣擢熊廷弼僉都御史兼兵部侍郎代楊鎬經略改差御史張銓巡按遼東廷弼疏請決策恢復開原上賜劍令刻期從事廷弼單車就道戶部請增李登父子職銜以鼓效義時李登父子捐資捐軀以勤遼事僅加巡簡職銜時論少之遣給事中姚宗文查閲援遼兵馬國子監司業張鼐言遼事之壞願皇上速諭京營提督同廷弼至大教場點閲選鋒㨂三千為經略帳下親兵而統以參將分以把總等官支太倉米半年或一年以給其家而安三千人內顧之心付萬金于廷弼之手為三千人口糧之費以壯其行色夫漢以羽林擊胸奴唐以神策征番逆此古來舊事可行也不報七月壬午朔給事中官應震請特設武科目前兩月一舉待兵將大集或半年或一年一舉𥘉場試箭馬步三技外刀鎗技擊諸法並試之二場則營陳火藥地雷車戰等項作何試驗三場不用策論令自書謀略并熟知古今何將何項兵法知何天文熟何地理夷情得隨意暢言大抵三場但有一二可取即為入彀將材既集而兵即于此集而餉即于此省今廢間將領與四方武舉天下衛所指揮千百户及兩京勳臣錦衣衛世職於應試時令其各遣舍人入京營練習不募之募不調之調較之募調者徑乃遠過此所謂即將即兵也又不用安家治裝但入營之後方給月廪其餘官帑樽節實多此所謂即兵即餉也可以亟救目前可以持行經久黃嘉善題開原城乃昔黃龍府舊地東鄰建州西接抄化宰暖諸虜迤北則金白二酋在焉遼陽所恃以隔夷虜之路而聮絡北關互為聲援開原實扼其會兹因殘破議者方亟圖恢復令督臣合主客之兵以城撫順虜來則堅壁自守去則出師優之弗拘常法處處防守抄化攻克十方寺堡後金兵陷鐵嶺自開原既克瀋鐡逃竄一空後金間諜所在內應而我偵備甚踈聞敵膽落故堅城應時立破熊廷弼馳至廣寧聞西虜自鎮西堡合侵勢甚急率兵禦之熊官兒屯以捷聞八月辛亥朔二日熊廷弼受代翼日入遼陽斬陳逃遊擊劉遇節中軍王捷遊擊王文鼎設壇躬受撫清開鐵死事軍民遣緹騎逮楊鎬御史陳王庭劾總兵李如楨謂宰賽因鐵嶺之陷引兵爭鬪𬒳執如楨竟襲西虜殘級為首功熊廷弼言臣至各邉相度敵之出路有四東南為靉陽南為清河西為撫順北為柴河三岔兒間俱當設重兵而鎮江南障四衛東顧朝鮮亦不可少者此險要之大略也四路首尾相護每路設民三萬裨將十五六員分奇正以當一靣鎮江設兵二萬裨將七八員半劄義州半劄鎮江夾鴨緑江而守此聯絡之大略也清河撫順三岔兒山多漫坡可騎步並進當用西北兵以西北大將統之寬靉林箐險阻可專用川土兵以西南大將統之鎮江水路之衝當兼用南北兵將此兵將之大略也各路領兵到邉畫地而守小警自為堵禦大敵互相應援挑其精悍者時出而撓之此坐困而轉蹙之大略也善行師者行必結陳止必立營貯放糧草兼作退步再設兵二萬駐遼陽以壯中堅海州設兵一萬以備後徑金復設兵一萬以杜南侵此征行居守之大略也後金兵破北關金台失自焚死白羊骨出降被殺北關亡擢贊善徐光啓以少詹事兼河南道御史專練京營九月庚辰朔以李懷信代李如禎將從經略請也允釋罪將麻承恩劉孔胤各納馬自贖仍令援遼立功給事中薛鳯翔言目前大政有應舉行者六謂儲講册太孫輔大􅒼下考選舉遺釋纍有應停止者三謂內批織造稅使有今日必不能得而他日必不可不行者二謂御殿發帑疏留中吏部等衙門尚書等官趙炳等詣文華門直陳遼左垂亡京師立蹙懇乞聖明臨朝用人行政報聞經略熊廷弼言比關陷後人心愈潰瀋陽空城難守不如還守遼陽厚集兵力人衆膽壯事勢萬全再圖恢復由是濬濠築垣借水為險人始有固志焉徐光啓奏兵事百不相應非博選天下竒才教練一二年決不可用尋以病乞歸光啓𥘉練兵費二百萬樞臣計臣相顧愕眙營緒未畢一簣中止至于招募四出坐糜千萬無一勝兵而後核其乾沒亦無及矣戶部主事楊嗣昌言募兵調兵逃兵之害并言各處土兵俱為遼出此苗狆得志之秋橫肆攻圍之日也又言水藺之役黔蜀相爭以莫解之冤共行間之役勢必有變十月庚戌朔山東撫按王在晉陳王庭言登萊等處兵將空虗建州姦細謀絶運道請復昔日之兵處應添之餉大同遊擊焦垣領兵八百援遼至懷安兵夜變垣縋城遁衆兵介馬控弦大索守備張承憲以單騎行亂兵中諭定之吏部尚書趙煥卒東師失律中外震驚率􅒼叩宫鵠俟竟日上為憮然至是以勒瘁卒于京師性素孝友寡嗜欲歷仕五十年自奉不踰寒素十一月庚辰朔建州遣其壻好里于斗問和于朝鮮朝鮮震懼請援建州兵擁入龍潭口且往開鐵馱運窖粟遼左大雪多涷飢經略檄總兵柴國柱等屯虎皮驛各路聨絡以扼賊衝以糧匱撤回遼陽就食御史彭化鯉言救遼之策有三言一曰速充國之疏七日報可事動經年人患其遲一曰實宣和之詔挂之墻壁而人不覩以其文也一曰斷宋雖議多功少其主亦時出獨斷不報後金築城撫順邉外且堅守牛毛寨萬遮嶺廣造攻具結連蒙古暖粆虎墩諸酋既而聲犯寬奠鎮江告急十二月庚戍朔司業張鼐陳太學六論一端本二清途三慎選四聲教五遵範六除習不報員外郎馮時行奏獻竒車曰飛輪車曰旋風車曰降魔杵車曰滚地産車曰轆轤車造車五百輛用兵一萬人餉三十萬一月可復開鐵不報遼左是時調兵十八萬歲增餉三百二十四萬即陸運車三萬七千輛用牛七萬四千頭贊畫劉國縉所募新兵一萬七千四百餘名分彂鎮江清河防守一時逃散殆盡御史周萬鎰言夷氛叵測廟算甚疏敬陳十二事舉視朝之典重根本之地發內帑之財嚴海防之道保形勝之地慎兵將之選連屬國之援安內地之民守門庭之險審議論之冝議理財之道昭懲勸之法大學士方從哲以署吏禮都察院官及順天大同巡撫請不報萬曆四十八年庚申正月庚辰朔釋御史劉光復為民給事中曽汝召為宗臣充戚臣王昺請乞釋禁還藉而以楊鎬逮而不誅李維翰寬罷失平李如柏李如楨鄭之范失律棄城乞盡下法官正罪疏留中增設關南海口關外羅城守備以閻輔李茂春為之熊廷弼奏言遼陽瀋陽撫順清河靉陽寬奠鎮皆當敵一靣來路不置兵無以阻其闌入不多置兵無以當其聚攻如僅屯聚一處其去逺者三四百里近亦百里其何能濟况海州三坌河金復等處尚議添設以護海運以防門戶作何鋪擺又言朝鮮自義州以上咸鏡六鎮猶足自衛而我自清靉以逹岫巗迤邐而南四衛則遼陽屏蔽在焉敵窺朝鮮取道牛毛東葛等嶺趨寬奠徑度昌城則一江隔阻聲援不及而朝鮮危不然由寬境直入鴉鶻關途鳯凰城蹂躪金蓋以西則遼之腹背俱寒而遼陽亦危又不然由清靉兩路奔岫巖南犯繞鳯凰城而攻鎮江則遼之八站與江東城俱為孤注而遼陽朝鮮又兩危由斯以談鎮江橫據水路之勢重而扼門戶以牽制其左右之衝突則寬奠尤重添設寬鎮兵將已不煩再計矣而樞臣𥿄上有兵出關無兵則各設添設亦𥿄上空言爾部議招集新兵歸伍團練責成道臣即克金復海蓋岔河等一帶防守依擬行二月己酉朔癸丑日生交暈如連環白虹彌天百官具疏候思善門叩請批發章奏不允御史李徴儀給事中張延登皆以求去不得出城候旨給事中曽汝召言遼民雖殘遼土如故請令遼陽十八萬軍士捍牧圉于外而諸孱弱與逃伍之兵授牛隻分土地而課之耕用以飽十八萬軍士當無不贍者誠為便計疏留中給遼東湧珠鐵炮二千位連珠鐵炮五百位從經臣所請也泰安岱廟神像口出火熖三月己卯朔巡漕御史毛一鷺陳三事一泇河之完工當議一水匱之清查當議一衛河之疏濬當議從之部議加派省直田地每畝二釐復滿旦阿暈舊賞總督文球言其前雖助逆今已悔罪陜撫李起元奏延鎮欵虜互市竣請輔給各酋升賞從之遼陽火藥局被焚闔城驚優京師戒嚴兵科薛鳯翔劾贊畫劉國縉招兵萬餘全伍脫逃道臣閻鳴泰馬匹草料纍月不給請治罪熊廷弼奏廣寧為遼陽後徑撫臣屢討援請該部别行徴募糧草罄竭乞催發接濟四月戊申朔大學士方從哲言遼陽搶犯決在旦夕皇上未肯臨朝靣啇備禦倘遼城一失則廣寧以西處處皆危而京師隨之彼時廟社陵寢將何如安置無恙而可漫不為意上曰弘濟時艱正望卿運籌匡贊傳示該部傳諭經略督撫齊心併力防勦癸丑皇后王氏崩戊午大學士方從哲詣思善門哭臨畢詣仁德門問安召見于弘德殿御榻東向上側身卧上云朕自去年三月以來頭目眩暈至今不時瀉痢神思恍惚又昻首向從哲云試看朕容且出手腕令看從哲奏慰畢因奏東事緊急又值皇后大禮請點閣臣上云遼東事只是文武不和以致如此閣臣本已批矣查出即發從哲請輔大􅒼科道上云知道了從哲叩首而出永順土司彭元錦願以萬兵援遼朝廷嘉其忠義加升都督僉事錫飛魚服色既而部檄八千僅以三千兵使將將之赴遼而自稱病不行戶科官應震言舊相張居正以申韓之學志冨強之功一時能者在職朝無幸位久而論㝎懇乞昭雪五月戊寅朔御史張銓奏言國家之亂皆起于民窮財盡履畝加賦七釐未已而九釐窮民何以堪此大內積金如瓦䃯而發帑之請呌閽不應加派之議朝奏夕可豈財為皇上之財而民非皇上之民乎加石柱宣撫司統兵女官秦氏三品服詔慰朝鮮時邉臣傳言朝鮮私通建州者國王李暐遣陪臣奏辨言不能焚書斬使而相機制權心實自明廷議謂當彰天朝字小之仁以寢狡謀搆誣之計豫敕書諭之以故南關裔指揮王世忠為遊擊風示四夷經略熊廷弼以兵力稍集請守瀋陽貴州巡撫張鶴鳴奏永寧土官奢崇明侵占白撒所屯地勒令一一退吐如不遵奉當改上為流官蓋鶴鳴貪婪借名以激其必反爾御史倪應春言皇上深居稱朕輔臣從哲忽蒙召見臣意輔臣眷懷時事涕泣開導者無所不至而寥寥𢾗語俄出俄入以致聖心愈厭豈不虛此良遘哉六月丁未朔建州萬騎由撫順關萬騎由東川堡深入至渾河賀世賢柴國柱設防瀋陽却之熊廷弼以軍士勞苦真堪痛哭之狀籲乞恩賚命戶工二部發銀二十萬兩犒賞遼軍上大行皇后尊諡曰孝端命皇太子才人王氏附葬于郭妃墳園之側七月丙子朔給事中薛鳯翔言劉國縉兵逃失伍不聞引罪之章回衛許時輒稱單騎之赴徑情往還作非客非主之官一彼一此不受經臣節制當令速回聼勘從之保靖土官彭象乾兵至涿州一夕逃散雲南巡撫沈警炌言安疆臣再逞悖逆真所罕睹安效良承繼烏撒原經三省會勘奉旨準襲效良即淫虐寡恩致起釁端然官印豈可擅奪兵端豈可擅興乞敕四川川南二道貴州貴寧畢節雲南曲靖各道勒限擒拏會問正法下兵部遼撫周永春告病不允經略熊廷弼以病告休不許丙申上病大漸召英國公張惟賢大學士方從哲尚書周嘉謨李汝華黃嘉善張問逹黃克纘侍郎孫如遊入見于弘德殿各致詞候安畢嘉謨以用人請上俞允之上問遼事云何嘉善曰臣當戮力料理即日蕩平無煩聖慮上頷之諸臣叩頭而出諭內閣朕嗣祖宗大位歷今四十八年因國事焦勞以致脾疾不起有負先帝付托惟皇太子青宫有年實賴卿與司禮監協心輔佐遵守祖制保固皇圖卿等功在社稷萬世不泯是日帝崩遺詔曰朕以沖齡纘承大統君臨海內四十八載干兹享國最長夫復何憾念朕嗣服之𥘉兢兢化理期無負先帝付托比緣多病靜挕有年郊廟弗躬朝講希御封章多滯􅒼宷半空加以礦稅繁興徴調四出民生日蹙邉釁漸開夙夜思惟不勝追悔方圖改轍嘉與天下維新而遘疾彌留殆不可起蓋愆輔過允賴後人皇太子聰明仁孝􅌖德夙成冝嗣皇帝位尚其修身勤政親賢納諌以永洪圖皇長孫冝及時册立進學瑞王惠王桂王各擇善地令早就藩封大小臣工務協恭和衷輔理嗣君保乂王室是皆朕惓惓之至意也內閣輔臣亟為簡任卿二大􅒼盡行推補兩次考選并散館補道官俱令授職建言廢棄及礦稅注誤諸臣酌量起用一切榷稅并新增織造燒造等項悉皆停止各衙門見監人犯俱送法司查審應釋東師缺餉宜多發內帑以助軍需陳亡將士速加恤録喪禮遵舊制以日易月二十七日釋毋禁民間音樂嫁娶宗室親王藩屏為重弗得輒離本國各處總督鎮巡三司官地方所繫不許擅去職守聞喪之日止于本處哭臨三日進香差官代行衛所府州縣并土官並免進香詔告天下咸使聞知尊諡曰範天合道哲肅敦簡光文章武安仁止孝顯皇帝廟號神宗葬定陵論曰天子統御天下其大政不越𢾗端用人聼言理財治兵而已而財之盈虛兵之強弱又未有不本乎聼與用者之當與不當萬曆𥘉年輔臣張居正擅而才天子深倚重焉以法制天下朝令夕行尤留心邉事縶維俺答宣大以西桴鼓凝埃矣用大帥戚于薊鎮李于遼左當時九邉晏如羣吏畏法國用饒足差方黃龍地節之間泊乎天子年日壯改絃鼓瑟而新進喜事者據甚美之名以關有識之口其始曰清姦黨既瀆矣又為之説曰去苛政曰開言路苛政去即一切綱維檢柙隄防鈎校咸以為厲民而莫之用言路開則酬恩怨任愛憎與身有隱過避黨彈射者恣行其胸臆天子曰嘻彼更張者始未嘗不新耳目快心志而今浸淫至是也何哉朕乃知治理矣矯亢而太嚴者必激激固漓天下之和詭隨太甚則又昵昵成懦懦成溺而天下之大義以潰今而往其惟去𥘉政之慘礉寡恩而仍行𥘉政之率作綜核憲典權衡兵食庶幾惇大中有修明振動之氣哉夫如是則衆言朋興皇志自定豈復憂驕將按劍屬夷抗命之漸奈之何因循日甚而兵食兩詘夫胡兒狼心不可以中國之冠帶豢主邉計者疏冠一軍制曰可後又摧折甚跳而赱險爰發大師雲集堅城之下而帑金𢾗百萬立盡一耗也朝鮮之急偏師可援而當國者欲就宋經略之功名輕議遠討直抵王京之東島寇方張而帑金𢾗百萬又已立盡二耗也楊酋應龍𥘉有功後反覆以覘上意宜撫而職事議以勦示張皇之效勦失利又議以撫收鎮定之功後卒無成而徒役𢾗省之兵竭百萬之餉三耗也斯時且力圖休養以濟羸虛猶恐無及而又輕聼姦人之言旁搜山澤之利冠蓋如雲徒衆如雨地脈摧殘閭閻蕩析本末相權得不償失而遐邇之民立疲焉由是廷臣之好名者連篇纍牘訐當國者之失策而朝堂水火矣雖其持論各有所短長大抵世所謂小人者皆真小人而所謂君子者未必皆真君子也可勝嘆哉時天子亦厭苦間多斥逐而人心益囂何者斥逐未有以當其罪也于是持論者益堅遂有南北沈黨之目又有淮上黨顧黨王黨之目而朋黨之盛昉乎此嗟乎人臣結黨以相傾此國家之大不利也斯時天子當進攻黨者而諭之曰君猶天也猶心也萬物同出于天百體同令乎心而東西參啇肝膽楚越可乎不可又進黨者而諭之曰子大夫之黨何為者得毋自謂君子耶君子有黨其説肇于贊皇弘于廬陵然朕嘗聞古聖之明訓矣不曰群而不黨乎又聞其繫易曰物以群分群不言合而言分者苟利社稷上為德下為民必親而愛焉親愛之為群反是者即以不受親與愛而分是何適而非分哉若夫忠佞不别附我者植合強摧弱合衆陵獨斯為黨爾黨一立則在黨外者縱有忠君利國之圖而立不能相下之勢國家究不得一全才之用朕又奚賴今與子大夫約各捐去黨私偕之大道子大夫不聼朕髙皇帝有三尺在朕將從事焉無食言果若兹則傾陷之夫畏天子之覺之也即內懷忠而外盛氣者亦且兢兢然恐拂天子之意必俱革轍而各以其結黨攻黨之精神移之以工國事又奈之何髙閣置之批答益寡朝鞭久不鳴章疏留中者十九推升者不下被彈者不議天子之一切鄙夷也豈不曰大臣之無足仗也言路之無可採也置之不用不答庶幾其可哉然不用則所用者益寡而一人操𢾗柄益得以持權矣且旨久不報則紏章一上不得旨處分而被紏者即去臺省不益恣行哉漸且輔臣不能持政而有當闕虎豹者出放廢天下賢人殆盡凡中外之得選臺省者皆閣不下舊臺省益得籠致後進必入其黨當時所喧持者惟禁道學一事而吏治邉防俱置不理賄賂日張將駑兵驕而邉關告急此何時乎殆安危存亡之秋也天子必當下罪已之詔赫然與群工更始曰咨爾邉臣彼不過漢一大縣我控弦之士見之却而走何歟汝其穀乃甲胄煆乃戈矛峙乃糗糧其必弔必善必宿否則汝殛朕且不汝貸又曰咨爾司馬將者國之司命經略者又將之司命可勿慎歟擇人而用之王用人而擇之亡汝欽擇焉其母忽苟有陳連進之謀奏搗巢之策者天子曰噫若是易耶朕考兵法曰神靈威明與天合勾萌動作與地俱隂陽寒暑與時至今者天意順歟地利得歟時不可失歟三者全其尚迪果毅功多有厚賞不迪有顯罰一之不備姑且礪戈儲糧以待彼黎庶者父母妻子所仰之身愼毋遽驅之鋒鏑下又慎毋以𢾗十年來朕所賴西平哱賊東平倭南平楊酋諸渠帥一旦漫置之荒漠之野俾進退失據而若等負濫首之謗于天下哉夫然後技精而氣充見可而進知難而退庶收萬全之效又奈之何無知人之鑑衆言搖亂又不克折衷如樞臣以邉才薦楊鎬夫鎬者敗群之羊駕而復馳義不可許天子曰允哉汝諧閫以外將軍制之首輔方從哲以腐枝持大厦天下寒心而天子以為忠命之曰進止機冝汝實代朕詔諸邉以作朕將軍之氣由是紅旗督戰三路喪師大將若劉杜輩一旦云殂餉竭財匱而邉難益發賦加民貧流寇乘之土崩瓦解禍發于天啓崇禎之代惜哉當萬曆朝天下方全盛倘任得其人而章疏又無中閼之象寧有兹患哉故曰欲天下久安而常治在乎財贍而兵強欲財贍而兵強義貴乎主之能知人與善聼言又論曰顯皇帝蒙襲承平享國長久恬熙蘖釁坐蹙強土卒貽繼世之患豈真委轡失馭哉帝之所患在于智術有餘觀世太熟而有厭薄其臣下以為不足當吾輕重長短之意夫人主者天下之大身也大小臣工其心膂股肱耳目也身之所能以不用為用者為幸其心膂股肱耳目之所自愛而收其用人主幸其臣之自愛其道德也而收其啓沃之用幸其臣之自愛其功名也而收其諷議之用幸其臣之自愛其冨貴也而收其勤勞敬慎之用今吾一切土苴置之談笑麾之曰是纍纍者牘人之情偽盡知之矣是將矯拂其君以樂居于隂陽禍福之間而重獲其名髙厚實以自利焉吾姑勿與為喜怒可否以無令窺吾短長緩急以便其身圖而亦使知玄黃水火之無用也而矍然其自已嗚呼使人臣盡撤其名髙厚實之碩人主誰復與共天下者哉且人臣委身筮仕必不能舍其道德功名冨貴以獨立于無事之地明矣既不獲邀君之喜怒可否以效其用勢必橫溢四出以嘗試而求勝而焬灶之徒坐起而收之于是一時之短長緩急不在人主而在人主床第醉飽之間威神隂蝕不與同盡抑巳鮮矣自昔朋黨之盛莫如東漢及宋元祐熙豐間方其大權在上諸君子挾其道德功名之志與營據冨貴之小人爭勝于人主之喜怒可否而力持于消長之介人主雖不能盡别其淄澠而靈爽所及常居中而互收其用及夫主聰既塞竊命者乘瑕鬻權節義禮學之氣散而求聚不能遂上殿之爭而從事穴中之鬪畢期焦爛卒殄國祚由此觀之凡有血氣莫能忘爭一薰一蕕猶有餘臭人知熹廟委命上公不惜挈其心膂股肱耳目以投刑餘之一燼而不知非定陵四十餘年之留中不省彼痿痺思振之氣亦何至橫溢難禦甘蹈清流之覆人亡邦瘁無辭階厲哉蓋帝𥘉亦自任其智術謂不為人臣之所用而孰知有從旁而用之者之禍至此烈也嗚呼古之以不用為用者非大智孰能當此乎又曰治天下之道譬猶弓然更張太驟則一弛而不復收神廟𥘉年中有母后外有貴強相綱紀振肅是時也若弦方張若弓在檠天子沖齡敬恭師保亡敢侈度恣情以貽慈聖憂及江陵相卒而朝講漸疏批答漸滯人心風俗漸委靡百司庶􅒼承江陵操切之餘樂于寬弛而自便宰輔大臣深懼攬權任事之名而務為委順謙光之習上不敢忤天子而下不敢讎庶司當江陵相時天子若負芒刺若嚴師傳江陵一死而唯諾將順者共矯江陵之所為深居九重稱朕不聞誰復正色而紏哉故貽神廟末載隳廢之憂者實江陵當國時􅍾之太急有以致之也江陵固才相罪不掩功使彼當柄時稍知以恭謹斂其傲而以柔道劑其剛毋以恣愎失主心毋以束濕賈衆怨天假之年久在相位而從容調燮務為萬全善後之圖主德以夾輔而勵精政化以久道而不變政成請老薦賢自代使守畫一神廟一朝之治豈不始終備美哉而惜其不出此也交歡馮保以結宫闈假母后以鉗幼主凡平日握權專斷徑行無阻幼主固已悒悒不快矣特制于母后而陽尊禮之一旦時移勢改發攄夙憤跋扈臣死恨晚爾寧復念其勞績而遵成盡乎盡改其法理固然也人情強其所不甘至于太甚必有悱然欲變之情神廟天性純柔江陵事之以操切以嚴濟寬相輔有功而無如其難合也申王輩繼之瑟琴專一如水濟水大勢痿痺而不可返矣以若臣居幃帷而奉深居拱默之主然猶闢土夜郎振旅寧夏用兵海邦威行絶域雖驛騷中土勞敝士卒而文武大吏頗能敵愾天威所加罔不糜碎是實江陵操切之成效也豈神廟深居拱默二三相臣唯諾順承之所能致哉且非持三征也神廟𥘉年江陵用殷石汀平嶺東用曽確菴平都蠻用凌雲翼平羅旁徴調或𢾗十萬拓地𢾗百里而所遴擢才臣名將立功邉徼者不可勝𢾗三征特籍其餘威爾乘令行禁止之勢加以山壓卵之兵什圍伍攻其愁不克帝始能委任江陵大綱振舉雖恩禮不終亦足警後權姦之圖假托者末年倦勤堂陛不交政務寢閣釀數世叢脞不振之憂然忽置繁瑣而大事能斷優容士夫而􅉏御悚息𢾗十年間九重髙拱中外憂疑太阿獨持未嘗旁落廟號稱神豈不信夫又曰神廟于世事無所不濡緩而尤莫緩于建儲建儲之緩一阻于豔妃之煽二激于衆議之淆三惑于宰相之無定識豔妃之煽衆議之淆猶可言也宰相之無定識不可言也天子不能絶衽席之寵而有立愛子之疑所賴大臣正色百執事昌言而顧乃持迎合之説以姦大統並封之揭王太倉得辭其責耶雖勉徇公論儲位卒定而遲之𢾗年議論煩多猜沮百出馴至三案之訟幾貽黨錮之憂邪正既分水火遂激其原皆為國本而神廟所以遲之不決致開天下之疑者實太倉先入之言為之祟也彼慿寵匹嫡者猶憚盈廷之議即小臣交章天子殊厭忽不理宰相一言天子所籍以資剖畫庶司百僚所恃以回天聼而蚤為逢悅之策天子安得不厚自解免而有詞于天下哉及後來悔過矢力挽回而終不能掩並封之誤也大臣當國欲定危疑決大事而進説于人主可不慎乎且自來朋黨之禍未有不起于優柔不斷之朝者也人主英明是非立剖刑賞不淹賢者無所開號召之門而小人亦無所為植黨之計其次則天子寬仁相臣明決猶能渙群和衆而不使日滋諍議之端萬曆𥘉年門戶未熾以江陵為之相也嗣後建白繁興衆言淆亂九重拱默而不聞大臣叩閽而莫應君子懷杞憂而讜論莫申相率有孚號同志之心小人蓄姦諛而刑憲無章亦競圖黨邪醜正之事國家一有風影之疑糾紛之事君子倡大義而建言小人肆讒説而傾正貌君子者亦欲借事以邀譽附小人者不惜違心以徇私百年之間朋黨之􅍔竟與國運相終始始于爭國本極于論三案而敗于攻魏璫忠臣節士肝腦塗地名甚正心甚苦而事甚難其中雖有敗類而不足為衆正纍其嫉君子者當論國本時已竊竊然倡調停省事之説以圖定策邀冨貴刺訊君子而總歸其罪于好名理亦近似殊足蠱惑天下之聼聞及逆閹橫行濁亂海內所抗章犯難而振髙岡之鳴者究止一二圖定策邀冨貴之君子而碌碌調停省事者方且奴顔婢態入逆閹之門而施下石之毒也至是而猶欲以好名排議君子而快小人之心是尚有人心也哉嗚呼使神廟蚤定立長之計毋起天下易儲之疑浮言既息論辨自消必不遺兩朝邪正傾軋之患諸君子罹􅍔不足惜而後之門户日以紛攘議論益多事功不講而馴至于隳敗是非神廟優柔不斷之所釀􅍔乎由今追昔不無志感焉且以警後世也
